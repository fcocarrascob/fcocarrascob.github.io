<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="arr3g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="940" height="360" fill="#ffffff"/>

  <!-- ============ IZQ: breakout en corte (PLANTA del pedestal) ============ -->
  <g>
    <text x="235" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Breakout en corte (planta pedestal)</text>
    <rect x="95" y="45" width="280" height="280" fill="#efece6" stroke="#8a857c"/>
    <!-- semi-cone from front row toward bottom edge: front row y=255 (ca1=200 -> 70px), anchors x at 177,212,258,293 -->
    <polygon points="177,255 293,255 375,325 95,325" fill="#d9480f" fill-opacity="0.14" stroke="#d9480f" stroke-width="2" stroke-dasharray="7 4"/>
    <!-- 4x4 anchors: cols x 177,212,258,293 ; rows y 115,150,220,255 -->
    <g fill="#3f3f3f">
      <circle cx="177" cy="115" r="5"/><circle cx="212" cy="115" r="5"/><circle cx="258" cy="115" r="5"/><circle cx="293" cy="115" r="5"/>
      <circle cx="177" cy="150" r="5"/><circle cx="212" cy="150" r="5"/><circle cx="258" cy="150" r="5"/><circle cx="293" cy="150" r="5"/>
      <circle cx="177" cy="220" r="5"/><circle cx="212" cy="220" r="5"/><circle cx="258" cy="220" r="5"/><circle cx="293" cy="220" r="5"/>
      <circle cx="177" cy="255" r="5"/><circle cx="212" cy="255" r="5"/><circle cx="258" cy="255" r="5"/><circle cx="293" cy="255" r="5"/>
    </g>
    <!-- shear arrow -->
    <line x1="235" y1="170" x2="235" y2="205" stroke="#b02a1a" stroke-width="3" marker-end="url(#arr3)"/>
    <text x="244" y="192" font-size="14" fill="#b02a1a" font-weight="bold">V</text>
    <!-- dims -->
    <line x1="390" y1="255" x2="390" y2="325" stroke="#666" stroke-width="1" marker-start="url(#arr3g)" marker-end="url(#arr3g)"/>
    <text x="398" y="294" font-size="12.5" fill="#666">c_a1 = 200</text>
    <line x1="95" y1="340" x2="375" y2="340" stroke="#666" stroke-width="1" marker-start="url(#arr3g)" marker-end="url(#arr3g)"/>
    <text x="235" y="356" font-size="12.5" text-anchor="middle" fill="#666">A_Vc limitado por el ancho 800 del pedestal</text>
    <text x="60" y="300" font-size="12.5" fill="#d9480f" text-anchor="start" transform="rotate(-40 60,300)">1.5·c_a1</text>
    <text x="235" y="80" font-size="12" text-anchor="middle" fill="#555">borde libre abajo ↓</text>
  </g>

  <!-- ============ DER: pryout (corte) ============ -->
  <g>
    <text x="705" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Pryout (sección)</text>
    <rect x="530" y="105" width="350" height="220" fill="#efece6" stroke="#8a857c"/>
    <rect x="560" y="92" width="290" height="13" fill="#5b6470"/>
    <!-- anchor -->
    <rect x="698" y="55" width="13" height="185" fill="#3f3f3f"/>
    <rect x="688" y="240" width="34" height="11" fill="#3f3f3f"/>
    <!-- shear at top -->
    <line x1="698" y1="75" x2="655" y2="75" stroke="#b02a1a" stroke-width="3" marker-end="url(#arr3)"/>
    <text x="662" y="65" font-size="14" fill="#b02a1a" font-weight="bold">V</text>
    <!-- back-side wedge popping up (behind = right side) -->
    <polygon points="705,240 850,105 711,105" fill="#d9480f" fill-opacity="0.14"/>
    <line x1="705" y1="240" x2="850" y2="105" stroke="#d9480f" stroke-width="2.2" stroke-dasharray="7 4"/>
    <line x1="778" y1="150" x2="792" y2="132" stroke="#b02a1a" stroke-width="2" marker-end="url(#arr3)"/>
    <text x="736" y="172" font-size="12.5" fill="#d9480f">el hormigón "salta"</text>
    <text x="736" y="188" font-size="12.5" fill="#d9480f">detrás del anclaje</text>
    <text x="705" y="290" font-size="13" text-anchor="middle" fill="#444">V_cpg = k_cp · N_cbg   (k_cp = 2 si h_ef ≥ 65 mm)</text>
    <text x="705" y="310" font-size="12.5" text-anchor="middle" fill="#555">típico de anclajes cortos y rígidos — aquí no controla</text>
  </g>
</svg>
