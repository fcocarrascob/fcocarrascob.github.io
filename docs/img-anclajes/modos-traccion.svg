<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <pattern id="crush" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="6" fill="#f6c9b3"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#d9480f" stroke-width="1.4"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="960" height="320" fill="#ffffff"/>

  <!-- ============ Panel (a) fluencia del acero ============ -->
  <g>
    <rect x="15" y="80" width="210" height="190" fill="#efece6" stroke="#8a857c"/>
    <rect x="45" y="66" width="150" height="14" fill="#5b6470"/>
    <text x="200" y="62" font-size="11" fill="#5b6470">placa</text>
    <!-- rod with necking -->
    <path d="M113,20 L113,140 L115,155 L113,170 L113,232 L127,232 L127,170 L125,155 L127,140 L127,20 Z" fill="#3f3f3f"/>
    <rect x="102" y="232" width="50" height="12" fill="#3f3f3f"/>
    <ellipse cx="120" cy="155" rx="16" ry="22" fill="none" stroke="#d9480f" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="142" y="152" font-size="12" fill="#d9480f">fluye /</text>
    <text x="142" y="166" font-size="12" fill="#d9480f">estricción</text>
    <line x1="120" y1="20" x2="120" y2="4" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="128" y="12" font-size="13" fill="#b02a1a" font-weight="bold">N</text>
    <text x="120" y="292" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">1. Acero: N_sa</text>
    <text x="120" y="308" font-size="12" text-anchor="middle" fill="#1c7c3c">DÚCTIL — el fusible deseado</text>
  </g>

  <!-- ============ Panel (b) breakout ============ -->
  <g transform="translate(240,0)">
    <rect x="15" y="80" width="210" height="190" fill="#efece6" stroke="#8a857c"/>
    <rect x="45" y="66" width="150" height="14" fill="#5b6470"/>
    <!-- cone -->
    <polygon points="106,232 134,232 220,80 20,80" fill="#d9480f" fill-opacity="0.12"/>
    <line x1="106" y1="232" x2="20" y2="80" stroke="#d9480f" stroke-width="2" stroke-dasharray="6 4"/>
    <line x1="134" y1="232" x2="220" y2="80" stroke="#d9480f" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="113" y="20" width="14" height="212" fill="#3f3f3f"/>
    <rect x="102" y="232" width="50" height="12" fill="#3f3f3f"/>
    <line x1="120" y1="20" x2="120" y2="4" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="128" y="12" font-size="13" fill="#b02a1a" font-weight="bold">N</text>
    <!-- 35 deg -->
    <path d="M170,232 A28,28 0 0 0 156,208" fill="none" stroke="#a35" stroke-width="1.4" transform="translate(-16,0)"/>
    <text x="163" y="226" font-size="11" fill="#a35">≈35°</text>
    <text x="120" y="292" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">2. Breakout: N_cbg</text>
    <text x="120" y="308" font-size="12" text-anchor="middle" fill="#b02a1a">FRÁGIL — cono a 1.5·h_ef</text>
  </g>

  <!-- ============ Panel (c) pullout ============ -->
  <g transform="translate(480,0)">
    <rect x="15" y="80" width="210" height="190" fill="#efece6" stroke="#8a857c"/>
    <rect x="45" y="66" width="150" height="14" fill="#5b6470"/>
    <!-- crushing above head -->
    <path d="M102,232 Q120,196 152,232 Z" fill="url(#crush)" stroke="#d9480f" stroke-width="1.5"/>
    <rect x="113" y="20" width="14" height="212" fill="#3f3f3f"/>
    <rect x="102" y="232" width="50" height="12" fill="#3f3f3f"/>
    <line x1="120" y1="20" x2="120" y2="4" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="128" y="12" font-size="13" fill="#b02a1a" font-weight="bold">N</text>
    <text x="160" y="212" font-size="12" fill="#d9480f">aplastamiento</text>
    <text x="160" y="226" font-size="12" fill="#d9480f">sobre A_brg</text>
    <text x="120" y="292" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">3. Pullout: N_pn</text>
    <text x="120" y="308" font-size="12" text-anchor="middle" fill="#b02a1a">FRÁGIL — mejora con planchuela</text>
  </g>

  <!-- ============ Panel (d) side-face blowout ============ -->
  <g transform="translate(720,0)">
    <rect x="15" y="80" width="210" height="190" fill="#efece6" stroke="#8a857c"/>
    <rect x="30" y="66" width="120" height="14" fill="#5b6470"/>
    <!-- anchor near left edge -->
    <polygon points="15,200 58,214 58,250 15,264" fill="#d9480f" fill-opacity="0.15" stroke="#d9480f" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="61" y="20" width="14" height="212" fill="#3f3f3f"/>
    <rect x="50" y="232" width="46" height="12" fill="#3f3f3f"/>
    <line x1="68" y1="20" x2="68" y2="4" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#arr)"/>
    <text x="76" y="12" font-size="13" fill="#b02a1a" font-weight="bold">N</text>
    <line x1="52" y1="232" x2="20" y2="232" stroke="#b02a1a" stroke-width="2" marker-end="url(#arr)"/>
    <!-- edge distance dim -->
    <line x1="15" y1="140" x2="61" y2="140" stroke="#666" stroke-width="1"/>
    <line x1="15" y1="134" x2="15" y2="146" stroke="#666" stroke-width="1"/>
    <line x1="61" y1="134" x2="61" y2="146" stroke="#666" stroke-width="1"/>
    <text x="80" y="144" font-size="12" fill="#666">c_a &lt; 0.4·h_ef</text>
    <text x="120" y="292" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">4. Side-face blowout: N_sb</text>
    <text x="120" y="308" font-size="12" text-anchor="middle" fill="#b02a1a">FRÁGIL — cabeza profunda + borde</text>
  </g>
</svg>
