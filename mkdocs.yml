site_name: Ingeniería Estructural
site_url: https://fcocarrascob.github.io
site_description: Wiki de referencia técnica para ingeniería estructural
site_author: Francisco Carrasco

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: es
  - mkdocs-jupyter:
      execute: false
      include_source: true

nav:
  - Inicio: index.md
  - Hormigón:
    - hormigon/index.md
  - Estanques:
    - estanques/index.md
  - Sismo:
    - sismo/index.md
  - Herramientas Python:
    - herramientas/index.md
  - Guía de contenido: guia-contenido.md
