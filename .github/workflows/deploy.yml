name: Deploy MkDocs a GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node: build Canvas Notepad (React/Vite) ─────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: math-notebook/package-lock.json

      - name: Build Canvas Notepad
        working-directory: math-notebook
        run: |
          npm ci
          npm run build
        # Vite deposita el build en docs/canvas-notepad/
        # MkDocs lo incluirá automáticamente en el deploy

      # ── Python: build & deploy MkDocs ───────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Deploy a GitHub Pages
        run: mkdocs gh-deploy --force
