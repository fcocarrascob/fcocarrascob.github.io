<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Por qué el borde importa: elementos no atiesados vs atiesados</text>

  <!-- divider -->
  <line x1="470" y1="55" x2="470" y2="330" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== LEFT: NO ATIESADO ===== -->
  <g>
    <text x="235" y="72" font-size="13.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">NO ATIESADO — apoyado en 1 borde</text>
    <!-- I-section with one flange half highlighted -->
    <rect x="150" y="105" width="170" height="14" fill="#efece6" stroke="#8a857c"/>
    <rect x="227" y="119" width="16" height="120" fill="#efece6" stroke="#8a857c"/>
    <rect x="150" y="239" width="170" height="14" fill="#efece6" stroke="#8a857c"/>
    <!-- highlight the outstanding flange (from web to free tip) -->
    <rect x="150" y="105" width="77" height="14" fill="#b02a1a" fill-opacity="0.22" stroke="#b02a1a" stroke-width="1.4"/>
    <!-- supported edge (at web) vs free edge (tip) -->
    <circle cx="227" cy="112" r="4" fill="#1c7c3c"/>
    <text x="252" y="100" font-size="10.5" fill="#1c7c3c">borde apoyado (alma)</text>
    <line x1="150" y1="112" x2="150" y2="112"/>
    <path d="M150,128 q 10,10 0,20" fill="none" stroke="#b02a1a" stroke-width="2"/>
    <text x="120" y="150" font-size="10.5" fill="#b02a1a" text-anchor="end">borde</text>
    <text x="120" y="163" font-size="10.5" fill="#b02a1a" text-anchor="end">libre</text>
    <!-- b measured full width from support to tip -->
    <line x1="150" y1="92" x2="227" y2="92" stroke="#666" stroke-width="1" marker-start="url(#aa)" marker-end="url(#aa)"/>
    <text x="188" y="86" font-size="11" fill="#666" text-anchor="middle">b</text>
    <text x="235" y="290" font-size="12" fill="#b02a1a" text-anchor="middle" font-weight="bold">un borde libre → pandea más fácil</text>
    <text x="235" y="310" font-size="11.5" fill="#555" text-anchor="middle">límites λ_r MENORES (más estrictos)</text>
    <text x="235" y="326" font-size="11" fill="#555" text-anchor="middle">ej: alas de I, canales, tés, ángulos</text>
  </g>

  <!-- ===== RIGHT: ATIESADO ===== -->
  <g>
    <text x="705" y="72" font-size="13.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">ATIESADO — apoyado en 2 bordes</text>
    <!-- I-section with web highlighted -->
    <rect x="620" y="105" width="170" height="14" fill="#efece6" stroke="#8a857c"/>
    <rect x="697" y="119" width="16" height="120" fill="#1c7c3c" fill-opacity="0.20" stroke="#1c7c3c" stroke-width="1.4"/>
    <rect x="620" y="239" width="170" height="14" fill="#efece6" stroke="#8a857c"/>
    <!-- both supported edges -->
    <circle cx="705" cy="122" r="4" fill="#1c7c3c"/>
    <circle cx="705" cy="236" r="4" fill="#1c7c3c"/>
    <text x="730" y="128" font-size="10.5" fill="#1c7c3c">apoyado (ala sup.)</text>
    <text x="730" y="232" font-size="10.5" fill="#1c7c3c">apoyado (ala inf.)</text>
    <!-- h measured between flanges -->
    <line x1="675" y1="119" x2="675" y2="239" stroke="#666" stroke-width="1" marker-start="url(#aa)" marker-end="url(#aa)"/>
    <text x="666" y="182" font-size="11" fill="#666" text-anchor="end">h</text>
    <text x="705" y="290" font-size="12" fill="#1c7c3c" text-anchor="middle" font-weight="bold">dos bordes apoyados → más estable</text>
    <text x="705" y="310" font-size="11.5" fill="#555" text-anchor="middle">límites λ_r MAYORES (más holgados)</text>
    <text x="705" y="326" font-size="11" fill="#555" text-anchor="middle">ej: almas de I, paredes de HSS</text>
  </g>

  <!-- takeaway -->
  <text x="470" y="365" font-size="12.5" text-anchor="middle" fill="#333">La misma placa aguanta más pandeo si está sujeta por ambos bordes — por eso las tablas B4.1 dan a cada elemento su propio λ_r.</text>
  <text x="470" y="386" font-size="12" text-anchor="middle" fill="#555">Y el ancho b se mide distinto: en no atiesados, del apoyo al borde libre; en atiesados, entre apoyos.</text>
</svg>
