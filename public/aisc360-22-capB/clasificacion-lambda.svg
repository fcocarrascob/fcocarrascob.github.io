<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="la" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="ld" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="940" height="440" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La esbeltez de placa λ = b/t: el vocabulario que usan todos los capítulos</text>

  <!-- element sketch top-left -->
  <g>
    <rect x="70" y="60" width="130" height="18" fill="#efece6" stroke="#8a857c"/>
    <line x1="70" y1="90" x2="200" y2="90" stroke="#666" stroke-width="1" marker-start="url(#ld)" marker-end="url(#ld)"/>
    <text x="135" y="104" font-size="12" fill="#666" text-anchor="middle">b</text>
    <line x1="212" y1="60" x2="212" y2="78" stroke="#666" stroke-width="1" marker-start="url(#ld)" marker-end="url(#ld)"/>
    <text x="222" y="74" font-size="12" fill="#666">t</text>
    <text x="135" y="130" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">λ = b / t</text>
  </g>
  <text x="560" y="80" font-size="12.5" fill="#555" text-anchor="middle">Una placa delgada (λ grande) se arruga antes de que el material dé todo. Según la solicitación,</text>
  <text x="560" y="98" font-size="12.5" fill="#555" text-anchor="middle">se compara λ con uno o dos umbrales — y de ahí sale toda la clasificación de la especificación.</text>

  <!-- ===== COMPRESIÓN AXIAL (Tabla B4.1a): one threshold ===== -->
  <text x="80" y="185" font-size="13.5" fill="#222" font-weight="bold">COMPRESIÓN AXIAL — Tabla B4.1a (un umbral)</text>
  <line x1="90" y1="230" x2="870" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#la)"/>
  <text x="874" y="234" font-size="12" fill="#333">λ</text>
  <rect x="90" y="205" width="440" height="25" fill="#1c7c3c" fill-opacity="0.12"/>
  <rect x="530" y="205" width="340" height="25" fill="#b02a1a" fill-opacity="0.10"/>
  <line x1="530" y1="196" x2="530" y2="238" stroke="#333" stroke-width="1.4"/>
  <text x="530" y="190" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">λ_r</text>
  <text x="310" y="222" font-size="12.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">NO ESBELTO</text>
  <text x="700" y="222" font-size="12.5" fill="#b02a1a" text-anchor="middle" font-weight="bold">ESBELTO</text>
  <text x="310" y="258" font-size="11.5" fill="#555" text-anchor="middle">desarrolla F_y en toda la sección</text>
  <text x="700" y="258" font-size="11.5" fill="#555" text-anchor="middle">pandea local antes → área efectiva (E7)</text>

  <!-- ===== FLEXIÓN (Tabla B4.1b): two thresholds ===== -->
  <text x="80" y="315" font-size="13.5" fill="#222" font-weight="bold">FLEXIÓN — Tabla B4.1b (dos umbrales)</text>
  <line x1="90" y1="360" x2="870" y2="360" stroke="#333" stroke-width="1.5" marker-end="url(#la)"/>
  <text x="874" y="364" font-size="12" fill="#333">λ</text>
  <rect x="90" y="335" width="280" height="25" fill="#1c7c3c" fill-opacity="0.12"/>
  <rect x="370" y="335" width="230" height="25" fill="#e67e22" fill-opacity="0.14"/>
  <rect x="600" y="335" width="270" height="25" fill="#b02a1a" fill-opacity="0.10"/>
  <line x1="370" y1="326" x2="370" y2="368" stroke="#333" stroke-width="1.4"/>
  <text x="370" y="320" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">λ_p</text>
  <line x1="600" y1="326" x2="600" y2="368" stroke="#333" stroke-width="1.4"/>
  <text x="600" y="320" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">λ_r</text>
  <text x="230" y="352" font-size="12.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">COMPACTA</text>
  <text x="485" y="352" font-size="12.5" fill="#b35c0e" text-anchor="middle" font-weight="bold">NO COMPACTA</text>
  <text x="735" y="352" font-size="12.5" fill="#b02a1a" text-anchor="middle" font-weight="bold">ESBELTA</text>
  <text x="230" y="388" font-size="11.5" fill="#555" text-anchor="middle">alcanza M_p</text>
  <text x="485" y="388" font-size="11.5" fill="#555" text-anchor="middle">entre M_p y el pandeo (transición)</text>
  <text x="735" y="388" font-size="11.5" fill="#555" text-anchor="middle">pandea local antes de M_p</text>

  <!-- takeaway -->
  <text x="470" y="422" font-size="12.5" text-anchor="middle" fill="#333">Se clasifican <tspan font-weight="bold">todos</tspan> los elementos comprimidos (ala, alma) y gobierna el más desfavorable. Un mismo perfil puede clasificarse distinto en axial que en flexión.</text>
</svg>
