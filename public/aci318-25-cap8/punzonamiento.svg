<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="pa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="par" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>

  <!-- ===== Left: section ===== -->
  <g>
    <text x="240" y="30" font-size="14" text-anchor="middle" fill="#222" font-weight="bold">Sección: el cono que atraviesa la losa</text>
    <!-- distributed load -->
    <line x1="70" y1="70" x2="410" y2="70" stroke="#666" stroke-width="1.4"/>
    <g stroke="#666" stroke-width="1.4">
      <line x1="90" y1="70" x2="90" y2="92" marker-end="url(#pa)"/>
      <line x1="150" y1="70" x2="150" y2="92" marker-end="url(#pa)"/>
      <line x1="210" y1="70" x2="210" y2="92" marker-end="url(#pa)"/>
      <line x1="270" y1="70" x2="270" y2="92" marker-end="url(#pa)"/>
      <line x1="330" y1="70" x2="330" y2="92" marker-end="url(#pa)"/>
      <line x1="390" y1="70" x2="390" y2="92" marker-end="url(#pa)"/>
    </g>
    <text x="418" y="80" font-size="12" fill="#666">q_u</text>
    <!-- slab -->
    <rect x="60" y="96" width="360" height="90" fill="#efece6" stroke="#8a857c"/>
    <!-- column -->
    <rect x="200" y="186" width="80" height="130" fill="#dcd8d0" stroke="#8a857c"/>
    <!-- failure cone (from column face, inclined outward-upward) -->
    <line x1="200" y1="186" x2="120" y2="96" stroke="#d9480f" stroke-width="2.4" stroke-dasharray="7 4"/>
    <line x1="280" y1="186" x2="360" y2="96" stroke="#d9480f" stroke-width="2.4" stroke-dasharray="7 4"/>
    <polygon points="200,186 120,96 360,96 280,186" fill="#d9480f" fill-opacity="0.10"/>
    <!-- critical section at d/2 -->
    <line x1="160" y1="96" x2="160" y2="186" stroke="#1a63a8" stroke-width="2.2"/>
    <line x1="320" y1="96" x2="320" y2="186" stroke="#1a63a8" stroke-width="2.2"/>
    <!-- d/2 dims -->
    <line x1="160" y1="200" x2="200" y2="200" stroke="#1a63a8" stroke-width="1.1" marker-start="url(#pa)" marker-end="url(#pa)"/>
    <text x="180" y="216" font-size="12" fill="#1a63a8" text-anchor="middle">d/2</text>
    <line x1="280" y1="200" x2="320" y2="200" stroke="#1a63a8" stroke-width="1.1" marker-start="url(#pa)" marker-end="url(#pa)"/>
    <text x="300" y="216" font-size="12" fill="#1a63a8" text-anchor="middle">d/2</text>
    <!-- d dim -->
    <line x1="440" y1="96" x2="440" y2="176" stroke="#666" stroke-width="1" marker-start="url(#pa)" marker-end="url(#pa)"/>
    <text x="448" y="140" font-size="12.5" fill="#666">d</text>
    <!-- crack label -->
    <text x="352" y="152" font-size="11.5" fill="#d9480f" transform="rotate(48 352,152)">fisura ~26–45°</text>
    <!-- reaction -->
    <line x1="240" y1="352" x2="240" y2="322" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#par)"/>
    <text x="250" y="345" font-size="13" fill="#b02a1a" font-weight="bold">V_u</text>
    <text x="240" y="392" font-size="12" fill="#555" text-anchor="middle">la losa "se ensarta" en la columna:</text>
    <text x="240" y="408" font-size="12" fill="#555" text-anchor="middle">falla frágil, sin aviso, sin redistribución</text>
  </g>

  <!-- ===== Right: plan ===== -->
  <g>
    <text x="710" y="30" font-size="14" text-anchor="middle" fill="#222" font-weight="bold">Planta: el perímetro crítico b_o</text>
    <!-- slab region -->
    <rect x="540" y="60" width="340" height="270" fill="#efece6" stroke="#8a857c"/>
    <!-- cone footprint -->
    <rect x="608" y="118" width="204" height="154" fill="#d9480f" fill-opacity="0.08" stroke="#d9480f" stroke-width="1.4" stroke-dasharray="5 4"/>
    <!-- critical perimeter -->
    <rect x="648" y="153" width="124" height="84" fill="none" stroke="#1a63a8" stroke-width="2.6" stroke-dasharray="8 5"/>
    <!-- column -->
    <rect x="675" y="175" width="70" height="40" fill="#8a857c"/>
    <text x="710" y="200" font-size="11.5" fill="#fff" text-anchor="middle">columna</text>
    <!-- labels -->
    <text x="710" y="146" font-size="12.5" fill="#1a63a8" font-weight="bold" text-anchor="middle">perímetro crítico b_o (a d/2 de la cara)</text>
    <text x="710" y="290" font-size="12.5" fill="#d9480f" text-anchor="middle">huella del cono en la cara superior</text>
    <!-- d/2 dim in plan -->
    <line x1="648" y1="195" x2="675" y2="195" stroke="#1a63a8" stroke-width="1.1" marker-start="url(#pa)" marker-end="url(#pa)"/>
    <text x="661" y="188" font-size="11" fill="#1a63a8" text-anchor="middle">d/2</text>
    <!-- formula -->
    <rect x="548" y="342" width="330" height="70" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
    <text x="560" y="364" font-size="12.5" fill="#222" font-weight="bold">La verificación es en tensión, no en fuerza:</text>
    <text x="560" y="384" font-size="12.5" fill="#222">v_u = V_u / (b_o·d)  ≤  φ·v_c   (φ = 0.75)</text>
    <text x="560" y="402" font-size="12" fill="#555">columnas de borde/esquina: b_o se recorta → menos capacidad</text>
  </g>
</svg>
