<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#ffffff"/>
  <text x="470" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Toda la estática en una ecuación: M_o se reparte, no se inventa</text>

  <!-- ===== Left: plan with strips ===== -->
  <g>
    <rect x="70" y="70" width="380" height="260" fill="#efece6" stroke="#8a857c"/>
    <!-- columns -->
    <g fill="#8a857c">
      <rect x="82" y="82" width="36" height="30"/>
      <rect x="402" y="82" width="36" height="30"/>
      <rect x="82" y="288" width="36" height="30"/>
      <rect x="402" y="288" width="36" height="30"/>
    </g>
    <!-- column strip (horizontal, along column line) -->
    <rect x="70" y="70" width="380" height="80" fill="#1a63a8" fill-opacity="0.13"/>
    <rect x="70" y="250" width="380" height="80" fill="#1a63a8" fill-opacity="0.13"/>
    <text x="260" y="122" font-size="12.5" fill="#1a63a8" font-weight="bold">franja de columna</text>
    <text x="260" y="200" font-size="12.5" fill="#555" font-weight="bold">franja central</text>
    <!-- spans -->
    <line x1="100" y1="352" x2="420" y2="352" stroke="#666" stroke-width="1" marker-start="url(#fa)" marker-end="url(#fa)"/>
    <text x="260" y="370" font-size="12.5" fill="#666" text-anchor="middle">ℓ₁ (dirección analizada)</text>
    <line x1="486" y1="97 " x2="486" y2="303" stroke="#666" stroke-width="1" marker-start="url(#fa)" marker-end="url(#fa)" transform="translate(-22,0)"/>
    <text x="478" y="204" font-size="12.5" fill="#666" transform="rotate(-90 478,204)" text-anchor="middle">ℓ₂</text>
    <!-- strip width dim -->
    <line x1="55" y1="70" x2="55" y2="150" stroke="#1a63a8" stroke-width="1.1" marker-start="url(#fa)" marker-end="url(#fa)"/>
    <text x="48" y="114" font-size="11.5" fill="#1a63a8" text-anchor="end">≤ ℓ/4</text>
  </g>

  <!-- ===== Right: Mo diagram ===== -->
  <g>
    <rect x="545" y="80" width="360" height="14" fill="#dcd8d0" stroke="#8a857c"/>
    <rect x="558" y="94" width="26" height="34" fill="#8a857c"/>
    <rect x="866" y="94" width="26" height="34" fill="#8a857c"/>
    <!-- moment diagram (negative up at supports, positive down mid) -->
    <path d="M 571,170 Q 725,300 879,170" fill="none" stroke="#1a63a8" stroke-width="2.6"/>
    <line x1="571" y1="205" x2="879" y2="205" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
    <!-- negative moments at supports (above line) -->
    <line x1="571" y1="205" x2="571" y2="170" stroke="#b02a1a" stroke-width="2.4"/>
    <line x1="879" y1="205" x2="879" y2="170" stroke="#b02a1a" stroke-width="2.4"/>
    <text x="571" y="160" font-size="12" fill="#b02a1a" text-anchor="middle">0.65·M_o</text>
    <text x="879" y="160" font-size="12" fill="#b02a1a" text-anchor="middle">0.65·M_o</text>
    <text x="725" y="258" font-size="12" fill="#1a63a8" text-anchor="middle">0.35·M_o</text>
    <text x="725" y="290" font-size="11.5" fill="#555" text-anchor="middle">(vano interior, Sec. 8.10.4)</text>
    <!-- formula box -->
    <rect x="580" y="316" width="300" height="66" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
    <text x="592" y="338" font-size="13" fill="#222" font-weight="bold">M_o = q_u · ℓ₂ · ℓₙ² / 8   (Ec. 8.10.3.2)</text>
    <text x="592" y="358" font-size="12" fill="#555">la suma |M⁻|prom + M⁺ debe dar M_o siempre;</text>
    <text x="592" y="374" font-size="12" fill="#555">el método solo decide cómo repartirlo</text>
  </g>
</svg>
