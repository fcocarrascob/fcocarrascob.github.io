<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ge" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="ger" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="geb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Cuando la barra no cabe recta: el gancho — y cuando la barra se acaba: el traslape</text>

  <!-- ===== Left: standard hook ===== -->
  <g>
    <text x="240" y="58" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">Gancho estándar de 90°</text>
    <rect x="80" y="72" width="320" height="270" fill="#efece6" stroke="#8a857c"/>
    <!-- hooked bar: comes horizontal from left (critical section), bends down -->
    <path d="M 92,140 L 290,140 A 42,42 0 0 1 332,182 L 332,300" fill="none" stroke="#3f3f3f" stroke-width="9" stroke-linecap="round"/>
    <line x1="90" y1="140" x2="50" y2="140" stroke="#b02a1a" stroke-width="3" marker-end="url(#ger)"/>
    <text x="46" y="124" font-size="13" fill="#b02a1a" font-weight="bold">T</text>
    <!-- critical section -->
    <line x1="92" y1="84" x2="92" y2="330" stroke="#c0392b" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="100" y="326" font-size="11.5" fill="#c0392b">sección crítica</text>
    <!-- bearing inside bend -->
    <g stroke="#1a63a8" stroke-width="2">
      <line x1="296" y1="158" x2="274" y2="178" marker-end="url(#geb)"/>
      <line x1="308" y1="172" x2="288" y2="194" marker-end="url(#geb)"/>
      <line x1="315" y1="190" x2="296" y2="208" marker-end="url(#geb)"/>
    </g>
    <text x="188" y="212" font-size="11.5" fill="#1a63a8">el codo APLASTA el</text>
    <text x="188" y="227" font-size="11.5" fill="#1a63a8">hormigón interior:</text>
    <text x="188" y="242" font-size="11.5" fill="#1a63a8">anclaje mecánico</text>
    <!-- extension dim -->
    <line x1="352" y1="182" x2="352" y2="300" stroke="#666" stroke-width="1" marker-start="url(#ge)" marker-end="url(#ge)"/>
    <text x="360" y="245" font-size="11.5" fill="#666">12·d_b</text>
    <!-- ldh dim -->
    <line x1="92" y1="360" x2="332" y2="360" stroke="#666" stroke-width="1.2" marker-start="url(#ge)" marker-end="url(#ge)"/>
    <text x="212" y="377" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">ℓ_dh ∝ d_b^1.5</text>
    <text x="240" y="400" font-size="12" fill="#555" text-anchor="middle">crece MÁS que el diámetro: los ganchos</text>
    <text x="240" y="416" font-size="12" fill="#555" text-anchor="middle">de barras gruesas rinden proporcionalmente menos</text>
  </g>

  <!-- ===== Right: lap splice ===== -->
  <g>
    <text x="690" y="58" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">Traslape: dos desarrollos cosidos por bielas</text>
    <rect x="490" y="72" width="400" height="180" fill="#efece6" stroke="#8a857c"/>
    <!-- two bars overlapping -->
    <line x1="500" y1="140" x2="760" y2="140" stroke="#3f3f3f" stroke-width="8" stroke-linecap="round"/>
    <line x1="620" y1="176" x2="880" y2="176" stroke="#3f3f3f" stroke-width="8" stroke-linecap="round"/>
    <line x1="512" y1="140" x2="466" y2="140" stroke="#b02a1a" stroke-width="3" marker-end="url(#ger)"/>
    <text x="452" y="128" font-size="13" fill="#b02a1a" font-weight="bold">T</text>
    <line x1="882" y1="176" x2="926" y2="176" stroke="#b02a1a" stroke-width="3" marker-end="url(#ger)"/>
    <text x="916" y="164" font-size="13" fill="#b02a1a" font-weight="bold">T</text>
    <!-- struts between bars -->
    <g stroke="#1a63a8" stroke-width="2" stroke-dasharray="5 4">
      <line x1="640" y1="172" x2="662" y2="144"/>
      <line x1="678" y1="172" x2="700" y2="144"/>
      <line x1="716" y1="172" x2="738" y2="144"/>
      <line x1="754" y1="172" x2="776" y2="144" transform="translate(-22,0)"/>
    </g>
    <text x="690" y="212" font-size="11.5" fill="#1a63a8" text-anchor="middle">bielas diagonales entre barras — el doble de fuerza radial en la misma zona</text>
    <!-- lap length dim -->
    <line x1="620" y1="112" x2="760" y2="112" stroke="#666" stroke-width="1.2" marker-start="url(#ge)" marker-end="url(#ge)"/>
    <text x="690" y="102" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">ℓ_st</text>
    <!-- classes box -->
    <rect x="490" y="272" width="400" height="120" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
    <text x="504" y="296" font-size="12.5" fill="#222" font-weight="bold">Clase A: ℓ_st = 1.0·ℓ_d — solo si SOBRA acero (≥2×)</text>
    <text x="504" y="313" font-size="12.5" fill="#222">y se empalma ≤ 50% de las barras en el tramo</text>
    <text x="504" y="337" font-size="12.5" fill="#222" font-weight="bold">Clase B: ℓ_st = 1.3·ℓ_d — todo lo demás (el caso normal)</text>
    <text x="504" y="361" font-size="12" fill="#555">el 1.3 paga la concentración de fisuras en los extremos del</text>
    <text x="504" y="377" font-size="12" fill="#555">traslape; escalonar los empalmes es gratis y siempre ayuda</text>
  </g>
</svg>
