<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="df" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>
  <rect width="940" height="440" fill="#ffffff"/>
  <text x="470" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">La barra solo resiste donde está desarrollada: capacidad vs demanda a lo largo del vano</text>

  <!-- beam elevation -->
  <rect x="100" y="50" width="740" height="56" fill="#efece6" stroke="#8a857c"/>
  <polygon points="120,106 104,130 136,130" fill="#5b6470"/>
  <polygon points="820,106 804,130 836,130" fill="#5b6470"/>
  <!-- bars: one continuous, one cut -->
  <line x1="112" y1="96" x2="828" y2="96" stroke="#3f3f3f" stroke-width="5"/>
  <line x1="300" y1="86" x2="640" y2="86" stroke="#1a63a8" stroke-width="5"/>
  <text x="118" y="80" font-size="11.5" fill="#3f3f3f">barra corrida</text>
  <text x="470" y="74" font-size="11.5" fill="#1a63a8" text-anchor="middle">barra cortada (la que sobra lejos del centro)</text>

  <!-- chart: capacity envelope vs demand -->
  <g>
    <line x1="100" y1="390" x2="860" y2="390" stroke="#333" stroke-width="1.4" marker-end="url(#df)"/>
    <line x1="100" y1="390" x2="100" y2="160" stroke="#333" stroke-width="1.4" marker-end="url(#df)"/>
    <text x="88" y="158" font-size="12" fill="#333" text-anchor="end">M</text>

    <!-- demand: moment diagram (parabola) -->
    <path d="M 120,390 Q 470,120 820,390" fill="#c0392b" fill-opacity="0.10" stroke="#c0392b" stroke-width="2.2"/>
    <text x="470" y="272" font-size="12.5" fill="#c0392b" text-anchor="middle" font-weight="bold">demanda M_u(x)</text>

    <!-- capacity envelope: continuous bar ramps from supports -->
    <polyline points="112,390 232,242 708,242 828,390" fill="none" stroke="#3f3f3f" stroke-width="2.4"/>
    <!-- capacity envelope: total with cut bar -->
    <polyline points="300,242 420,178 520,178 640,242" fill="none" stroke="#1a63a8" stroke-width="2.4"/>
    <!-- ld ramps annotations -->
    <line x1="112" y1="408" x2="232" y2="408" stroke="#666" stroke-width="1" marker-start="url(#df)" marker-end="url(#df)"/>
    <text x="172" y="424" font-size="11.5" fill="#666" text-anchor="middle">ℓ_d</text>
    <line x1="300" y1="222" x2="420" y2="222" stroke="#1a63a8" stroke-width="1" marker-start="url(#df)" marker-end="url(#df)" transform="translate(0,-56)"/>
    <text x="360" y="160" font-size="11.5" fill="#1a63a8" text-anchor="middle">ℓ_d</text>
    <text x="712" y="216" font-size="12" fill="#3f3f3f">capacidad de la barra corrida:</text>
    <text x="712" y="232" font-size="12" fill="#3f3f3f">rampa de 0 al 100% en ℓ_d</text>
  </g>

  <text x="470" y="437" font-size="12.5" text-anchor="middle" fill="#555">Regla de diseño: la curva de capacidad (escalonada por los cortes de barra) debe envolver a la demanda EN TODO x — no solo en el máximo.</text>
</svg>
