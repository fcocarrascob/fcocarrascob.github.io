<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <rect width="720" height="330" fill="#ffffff"/>

  <!-- column position labels -->
  <g font-size="12" fill="#9ca3af" text-anchor="middle">
    <text x="150" y="34">posición 0</text>
    <text x="290" y="34">posición 1</text>
    <text x="430" y="34">posición 2</text>
    <text x="570" y="34">posición 3</text>
  </g>

  <!-- ROW 1: token embeddings (identical, value 1) -->
  <text x="30" y="72" font-size="13" fill="#6b7280">token emb.</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#1e3a8a" text-anchor="middle">
    <g><rect x="110" y="48" width="80" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/><text x="150" y="73">1.0 1.0 1.0</text></g>
    <g><rect x="250" y="48" width="80" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/><text x="290" y="73">1.0 1.0 1.0</text></g>
    <g><rect x="390" y="48" width="80" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/><text x="430" y="73">1.0 1.0 1.0</text></g>
    <g><rect x="530" y="48" width="80" height="40" rx="5" fill="#dbeafe" stroke="#93c5fd"/><text x="570" y="73">1.0 1.0 1.0</text></g>
  </g>
  <text x="656" y="72" font-size="11" fill="#9ca3af">iguales</text>

  <!-- plus signs -->
  <g font-size="20" fill="#1a1a1a" font-weight="700" text-anchor="middle">
    <text x="150" y="112">+</text><text x="290" y="112">+</text><text x="430" y="112">+</text><text x="570" y="112">+</text>
  </g>

  <!-- ROW 2: positional embeddings (distinct) -->
  <text x="30" y="146" font-size="13" fill="#6b7280">positional</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#9a3412" text-anchor="middle">
    <g><rect x="110" y="122" width="80" height="40" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="150" y="147">0.1 0.2 0.3</text></g>
    <g><rect x="250" y="122" width="80" height="40" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="290" y="147">1.1 1.2 1.3</text></g>
    <g><rect x="390" y="122" width="80" height="40" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="430" y="147">2.1 2.2 2.3</text></g>
    <g><rect x="530" y="122" width="80" height="40" rx="5" fill="#ffedd5" stroke="#fdba74"/><text x="570" y="147">3.1 3.2 3.3</text></g>
  </g>
  <text x="656" y="146" font-size="11" fill="#9ca3af">distintas</text>

  <!-- equals signs -->
  <g font-size="20" fill="#1a1a1a" font-weight="700" text-anchor="middle">
    <text x="150" y="186">=</text><text x="290" y="186">=</text><text x="430" y="186">=</text><text x="570" y="186">=</text>
  </g>

  <!-- ROW 3: input embeddings (now distinct) -->
  <text x="30" y="220" font-size="13" fill="#6b7280">input emb.</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="#ffffff" text-anchor="middle">
    <g><rect x="110" y="196" width="80" height="40" rx="5" fill="#2563eb"/><text x="150" y="221">1.1 1.2 1.3</text></g>
    <g><rect x="250" y="196" width="80" height="40" rx="5" fill="#2563eb"/><text x="290" y="221">2.1 2.2 2.3</text></g>
    <g><rect x="390" y="196" width="80" height="40" rx="5" fill="#2563eb"/><text x="430" y="221">3.1 3.2 3.3</text></g>
    <g><rect x="530" y="196" width="80" height="40" rx="5" fill="#2563eb"/><text x="570" y="221">4.1 4.2 4.3</text></g>
  </g>
  <text x="656" y="220" font-size="11" fill="#9ca3af">únicas</text>

  <!-- caption -->
  <text x="360" y="278" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">El token embedding no cambia con la posición. Sumarle un vector posicional distinto</text>
  <text x="360" y="298" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">le da a cada lugar de la secuencia una identidad propia.</text>
  <text x="360" y="320" text-anchor="middle" font-size="12" fill="#6b7280">Sin esto, "perro muerde hombre" y "hombre muerde perro" serían indistinguibles para el modelo.</text>
</svg>
