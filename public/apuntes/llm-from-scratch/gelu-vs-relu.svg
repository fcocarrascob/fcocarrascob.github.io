<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">GELU vs. ReLU</text>

  <!-- axes -->
  <!-- plot area: x from -3..3 mapped to 80..560 ; y from -1..3 mapped to 250..70 -->
  <!-- x axis (y=0) -->
  <line x1="80" y1="250" x2="560" y2="250" stroke="#9ca3af" stroke-width="1"/>
  <!-- y axis (x=0) -->
  <line x1="320" y1="70" x2="320" y2="285" stroke="#9ca3af" stroke-width="1"/>
  <text x="566" y="254" font-size="11" fill="#6b7280">x</text>
  <text x="326" y="78" font-size="11" fill="#6b7280">f(x)</text>
  <g font-size="10" fill="#9ca3af" text-anchor="middle">
    <text x="160" y="266">-2</text>
    <text x="240" y="266">-1</text>
    <text x="400" y="266">1</text>
    <text x="480" y="266">2</text>
  </g>

  <!-- ReLU: 0 for x<0, x for x>0. points: (-3,0)->(80,250) (0,0)->(320,250) (3,3)->(560,70) -->
  <polyline points="80,250 320,250 560,70" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="470" y="120" font-size="12" fill="#6b7280" font-weight="600">ReLU</text>

  <!-- GELU: smooth. Approx points scaled (y: 45 px per unit, base 250; x: 80px per unit, base 320) -->
  <!-- x, gelu(x): -3,-0.004 -2,-0.045 -1.5,-0.10 -1,-0.159 -0.5,-0.154 0,0 0.5,0.345 1,0.841 1.5,1.40 2,1.954 2.5,2.485 3,2.996 -->
  <polyline points="80,250.2 160,252 200,254.5 240,257.2 280,257 320,250 360,234.5 400,212 440,187 480,162 520,138 560,115"
            fill="none" stroke="#2563eb" stroke-width="2.6"/>
  <text x="392" y="150" font-size="12" fill="#2563eb" font-weight="600">GELU</text>

  <!-- highlight small negative bump -->
  <circle cx="240" cy="257.2" r="3" fill="#2563eb"/>
  <text x="205" y="290" font-size="10" fill="#2563eb">gradiente ≠ 0 para negativos</text>

  <!-- caption -->
  <line x1="60" y1="312" x2="580" y2="312" stroke="#e5e7eb" stroke-width="1"/>
  <text x="320" y="336" text-anchor="middle" font-size="12.5" fill="#6b7280">ReLU corta en seco los negativos a 0; GELU es suave y deja pasar un gradiente pequeño,</text>
  <text x="320" y="353" text-anchor="middle" font-size="12.5" fill="#6b7280">lo que da mejores dinámicas de optimización en redes profundas como los LLMs.</text>
</svg>
