<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="al" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="760" height="380" fill="#ffffff"/>

  <!-- LEFT: token IDs to embed -->
  <text x="70" y="40" text-anchor="middle" font-size="13" fill="#6b7280">token IDs</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#1a1a1a" text-anchor="middle">
    <rect x="42" y="58" width="56" height="34" rx="5" fill="#f3f4f6" stroke="#d1d5db"/><text x="70" y="81">2</text>
    <rect x="42" y="100" width="56" height="34" rx="5" fill="#f3f4f6" stroke="#d1d5db"/><text x="70" y="123">3</text>
    <rect x="42" y="142" width="56" height="34" rx="5" fill="#f3f4f6" stroke="#d1d5db"/><text x="70" y="165">5</text>
    <rect x="42" y="184" width="56" height="34" rx="5" fill="#f3f4f6" stroke="#d1d5db"/><text x="70" y="207">1</text>
  </g>

  <!-- MIDDLE: weight matrix 6x3 with row indices -->
  <text x="330" y="40" text-anchor="middle" font-size="13" fill="#6b7280">matriz de pesos del embedding (vocab 6 × dim 3)</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13">
    <!-- row index labels -->
    <g fill="#9ca3af" font-size="11" text-anchor="end">
      <text x="212" y="76">0</text><text x="212" y="110">1</text><text x="212" y="144">2</text>
      <text x="212" y="178">3</text><text x="212" y="212">4</text><text x="212" y="246">5</text>
    </g>
    <!-- rows: default light; highlighted rows 1,2,3,5 in blue -->
    <!-- row 0 -->
    <rect x="222" y="58" width="216" height="28" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="330" y="77" text-anchor="middle" fill="#374151">0.34   -0.18   -0.17</text>
    <!-- row 1 (ID 1) -->
    <rect x="222" y="92" width="216" height="28" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="330" y="111" text-anchor="middle" fill="#1e3a8a">0.92    1.58    1.30</text>
    <!-- row 2 (ID 2) -->
    <rect x="222" y="126" width="216" height="28" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="330" y="145" text-anchor="middle" fill="#1e3a8a">1.27   -0.20   -0.16</text>
    <!-- row 3 (ID 3) -->
    <rect x="222" y="160" width="216" height="28" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="330" y="179" text-anchor="middle" fill="#1e3a8a">-0.40   0.97   -1.15</text>
    <!-- row 4 -->
    <rect x="222" y="194" width="216" height="28" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="330" y="213" text-anchor="middle" fill="#374151">-1.16   0.33   -0.63</text>
    <!-- row 5 (ID 5) -->
    <rect x="222" y="228" width="216" height="28" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="330" y="247" text-anchor="middle" fill="#1e3a8a">-2.84  -0.78   -1.41</text>
  </g>

  <!-- arrows from IDs to matched rows -->
  <g stroke="#2563eb" stroke-width="1.6" fill="none">
    <path d="M100,75 C150,75 175,140 220,140" marker-end="url(#al)"/>
    <path d="M100,117 C150,117 175,174 220,174" marker-end="url(#al)"/>
    <path d="M100,159 C150,159 175,242 220,242" marker-end="url(#al)"/>
    <path d="M100,201 C150,201 175,106 220,106" marker-end="url(#al)"/>
  </g>

  <!-- RIGHT: extracted rows in input order -->
  <text x="620" y="40" text-anchor="middle" font-size="13" fill="#6b7280">embeddings (4 × 3)</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" text-anchor="middle">
    <rect x="512" y="58" width="216" height="30" rx="4" fill="#dbeafe" stroke="#60a5fa"/><text x="620" y="78" fill="#1e3a8a">1.27   -0.20   -0.16</text>
    <rect x="512" y="94" width="216" height="30" rx="4" fill="#dbeafe" stroke="#60a5fa"/><text x="620" y="114" fill="#1e3a8a">-0.40   0.97   -1.15</text>
    <rect x="512" y="130" width="216" height="30" rx="4" fill="#dbeafe" stroke="#60a5fa"/><text x="620" y="150" fill="#1e3a8a">-2.84  -0.78   -1.41</text>
    <rect x="512" y="166" width="216" height="30" rx="4" fill="#dbeafe" stroke="#60a5fa"/><text x="620" y="186" fill="#1e3a8a">0.92    1.58    1.30</text>
  </g>
  <g stroke="#9ca3af" stroke-width="1.4" fill="none" stroke-dasharray="3 3">
    <path d="M438,140 L512,73"/>
    <path d="M438,174 L512,109"/>
    <path d="M438,242 L512,145"/>
    <path d="M438,106 L512,181"/>
  </g>

  <!-- caption inside -->
  <text x="380" y="300" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">Embeber un ID = copiar su fila de la tabla.</text>
  <text x="380" y="322" text-anchor="middle" font-size="13" fill="#6b7280">No hay cálculo: es una operación de búsqueda (lookup). La tabla se aprende por backpropagation.</text>
  <text x="380" y="352" text-anchor="middle" font-size="12" fill="#9ca3af" font-family="'JetBrains Mono', ui-monospace, monospace">input_ids = [2, 3, 5, 1]  →  filas 2, 3, 5, 1</text>
</svg>
