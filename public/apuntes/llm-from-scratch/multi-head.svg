<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="mh-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="780" height="400" fill="#ffffff"/>

  <!-- Inputs -->
  <rect x="40" y="120" width="90" height="80" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="85" y="155" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">X</text>
  <text x="85" y="175" text-anchor="middle" font-size="10" fill="#6b7280">input</text>
  <text x="85" y="188" text-anchor="middle" font-size="10" fill="#6b7280">embeddings</text>

  <!-- split to two heads -->
  <path d="M132,145 C170,145 180,90 220,90" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#mh-ar)"/>
  <path d="M132,175 C170,175 180,230 220,230" stroke="#7c3aed" stroke-width="1.6" fill="none" marker-end="url(#mh-ar)"/>

  <!-- Head 1 -->
  <rect x="220" y="52" width="200" height="90" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="320" y="74" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="600">Cabeza 1</text>
  <text x="320" y="94" text-anchor="middle" font-size="11" fill="#1e40af" font-family="'JetBrains Mono', ui-monospace, monospace">Wq₁, Wk₁, Wv₁</text>
  <text x="320" y="114" text-anchor="middle" font-size="10.5" fill="#3730a3">causal attention</text>
  <text x="320" y="130" text-anchor="middle" font-size="10.5" fill="#3730a3">→ Z₁</text>

  <!-- Head 2 -->
  <rect x="220" y="192" width="200" height="90" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="320" y="214" text-anchor="middle" font-size="13" fill="#5b21b6" font-weight="600">Cabeza 2</text>
  <text x="320" y="234" text-anchor="middle" font-size="11" fill="#6d28d9" font-family="'JetBrains Mono', ui-monospace, monospace">Wq₂, Wk₂, Wv₂</text>
  <text x="320" y="254" text-anchor="middle" font-size="10.5" fill="#5b21b6">causal attention</text>
  <text x="320" y="270" text-anchor="middle" font-size="10.5" fill="#5b21b6">→ Z₂</text>

  <!-- concat -->
  <path d="M422,97 C460,97 470,150 510,150" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#mh-ar)"/>
  <path d="M422,237 C460,237 470,180 510,180" stroke="#7c3aed" stroke-width="1.6" fill="none" marker-end="url(#mh-ar)"/>
  <rect x="510" y="118" width="110" height="94" rx="8" fill="#dcfce7" stroke="#86efac"/>
  <text x="565" y="150" text-anchor="middle" font-size="13" fill="#166534" font-weight="600">concat</text>
  <text x="565" y="170" text-anchor="middle" font-size="12" fill="#166534" font-family="'JetBrains Mono', ui-monospace, monospace">[Z₁ | Z₂]</text>
  <text x="565" y="190" text-anchor="middle" font-size="10.5" fill="#15803d">+ proyección</text>
  <text x="565" y="204" text-anchor="middle" font-size="10.5" fill="#15803d">out_proj</text>

  <!-- output -->
  <path d="M622,165 L672,165" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#mh-ar)"/>
  <text x="710" y="160" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="600">Z</text>
  <text x="710" y="178" text-anchor="middle" font-size="10" fill="#6b7280">contexto</text>

  <!-- caption -->
  <line x1="40" y1="312" x2="740" y2="312" stroke="#e5e7eb" stroke-width="1"/>
  <text x="390" y="342" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">Multi-head: varias atenciones en paralelo.</text>
  <text x="390" y="364" text-anchor="middle" font-size="12.5" fill="#6b7280">Cada cabeza tiene sus propias proyecciones y mira un subespacio distinto de la relación entre tokens.</text>
  <text x="390" y="382" text-anchor="middle" font-size="12.5" fill="#6b7280">Sus context vectors se concatenan y se combinan con una proyección de salida. En la práctica, una sola matriz que se parte con <tspan font-family="'JetBrains Mono', ui-monospace, monospace">.view</tspan>.</text>
</svg>
