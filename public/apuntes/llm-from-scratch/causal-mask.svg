<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="cm-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="780" height="400" fill="#ffffff"/>

  <!-- STEP 1: raw scores -->
  <text x="120" y="46" text-anchor="middle" font-size="13" fill="#6b7280">1) Attention scores</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" text-anchor="middle">
    <rect x="40" y="60" width="160" height="120" rx="4" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="120" y="80" fill="#374151">0.29 0.47 0.46 0.26 0.22 0.34</text>
    <text x="120" y="100" fill="#374151">0.47 0.17 0.17 0.10 0.09 0.13</text>
    <text x="120" y="120" fill="#374151">0.46 0.17 0.17 0.10 0.09 0.13</text>
    <text x="120" y="140" fill="#374151">0.26 0.10 0.10 0.02 0.02 0.02</text>
    <text x="120" y="160" fill="#374151">0.22 0.09 0.09 0.02 0.08 0.13</text>
    <text x="120" y="176" fill="#374151">0.34 0.13 0.13 0.02 0.13 0.01</text>
  </g>

  <!-- arrow to step 2 -->
  <path d="M205,120 L260,120" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#cm-ar)"/>
  <text x="232" y="108" text-anchor="middle" font-size="11" fill="#2563eb">mask −∞</text>
  <text x="232" y="136" text-anchor="middle" font-size="10" fill="#9ca3af">sobre diagonal</text>

  <!-- STEP 2: masked with -inf -->
  <text x="345" y="46" text-anchor="middle" font-size="13" fill="#6b7280">2) −∞ sobre la diagonal</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" text-anchor="middle">
    <rect x="265" y="60" width="160" height="120" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="290" y="80" fill="#374151" text-anchor="start">0.29</text><text x="410" y="80" fill="#dc2626" text-anchor="end">−∞ …</text>
    <text x="290" y="100" fill="#374151" text-anchor="start">0.47 0.17</text><text x="410" y="100" fill="#dc2626" text-anchor="end">−∞ …</text>
    <text x="290" y="120" fill="#374151" text-anchor="start">0.46 0.17 0.17</text><text x="412" y="120" fill="#dc2626" text-anchor="end">−∞</text>
    <text x="290" y="140" fill="#374151" text-anchor="start">0.26 0.10 0.10 0.02</text>
    <text x="290" y="160" fill="#374151" text-anchor="start">0.22 0.09 0.09 0.02 0.08</text>
    <text x="290" y="176" fill="#374151" text-anchor="start">0.34 0.13 0.13 0.02 0.13 0.01</text>
  </g>

  <!-- arrow to step 3 -->
  <path d="M430,120 L485,120" stroke="#2563eb" stroke-width="1.6" fill="none" marker-end="url(#cm-ar)"/>
  <text x="457" y="108" text-anchor="middle" font-size="11" fill="#2563eb">softmax</text>

  <!-- STEP 3: normalized lower-triangular -->
  <text x="595" y="46" text-anchor="middle" font-size="13" fill="#6b7280">3) Pesos causales (filas suman 1)</text>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" text-anchor="start">
    <rect x="490" y="60" width="250" height="120" rx="4" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="500" y="80" fill="#1e3a8a">1.00</text>
    <text x="500" y="100" fill="#1e3a8a">0.55 0.45</text>
    <text x="500" y="120" fill="#1e3a8a">0.38 0.31 0.31</text>
    <text x="500" y="140" fill="#1e3a8a">0.28 0.25 0.25 0.23</text>
    <text x="500" y="160" fill="#1e3a8a">0.22 0.20 0.20 0.19 0.20</text>
    <text x="500" y="176" fill="#1e3a8a">0.19 0.17 0.17 0.15 0.17 0.15</text>
  </g>

  <!-- caption -->
  <line x1="40" y1="240" x2="740" y2="240" stroke="#e5e7eb" stroke-width="1"/>
  <text x="390" y="272" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">El truco eficiente de la causal attention.</text>
  <text x="390" y="296" text-anchor="middle" font-size="12.5" fill="#6b7280">Poner −∞ en los scores por encima de la diagonal <tspan font-weight="600">antes</tspan> de la softmax</text>
  <text x="390" y="314" text-anchor="middle" font-size="12.5" fill="#6b7280">enmascara y renormaliza en un solo paso: como e^(−∞)→0, cada token solo atiende a sí mismo y a los previos.</text>
  <text x="390" y="340" text-anchor="middle" font-size="12" fill="#9ca3af" font-family="'JetBrains Mono', ui-monospace, monospace">masked = scores.masked_fill(mask.bool(), -torch.inf)</text>
</svg>
