<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 376" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="g1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="g2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="640" height="376" fill="#ffffff"/>

  <!-- axes -->
  <line x1="46" y1="30" x2="46" y2="348" stroke="#9ca3af" stroke-width="1.4"/>
  <line x1="46" y1="348" x2="600" y2="348" stroke="#9ca3af" stroke-width="1.4"/>
  <text x="52" y="26" font-size="12.5" fill="#6b7280">costo J(θ)</text>
  <text x="596" y="368" font-size="12.5" fill="#6b7280" text-anchor="end">θ (parámetro)</text>

  <!-- parabola (cost bowl) -->
  <path d="M70,49 L95,102 L120,150 L145,192 L170,229 L195,260 L220,285 L245,305 L270,319 L295,327 L320,330 L345,327 L370,319 L395,305 L420,285 L445,260 L470,229 L495,192 L520,150 L545,102 L570,49"
        fill="none" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- gradient (tangent) at start ball -->
  <line x1="500" y1="118" x2="576" y2="172" stroke="#d97706" stroke-width="2" marker-start="url(#g2)"/>
  <text x="556" y="150" font-size="12" fill="#d97706" font-weight="600">pendiente</text>
  <text x="556" y="165" font-size="11.5" fill="#d97706">(gradiente)</text>

  <!-- descending step arrows (getting shorter) -->
  <g stroke="#2563eb" stroke-width="1.8" fill="none">
    <path d="M540,110 Q505,150 476,196" marker-end="url(#g1)"/>
    <path d="M470,229 Q440,262 411,286" marker-end="url(#g1)"/>
    <path d="M405,300 Q378,315 358,323" marker-end="url(#g1)"/>
    <path d="M352,326 Q338,329 331,330" marker-end="url(#g1)"/>
  </g>

  <!-- balls -->
  <g>
    <circle cx="540" cy="106" r="8" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="470" cy="225" r="7" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="405" cy="296" r="6.5" fill="#60a5fa" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="352" cy="322" r="6" fill="#93c5fd" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="320" cy="330" r="6.5" fill="#16a34a" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- start & min labels -->
  <text x="540" y="92" text-anchor="middle" font-size="12" fill="#1e3a8a" font-weight="600">inicio (θ al azar)</text>
  <line x1="320" y1="336" x2="320" y2="348" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="2 2"/>
  <text x="320" y="366" text-anchor="middle" font-size="12.5" fill="#16a34a" font-weight="600">mínimo → θ óptimo</text>
</svg>
