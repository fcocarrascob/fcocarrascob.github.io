<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="640" height="340" fill="#ffffff"/>

  <!-- ============ Panel A: underfitting ============ -->
  <text x="173" y="30" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">Underfitting</text>
  <!-- axes -->
  <line x1="58" y1="52" x2="58" y2="250" stroke="#9ca3af" stroke-width="1.4"/>
  <line x1="58" y1="250" x2="296" y2="250" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#ax)"/>
  <text x="46" y="150" text-anchor="middle" font-size="11" fill="#6b7280" transform="rotate(-90 46 150)">error</text>
  <text x="178" y="268" text-anchor="middle" font-size="11" fill="#6b7280">tamaño del training set →</text>

  <!-- train curve (rises to a high plateau) -->
  <path d="M62,246 C 90,236 116,158 150,138 S 240,122 288,122" fill="none" stroke="#2563eb" stroke-width="2.4"/>
  <!-- valid curve (falls to the same high plateau) -->
  <path d="M62,72 C 110,96 150,116 190,124 S 250,128 288,130" fill="none" stroke="#d97706" stroke-width="2.4"/>

  <!-- annotation: both high & together -->
  <text x="238" y="92" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="600">juntas</text>
  <text x="238" y="106" text-anchor="middle" font-size="11.5" fill="#16a34a" font-weight="600">y altas</text>

  <!-- ============ Panel B: overfitting ============ -->
  <text x="473" y="30" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="600">Overfitting</text>
  <line x1="358" y1="52" x2="358" y2="250" stroke="#9ca3af" stroke-width="1.4"/>
  <line x1="358" y1="250" x2="596" y2="250" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#ax)"/>
  <text x="346" y="150" text-anchor="middle" font-size="11" fill="#6b7280" transform="rotate(-90 346 150)">error</text>
  <text x="478" y="268" text-anchor="middle" font-size="11" fill="#6b7280">tamaño del training set →</text>

  <!-- train curve (stays low) -->
  <path d="M362,246 C 420,242 480,238 588,232" fill="none" stroke="#2563eb" stroke-width="2.4"/>
  <!-- valid curve (falls but plateaus above train) -->
  <path d="M362,80 C 430,150 500,176 588,188" fill="none" stroke="#d97706" stroke-width="2.4"/>

  <!-- gap bracket -->
  <g stroke="#16a34a" stroke-width="1.4" fill="none">
    <line x1="556" y1="188" x2="562" y2="188"/>
    <line x1="559" y1="188" x2="559" y2="232"/>
    <line x1="556" y1="232" x2="562" y2="232"/>
  </g>
  <text x="568" y="214" font-size="11.5" fill="#16a34a" font-weight="600">brecha</text>

  <!-- ============ legend ============ -->
  <g font-size="12.5">
    <line x1="200" y1="308" x2="238" y2="308" stroke="#2563eb" stroke-width="2.8"/>
    <text x="246" y="312" fill="#1a1a1a">entrenamiento</text>
    <line x1="368" y1="308" x2="406" y2="308" stroke="#d97706" stroke-width="2.8"/>
    <text x="414" y="312" fill="#1a1a1a">validación</text>
  </g>
</svg>
