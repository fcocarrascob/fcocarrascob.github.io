<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="720" height="560" fill="#ffffff"/>

  <text x="360" y="26" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="700">GRPO con recompensa estructural: el verificador ahora enseña</text>

  <!-- Prompt -->
  <rect x="230" y="42" width="260" height="38" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="360" y="66" text-anchor="middle" font-size="12.5" fill="#374151">Problema de tracción (AISC 360)</text>

  <!-- Rollouts -->
  <g stroke="#2563eb" stroke-width="1.6">
    <line x1="300" y1="80" x2="130" y2="112" marker-end="url(#ar)"/>
    <line x1="340" y1="80" x2="290" y2="112" marker-end="url(#ar)"/>
    <line x1="380" y1="80" x2="440" y2="112" marker-end="url(#ar)"/>
    <line x1="420" y1="80" x2="595" y2="112" marker-end="url(#ar)"/>
  </g>
  <text x="640" y="100" font-size="11" fill="#6b7280">4 rollouts (T=0.8, p=0.9)</text>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5" text-anchor="middle">
    <rect x="55" y="116" width="145" height="36" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="127" y="139" fill="#166534">\boxed{450 kN}</text>
    <rect x="215" y="116" width="145" height="36" rx="6" fill="#fef9c3" stroke="#fde047"/>
    <text x="287" y="139" fill="#854d0e">\boxed{450}</text>
    <rect x="375" y="116" width="145" height="36" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="447" y="139" fill="#b91c1c">\boxed{225 kN}</text>
    <rect x="535" y="116" width="145" height="36" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="607" y="139" fill="#b91c1c">El área es...</text>
  </g>

  <!-- Rewards -->
  <line x1="360" y1="156" x2="360" y2="184" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="374" y="176" font-size="12" fill="#2563eb" font-weight="600">recompensa = verify_answer + crédito parcial por unidades</text>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" text-anchor="middle" font-weight="700">
    <rect x="55" y="190" width="145" height="30" rx="6" fill="#16a34a"/>
    <text x="127" y="210" fill="#ffffff">1.0</text>
    <rect x="215" y="190" width="145" height="30" rx="6" fill="#eab308"/>
    <text x="287" y="210" fill="#ffffff">0.5</text>
    <rect x="375" y="190" width="145" height="30" rx="6" fill="#dc2626"/>
    <text x="447" y="210" fill="#ffffff">0.0</text>
    <rect x="535" y="190" width="145" height="30" rx="6" fill="#dc2626"/>
    <text x="607" y="210" fill="#ffffff">0.0</text>
  </g>
  <g font-size="10.5" fill="#6b7280" text-anchor="middle">
    <text x="127" y="234">valor + unidad ✓</text>
    <text x="287" y="234">valor ✓, sin unidad</text>
    <text x="447" y="234">valor errado</text>
    <text x="607" y="234">sin \boxed{}</text>
  </g>

  <!-- Advantages -->
  <line x1="360" y1="242" x2="360" y2="270" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="374" y="262" font-size="12" fill="#2563eb" font-weight="600">advantages: (r − μ)/(σ + ε) — la comparación DENTRO del grupo</text>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12.5" text-anchor="middle">
    <rect x="55" y="276" width="145" height="30" rx="6" fill="#f0fdf4" stroke="#86efac"/>
    <text x="127" y="296" fill="#166534">+1.34</text>
    <rect x="215" y="276" width="145" height="30" rx="6" fill="#fef9c3" stroke="#fde047"/>
    <text x="287" y="296" fill="#854d0e">+0.27</text>
    <rect x="375" y="276" width="145" height="30" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="447" y="296" fill="#b91c1c">−0.80</text>
    <rect x="535" y="276" width="145" height="30" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="607" y="296" fill="#b91c1c">−0.80</text>
  </g>

  <!-- Loss y update -->
  <line x1="360" y1="314" x2="360" y2="342" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="140" y="346" width="440" height="66" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="360" y="370" text-anchor="middle" font-size="12.5" fill="#1e3a8a" font-weight="700">pérdida = −promedio( advantage × logprob de la secuencia )</text>
  <text x="360" y="392" text-anchor="middle" font-size="11.5" fill="#374151">sube la probabilidad de generar los rollouts buenos, baja la de los malos</text>

  <line x1="360" y1="412" x2="360" y2="440" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arg)"/>
  <rect x="185" y="444" width="350" height="40" rx="6" fill="#16a34a"/>
  <text x="360" y="470" text-anchor="middle" font-size="13.5" fill="#ffffff" font-weight="700">backward + AdamW: los PESOS cambian</text>

  <path d="M 535 464 C 660 464 680 90 500 62" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#ar)"/>
  <text x="648" y="300" font-size="11" fill="#6b7280" transform="rotate(90 648 300)">siguiente paso: nuevo problema</text>

  <!-- Nota -->
  <rect x="40" y="500" width="640" height="48" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="60" y="520" font-size="12" fill="#9a3412" font-weight="700">La diferencia con los caps. 4–5: hasta ahora todo era inferencia — aquí, por primera vez,</text>
  <text x="60" y="539" font-size="12" fill="#374151">la calificación del verificador estructural se convierte en gradiente y modifica el modelo.</text>
</svg>
