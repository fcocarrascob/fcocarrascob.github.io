<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#ffffff"/>

  <text x="360" y="28" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="700">De greedy a muestreo: el pipeline del capítulo 4</text>

  <!-- Paso 1: logits -->
  <rect x="40" y="50" width="200" height="150" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="140" y="72" text-anchor="middle" font-size="12.5" fill="#374151" font-weight="600">1 · logits (scores crudos)</text>
  <!-- barras -->
  <g fill="#9ca3af">
    <rect x="65" y="150" width="16" height="35"/>
    <rect x="88" y="120" width="16" height="65"/>
    <rect x="111" y="85" width="16" height="100" fill="#2563eb"/>
    <rect x="134" y="140" width="16" height="45"/>
    <rect x="157" y="160" width="16" height="25"/>
    <rect x="180" y="130" width="16" height="55"/>
    <rect x="203" y="168" width="16" height="17"/>
  </g>
  <text x="119" y="80" font-size="10.5" fill="#2563eb" font-weight="700">450</text>

  <line x1="240" y1="125" x2="280" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="260" y="112" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">÷ T</text>

  <!-- Paso 2: temperatura -->
  <rect x="280" y="50" width="200" height="150" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="380" y="72" text-anchor="middle" font-size="12.5" fill="#374151" font-weight="600">2 · temperatura</text>
  <!-- T<1 sharp -->
  <g fill="#93c5fd">
    <rect x="300" y="175" width="12" height="10"/>
    <rect x="317" y="160" width="12" height="25"/>
    <rect x="334" y="90" width="12" height="95" fill="#2563eb"/>
    <rect x="351" y="170" width="12" height="15"/>
    <rect x="368" y="180" width="12" height="5"/>
  </g>
  <text x="337" y="196" font-size="10.5" fill="#1e3a8a">T&lt;1 afila</text>
  <!-- T>1 flat -->
  <g fill="#fdba74">
    <rect x="395" y="150" width="12" height="35"/>
    <rect x="412" y="140" width="12" height="45"/>
    <rect x="429" y="128" width="12" height="57" fill="#f59e0b"/>
    <rect x="446" y="145" width="12" height="40"/>
    <rect x="463" y="155" width="12" height="30"/>
  </g>
  <text x="428" y="196" font-size="10.5" fill="#9a3412">T&gt;1 aplana</text>

  <line x1="480" y1="125" x2="520" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="500" y="112" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">softmax</text>

  <!-- Paso 3: top-p -->
  <rect x="520" y="50" width="180" height="150" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="610" y="72" text-anchor="middle" font-size="12.5" fill="#374151" font-weight="600">3 · filtro top-p</text>
  <g>
    <rect x="540" y="95" width="20" height="90" fill="#2563eb"/>
    <rect x="567" y="125" width="20" height="60" fill="#2563eb"/>
    <rect x="594" y="150" width="20" height="35" fill="#2563eb"/>
    <rect x="621" y="167" width="20" height="18" fill="#e5e7eb"/>
    <rect x="648" y="175" width="20" height="10" fill="#e5e7eb"/>
  </g>
  <line x1="617" y1="85" x2="617" y2="190" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="623" y="95" font-size="10.5" fill="#dc2626">corte p=0.9</text>
  <text x="610" y="198" text-anchor="middle" font-size="10.5" fill="#6b7280">los improbables quedan fuera</text>

  <!-- Flecha hacia el muestreo -->
  <line x1="610" y1="200" x2="610" y2="240" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="610" y1="240" x2="370" y2="240" stroke="#2563eb" stroke-width="2"/>
  <line x1="370" y1="240" x2="370" y2="262" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="500" y="232" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">4 · torch.multinomial: sortear proporcional a la probabilidad</text>

  <!-- Resultado: dos caminos -->
  <rect x="60" y="268" width="290 " height="104" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="205" y="292" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="700">greedy (T=0)</text>
  <text x="205" y="314" text-anchor="middle" font-size="12" fill="#374151">argmax: siempre el token top</text>
  <text x="205" y="334" text-anchor="middle" font-size="12" fill="#374151">misma pregunta → misma respuesta</text>
  <text x="205" y="356" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">determinista, sin diversidad</text>

  <rect x="380" y="268" width="290" height="104" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="525" y="292" text-anchor="middle" font-size="13" fill="#9a3412" font-weight="700">muestreo (T&gt;0 + top-p)</text>
  <text x="525" y="314" text-anchor="middle" font-size="12" fill="#374151">sorteo entre los tokens plausibles</text>
  <text x="525" y="334" text-anchor="middle" font-size="12" fill="#374151">misma pregunta → respuestas distintas</text>
  <text x="525" y="356" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">la materia prima para votar</text>

  <!-- Nota inferior -->
  <rect x="40" y="396" width="660" height="100" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="60" y="422" font-size="12.5" fill="#166534" font-weight="700">Por qué molestarse en sortear:</text>
  <text x="60" y="444" font-size="12" fill="#374151">El muestreo solo NO mejora la accuracy (17.8% vs 15.2% en MATH-500) — controla la diversidad, no la calidad.</text>
  <text x="60" y="464" font-size="12" fill="#374151">Su valor aparece al combinarlo con self-consistency: N respuestas distintas que pueden votar entre sí.</text>
  <text x="60" y="484" font-size="12" fill="#374151">Sin temperatura, las N copias serían idénticas y la votación no aportaría información.</text>
</svg>
