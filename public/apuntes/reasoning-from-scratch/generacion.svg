<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 470" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="720" height="470" fill="#ffffff"/>

  <!-- Prompt -->
  <rect x="120" y="20" width="480" height="44" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="360" y="47" text-anchor="middle" font-size="14" fill="#1a1a1a" font-family="'JetBrains Mono', ui-monospace, monospace">"Explain large language models."  →  6 tokens</text>
  <text x="614" y="46" font-size="12" fill="#6b7280">prompt</text>

  <line x1="360" y1="64" x2="360" y2="96" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="374" y="86" font-size="12.5" fill="#2563eb" font-weight="600">un forward pass</text>

  <!-- LLM -->
  <rect x="230" y="100" width="260" height="44" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="360" y="127" text-anchor="middle" font-size="14.5" fill="#1e3a8a" font-weight="600">Qwen3 0.6B</text>

  <line x1="360" y1="144" x2="360" y2="176" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Matriz de salida -->
  <rect x="150" y="180" width="420" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="360" y="200" text-anchor="middle" font-size="12.5" fill="#6b7280">matriz de salida: 6 filas × 151 936 columnas (una fila por token de entrada)</text>
  <g font-size="11.5" fill="#9ca3af" font-family="'JetBrains Mono', ui-monospace, monospace">
    <text x="170" y="222">fila 1   7.40  11.43   9.25  ...</text>
    <text x="170" y="240">fila 2   9.50  10.62   7.31  ...</text>
    <text x="170" y="256">  ...</text>
  </g>
  <rect x="160" y="264" width="400" height="26" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="170" y="282" font-size="11.5" fill="#1e3a8a" font-family="'JetBrains Mono', ui-monospace, monospace">fila 6   7.37   2.03   8.00  ...  20.50  ...   ← la única que se usa</text>

  <line x1="360" y1="300" x2="360" y2="332" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="374" y="322" font-size="12.5" fill="#2563eb" font-weight="600">argmax de la última fila (greedy)</text>

  <!-- Token elegido -->
  <rect x="255" y="336" width="210" height="40" rx="6" fill="#2563eb"/>
  <text x="360" y="361" text-anchor="middle" font-size="14" fill="#ffffff" font-family="'JetBrains Mono', ui-monospace, monospace">20286 → " Large"</text>

  <!-- Loop de vuelta -->
  <path d="M 465 356 C 620 356, 640 42, 604 42" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arg)"/>
  <text x="648" y="200" font-size="12" fill="#6b7280" text-anchor="middle">se anexa al</text>
  <text x="648" y="215" font-size="12" fill="#6b7280" text-anchor="middle">prompt y se</text>
  <text x="648" y="230" font-size="12" fill="#6b7280" text-anchor="middle">repite todo</text>

  <text x="360" y="412" text-anchor="middle" font-size="12.5" fill="#374151">Cada token nuevo cuesta un forward pass completo.</text>
  <text x="360" y="432" text-anchor="middle" font-size="12.5" fill="#374151">Se detiene al llegar a max_new_tokens o al token &lt;|endoftext|&gt;.</text>
</svg>
