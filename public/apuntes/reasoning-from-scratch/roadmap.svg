<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="ard" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="720" height="340" fill="#ffffff"/>

  <!-- Etapa 1 -->
  <rect x="30" y="120" width="150" height="80" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="105" y="146" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="700">ETAPA 1 · cap. 2</text>
  <text x="105" y="168" text-anchor="middle" font-size="13" fill="#1a1a1a">LLM convencional</text>
  <text x="105" y="186" text-anchor="middle" font-size="11" fill="#6b7280">Qwen3 0.6B base</text>

  <line x1="180" y1="160" x2="246" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Etapa 2 -->
  <rect x="250" y="120" width="160" height="80" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="330" y="146" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="700">ETAPA 2 · cap. 3</text>
  <text x="330" y="168" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="600">Evaluación</text>
  <text x="330" y="186" text-anchor="middle" font-size="11" fill="#6b7280">¿el método ayuda?</text>

  <!-- Etapa 3 arriba -->
  <line x1="410" y1="140" x2="486" y2="84" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="490" y="40" width="200" height="76" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="590" y="64" text-anchor="middle" font-size="12" fill="#c2410c" font-weight="700">ETAPA 3 · caps. 4–5</text>
  <text x="590" y="84" text-anchor="middle" font-size="13" fill="#9a3412">Técnicas de inferencia</text>
  <text x="590" y="102" text-anchor="middle" font-size="11" fill="#6b7280">sin entrenar el modelo</text>

  <!-- Etapa 4 abajo -->
  <line x1="410" y1="180" x2="486" y2="236" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="490" y="204" width="200" height="76" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="590" y="228" text-anchor="middle" font-size="12" fill="#15803d" font-weight="700">ETAPA 4 · caps. 6–8</text>
  <text x="590" y="248" text-anchor="middle" font-size="13" fill="#166534">Técnicas de entrenamiento</text>
  <text x="590" y="266" text-anchor="middle" font-size="11" fill="#6b7280">RL (GRPO) y distillation</text>

  <!-- Loops de re-evaluación -->
  <path d="M 490 66 C 380 50, 310 80, 310 116" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <path d="M 490 258 C 380 274, 310 244, 310 204" fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ard)"/>
  <text x="392" y="38" font-size="11" fill="#9ca3af">se vuelve a evaluar</text>
  <text x="392" y="300" font-size="11" fill="#9ca3af">se vuelve a evaluar</text>
</svg>
