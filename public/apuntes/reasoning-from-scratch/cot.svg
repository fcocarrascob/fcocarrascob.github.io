<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="720" height="430" fill="#ffffff"/>

  <!-- Prompt compartido -->
  <rect x="110" y="20" width="500" height="52" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="360" y="42" text-anchor="middle" font-size="13.5" fill="#1a1a1a">Alice tiene 3 manzanas y Bob tiene 5. Alice le da 1 a Bob.</text>
  <text x="360" y="60" text-anchor="middle" font-size="13.5" fill="#1a1a1a">¿Cuántas tienen entre los dos?</text>
  <text x="622" y="50" font-size="12" fill="#6b7280">prompt</text>

  <line x1="230" y1="72" x2="185" y2="112" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="490" y1="72" x2="535" y2="112" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Rama izquierda: LLM convencional -->
  <rect x="60" y="116" width="250" height="44" rx="6" fill="#f3f4f6" stroke="#9ca3af"/>
  <text x="185" y="143" text-anchor="middle" font-size="14.5" fill="#1a1a1a" font-weight="600">LLM convencional</text>

  <line x1="185" y1="160" x2="185" y2="192" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="98" y="196" width="174" height="42" rx="6" fill="#2563eb"/>
  <text x="185" y="222" text-anchor="middle" font-size="14.5" fill="#ffffff" font-weight="600">Respuesta: 8</text>
  <text x="185" y="264" text-anchor="middle" font-size="12" fill="#6b7280">salta directo a la conclusión;</text>
  <text x="185" y="280" text-anchor="middle" font-size="12" fill="#6b7280">no muestra cómo llegó</text>

  <!-- Rama derecha: reasoning LLM -->
  <rect x="410" y="116" width="250" height="44" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="535" y="143" text-anchor="middle" font-size="14.5" fill="#1e3a8a" font-weight="600">Reasoning LLM</text>

  <line x1="535" y1="160" x2="535" y2="184" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <g font-size="12.5">
    <rect x="410" y="188" width="250" height="30" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="535" y="207" text-anchor="middle" fill="#1e3a8a">Paso 1: conteos iniciales (3, 5)</text>
    <rect x="410" y="226" width="250" height="30" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="535" y="245" text-anchor="middle" fill="#1e3a8a">Paso 2: tras el traspaso (2, 6)</text>
    <rect x="410" y="264" width="250" height="30" rx="5" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="535" y="283" text-anchor="middle" fill="#1e3a8a">Paso 3: total 2 + 6 = 8</text>
  </g>
  <text x="676" y="245" font-size="12" fill="#6b7280" text-anchor="middle">cadena</text>
  <text x="676" y="260" font-size="12" fill="#6b7280" text-anchor="middle">de pasos</text>
  <text x="676" y="275" font-size="12" fill="#6b7280" text-anchor="middle">(CoT)</text>

  <line x1="535" y1="294" x2="535" y2="322" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="448" y="326" width="174" height="42" rx="6" fill="#2563eb"/>
  <text x="535" y="352" text-anchor="middle" font-size="14.5" fill="#ffffff" font-weight="600">Respuesta: 8</text>
  <text x="535" y="394" text-anchor="middle" font-size="12" fill="#6b7280">los pasos pueden mostrarse o ir ocultos</text>
  <text x="535" y="410" text-anchor="middle" font-size="12" fill="#6b7280" font-family="'JetBrains Mono', ui-monospace, monospace">&lt;think&gt; ... &lt;/think&gt;</text>
</svg>
