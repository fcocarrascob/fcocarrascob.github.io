<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="720" height="540" fill="#ffffff"/>

  <text x="360" y="28" text-anchor="middle" font-size="15" fill="#1a1a1a" font-weight="700">Destilación con el verificador como curador de datos</text>

  <!-- Profesor -->
  <rect x="40" y="54" width="300" height="76" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="190" y="80" text-anchor="middle" font-size="13" fill="#1e3a8a" font-weight="700">Profesor: razonador oficial 0.6B</text>
  <text x="190" y="100" text-anchor="middle" font-size="11.5" fill="#374151">misma familia que el estudiante</text>
  <text x="190" y="118" text-anchor="middle" font-size="11.5" fill="#6b7280">(el caso que mejor rinde en la tabla 8.1)</text>

  <rect x="380" y="54" width="300" height="76" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="530" y="80" text-anchor="middle" font-size="13" fill="#1a1a1a" font-weight="700">21 problemas del benchmark</text>
  <text x="530" y="100" text-anchor="middle" font-size="11.5" fill="#374151">acero · hormigón · cargas · sísmica</text>
  <text x="530" y="118" text-anchor="middle" font-size="11.5" fill="#6b7280">varios intentos por problema (T=0.7)</text>

  <line x1="190" y1="130" x2="330" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="530" y1="130" x2="390" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Trazas -->
  <rect x="180" y="186" width="360" height="56" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="360" y="210" text-anchor="middle" font-size="12.5" fill="#374151" font-weight="600">Trazas candidatas (razonamiento + respuesta)</text>
  <text x="360" y="230" text-anchor="middle" font-size="11.5" fill="#6b7280">el profesor acierta a veces — no siempre</text>

  <line x1="360" y1="242" x2="360" y2="282" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Verificador -->
  <rect x="200" y="286" width="320" height="70" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="360" y="310" text-anchor="middle" font-size="13" fill="#9a3412" font-weight="700">VERIFICADOR — tercer rol</text>
  <text x="360" y="330" text-anchor="middle" font-size="11.5" fill="#374151">métrica (cap. 3) → recompensa (cap. 6) → curador (cap. 8)</text>
  <text x="360" y="348" text-anchor="middle" font-size="11.5" fill="#374151">solo pasan las trazas con valor + unidad correctos</text>

  <line x1="290" y1="356" x2="180" y2="400" stroke="#dc2626" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="430" y1="356" x2="540" y2="400" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="60" y="404" width="230" height="52" rx="8" fill="#fef2f2" stroke="#fecaca"/>
  <text x="175" y="426" text-anchor="middle" font-size="12" fill="#b91c1c" font-weight="600">trazas incorrectas</text>
  <text x="175" y="444" text-anchor="middle" font-size="11.5" fill="#b91c1c">descartadas (rejection sampling)</text>

  <rect x="430" y="404" width="230" height="52" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="545" y="426" text-anchor="middle" font-size="12" fill="#166534" font-weight="600">dataset sintético verificado</text>
  <text x="545" y="444" text-anchor="middle" font-size="11.5" fill="#166534">→ SFT del base (cross-entropy)</text>

  <!-- Nota -->
  <rect x="40" y="480" width="640" height="46" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="60" y="500" font-size="12" fill="#1e3a8a" font-weight="600">La pérdida es conocida: cross-entropy solo-respuesta = el negativo del logprob promedio del cap. 5.</text>
  <text x="60" y="518" font-size="12" fill="#374151">El costo caro (generar trazas) se paga una vez; después entrenar es un SFT estándar de minutos.</text>
</svg>
