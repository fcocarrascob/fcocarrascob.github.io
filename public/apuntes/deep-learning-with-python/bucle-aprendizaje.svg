<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="bl-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="bl-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="700" height="420" fill="#ffffff"/>

  <!-- Input -->
  <rect x="60" y="40" width="120" height="42" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="120" y="66" text-anchor="middle" font-size="13" fill="#374151">Input X</text>

  <!-- Layer 1 -->
  <rect x="60" y="120" width="120" height="52" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="120" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Capa</text>
  <text x="120" y="160" text-anchor="middle" font-size="11" fill="#2563eb">pesos W₁, b₁</text>

  <!-- Layer 2 -->
  <rect x="60" y="210" width="120" height="52" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="120" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Capa</text>
  <text x="120" y="250" text-anchor="middle" font-size="11" fill="#2563eb">pesos W₂, b₂</text>

  <!-- Prediction -->
  <rect x="60" y="300" width="120" height="42" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="120" y="326" text-anchor="middle" font-size="13" fill="#374151">Predicción Y'</text>

  <line x1="120" y1="82" x2="120" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#bl-ar)"/>
  <line x1="120" y1="172" x2="120" y2="208" stroke="#2563eb" stroke-width="2" marker-end="url(#bl-ar)"/>
  <line x1="120" y1="262" x2="120" y2="298" stroke="#2563eb" stroke-width="2" marker-end="url(#bl-ar)"/>

  <!-- True target -->
  <rect x="300" y="300" width="120" height="42" rx="6" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="360" y="326" text-anchor="middle" font-size="13" fill="#374151">Objetivo Y</text>

  <!-- Loss function -->
  <rect x="250" y="200" width="200" height="52" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="350" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Función de pérdida</text>
  <text x="350" y="240" text-anchor="middle" font-size="11" fill="#dc2626">distancia predicción ↔ objetivo</text>

  <line x1="180" y1="321" x2="248" y2="240" stroke="#dc2626" stroke-width="2" marker-end="url(#bl-red)"/>
  <line x1="360" y1="298" x2="360" y2="254" stroke="#dc2626" stroke-width="2" marker-end="url(#bl-red)"/>

  <!-- Loss score -->
  <rect x="510" y="200" width="130" height="52" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="575" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Puntaje</text>
  <text x="575" y="240" text-anchor="middle" font-size="11" fill="#b45309">de pérdida</text>
  <line x1="450" y1="226" x2="508" y2="226" stroke="#dc2626" stroke-width="2" marker-end="url(#bl-red)"/>

  <!-- Optimizer -->
  <rect x="510" y="100" width="130" height="60" rx="6" fill="#2563eb"/>
  <text x="575" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Optimizador</text>
  <text x="575" y="144" text-anchor="middle" font-size="10.5" fill="#dbeafe">backpropagation</text>
  <line x1="575" y1="200" x2="575" y2="162" stroke="#f59e0b" stroke-width="2" marker-end="url(#bl-ar)"/>

  <!-- feedback to weights -->
  <path d="M510,120 C300,60 200,80 130,116" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#bl-ar)"/>
  <text x="330" y="70" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2563eb">ajusta los pesos ↺</text>
</svg>
