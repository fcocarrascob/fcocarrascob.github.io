<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 400" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <rect width="620" height="400" fill="#ffffff"/>

  <!-- outer: IA -->
  <rect x="30" y="30" width="560" height="340" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="310" y="58" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">Inteligencia Artificial</text>
  <text x="310" y="78" text-anchor="middle" font-size="12" fill="#3b82f6">automatizar tareas intelectuales humanas</text>
  <text x="52" y="120" font-size="11.5" fill="#60a5fa">incluye IA simbólica (reglas escritas a mano)</text>

  <!-- middle: ML -->
  <rect x="90" y="100" width="440" height="260" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="310" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Machine Learning</text>
  <text x="310" y="149" text-anchor="middle" font-size="11.5" fill="#2563eb">aprende las reglas a partir de datos + respuestas</text>

  <!-- inner: DL -->
  <rect x="150" y="170" width="320" height="180" rx="12" fill="#2563eb"/>
  <text x="310" y="235" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Deep Learning</text>
  <text x="310" y="262" text-anchor="middle" font-size="12.5" fill="#dbeafe">capas sucesivas de</text>
  <text x="310" y="280" text-anchor="middle" font-size="12.5" fill="#dbeafe">representaciones cada vez más útiles</text>
  <text x="310" y="312" text-anchor="middle" font-size="11.5" fill="#bfdbfe">"deep" = nº de capas, no "entendimiento"</text>
</svg>
