<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="bp-fw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="bp-bw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="700" height="380" fill="#ffffff"/>

  <!-- legend -->
  <line x1="440" y1="34" x2="472" y2="34" stroke="#2563eb" stroke-width="2.5" marker-end="url(#bp-fw)"/>
  <text x="480" y="38" font-size="12" fill="#2563eb" font-weight="600">forward pass</text>
  <line x1="440" y1="56" x2="472" y2="56" stroke="#dc2626" stroke-width="2.5" marker-end="url(#bp-bw)"/>
  <text x="480" y="60" font-size="12" fill="#dc2626" font-weight="600">backward pass (∂loss/∂·)</text>

  <text x="60" y="40" font-size="14" font-weight="700" fill="#1a1a1a">Backpropagation = regla de la cadena sobre el grafo</text>

  <!-- nodes -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" text-anchor="middle">
    <!-- inputs -->
    <circle cx="80" cy="120" r="26" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="80" y="118" font-size="12" fill="#374151">w</text><text x="80" y="132" font-size="10" fill="#6b7280">2</text>
    <circle cx="80" cy="230" r="26" fill="#f3f4f6" stroke="#d1d5db"/>
    <text x="80" y="228" font-size="12" fill="#374151">b</text><text x="80" y="242" font-size="10" fill="#6b7280">1</text>

    <!-- x1 = x*w -->
    <circle cx="250" cy="120" r="30" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="250" y="116" font-size="12" fill="#1e3a8a">x1 = x·w</text><text x="250" y="132" font-size="11" fill="#2563eb">6</text>

    <!-- x2 = x1 + b -->
    <circle cx="420" cy="175" r="30" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="420" y="171" font-size="12" fill="#1e3a8a">x2 = x1+b</text><text x="420" y="187" font-size="11" fill="#2563eb">7</text>

    <!-- loss -->
    <circle cx="600" cy="175" r="32" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="600" y="171" font-size="11" fill="#991b1b">loss_val</text><text x="600" y="187" font-size="11" fill="#dc2626">3</text>
  </g>

  <!-- forward edges -->
  <line x1="106" y1="120" x2="219" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#bp-fw)"/>
  <line x1="276" y1="132" x2="392" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#bp-fw)"/>
  <line x1="104" y1="222" x2="393" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#bp-fw)"/>
  <line x1="450" y1="175" x2="567" y2="175" stroke="#2563eb" stroke-width="2" marker-end="url(#bp-fw)"/>

  <!-- backward edges (offset, red, dashed) -->
  <g stroke="#dc2626" stroke-width="2" stroke-dasharray="5 4">
    <line x1="567" y1="188" x2="452" y2="188" marker-end="url(#bp-bw)"/>
    <line x1="393" y1="192" x2="278" y2="140" marker-end="url(#bp-bw)"/>
    <line x1="221" y1="134" x2="108" y2="134" marker-end="url(#bp-bw)"/>
  </g>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5" fill="#dc2626">
    <text x="505" y="205">grad=1</text>
    <text x="325" y="185">grad=1</text>
    <text x="150" y="152">grad=2</text>
  </g>

  <!-- result -->
  <rect x="120" y="300" width="460" height="56" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="350" y="323" text-anchor="middle" font-size="12.5" fill="#92400e">Multiplicar las derivadas a lo largo del camino (chain rule):</text>
  <text x="350" y="344" text-anchor="middle" font-size="12" fill="#b45309" font-family="'JetBrains Mono', ui-monospace, monospace" font-weight="700">grad(loss, w) = 1 · 1 · 2 = 2</text>
</svg>
