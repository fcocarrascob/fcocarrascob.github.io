<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="cg-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="760" height="260" fill="#ffffff"/>

  <!-- Input -->
  <rect x="30" y="90" width="120" height="70" rx="8" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="90" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">Espacio de</text>
  <text x="90" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">entrada</text>

  <line x1="150" y1="125" x2="198" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#cg-ar)"/>
  <text x="174" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">matmul(W, x)</text>
  <text x="174" y="150" text-anchor="middle" font-size="10" fill="#6b7280">mapa lineal</text>

  <!-- Rotated/scaled -->
  <rect x="200" y="90" width="130" height="70" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="265" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Rotado /</text>
  <text x="265" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">escalado</text>

  <line x1="330" y1="125" x2="378" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#cg-ar)"/>
  <text x="354" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">+ b</text>
  <text x="354" y="150" text-anchor="middle" font-size="10" fill="#6b7280">traslación</text>

  <!-- Affine -->
  <rect x="380" y="90" width="130" height="70" rx="8" fill="#bfdbfe" stroke="#3b82f6"/>
  <text x="445" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">Resultado</text>
  <text x="445" y="138" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a8a">afín</text>

  <line x1="510" y1="125" x2="558" y2="125" stroke="#2563eb" stroke-width="2" marker-end="url(#cg-ar)"/>
  <text x="534" y="112" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">relu</text>
  <text x="534" y="150" text-anchor="middle" font-size="10" fill="#6b7280">no linealidad</text>

  <!-- Output -->
  <rect x="560" y="90" width="130" height="70" rx="8" fill="#2563eb"/>
  <text x="625" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Salida de</text>
  <text x="625" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">la capa</text>

  <!-- title & caption -->
  <text x="380" y="45" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Una capa Dense = transformación afín + activación</text>
  <text x="380" y="215" text-anchor="middle" font-size="12" fill="#374151">Sin la <tspan font-weight="700" fill="#2563eb">relu</tspan>, apilar capas afines colapsa a <tspan font-style="italic">una sola</tspan> capa lineal:</text>
  <text x="380" y="235" text-anchor="middle" font-size="11.5" fill="#6b7280" font-family="'JetBrains Mono', ui-monospace, monospace">W₂·(W₁·x + b₁) + b₂ = (W₂·W₁)·x + (W₂·b₁ + b₂)</text>
</svg>
