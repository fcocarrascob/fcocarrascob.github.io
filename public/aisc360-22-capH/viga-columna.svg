<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 410" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="hp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <marker id="hr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="410" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La viga-columna siente axial y flexión a la vez — y la flexión se amplifica</text>

  <!-- divider -->
  <line x1="470" y1="55" x2="470" y2="360" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== LEFT: deflected member ===== -->
  <g>
    <text x="130" y="70" font-size="13" text-anchor="start" fill="#222" font-weight="bold">El miembro real</text>
    <!-- P at top -->
    <line x1="250" y1="58" x2="250" y2="92" stroke="#1a63a8" stroke-width="3" marker-end="url(#hp)"/>
    <text x="264" y="74" font-size="13" fill="#1a63a8" font-weight="bold">P_r</text>
    <!-- straight reference axis -->
    <line x1="250" y1="95" x2="250" y2="330" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 4"/>
    <!-- deflected column (bows right) -->
    <path d="M250,95 C 320,160 320,265 250,330" fill="none" stroke="#1a63a8" stroke-width="4"/>
    <!-- end moments (curved arrows) -->
    <path d="M212,104 A 26 26 0 0 1 262,100" fill="none" stroke="#b02a1a" stroke-width="2" marker-start="url(#hr)"/>
    <text x="200" y="100" font-size="12.5" fill="#b02a1a" font-weight="bold">M</text>
    <path d="M262,322 A 26 26 0 0 1 212,326" fill="none" stroke="#b02a1a" stroke-width="2" marker-start="url(#hr)"/>
    <text x="200" y="332" font-size="12.5" fill="#b02a1a" font-weight="bold">M</text>
    <!-- base support -->
    <polygon points="250,330 238,346 262,346" fill="#5b6470"/>
    <line x1="230" y1="346" x2="270" y2="346" stroke="#333" stroke-width="2"/>
    <!-- delta dimension at mid -->
    <line x1="250" y1="212" x2="313" y2="212" stroke="#666" stroke-width="1" marker-start="url(#ha)" marker-end="url(#ha)"/>
    <text x="322" y="216" font-size="12.5" fill="#666" font-weight="bold">δ</text>
    <text x="235" y="378" font-size="11.5" fill="#555" text-anchor="middle">el axial P monta sobre la deflexión δ</text>
    <text x="235" y="394" font-size="11.5" fill="#555" text-anchor="middle">y agrega momento extra P·δ (2° orden)</text>
  </g>

  <!-- ===== RIGHT: the two demands + amplification ===== -->
  <g>
    <text x="705" y="72" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">Las dos demandas que compiten</text>

    <!-- axial chip -->
    <rect x="540" y="100" width="330" height="52" rx="8" fill="#eaf1fa" stroke="#1a63a8"/>
    <text x="560" y="125" font-size="13" fill="#1a63a8" font-weight="bold">AXIAL</text>
    <text x="560" y="143" font-size="12" fill="#333">P_r  — de los Cap. D / E</text>

    <!-- bending chip -->
    <rect x="540" y="166" width="330" height="72" rx="8" fill="#fbeeec" stroke="#b02a1a"/>
    <text x="560" y="191" font-size="13" fill="#b02a1a" font-weight="bold">FLEXIÓN</text>
    <text x="560" y="209" font-size="12" fill="#333">M_r — del Cap. F, pero amplificada:</text>
    <text x="560" y="229" font-size="13" fill="#b02a1a" font-weight="bold">M_r = M primario + P·δ</text>

    <!-- combine -->
    <text x="705" y="278" font-size="12.5" fill="#333" text-anchor="middle">El Capítulo H no calcula resistencia nueva:</text>
    <text x="705" y="298" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">pregunta cuánto de la capacidad</text>
    <text x="705" y="316" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">consumen las dos demandas juntas.</text>
    <text x="705" y="352" font-size="12" fill="#555" text-anchor="middle">P_r y M_r ya incluyen el 2° orden (Cap. C / Ap. 8)</text>
    <text x="705" y="370" font-size="12" fill="#555" text-anchor="middle">antes de entrar al diagrama de interacción.</text>
  </g>
</svg>
