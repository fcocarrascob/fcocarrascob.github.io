<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="mar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <pattern id="soil" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#f0e9dd"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#b8a888" stroke-width="1.2"/>
    </pattern>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">En el Capítulo 11 conviven dos muros distintos</text>

  <!-- ===== Left: shear wall (in-plane) ===== -->
  <g>
    <text x="240" y="60" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Muro de corte: la fuerza vive EN el plano</text>
    <!-- foundation -->
    <rect x="90" y="330" width="300" height="26" fill="#dcd8d0" stroke="#8a857c"/>
    <!-- wall elevation -->
    <rect x="130" y="100" width="220" height="230" fill="#efece6" stroke="#8a857c"/>
    <!-- V arrow at top -->
    <line x1="70" y1="112" x2="124" y2="112" stroke="#b02a1a" stroke-width="3" marker-end="url(#mar)"/>
    <text x="72" y="100" font-size="13.5" fill="#b02a1a" font-weight="bold">V (sismo/viento)</text>
    <!-- diagonal cracks -->
    <g stroke="#a35" stroke-width="1.6">
      <line x1="150" y1="320" x2="330" y2="140"/>
      <line x1="185" y1="325" x2="340" y2="170"/>
      <line x1="140" y1="285" x2="300" y2="125"/>
    </g>
    <!-- horizontal reinforcement -->
    <g stroke="#1c7c3c" stroke-width="2.8">
      <line x1="138" y1="135" x2="342" y2="135"/>
      <line x1="138" y1="175" x2="342" y2="175"/>
      <line x1="138" y1="215" x2="342" y2="215"/>
      <line x1="138" y1="255" x2="342" y2="255"/>
      <line x1="138" y1="295" x2="342" y2="295"/>
    </g>
    <!-- dims -->
    <line x1="130" y1="376" x2="350" y2="376" stroke="#666" stroke-width="1" marker-start="url(#ma)" marker-end="url(#ma)"/>
    <text x="240" y="392" font-size="12" fill="#666" text-anchor="middle">ℓ_w</text>
    <line x1="375" y1="100" x2="375" y2="330" stroke="#666" stroke-width="1" marker-start="url(#ma)" marker-end="url(#ma)"/>
    <text x="384" y="220" font-size="12" fill="#666">h_w</text>
    <text x="240" y="414" font-size="12" fill="#1c7c3c" text-anchor="middle">las fisuras son diagonales → las cose el refuerzo HORIZONTAL (ρ_t)</text>
  </g>

  <!-- ===== Right: basement wall (out-of-plane) ===== -->
  <g>
    <text x="700" y="60" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Muro de sótano: la fuerza EMPUJA el plano</text>
    <!-- soil -->
    <rect x="530" y="100" width="120" height="256" fill="url(#soil)"/>
    <text x="590" y="90" font-size="12" fill="#8a7449" text-anchor="middle">suelo</text>
    <!-- wall section (with deflected shape) -->
    <rect x="650" y="100" width="44" height="256" fill="#efece6" stroke="#8a857c"/>
    <!-- deflected shape -->
    <path d="M 672,100 C 700,170 700,290 672,356" fill="none" stroke="#666" stroke-width="1.6" stroke-dasharray="6 4"/>
    <!-- earth pressure (triangular) -->
    <g stroke="#b02a1a" stroke-width="2">
      <line x1="622" y1="140" x2="646" y2="140" marker-end="url(#mar)"/>
      <line x1="612" y1="190" x2="646" y2="190" marker-end="url(#mar)"/>
      <line x1="600" y1="240" x2="646" y2="240" marker-end="url(#mar)"/>
      <line x1="588" y1="290" x2="646" y2="290" marker-end="url(#mar)"/>
      <line x1="576" y1="335" x2="646" y2="335" marker-end="url(#mar)"/>
    </g>
    <!-- vertical bars on tension face -->
    <line x1="684" y1="106" x2="684" y2="352" stroke="#1c7c3c" stroke-width="3"/>
    <text x="700" y="230" font-size="12" fill="#1c7c3c" transform="rotate(90 700,230)" text-anchor="middle"> </text>
    <!-- slabs restraining -->
    <rect x="694" y="100" width="150" height="16" fill="#dcd8d0" stroke="#8a857c"/>
    <rect x="694" y="340" width="150" height="16" fill="#dcd8d0" stroke="#8a857c"/>
    <text x="775" y="94" font-size="11.5" fill="#555">losa (apoyo)</text>
    <text x="775" y="374" font-size="11.5" fill="#555">fundación (apoyo)</text>
    <!-- annotation -->
    <text x="782" y="200" font-size="12" fill="#1c7c3c">tracción en la cara</text>
    <text x="782" y="216" font-size="12" fill="#1c7c3c">interior → manda el</text>
    <text x="782" y="232" font-size="12" fill="#1c7c3c">refuerzo VERTICAL (ρ_ℓ)</text>
    <line x1="778" y1="212" x2="690" y2="220" stroke="#1c7c3c" stroke-width="1.3" marker-end="url(#ma)"/>
    <text x="700" y="414" font-size="12" fill="#555" text-anchor="middle">trabaja como losa vertical en flexión: una viga ancha apoyada arriba y abajo</text>
  </g>
</svg>
