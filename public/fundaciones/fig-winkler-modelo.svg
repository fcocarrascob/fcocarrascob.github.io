<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>

  <!-- ═══ Panel A: planta discretizada ═══ -->
  <text x="180" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Planta — discretización</text>

  <rect x="50" y="60" width="260" height="260" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="82.5" y1="60" x2="82.5" y2="320"/>
    <line x1="115" y1="60" x2="115" y2="320"/>
    <line x1="147.5" y1="60" x2="147.5" y2="320"/>
    <line x1="180" y1="60" x2="180" y2="320"/>
    <line x1="212.5" y1="60" x2="212.5" y2="320"/>
    <line x1="245" y1="60" x2="245" y2="320"/>
    <line x1="277.5" y1="60" x2="277.5" y2="320"/>
    <line x1="50" y1="92.5" x2="310" y2="92.5"/>
    <line x1="50" y1="125" x2="310" y2="125"/>
    <line x1="50" y1="157.5" x2="310" y2="157.5"/>
    <line x1="50" y1="190" x2="310" y2="190"/>
    <line x1="50" y1="222.5" x2="310" y2="222.5"/>
    <line x1="50" y1="255" x2="310" y2="255"/>
    <line x1="50" y1="287.5" x2="310" y2="287.5"/>
  </g>

  <rect x="212.5" y="222.5" width="32.5" height="32.5" fill="#2563eb" fill-opacity="0.22" stroke="#2563eb" stroke-width="1.2"/>
  <circle cx="229" cy="239" r="2.2" fill="#2563eb"/>
  <line x1="233" y1="252" x2="266" y2="330" stroke="#9ca3af" stroke-width="1"/>
  <text x="270" y="336" font-size="10.5" fill="#6b7280">celda <tspan font-style="italic">i</tspan> en (<tspan font-style="italic">x</tspan><tspan font-size="8" dy="2">i</tspan><tspan dy="-2">, </tspan><tspan font-style="italic">y</tspan><tspan font-size="8" dy="2">i</tspan><tspan dy="-2">)</tspan></text>

  <!-- ejes -->
  <line x1="180" y1="190" x2="228" y2="190" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aa)"/>
  <line x1="180" y1="190" x2="180" y2="145" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="234" y="183" font-size="11" font-style="italic" fill="#2563eb">x</text>
  <text x="187" y="150" font-size="11" font-style="italic" fill="#2563eb">y</text>

  <!-- dimensiones -->
  <line x1="212.5" y1="56" x2="212.5" y2="42" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="245" y1="56" x2="245" y2="42" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="212.5" y1="48" x2="245" y2="48" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="229" y="40" text-anchor="middle" font-size="10.5" fill="#1a1a1a">Δ<tspan font-style="italic">x</tspan></text>
  <line x1="314" y1="222.5" x2="330" y2="222.5" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="314" y1="255" x2="330" y2="255" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="324" y1="222.5" x2="324" y2="255" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="332" y="243" font-size="10.5" fill="#1a1a1a">Δ<tspan font-style="italic">y</tspan></text>
  <line x1="50" y1="324" x2="50" y2="360" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="310" y1="324" x2="310" y2="360" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="50" y1="354" x2="310" y2="354" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="180" y="348" text-anchor="middle" font-size="11.5" font-style="italic" fill="#1a1a1a">L<tspan font-size="8.5" dy="2.5">x</tspan></text>
  <line x1="46" y1="60" x2="22" y2="60" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="46" y1="320" x2="22" y2="320" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="28" y1="60" x2="28" y2="320" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="12" y="194" text-anchor="middle" font-size="11.5" font-style="italic" fill="#1a1a1a">L<tspan font-size="8.5" dy="2.5">y</tspan></text>

  <!-- ═══ Panel B: elevación con resortes ═══ -->
  <text x="575" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Elevación — resortes de solo compresión</text>

  <!-- plano de asentamientos -->
  <text x="565" y="140" text-anchor="middle" font-size="11.5" font-style="italic" fill="#2563eb">δ(x, y) = δ₀ + α<tspan font-size="8.5" dy="2.5">x</tspan><tspan dy="-2.5">·x + α</tspan><tspan font-size="8.5" dy="2.5">y</tspan><tspan dy="-2.5">·y</tspan></text>

  <!-- nivel original del terreno -->
  <line x1="425" y1="210" x2="725" y2="210" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- resortes desactivados (despegue) -->
  <g stroke="#9ca3af" stroke-width="1.3" fill="none" stroke-dasharray="3 2">
    <polyline points="450,210 450,219 457,228 443,242 457,255 443,269 457,282 450,291 450,300"/>
    <polyline points="495,210 495,219 502,228 488,242 502,255 488,269 502,282 495,291 495,300"/>
  </g>
  <!-- resortes activos (comprimidos) -->
  <g stroke="#1a1a1a" stroke-width="1.3" fill="none">
    <polyline points="585,219 585,227 592,235 578,247 592,260 578,272 592,284 585,292 585,300"/>
    <polyline points="630,226 630,233 637,241 623,252 637,263 623,274 637,285 630,293 630,300"/>
    <polyline points="675,234 675,241 682,247 668,257 682,267 668,277 682,287 675,293 675,300"/>
    <polyline points="715,241 715,247 722,253 708,262 722,271 708,279 722,288 715,294 715,300"/>
  </g>

  <!-- zapata rígida (plano girado) -->
  <polygon points="430,180 720,230 720,242 430,192" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- cargas -->
  <line x1="575" y1="158" x2="575" y2="197" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="561" y="182" text-anchor="end" font-size="12" font-style="italic" fill="#1a1a1a">N</text>
  <path d="M 602 166 A 20 20 0 0 1 602 202" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="626" y="188" font-size="12" font-style="italic" fill="#1a1a1a">M′</text>

  <!-- borde de contacto -->
  <line x1="534" y1="212" x2="534" y2="308" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- base -->
  <line x1="420" y1="300" x2="730" y2="300" stroke="#1a1a1a" stroke-width="1.2"/>
  <g stroke="#9ca3af" stroke-width="1">
    <line x1="436" y1="300" x2="429" y2="308"/>
    <line x1="460" y1="300" x2="453" y2="308"/>
    <line x1="484" y1="300" x2="477" y2="308"/>
    <line x1="508" y1="300" x2="501" y2="308"/>
    <line x1="532" y1="300" x2="525" y2="308"/>
    <line x1="556" y1="300" x2="549" y2="308"/>
    <line x1="580" y1="300" x2="573" y2="308"/>
    <line x1="604" y1="300" x2="597" y2="308"/>
    <line x1="628" y1="300" x2="621" y2="308"/>
    <line x1="652" y1="300" x2="645" y2="308"/>
    <line x1="676" y1="300" x2="669" y2="308"/>
    <line x1="700" y1="300" x2="693" y2="308"/>
    <line x1="724" y1="300" x2="717" y2="308"/>
  </g>

  <text x="472" y="326" text-anchor="middle" font-size="10.5" fill="#6b7280">despegue: <tspan font-style="italic">q</tspan> = 0</text>
  <text x="648" y="326" text-anchor="middle" font-size="10.5" fill="#1d4ed8">contacto: <tspan font-style="italic">q</tspan> = <tspan font-style="italic">k</tspan><tspan font-size="8" dy="2.5">s</tspan><tspan dy="-2.5">·</tspan><tspan font-style="italic">δ</tspan></text>
</svg>
