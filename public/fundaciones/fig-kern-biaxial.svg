<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
    <linearGradient id="gq" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <rect width="620" height="470" fill="#ffffff"/>

  <!-- zapata con gradiente de presión (creciente hacia la resultante) -->
  <rect x="110" y="90" width="400" height="320" fill="#ffffff"/>
  <rect x="110" y="90" width="400" height="320" fill="url(#gq)" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="500" y="110" text-anchor="end" font-size="11" font-style="italic" fill="#1d4ed8">q<tspan font-size="8" dy="2.5">max</tspan></text>
  <text x="120" y="396" font-size="11" font-style="italic" fill="#6b7280">q<tspan font-size="8" dy="2.5">min</tspan></text>

  <!-- kern (rombo de diagonales Lx/3 y Ly/3) -->
  <polygon points="243,250 310,197 377,250 310,303" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 4"/>
  <circle cx="310" cy="250" r="2.5" fill="#6b7280"/>
  <text x="310" y="278" text-anchor="middle" font-size="11" fill="#2563eb">kern</text>

  <!-- resultante y excentricidades -->
  <line x1="310" y1="250" x2="340" y2="250" stroke="#9ca3af" stroke-width="1"/>
  <line x1="340" y1="250" x2="340" y2="234" stroke="#9ca3af" stroke-width="1"/>
  <text x="324" y="263" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">e<tspan font-size="7.5" dy="2">x</tspan></text>
  <text x="347" y="248" font-size="10" font-style="italic" fill="#6b7280">e<tspan font-size="7.5" dy="2">y</tspan></text>
  <circle cx="340" cy="230" r="4" fill="#dc2626"/>
  <text x="352" y="224" font-size="11" fill="#dc2626">resultante <tspan font-style="italic">N</tspan> en (<tspan font-style="italic">e</tspan><tspan font-size="8" dy="2.5">x</tspan><tspan dy="-2.5">, </tspan><tspan font-style="italic">e</tspan><tspan font-size="8" dy="2.5">y</tspan><tspan dy="-2.5">)</tspan></text>

  <!-- dimensiones del kern -->
  <line x1="243" y1="254" x2="243" y2="336" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="377" y1="254" x2="377" y2="336" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="243" y1="330" x2="377" y2="330" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="310" y="345" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1a1a1a">L<tspan font-size="8" dy="2.5">x</tspan><tspan dy="-2.5">/3</tspan></text>
  <line x1="306" y1="197" x2="206" y2="197" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="306" y1="303" x2="206" y2="303" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="212" y1="197" x2="212" y2="303" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="204" y="254" text-anchor="end" font-size="10.5" font-style="italic" fill="#1a1a1a">L<tspan font-size="8" dy="2.5">y</tspan><tspan dy="-2.5">/3</tspan></text>

  <!-- dimensiones de la zapata -->
  <line x1="110" y1="414" x2="110" y2="442" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="510" y1="414" x2="510" y2="442" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="110" y1="436" x2="510" y2="436" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="310" y="430" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">x</tspan></text>
  <line x1="106" y1="90" x2="78" y2="90" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="106" y1="410" x2="78" y2="410" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="84" y1="90" x2="84" y2="410" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="68" y="254" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">y</tspan></text>
</svg>
