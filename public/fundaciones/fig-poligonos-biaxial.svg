<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="760" height="240" fill="#ffffff"/>

  <!-- ═══ triángulo ═══ -->
  <polygon points="100,55 180,55 180,135" fill="#2563eb" fill-opacity="0.18"/>
  <rect x="30" y="55" width="150" height="130" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="100" y1="55" x2="180" y2="135" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="5 4"/>
  <circle cx="152" cy="82" r="3.5" fill="#dc2626"/>
  <text x="159" y="79" font-size="10" font-style="italic" fill="#dc2626">N</text>
  <text x="80" y="152" text-anchor="middle" font-size="9.5" fill="#9ca3af">despegue</text>
  <text x="105" y="209" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">triángulo</text>

  <!-- ═══ cuadrilátero ═══ -->
  <polygon points="262,55 375,55 375,185 322,185" fill="#2563eb" fill-opacity="0.18"/>
  <rect x="225" y="55" width="150" height="130" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="262" y1="55" x2="322" y2="185" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="5 4"/>
  <circle cx="330" cy="105" r="3.5" fill="#dc2626"/>
  <text x="252" y="152" text-anchor="middle" font-size="9.5" fill="#9ca3af">despegue</text>
  <text x="300" y="209" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">cuadrilátero</text>

  <!-- ═══ pentágono ═══ -->
  <polygon points="478,55 570,55 570,185 420,185 420,115" fill="#2563eb" fill-opacity="0.18"/>
  <rect x="420" y="55" width="150" height="130" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="420" y1="115" x2="478" y2="55" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="5 4"/>
  <circle cx="515" cy="125" r="3.5" fill="#dc2626"/>
  <text x="443" y="80" text-anchor="middle" font-size="9.5" fill="#9ca3af">despegue</text>
  <text x="495" y="209" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">pentágono</text>

  <!-- ═══ plano de excentricidades ═══ -->
  <polygon points="620,185 677,185 620,128" fill="#2563eb" fill-opacity="0.12"/>
  <line x1="677" y1="185" x2="620" y2="128" stroke="#2563eb" stroke-width="1.3"/>
  <line x1="620" y1="185" x2="745" y2="185" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#aa)"/>
  <line x1="620" y1="185" x2="620" y2="60" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#aa)"/>
  <text x="745" y="200" text-anchor="end" font-size="10" font-style="italic" fill="#1a1a1a">e<tspan font-size="7.5" dy="2">x</tspan><tspan dy="-2">/B</tspan></text>
  <text x="628" y="68" font-size="10" font-style="italic" fill="#1a1a1a">e<tspan font-size="7.5" dy="2">y</tspan><tspan dy="-2">/L</tspan></text>
  <text x="640" y="176" font-size="10" fill="#1d4ed8">kern</text>
  <text x="700" y="112" text-anchor="middle" font-size="10" fill="#6b7280">despegue biaxial</text>
  <text x="682" y="209" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1a1a1a">plano de excentricidades</text>
</svg>
