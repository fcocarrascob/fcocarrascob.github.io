<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="310" fill="#ffffff"/>
  <line x1="380" y1="20" x2="380" y2="290" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ═══ (a) Rígida ═══ -->
  <text x="190" y="26" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a1a1a">(a) Rígida — <tspan font-style="italic">K</tspan><tspan font-size="9" dy="2.5">r</tspan><tspan dy="-2.5"> ≳ 1</tspan></text>
  <line x1="190" y1="44" x2="190" y2="74" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="198" y="62" font-size="12" font-style="italic" fill="#1a1a1a">N</text>
  <rect x="165" y="78" width="50" height="62" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="70" y="140" width="240" height="26" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="66" y1="140" x2="48" y2="140" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="66" y1="166" x2="48" y2="166" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="54" y1="140" x2="54" y2="166" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="44" y="157" text-anchor="middle" font-size="11" font-style="italic" fill="#1a1a1a">T</text>

  <rect x="70" y="166" width="240" height="34" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="120" y1="194" x2="120" y2="172" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <line x1="190" y1="194" x2="190" y2="172" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <line x1="260" y1="194" x2="260" y2="172" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <text x="190" y="222" text-anchor="middle" font-size="11" fill="#1d4ed8"><tspan font-style="italic">q</tspan> ≈ N/A (uniforme)</text>

  <!-- ═══ (b) Flexible ═══ -->
  <text x="570" y="26" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a1a1a">(b) Flexible — <tspan font-style="italic">K</tspan><tspan font-size="9" dy="2.5">r</tspan><tspan dy="-2.5"> ≪ 1</tspan></text>
  <line x1="570" y1="52" x2="570" y2="100" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="578" y="80" font-size="12" font-style="italic" fill="#1a1a1a">N</text>
  <rect x="545" y="106" width="50" height="64" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>

  <!-- posición sin deformar -->
  <line x1="450" y1="154" x2="690" y2="154" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- presión concentrada bajo la columna -->
  <path d="M450,160 C505,164 515,244 570,250 C625,244 635,164 690,160 Q570,204 450,160 Z" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.2"/>

  <!-- losa deformada (dishing) -->
  <path d="M450,148 Q570,192 690,148 L690,160 Q570,204 450,160 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- bordes que se levantan -->
  <line x1="455" y1="142" x2="455" y2="128" stroke="#6b7280" stroke-width="1.3" marker-end="url(#am)"/>
  <line x1="685" y1="142" x2="685" y2="128" stroke="#6b7280" stroke-width="1.3" marker-end="url(#am)"/>
  <text x="538" y="120" text-anchor="end" font-size="10" fill="#6b7280">los bordes se levantan</text>

  <text x="570" y="222" text-anchor="middle" font-size="10.5" font-style="italic" fill="#6b7280">«dishing»</text>
  <text x="570" y="274" text-anchor="middle" font-size="11" fill="#1d4ed8"><tspan font-style="italic">q</tspan> concentrada — <tspan font-style="italic">q</tspan><tspan font-size="8" dy="2.5">max</tspan><tspan dy="-2.5"> ≫ N/A</tspan></text>
</svg>
