<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 305" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="305" fill="#ffffff"/>

  <!-- ═══ Nivel 1: LHS sobre el espacio adimensional ═══ -->
  <text x="16" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">Nivel 1 — Latin Hypercube adimensional</text>
  <text x="16" y="42" font-size="11" fill="#6b7280">2 de las 6 dimensiones; cada punto es una zapata</text>
  <line x1="70" y1="70" x2="70" y2="230" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="70" y1="230" x2="330" y2="230" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="200" y="262" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1a1a1a">log<tspan font-size="7.5" dy="2.5">10</tspan><tspan dy="-2.5"> K</tspan><tspan font-size="7.5" dy="2.5">r</tspan><tspan dy="-2.5" font-style="normal"> (log-uniforme)</tspan></text>
  <text x="200" y="245" text-anchor="middle" font-size="0" fill="#6b7280"> </text>
  <text x="70" y="245" text-anchor="middle" font-size="9" fill="#6b7280">−2</text>
  <text x="174" y="245" text-anchor="middle" font-size="9" fill="#6b7280">0</text>
  <text x="330" y="245" text-anchor="middle" font-size="9" fill="#6b7280">3</text>
  <text x="62" y="234" text-anchor="end" font-size="9" fill="#6b7280">1.0</text>
  <text x="62" y="74" text-anchor="end" font-size="9" fill="#6b7280">2.5</text>
  <text x="56" y="60" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1a1a1a">L/B</text>
  <!-- transición rígida/flexible -->
  <line x1="158" y1="70" x2="158" y2="230" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="158" y="63" text-anchor="middle" font-size="9" fill="#6b7280">K<tspan font-size="7" dy="2">r</tspan><tspan dy="-2"> ≈ 0.5</tspan></text>
  <text x="152" y="83" text-anchor="end" font-size="8.5" font-style="italic" fill="#9ca3af">flexible</text>
  <text x="164" y="83" font-size="8.5" font-style="italic" fill="#9ca3af">rígida</text>
  <!-- puntos LHS (uno por estrato en cada eje) -->
  <g fill="#1a1a1a">
    <circle cx="80.8" cy="130" r="3.2"/>
    <circle cx="102.5" cy="183.3" r="3.2"/>
    <circle cx="124.2" cy="76.7" r="3.2"/>
    <circle cx="145.8" cy="210" r="3.2"/>
    <circle cx="167.5" cy="103.3" r="3.2"/>
    <circle cx="189.2" cy="156.7" r="3.2"/>
    <circle cx="210.8" cy="223.3" r="3.2"/>
    <circle cx="232.5" cy="90" r="3.2"/>
    <circle cx="275.8" cy="116.7" r="3.2"/>
    <circle cx="297.5" cy="196.7" r="3.2"/>
    <circle cx="319.2" cy="143.3" r="3.2"/>
  </g>
  <circle cx="254.2" cy="170" r="5" fill="#2563eb"/>
  <circle cx="254.2" cy="170" r="8.5" fill="none" stroke="#2563eb" stroke-width="1.2"/>
  <!-- flecha hacia el nivel 2 -->
  <path d="M 266 166 C 320 145, 380 118, 434 111" fill="none" stroke="#6b7280" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#am)"/>

  <!-- ═══ Nivel 2: barrido de e/B por geometría ═══ -->
  <text x="400" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">Nivel 2 — barrido de e/B por zapata</text>
  <text x="400" y="42" font-size="11" fill="#6b7280">N fijo, momento por pasos, dos direcciones</text>
  <!-- planta -->
  <rect x="445" y="62" width="70" height="98" fill="#eef1f4" stroke="#1a1a1a" stroke-width="1.2"/>
  <polygon points="468.3,111 480,94.7 491.7,111 480,127.3" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="480" y="140" text-anchor="middle" font-size="9" fill="#2563eb">kern</text>
  <line x1="480" y1="111" x2="527" y2="111" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#ai)"/>
  <text x="532" y="115" font-size="9.5" font-style="italic" fill="#1a1a1a">θ = 0°</text>
  <line x1="480" y1="111" x2="509" y2="77" stroke="#1a1a1a" stroke-width="1.6" marker-end="url(#ai)"/>
  <text x="520" y="72" font-size="9.5" font-style="italic" fill="#1a1a1a">θ = 45°</text>
  <!-- eje e/B -->
  <line x1="420" y1="210" x2="730" y2="210" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#ai)"/>
  <text x="414" y="214" text-anchor="end" font-size="9.5" fill="#6b7280">0°</text>
  <text x="414" y="230" text-anchor="end" font-size="9.5" fill="#6b7280">45°</text>
  <g fill="#1a1a1a">
    <circle cx="420" cy="210" r="3"/>
    <circle cx="449.8" cy="210" r="3"/>
    <circle cx="479.6" cy="210" r="3"/>
    <circle cx="519.4" cy="210" r="3"/>
    <circle cx="539.2" cy="210" r="3"/>
    <circle cx="569" cy="210" r="3"/>
    <circle cx="628.7" cy="210" r="3"/>
    <circle cx="718" cy="210" r="3"/>
  </g>
  <g fill="none" stroke="#1a1a1a" stroke-width="1.1">
    <circle cx="420" cy="226" r="2.8"/>
    <circle cx="449.8" cy="226" r="2.8"/>
    <circle cx="479.6" cy="226" r="2.8"/>
    <circle cx="519.4" cy="226" r="2.8"/>
    <circle cx="539.2" cy="226" r="2.8"/>
    <circle cx="569" cy="226" r="2.8"/>
    <circle cx="628.7" cy="226" r="2.8"/>
    <circle cx="718" cy="226" r="2.8"/>
  </g>
  <!-- valores -->
  <text x="420" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">0</text>
  <text x="449.8" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.05</text>
  <text x="479.6" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.10</text>
  <text x="539.2" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.20</text>
  <text x="569" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.25</text>
  <text x="628.7" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.35</text>
  <text x="718" y="200" text-anchor="middle" font-size="8.5" fill="#6b7280">.50</text>
  <!-- kern en el eje -->
  <line x1="519.4" y1="186" x2="519.4" y2="238" stroke="#2563eb" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="519.4" y="180" text-anchor="middle" font-size="9.5" fill="#2563eb">kern: e/B = 1/6</text>
  <text x="575" y="262" text-anchor="middle" font-size="10.5" fill="#1a1a1a"><tspan font-style="italic">e/B</tspan> creciente con momento por pasos (8 niveles × 2 direcciones)</text>

  <!-- ═══ Total ═══ -->
  <line x1="15" y1="274" x2="745" y2="274" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="294" text-anchor="middle" font-size="10.5" fill="#6b7280">~50 geometrías × 8 e/B × 2 direcciones ≈ 750 simulaciones (piloto) · ~300 geometrías ≈ 4 500 (barrido completo)</text>
</svg>
