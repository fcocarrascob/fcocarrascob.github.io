<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>

  <!-- ═══ Panel A: planta ═══ -->
  <text x="170" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Planta</text>
  <rect x="50" y="60" width="240" height="240" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="170" y="84" text-anchor="middle" font-size="11" fill="#6b7280">zapata <tspan font-style="italic">L</tspan><tspan font-size="8" dy="2.5">x</tspan><tspan dy="-2.5"> × </tspan><tspan font-style="italic">L</tspan><tspan font-size="8" dy="2.5">y</tspan></text>
  <rect x="140" y="150" width="60" height="60" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="170" y="232" text-anchor="middle" font-size="10.5" fill="#6b7280">pedestal <tspan font-style="italic">b</tspan><tspan> × </tspan><tspan font-style="italic">h</tspan></text>

  <line x1="140" y1="138" x2="200" y2="138" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="170" y="132" text-anchor="middle" font-size="11" font-style="italic" fill="#1a1a1a">b</text>
  <line x1="212" y1="150" x2="212" y2="210" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="220" y="184" font-size="11" font-style="italic" fill="#1a1a1a">h</text>

  <line x1="50" y1="304" x2="50" y2="336" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="290" y1="304" x2="290" y2="336" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="50" y1="330" x2="290" y2="330" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="170" y="324" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">x</tspan></text>
  <line x1="46" y1="60" x2="22" y2="60" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="46" y1="300" x2="22" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="28" y1="60" x2="28" y2="300" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="12" y="184" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">y</tspan></text>

  <!-- ═══ Panel B: elevación ═══ -->
  <text x="565" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Elevación</text>

  <!-- relleno sobre la zapata -->
  <rect x="430" y="190" width="110" height="80" fill="#f6f1e7" stroke="#d9d2c3" stroke-width="1"/>
  <rect x="600" y="190" width="110" height="80" fill="#f6f1e7" stroke="#d9d2c3" stroke-width="1"/>
  <text x="478" y="236" text-anchor="middle" font-size="10.5" fill="#6b7280">relleno</text>

  <!-- terreno -->
  <line x1="380" y1="190" x2="750" y2="190" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="392" y1="190" x2="386" y2="197" stroke="#9ca3af" stroke-width="1"/>
  <line x1="412" y1="190" x2="406" y2="197" stroke="#9ca3af" stroke-width="1"/>
  <line x1="726" y1="190" x2="720" y2="197" stroke="#9ca3af" stroke-width="1"/>
  <line x1="746" y1="190" x2="740" y2="197" stroke="#9ca3af" stroke-width="1"/>

  <!-- zapata y pedestal -->
  <rect x="430" y="270" width="280" height="50" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="540" y="120" width="60" height="150" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>

  <!-- suelo bajo el sello -->
  <line x1="400" y1="320" x2="740" y2="320" stroke="#9ca3af" stroke-width="0"/>
  <line x1="412" y1="322" x2="404" y2="332" stroke="#9ca3af" stroke-width="1"/>
  <line x1="434" y1="322" x2="426" y2="332" stroke="#9ca3af" stroke-width="1"/>
  <line x1="720" y1="322" x2="712" y2="332" stroke="#9ca3af" stroke-width="1"/>
  <line x1="742" y1="322" x2="734" y2="332" stroke="#9ca3af" stroke-width="1"/>

  <!-- cargas en el tope del pedestal -->
  <line x1="570" y1="70" x2="570" y2="116" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="578" y="94" font-size="12" font-style="italic" fill="#1a1a1a">F<tspan font-size="9" dy="2.5">3</tspan></text>
  <line x1="500" y1="138" x2="536" y2="138" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="494" y="142" text-anchor="end" font-size="12" font-style="italic" fill="#1a1a1a">F<tspan font-size="9" dy="2.5">1</tspan></text>
  <path d="M 598 100 A 20 20 0 0 1 598 138" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="620" y="122" font-size="12" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">2</tspan></text>

  <!-- pesos propios -->
  <line x1="570" y1="200" x2="570" y2="232" stroke="#6b7280" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="578" y="220" font-size="11" font-style="italic" fill="#6b7280">W<tspan font-size="8" dy="2.5">p</tspan></text>
  <line x1="470" y1="282" x2="470" y2="312" stroke="#6b7280" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="478" y="302" font-size="11" font-style="italic" fill="#6b7280">W<tspan font-size="8" dy="2.5">z</tspan></text>
  <line x1="655" y1="215" x2="655" y2="247" stroke="#6b7280" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="663" y="236" font-size="11" font-style="italic" fill="#6b7280">W<tspan font-size="8" dy="2.5">r</tspan></text>

  <!-- resultantes al nivel de base -->
  <line x1="470" y1="326" x2="470" y2="360" stroke="#2563eb" stroke-width="2" marker-end="url(#aa)"/>
  <text x="456" y="346" text-anchor="end" font-size="12" font-style="italic" fill="#2563eb">N</text>
  <path d="M 500 328 A 17 17 0 0 1 500 360" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#aa)"/>
  <text x="522" y="350" font-size="10.5" font-style="italic" fill="#2563eb">M′<tspan font-size="8" dy="2.5">y</tspan><tspan dy="-2.5"> = M</tspan><tspan font-size="8" dy="2.5">2</tspan><tspan dy="-2.5"> + F</tspan><tspan font-size="8" dy="2.5">1</tspan><tspan dy="-2.5">·h</tspan><tspan font-size="8" dy="2.5">p</tspan></text>

  <!-- dimensiones -->
  <line x1="540" y1="120" x2="516" y2="120" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="522" y1="120" x2="522" y2="270" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="510" y="200" text-anchor="end" font-size="11" font-style="italic" fill="#1a1a1a">h<tspan font-size="8" dy="2.5">p</tspan></text>
  <line x1="712" y1="190" x2="736" y2="190" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="712" y1="270" x2="736" y2="270" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="712" y1="320" x2="736" y2="320" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="730" y1="190" x2="730" y2="270" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="738" y="234" font-size="11" font-style="italic" fill="#1a1a1a">h<tspan font-size="8" dy="2.5">r</tspan></text>
  <line x1="730" y1="270" x2="730" y2="320" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="738" y="299" font-size="11" font-style="italic" fill="#1a1a1a">t</text>
  <line x1="430" y1="324" x2="430" y2="380" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="710" y1="324" x2="710" y2="380" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="430" y1="374" x2="710" y2="374" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="570" y="368" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">x</tspan></text>
</svg>
