<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 450" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
    <marker id="aab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="640" height="450" fill="#ffffff"/>

  <!-- zapata -->
  <rect x="90" y="70" width="400" height="300" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- área efectiva centrada en la resultante -->
  <rect x="170" y="70" width="320" height="240" fill="#2563eb" fill-opacity="0.13" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="430" y="112" font-size="14" font-style="italic" fill="#1d4ed8">A<tspan font-size="10" dy="3">e</tspan></text>
  <text x="130" y="346" text-anchor="middle" font-size="10.5" fill="#9ca3af">excluida</text>

  <!-- centroide, resultante y excentricidades -->
  <circle cx="290" cy="220" r="2.5" fill="#6b7280"/>
  <line x1="290" y1="220" x2="330" y2="220" stroke="#9ca3af" stroke-width="1"/>
  <line x1="330" y1="220" x2="330" y2="190" stroke="#9ca3af" stroke-width="1"/>
  <text x="308" y="233" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">e<tspan font-size="7.5" dy="2">x</tspan></text>
  <text x="337" y="209" font-size="10" font-style="italic" fill="#6b7280">e<tspan font-size="7.5" dy="2">y</tspan></text>
  <circle cx="330" cy="190" r="4" fill="#dc2626"/>
  <text x="339" y="187" font-size="12" font-style="italic" fill="#dc2626">N</text>

  <!-- dimensiones inferiores: 2ex + L'x -->
  <line x1="90" y1="374" x2="90" y2="402" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="170" y1="374" x2="170" y2="402" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="490" y1="374" x2="490" y2="402" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="90" y1="396" x2="170" y2="396" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="130" y="390" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1a1a1a">2·e<tspan font-size="8" dy="2.5">x</tspan></text>
  <line x1="170" y1="396" x2="490" y2="396" stroke="#2563eb" stroke-width="1" marker-start="url(#aab)" marker-end="url(#aab)"/>
  <text x="330" y="390" text-anchor="middle" font-size="11" font-style="italic" fill="#1d4ed8">L′<tspan font-size="8" dy="2.5">x</tspan></text>

  <!-- dimensiones derechas: L'y + 2ey -->
  <line x1="494" y1="70" x2="522" y2="70" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="494" y1="310" x2="522" y2="310" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="494" y1="370" x2="522" y2="370" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="516" y1="70" x2="516" y2="310" stroke="#2563eb" stroke-width="1" marker-start="url(#aab)" marker-end="url(#aab)"/>
  <text x="524" y="194" font-size="11" font-style="italic" fill="#1d4ed8">L′<tspan font-size="8" dy="2.5">y</tspan></text>
  <line x1="516" y1="310" x2="516" y2="370" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="524" y="344" font-size="10.5" font-style="italic" fill="#1a1a1a">2·e<tspan font-size="8" dy="2.5">y</tspan></text>

  <!-- dimensiones globales -->
  <line x1="90" y1="66" x2="90" y2="38" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="490" y1="66" x2="490" y2="38" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="90" y1="44" x2="490" y2="44" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="290" y="38" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">x</tspan></text>
  <line x1="86" y1="70" x2="58" y2="70" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="86" y1="370" x2="58" y2="370" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="64" y1="70" x2="64" y2="370" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="48" y="224" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">L<tspan font-size="9" dy="2.5">y</tspan></text>
</svg>
