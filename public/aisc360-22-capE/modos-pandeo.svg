<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ma" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="mr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Los modos de pandeo: cuatro maneras de volverse inestable</text>

  <!-- dividers -->
  <line x1="235" y1="55" x2="235" y2="345" stroke="#e5e2dc" stroke-width="1.5"/>
  <line x1="470" y1="55" x2="470" y2="345" stroke="#e5e2dc" stroke-width="1.5"/>
  <line x1="705" y1="55" x2="705" y2="345" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== 1. Flexural buckling ===== -->
  <g>
    <text x="117" y="72" font-size="13" text-anchor="middle" fill="#1a63a8" font-weight="bold">Por flexión (E3)</text>
    <line x1="117" y1="88" x2="117" y2="72" stroke="#666" stroke-width="2" marker-start="url(#ma)"/>
    <!-- straight reference -->
    <line x1="117" y1="95" x2="117" y2="300" stroke="#ccc" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- bowed shape -->
    <path d="M117,95 C 165,160 165,235 117,300" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
    <!-- base -->
    <line x1="97" y1="300" x2="137" y2="300" stroke="#333" stroke-width="2.5"/>
    <text x="117" y="330" font-size="11.5" fill="#333" text-anchor="middle">se flexiona de lado</text>
    <text x="117" y="366" font-size="11" fill="#555" text-anchor="middle">el modo clásico (Euler).</text>
    <text x="117" y="382" font-size="11" fill="#555" text-anchor="middle">Gobierna en perfiles compactos</text>
    <text x="117" y="398" font-size="11" fill="#555" text-anchor="middle">doblemente simétricos (W).</text>
  </g>

  <!-- ===== 2. Torsional buckling ===== -->
  <g>
    <text x="352" y="72" font-size="13" text-anchor="middle" fill="#8e44ad" font-weight="bold">Torsional (E4)</text>
    <line x1="352" y1="88" x2="352" y2="72" stroke="#666" stroke-width="2" marker-start="url(#ma)"/>
    <!-- column axis -->
    <line x1="352" y1="95" x2="352" y2="300" stroke="#bbb" stroke-width="2"/>
    <!-- cruciform cross-section at top, twisted -->
    <g transform="translate(352,150)">
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#8e44ad" stroke-width="3"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#8e44ad" stroke-width="3"/>
    </g>
    <g transform="translate(352,245) rotate(28)">
      <line x1="-28" y1="0" x2="28" y2="0" stroke="#8e44ad" stroke-width="3"/>
      <line x1="0" y1="-28" x2="0" y2="28" stroke="#8e44ad" stroke-width="3"/>
    </g>
    <!-- twist arrows -->
    <path d="M382,235 A 32 32 0 0 1 330,262" fill="none" stroke="#b02a1a" stroke-width="1.8" marker-end="url(#mr)"/>
    <line x1="332" y1="300" x2="372" y2="300" stroke="#333" stroke-width="2.5"/>
    <text x="352" y="330" font-size="11.5" fill="#333" text-anchor="middle">gira sobre su eje</text>
    <text x="352" y="366" font-size="11" fill="#555" text-anchor="middle">sin flexionarse. Perfiles</text>
    <text x="352" y="382" font-size="11" fill="#555" text-anchor="middle">cruciformes y abiertos de</text>
    <text x="352" y="398" font-size="11" fill="#555" text-anchor="middle">baja rigidez torsional.</text>
  </g>

  <!-- ===== 3. Flexo-torsional ===== -->
  <g>
    <text x="587" y="72" font-size="13" text-anchor="middle" fill="#c0392b" font-weight="bold">Flexo-torsional (E4)</text>
    <line x1="587" y1="88" x2="587" y2="72" stroke="#666" stroke-width="2" marker-start="url(#ma)"/>
    <line x1="587" y1="95" x2="587" y2="300" stroke="#ccc" stroke-width="2" stroke-dasharray="4 4"/>
    <!-- bow + twisted section markers -->
    <path d="M587,95 C 632,160 632,235 587,300" fill="none" stroke="#c0392b" stroke-width="3.5"/>
    <g transform="translate(600,150) rotate(20)">
      <path d="M-16,-16 L0,-16 L0,16 L16,16" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    </g>
    <g transform="translate(612,245) rotate(35)">
      <path d="M-16,-16 L0,-16 L0,16 L16,16" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    </g>
    <line x1="567" y1="300" x2="607" y2="300" stroke="#333" stroke-width="2.5"/>
    <text x="587" y="330" font-size="11.5" fill="#333" text-anchor="middle">se flexiona y gira a la vez</text>
    <text x="587" y="366" font-size="11" fill="#555" text-anchor="middle">Simetría simple o asimétricos:</text>
    <text x="587" y="382" font-size="11" fill="#555" text-anchor="middle">ángulos, tés, canales.</text>
    <text x="587" y="398" font-size="11" fill="#555" text-anchor="middle">Su F_e cae más bajo.</text>
  </g>

  <!-- ===== 4. Local ===== -->
  <g>
    <text x="822" y="72" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">Local (E7)</text>
    <line x1="822" y1="88" x2="822" y2="72" stroke="#666" stroke-width="2" marker-start="url(#ma)"/>
    <!-- column with wrinkled flanges -->
    <line x1="805" y1="95" x2="805" y2="300" stroke="#8a857c" stroke-width="2"/>
    <line x1="839" y1="95" x2="839" y2="300" stroke="#8a857c" stroke-width="2"/>
    <!-- wrinkle on the plates -->
    <path d="M805,150 q -12,12 0,24 q -12,12 0,24" fill="none" stroke="#b02a1a" stroke-width="2.2"/>
    <path d="M839,150 q 12,12 0,24 q 12,12 0,24" fill="none" stroke="#b02a1a" stroke-width="2.2"/>
    <line x1="802" y1="300" x2="842" y2="300" stroke="#333" stroke-width="2.5"/>
    <text x="822" y="330" font-size="11.5" fill="#333" text-anchor="middle">las placas se arrugan</text>
    <text x="822" y="366" font-size="11" fill="#555" text-anchor="middle">antes de que pandee la</text>
    <text x="822" y="382" font-size="11" fill="#555" text-anchor="middle">columna entera. Reduce el</text>
    <text x="822" y="398" font-size="11" fill="#555" text-anchor="middle">área efectiva (ancho efectivo).</text>
  </g>

  <!-- P labels row -->
  <text x="117" y="60" font-size="11" fill="#666" text-anchor="middle">P</text>
  <text x="352" y="60" font-size="11" fill="#666" text-anchor="middle">P</text>
  <text x="587" y="60" font-size="11" fill="#666" text-anchor="middle">P</text>
  <text x="822" y="60" font-size="11" fill="#666" text-anchor="middle">P</text>
</svg>
