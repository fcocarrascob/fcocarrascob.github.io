<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="440" fill="#ffffff"/>
  <text x="480" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El signo lo fija el orden de los cuatro puntos (regla de la mano derecha)</text>

  <defs>
    <marker id="nrm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <marker id="wind" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>

  <line x1="480" y1="60" x2="480" y2="360" stroke="#e2e2e2" stroke-width="1.5"/>

  <!-- ============ LEFT: forward order ============ -->
  <g transform="translate(60,70)">
    <text x="180" y="18" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Orden 1 → 2 → 3 → 4</text>

    <!-- quad plane (parallelogram, pseudo-3D) -->
    <g transform="translate(70,50)">
      <polygon points="0,120 200,120 250,40 50,40" fill="#eef2f6" stroke="#666" stroke-width="2"/>
      <!-- corner points labeled in winding order -->
      <circle cx="0" cy="120" r="5" fill="#b02a1a"/><text x="-14" y="128" font-size="12" fill="#b02a1a" font-weight="bold">1</text>
      <circle cx="200" cy="120" r="5" fill="#b02a1a"/><text x="208" y="128" font-size="12" fill="#b02a1a" font-weight="bold">2</text>
      <circle cx="250" cy="40" r="5" fill="#b02a1a"/><text x="258" y="42" font-size="12" fill="#b02a1a" font-weight="bold">3</text>
      <circle cx="50" cy="40" r="5" fill="#b02a1a"/><text x="34" y="42" font-size="12" fill="#b02a1a" font-weight="bold">4</text>
      <!-- winding arrows -->
      <path d="M20,118 L180,118" fill="none" stroke="#b02a1a" stroke-width="1.6" marker-end="url(#wind)"/>
      <!-- normal (eje 1) pointing up-out toward viewer -->
      <line x1="125" y1="80" x2="125" y2="4" stroke="#1a63a8" stroke-width="3" marker-end="url(#nrm)"/>
      <text x="132" y="18" font-size="12" fill="#1a63a8" font-weight="bold">eje 1 (normal)</text>
    </g>

    <text x="180" y="238" font-size="13" text-anchor="middle" fill="#333">La normal apunta <tspan font-weight="bold">hacia un lado</tspan></text>
    <text x="180" y="266" font-size="15" text-anchor="middle" fill="#b02a1a" font-weight="bold">M2 = −18,1 tonf·m</text>
  </g>

  <!-- ============ RIGHT: reversed order ============ -->
  <g transform="translate(540,70)">
    <text x="180" y="18" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Orden invertido 1 → 4 → 3 → 2</text>

    <g transform="translate(70,50)">
      <polygon points="0,120 200,120 250,40 50,40" fill="#eef2f6" stroke="#666" stroke-width="2"/>
      <circle cx="0" cy="120" r="5" fill="#b02a1a"/><text x="-14" y="128" font-size="12" fill="#b02a1a" font-weight="bold">1</text>
      <circle cx="200" cy="120" r="5" fill="#b02a1a"/><text x="208" y="128" font-size="12" fill="#b02a1a" font-weight="bold">4</text>
      <circle cx="250" cy="40" r="5" fill="#b02a1a"/><text x="258" y="42" font-size="12" fill="#b02a1a" font-weight="bold">3</text>
      <circle cx="50" cy="40" r="5" fill="#b02a1a"/><text x="34" y="42" font-size="12" fill="#b02a1a" font-weight="bold">2</text>
      <!-- winding arrows reversed direction -->
      <path d="M180,118 L20,118" fill="none" stroke="#b02a1a" stroke-width="1.6" marker-end="url(#wind)"/>
      <!-- normal now pointing down-into (away) -->
      <line x1="125" y1="40" x2="125" y2="116" stroke="#1a63a8" stroke-width="3" marker-end="url(#nrm)"/>
      <text x="132" y="150" font-size="12" fill="#1a63a8" font-weight="bold">eje 1 (normal)</text>
    </g>

    <text x="180" y="238" font-size="13" text-anchor="middle" fill="#333">La normal apunta <tspan font-weight="bold">al otro lado</tspan></text>
    <text x="180" y="266" font-size="15" text-anchor="middle" fill="#1a7a3a" font-weight="bold">M2 = +18,1 tonf·m</text>
  </g>

  <text x="480" y="392" font-size="12" text-anchor="middle" fill="#333">Mismo modelo, mismo corte, misma losa — solo cambió el orden de los puntos. El valor absoluto es el mismo; el signo es una referencia.</text>
  <text x="480" y="414" font-size="11.5" text-anchor="middle" fill="#777">En By Group el signo lo fija cuál de los dos lados agrupaste. En ambos casos: verifica el signo contra un diagrama de cuerpo libre.</text>
</svg>
