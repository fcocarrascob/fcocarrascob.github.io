<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="470" fill="#ffffff"/>
  <text x="480" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Los dos métodos suman cosas distintas</text>

  <defs>
    <marker id="rArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="gArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a7a3a"/>
    </marker>
  </defs>

  <line x1="480" y1="56" x2="480" y2="400" stroke="#e2e2e2" stroke-width="1.5"/>

  <!-- ================= LEFT: By Group ================= -->
  <g transform="translate(0,56)">
    <text x="240" y="22" font-size="13.5" text-anchor="middle" fill="#1a7a3a" font-weight="bold">By Group</text>
    <text x="240" y="42" font-size="11.5" text-anchor="middle" fill="#555">agrupas los objetos de un lado…</text>

    <!-- wall elevation, whole thing grouped (green fill) -->
    <g transform="translate(150,60)">
      <rect x="0" y="0" width="180" height="150" fill="#e7f3ec" stroke="#1a7a3a" stroke-width="2.5"/>
      <!-- mesh hint -->
      <line x1="60" y1="0" x2="60" y2="150" stroke="#bcd9c8" stroke-width="1"/>
      <line x1="120" y1="0" x2="120" y2="150" stroke="#bcd9c8" stroke-width="1"/>
      <line x1="0" y1="50" x2="180" y2="50" stroke="#bcd9c8" stroke-width="1"/>
      <line x1="0" y1="100" x2="180" y2="100" stroke="#bcd9c8" stroke-width="1"/>
      <text x="90" y="80" font-size="12" text-anchor="middle" fill="#1a7a3a" font-weight="bold">GRUPO</text>
      <!-- base line -->
      <line x1="-15" y1="150" x2="195" y2="150" stroke="#333" stroke-width="3"/>
      <!-- reaction arrows summed (green, pointing up from supports) -->
      <line x1="20" y1="185" x2="20" y2="153" stroke="#1a7a3a" stroke-width="3" marker-end="url(#gArr)"/>
      <line x1="90" y1="185" x2="90" y2="153" stroke="#1a7a3a" stroke-width="3" marker-end="url(#gArr)"/>
      <line x1="160" y1="185" x2="160" y2="153" stroke="#1a7a3a" stroke-width="3" marker-end="url(#gArr)"/>
      <text x="90" y="205" font-size="10.5" text-anchor="middle" fill="#1a7a3a">reacciones de apoyo</text>
    </g>

    <text x="240" y="320" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">SAP suma reacciones + cargas nodales</text>
    <text x="240" y="340" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">de los objetos del grupo</text>
    <text x="240" y="366" font-size="11.5" text-anchor="middle" fill="#1a7a3a">→ cortante basal y volcamiento de un muro</text>
  </g>

  <!-- ================= RIGHT: By Quadrilateral ================= -->
  <g transform="translate(480,56)">
    <text x="240" y="22" font-size="13.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">By Quadrilateral</text>
    <text x="240" y="42" font-size="11.5" text-anchor="middle" fill="#555">…defines un plano de corte</text>

    <!-- slab/wall with a cutting plane -->
    <g transform="translate(150,60)">
      <rect x="0" y="0" width="180" height="150" fill="#f6f6f6" stroke="#888" stroke-width="1.5"/>
      <line x1="60" y1="0" x2="60" y2="150" stroke="#dcdcdc" stroke-width="1"/>
      <line x1="120" y1="0" x2="120" y2="150" stroke="#dcdcdc" stroke-width="1"/>
      <line x1="0" y1="50" x2="180" y2="50" stroke="#dcdcdc" stroke-width="1"/>
      <line x1="0" y1="100" x2="180" y2="100" stroke="#dcdcdc" stroke-width="1"/>
      <!-- cut plane (vertical dashed red) -->
      <line x1="90" y1="-8" x2="90" y2="182" stroke="#b02a1a" stroke-width="2.5" stroke-dasharray="7 4"/>
      <text x="90" y="196" font-size="10.5" text-anchor="middle" fill="#b02a1a">plano de corte</text>
      <!-- internal force arrows on the cut face (small, both sides) -->
      <line x1="76" y1="30" x2="104" y2="30" stroke="#b02a1a" stroke-width="2.2" marker-end="url(#rArr)"/>
      <line x1="104" y1="75" x2="76" y2="75" stroke="#b02a1a" stroke-width="2.2" marker-end="url(#rArr)"/>
      <line x1="76" y1="120" x2="104" y2="120" stroke="#b02a1a" stroke-width="2.2" marker-end="url(#rArr)"/>
      <text x="150" y="80" font-size="10.5" text-anchor="middle" fill="#b02a1a">fuerzas</text>
      <text x="150" y="94" font-size="10.5" text-anchor="middle" fill="#b02a1a">internas</text>
    </g>

    <text x="240" y="320" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">SAP suma las fuerzas internas</text>
    <text x="240" y="340" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">de los elementos que el plano cruza</text>
    <text x="240" y="366" font-size="11.5" text-anchor="middle" fill="#b02a1a">→ V y M en una sección interior (losa, media altura)</text>
  </g>

  <text x="480" y="456" font-size="11.5" text-anchor="middle" fill="#777">Usar el método equivocado da el número de otra cosa: un grupo sobre una sección interior devuelve la reacción, no el esfuerzo interno.</text>
</svg>
