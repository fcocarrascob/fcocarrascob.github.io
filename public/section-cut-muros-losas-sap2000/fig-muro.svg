<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="430" fill="#ffffff"/>
  <text x="480" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Muro en voladizo — cortante basal y volcamiento (By Group)</text>

  <defs>
    <marker id="mR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>

  <!-- ===== Wall elevation ===== -->
  <!-- scale 40 px/m; wall 6m x 3m = 240 x 120... use 50px/m: 300 x 150 -->
  <g transform="translate(210,90)">
    <!-- ground / fixed base hatch -->
    <line x1="-30" y1="150" x2="330" y2="150" stroke="#333" stroke-width="3"/>
    <g stroke="#999" stroke-width="1.2">
      <line x1="-20" y1="150" x2="-32" y2="165"/><line x1="10" y1="150" x2="-2" y2="165"/>
      <line x1="40" y1="150" x2="28" y2="165"/><line x1="70" y1="150" x2="58" y2="165"/>
      <line x1="100" y1="150" x2="88" y2="165"/><line x1="130" y1="150" x2="118" y2="165"/>
      <line x1="160" y1="150" x2="148" y2="165"/><line x1="190" y1="150" x2="178" y2="165"/>
      <line x1="220" y1="150" x2="208" y2="165"/><line x1="250" y1="150" x2="238" y2="165"/>
      <line x1="280" y1="150" x2="268" y2="165"/><line x1="310" y1="150" x2="298" y2="165"/>
    </g>
    <!-- wall body -->
    <rect x="0" y="0" width="300" height="150" fill="#eef2f6" stroke="#333" stroke-width="2.5"/>
    <!-- mesh hint -->
    <g stroke="#d3dbe3" stroke-width="1">
      <line x1="60" y1="0" x2="60" y2="150"/><line x1="120" y1="0" x2="120" y2="150"/>
      <line x1="180" y1="0" x2="180" y2="150"/><line x1="240" y1="0" x2="240" y2="150"/>
      <line x1="0" y1="50" x2="300" y2="50"/><line x1="0" y1="100" x2="300" y2="100"/>
    </g>
    <!-- lateral load P at top -->
    <line x1="-70" y1="-0" x2="-2" y2="-0" stroke="#b02a1a" stroke-width="4" marker-end="url(#mR)"/>
    <text x="-36" y="-12" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">P = 10 tonf</text>
    <!-- dimensions -->
    <text x="150" y="172" font-size="11" text-anchor="middle" fill="#555">6 m</text>
    <text x="318" y="78" font-size="11" text-anchor="start" fill="#555">H = 3 m</text>

    <!-- MID cut at z=2 (1 m below top -> y=50) -->
    <line x1="-14" y1="50" x2="314" y2="50" stroke="#1a63a8" stroke-width="2" stroke-dasharray="7 4"/>
    <circle cx="150" cy="50" r="3" fill="#1a63a8"/>
    <text x="322" y="46" font-size="10.5" fill="#1a63a8">corte z = 2 m</text>

    <!-- BASE cut -->
    <text x="322" y="146" font-size="10.5" fill="#1a7a3a">corte base</text>
  </g>

  <!-- ===== Result boxes ===== -->
  <g font-size="12">
    <!-- base cut box -->
    <rect x="600" y="80" width="330" height="96" rx="6" fill="#e7f3ec" stroke="#1a7a3a" stroke-width="1.5"/>
    <text x="616" y="102" font-size="12.5" fill="#1a7a3a" font-weight="bold">Corte en la base</text>
    <text x="616" y="124" fill="#333">F1 = <tspan font-weight="bold">10 tonf</tspan>  = cortante basal (P) ✓</text>
    <text x="616" y="146" fill="#333">M2 = <tspan font-weight="bold">30 tonf·m</tspan> = volcamiento (P·H) ✓</text>
    <text x="616" y="166" font-size="10.5" fill="#777">…con la Result Location fijada en z = 0</text>

    <!-- mid cut box -->
    <rect x="600" y="196" width="330" height="70" rx="6" fill="#eaf1f8" stroke="#1a63a8" stroke-width="1.5"/>
    <text x="616" y="218" font-size="12.5" fill="#1a63a8" font-weight="bold">Corte a media altura (z = 2)</text>
    <text x="616" y="240" fill="#333">F1 = <tspan font-weight="bold">10 tonf</tspan>   M2 = <tspan font-weight="bold">10 tonf·m</tspan> = P·(3−2) ✓</text>
    <text x="616" y="258" font-size="10.5" fill="#777">el momento crece linealmente hacia la base</text>
  </g>

  <!-- ===== Pitfall callout ===== -->
  <g transform="translate(210,300)">
    <rect x="0" y="0" width="720" height="86" rx="6" fill="#fff7e6" stroke="#e0a800" stroke-width="1.5"/>
    <text x="16" y="24" font-size="12.5" fill="#8a6d00" font-weight="bold">⚠ La trampa del momento: ¿respecto a qué punto?</text>
    <text x="16" y="46" font-size="11.5" fill="#333">Por defecto, SAP reporta M2 respecto al <tspan font-weight="bold">centroide del grupo</tspan> (z = 2 m) → M2 = 10, no 30.</text>
    <text x="16" y="66" font-size="11.5" fill="#333">Para leer el volcamiento real hay que fijar la <tspan font-weight="bold">Result Location en la base</tspan> (z = 0) → M2 = 30 = P·H.</text>
  </g>
</svg>
