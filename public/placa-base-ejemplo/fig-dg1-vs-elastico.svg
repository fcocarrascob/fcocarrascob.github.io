<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="410" fill="#ffffff"/>
  <line x1="380" y1="18" x2="380" y2="310" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ═══ (a) DG1: bloque rectangular plástico ═══ -->
  <text x="16" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">(a) DG1 — bloque rectangular</text>
  <text x="16" y="42" font-size="11" fill="#6b7280">la resultante, lo más cerca posible del borde</text>
  <rect x="60" y="210" width="260" height="55" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <rect x="269.7" y="210" width="20.3" height="46" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="90" y="198" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="123" y="134" width="134" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="190" y1="102" x2="190" y2="130" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="176" y="116" text-anchor="end" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan></text>
  <path d="M 214 106 A 22 22 0 0 1 214 144" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="232" y="128" font-size="12" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">u</tspan></text>
  <!-- pernos -->
  <rect x="107" y="176" width="10" height="5" fill="#1a1a1a"/>
  <line x1="112" y1="181" x2="112" y2="200" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="112" y1="200" x2="112" y2="248" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="263" y="176" width="10" height="5" fill="#1a1a1a"/>
  <line x1="268" y1="181" x2="268" y2="200" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="268" y1="200" x2="268" y2="248" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <!-- tracción -->
  <line x1="112" y1="206" x2="112" y2="234" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="120" y="230" font-size="10.5" font-style="italic" fill="#dc2626">T<tspan font-style="normal"> = 5.2 tonf/perno</tspan></text>
  <!-- etiquetas del bloque -->
  <text x="296" y="228" font-size="10.5" font-style="italic" fill="#2563eb">f<tspan font-size="8" dy="2.5">p,máx</tspan><tspan dy="-2.5" font-style="normal"> = 245.6</tspan></text>
  <text x="296" y="242" font-size="9.5" fill="#2563eb">kgf/cm²</text>
  <text x="296" y="260" font-size="10.5" fill="#6b7280">Y = 4.6 cm</text>
  <!-- centroide y brazo -->
  <line x1="279.9" y1="256" x2="279.9" y2="285" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="112" y1="252" x2="112" y2="285" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="112" y1="280" x2="279.9" y2="280" stroke="#6b7280" stroke-width="1.2" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="196" y="296" text-anchor="middle" font-size="10.5" fill="#6b7280">brazo = 37.7 cm</text>

  <!-- ═══ (b) Herramienta: distribución elástica ═══ -->
  <text x="396" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">(b) Herramienta — distribución elástica</text>
  <text x="396" y="42" font-size="11" fill="#6b7280">el mismo equilibrio, con un brazo menor</text>
  <rect x="440" y="210" width="260" height="55" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <polygon points="592,210 670,210 670,236.4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="470" y="198" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="503" y="134" width="134" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="570" y1="102" x2="570" y2="130" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="556" y="116" text-anchor="end" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan></text>
  <path d="M 594 106 A 22 22 0 0 1 594 144" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="612" y="128" font-size="12" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">u</tspan></text>
  <!-- pernos -->
  <rect x="487" y="176" width="10" height="5" fill="#1a1a1a"/>
  <line x1="492" y1="181" x2="492" y2="200" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="492" y1="200" x2="492" y2="248" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="643" y="176" width="10" height="5" fill="#1a1a1a"/>
  <line x1="648" y1="181" x2="648" y2="200" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="648" y1="200" x2="648" y2="248" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <!-- eje neutro -->
  <line x1="592" y1="190" x2="592" y2="254" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="592" y="266" text-anchor="middle" font-size="10" fill="#6b7280">eje neutro</text>
  <!-- tracción -->
  <line x1="492" y1="206" x2="492" y2="234" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="500" y="230" font-size="10.5" font-style="italic" fill="#dc2626">T<tspan font-style="normal"> = 7.8 tonf/perno</tspan></text>
  <!-- etiqueta sigma -->
  <text x="676" y="224" font-size="10.5" font-style="italic" fill="#2563eb">σ<tspan font-size="8" dy="2.5">máx</tspan></text>
  <text x="676" y="238" font-size="9.5" fill="#2563eb">= 141 kgf/cm²</text>
  <!-- centroide y brazo -->
  <line x1="644" y1="240" x2="644" y2="285" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="492" y1="252" x2="492" y2="285" stroke="#6b7280" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="492" y1="280" x2="644" y2="280" stroke="#6b7280" stroke-width="1.2" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="568" y="296" text-anchor="middle" font-size="10.5" fill="#6b7280">brazo = 34.2 cm</text>

  <!-- ═══ Cierre: mismo equilibrio, distinto brazo ═══ -->
  <line x1="15" y1="318" x2="745" y2="318" stroke="#e5e7eb" stroke-width="1"/>
  <text x="380" y="342" text-anchor="middle" font-size="11.5" fill="#1a1a1a">Mismo equilibrio de momentos respecto de la fila traccionada:&#160;&#160;<tspan font-style="italic">R</tspan> · brazo = <tspan font-style="italic">P</tspan><tspan font-size="8.5" dy="2.5">u</tspan><tspan dy="-2.5"> · (e + f) = 19.0 tonf·m</tspan></text>
  <text x="380" y="364" text-anchor="middle" font-size="11" fill="#1a1a1a">(a) R = 50.4 tonf → T = R − P<tspan font-size="8.5" dy="2.5">u</tspan><tspan dy="-2.5"> = 10.4 tonf</tspan>&#160;&#160;&#160;&#160;&#160;&#160;(b) R = 55.6 tonf → T = 15.6 tonf</text>
  <text x="380" y="388" text-anchor="middle" font-size="10.5" fill="#6b7280">El bloque plástico maximiza el brazo → mínima tracción de pernos; la solución elástica reparte la presión → menos flexión de placa.</text>
</svg>
