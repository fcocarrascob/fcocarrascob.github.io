<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="ablue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <marker id="agreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#ffffff"/>
  <text x="440" y="28" font-size="16" text-anchor="middle" fill="#222" font-weight="bold">El principio: el LLM orquesta y narra; los números los calcula Python</text>

  <!-- ===== zona del LLM (texto) ===== -->
  <rect x="16" y="52" width="848" height="150" rx="8" fill="#f4f7fb" stroke="#cdd9e8"/>
  <text x="30" y="72" font-size="12" fill="#1a63a8" font-weight="bold">ZONA DEL LENGUAJE — texto, revisable de un vistazo</text>

  <!-- enunciado -->
  <rect x="30" y="92" width="176" height="92" rx="6" fill="#ffffff" stroke="#8aa6c4"/>
  <text x="118" y="112" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">Enunciado</text>
  <text x="118" y="132" font-size="10.5" text-anchor="middle" fill="#555">«verifica una zapata</text>
  <text x="118" y="147" font-size="10.5" text-anchor="middle" fill="#555">de 2.20 m, D=60,</text>
  <text x="118" y="162" font-size="10.5" text-anchor="middle" fill="#555">L=30, G25…»</text>

  <!-- LLM hub -->
  <rect x="352" y="86" width="184" height="104" rx="6" fill="#eaf1fb" stroke="#1a63a8" stroke-width="1.6"/>
  <text x="444" y="108" font-size="13" text-anchor="middle" fill="#1a63a8" font-weight="bold">Modelo de lenguaje</text>
  <text x="444" y="130" font-size="10.5" text-anchor="middle" fill="#333">elige la herramienta</text>
  <text x="444" y="146" font-size="10.5" text-anchor="middle" fill="#333">arma la llamada</text>
  <text x="444" y="162" font-size="10.5" text-anchor="middle" fill="#333">narra el resultado</text>
  <text x="444" y="180" font-size="10" text-anchor="middle" fill="#c0392b" font-weight="bold">no produce ni un número</text>

  <!-- respuesta -->
  <rect x="682" y="92" width="176" height="92" rx="6" fill="#ffffff" stroke="#8aa6c4"/>
  <text x="770" y="112" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">Respuesta</text>
  <text x="770" y="132" font-size="10.5" text-anchor="middle" fill="#555">verificación redactada,</text>
  <text x="770" y="147" font-size="10.5" text-anchor="middle" fill="#555">cada número con su</text>
  <text x="770" y="162" font-size="10.5" text-anchor="middle" fill="#555">cita a la norma</text>

  <!-- flechas zona superior -->
  <line x1="206" y1="138" x2="346" y2="138" stroke="#555" stroke-width="1.4" marker-end="url(#a1)"/>
  <line x1="536" y1="138" x2="676" y2="138" stroke="#1a63a8" stroke-width="1.4" marker-end="url(#ablue)"/>
  <text x="606" y="130" font-size="10" text-anchor="middle" fill="#1a63a8">narra</text>

  <!-- ===== frontera ===== -->
  <line x1="16" y1="222" x2="864" y2="222" stroke="#c0392b" stroke-width="1.4" stroke-dasharray="7 5"/>
  <rect x="300" y="211" width="280" height="22" rx="11" fill="#fdecea" stroke="#c0392b"/>
  <text x="440" y="226" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">los números nunca cruzan hacia arriba</text>

  <!-- ===== zona del cálculo (números) ===== -->
  <rect x="16" y="244" width="848" height="150" rx="8" fill="#eef7ee" stroke="#bfe0c4"/>
  <text x="30" y="264" font-size="12" fill="#1c7c3c" font-weight="bold">ZONA DEL CÁLCULO — números, código testeable</text>

  <!-- herramienta -->
  <rect x="300" y="284" width="184" height="96" rx="6" fill="#ffffff" stroke="#1c7c3c" stroke-width="1.6"/>
  <text x="392" y="318" font-size="13" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Herramienta Python</text>
  <text x="392" y="340" font-size="15" text-anchor="middle" fill="#1c7c3c" font-weight="bold">CALCULA</text>
  <text x="392" y="362" font-size="10" text-anchor="middle" fill="#555">ACI 318-25 / AISC 360-22</text>

  <!-- JSON -->
  <rect x="560" y="284" width="200" height="96" rx="6" fill="#f4f7fb" stroke="#8aa6c4"/>
  <text x="660" y="308" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">JSON</text>
  <text x="660" y="330" font-size="11" text-anchor="middle" fill="#1c7c3c">{ número</text>
  <text x="660" y="348" font-size="11" text-anchor="middle" fill="#1a63a8">+ cita normativa</text>
  <text x="660" y="366" font-size="11" text-anchor="middle" fill="#333">+ cumple? }</text>

  <!-- flechas que cruzan la frontera -->
  <line x1="410" y1="190" x2="360" y2="280" stroke="#1a63a8" stroke-width="1.5" marker-end="url(#ablue)"/>
  <text x="300" y="242" font-size="10" text-anchor="middle" fill="#1a63a8">llamada: datos,</text>
  <text x="300" y="255" font-size="10" text-anchor="middle" fill="#1a63a8">sin cálculo</text>

  <line x1="484" y1="330" x2="556" y2="330" stroke="#1c7c3c" stroke-width="1.4" marker-end="url(#agreen)"/>

  <line x1="640" y1="280" x2="500" y2="192" stroke="#1c7c3c" stroke-width="1.5" marker-end="url(#agreen)"/>
  <text x="612" y="250" font-size="10" text-anchor="middle" fill="#1c7c3c">número + cita</text>
  <text x="612" y="263" font-size="10" text-anchor="middle" fill="#1c7c3c">de vuelta al LLM</text>
</svg>
