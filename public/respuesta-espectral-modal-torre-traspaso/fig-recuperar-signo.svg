<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="440" fill="#ffffff"/>
  <text x="480" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Recuperar el signo: de cuatro magnitudes positivas a un set firmado y concurrente</text>

  <defs>
    <marker id="upArr" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#c0392b"/>
    </marker>
    <marker id="dnArr" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="9" markerHeight="9" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M0,0 L5,10 L10,0 z" fill="#1a5e8a"/>
    </marker>
  </defs>

  <!-- ============ LEFT: CQC magnitudes (sin signo) ============ -->
  <g transform="translate(70,58)">
    <text x="160" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Lo que entrega CQC: magnitudes</text>
    <g transform="translate(60,64)">
      <rect x="0" y="0" width="200" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
      <g font-size="11" text-anchor="middle">
        <!-- A0 bottom-left -->
        <circle cx="0" cy="120" r="6" fill="#999"/>
        <rect x="-42" y="130" width="84" height="30" rx="3" fill="#eee" stroke="#ccc"/>
        <text x="0" y="144" fill="#333">A0: 60.96</text>
        <text x="0" y="156" fill="#c0392b">¿↑ o ↓?</text>
        <!-- B0 bottom-right -->
        <circle cx="200" cy="120" r="6" fill="#999"/>
        <rect x="158" y="130" width="84" height="30" rx="3" fill="#eee" stroke="#ccc"/>
        <text x="200" y="144" fill="#333">B0: 67.49</text>
        <text x="200" y="156" fill="#c0392b">¿↑ o ↓?</text>
        <!-- C0 top-right -->
        <circle cx="200" cy="0" r="6" fill="#999"/>
        <rect x="158" y="-32" width="84" height="30" rx="3" fill="#eee" stroke="#ccc"/>
        <text x="200" y="-18" fill="#333">C0: 94.67</text>
        <text x="200" y="-6" fill="#c0392b">¿↑ o ↓?</text>
        <!-- D0 top-left -->
        <circle cx="0" cy="0" r="6" fill="#999"/>
        <rect x="-42" y="-32" width="84" height="30" rx="3" fill="#eee" stroke="#ccc"/>
        <text x="0" y="-18" fill="#333">D0: 94.49</text>
        <text x="0" y="-6" fill="#c0392b">¿↑ o ↓?</text>
      </g>
    </g>
    <text x="160" y="258" font-size="11" text-anchor="middle" fill="#555">Las 4 esquinas salen positivas — como si</text>
    <text x="160" y="274" font-size="11" text-anchor="middle" fill="#555">todas comprimieran a la vez (imposible).</text>
  </g>

  <!-- arrow between -->
  <g transform="translate(468,200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#555" stroke-width="2.5"/>
    <path d="M50,-6 L62,0 L50,6 z" fill="#555"/>
    <text x="28" y="-12" font-size="10.5" text-anchor="middle" fill="#333">signo del</text>
    <text x="28" y="20" font-size="10.5" text-anchor="middle" fill="#333">modo 1</text>
  </g>

  <!-- ============ RIGHT: mode-1 signed pattern ============ -->
  <g transform="translate(560,58)">
    <text x="160" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Con el patrón del modo dominante</text>
    <g transform="translate(60,64)">
      <rect x="0" y="0" width="200" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
      <path d="M0,120 L200,0" stroke="#ddd" stroke-width="1" stroke-dasharray="4 4"/>
      <g font-size="11" text-anchor="middle">
        <!-- A0 bottom-left : uplift (-) -->
        <line x1="0" y1="120" x2="0" y2="96" stroke="#c0392b" stroke-width="3" marker-end="url(#upArr)"/>
        <circle cx="0" cy="120" r="6" fill="#c0392b"/>
        <rect x="-44" y="130" width="88" height="20" rx="3" fill="#fdecea" stroke="#e6b0a8"/>
        <text x="0" y="144" fill="#c0392b" font-weight="bold">A0: −60.96</text>
        <!-- B0 bottom-right : compression (+) -->
        <line x1="200" y1="96" x2="200" y2="120" stroke="#1a5e8a" stroke-width="3" marker-end="url(#dnArr)"/>
        <circle cx="200" cy="120" r="6" fill="#1a5e8a"/>
        <rect x="156" y="130" width="88" height="20" rx="3" fill="#e9f1f7" stroke="#a8c6dd"/>
        <text x="200" y="144" fill="#1a5e8a" font-weight="bold">B0: +67.49</text>
        <!-- C0 top-right : uplift (-) -->
        <line x1="200" y1="24" x2="200" y2="0" stroke="#c0392b" stroke-width="3" marker-end="url(#upArr)"/>
        <circle cx="200" cy="0" r="6" fill="#c0392b"/>
        <rect x="156" y="-32" width="88" height="20" rx="3" fill="#fdecea" stroke="#e6b0a8"/>
        <text x="200" y="-18" fill="#c0392b" font-weight="bold">C0: −94.67</text>
        <!-- D0 top-left : compression (+) -->
        <line x1="0" y1="-24" x2="0" y2="0" stroke="#1a5e8a" stroke-width="3" marker-end="url(#dnArr)"/>
        <circle cx="0" cy="0" r="6" fill="#1a5e8a"/>
        <rect x="-44" y="-32" width="88" height="20" rx="3" fill="#e9f1f7" stroke="#a8c6dd"/>
        <text x="0" y="-18" fill="#1a5e8a" font-weight="bold">D0: +94.49</text>
      </g>
    </g>
    <text x="160" y="258" font-size="11" text-anchor="middle" fill="#555">Patrón <tspan fill="#333" font-weight="bold">diagonal</tspan>: A0 y C0 traccionan,</text>
    <text x="160" y="274" font-size="11" text-anchor="middle" fill="#555">B0 y D0 comprimen — la torsión inclina el vuelco.</text>
  </g>

  <!-- legend -->
  <g transform="translate(0,352)" font-size="11">
    <polygon points="300,-14 294,-2 306,-2" fill="#c0392b"/>
    <text x="314" y="-2" fill="#555">tracción / levantamiento (−)</text>
    <polygon points="560,-14 554,-2 566,-2" fill="#1a5e8a" transform="rotate(180 560 -8)"/>
    <text x="574" y="-2" fill="#555">compresión (+)</text>
  </g>
  <text x="480" y="398" font-size="11.5" text-anchor="middle" fill="#555">
    SRSS y CQC son raíces de sumas de cuadrados: siempre positivas. Sin recuperar el signo, no se puede saber si una zapata trabaja a compresión o a tracción.
  </text>
  <text x="480" y="418" font-size="11.5" text-anchor="middle" fill="#555">
    El modo dominante presta su patrón de signos y convierte las magnitudes en reacciones firmadas que ocurren juntas — lo que necesita el diseño de la fundación.
  </text>
</svg>
