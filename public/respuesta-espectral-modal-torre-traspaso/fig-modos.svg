<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="380" fill="#ffffff"/>
  <text x="480" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Los tres modos relevantes: traslación y torsión mezcladas</text>

  <defs>
    <marker id="mArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="mArrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
  </defs>

  <!-- ===== Mode 1 ===== -->
  <g transform="translate(40,60)">
    <text x="115" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Modo 1 · T=0.859 s</text>
    <rect x="30" y="20" width="170" height="110" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- translation arrow X -->
    <line x1="115" y1="75" x2="175" y2="75" stroke="#b02a1a" stroke-width="4" marker-end="url(#mArr)"/>
    <!-- rotation arrow -->
    <path d="M 90,50 A 30,30 0 1 1 85,100" fill="none" stroke="#1a63a8" stroke-width="3" marker-end="url(#mArrB)"/>
    <text x="115" y="160" font-size="11.5" text-anchor="middle" fill="#b02a1a">Ux = 55.5 %</text>
    <text x="115" y="176" font-size="11.5" text-anchor="middle" fill="#1a63a8">Rz = 26.8 %</text>
    <text x="115" y="196" font-size="10.5" text-anchor="middle" fill="#555">X acoplado con torsión</text>
  </g>

  <!-- ===== Mode 2 ===== -->
  <g transform="translate(360,60)">
    <text x="115" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Modo 2 · T=0.537 s</text>
    <rect x="30" y="20" width="170" height="110" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- translation arrow Y (vertical in plan) -->
    <line x1="115" y1="105" x2="115" y2="30" stroke="#b02a1a" stroke-width="4" marker-end="url(#mArr)"/>
    <text x="115" y="160" font-size="11.5" text-anchor="middle" fill="#b02a1a">Uy = 81.2 %</text>
    <text x="115" y="176" font-size="11.5" text-anchor="middle" fill="#1a63a8">Rz = 0.2 %</text>
    <text x="115" y="196" font-size="10.5" text-anchor="middle" fill="#555">Y prácticamente puro</text>
  </g>

  <!-- ===== Mode 3 ===== -->
  <g transform="translate(680,60)">
    <text x="115" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Modo 3 · T=0.398 s</text>
    <rect x="30" y="20" width="170" height="110" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- translation arrow X, smaller -->
    <line x1="115" y1="75" x2="155" y2="75" stroke="#b02a1a" stroke-width="4" marker-end="url(#mArr)"/>
    <!-- rotation arrow, larger -->
    <path d="M 95,35 A 42,42 0 1 1 88,117" fill="none" stroke="#1a63a8" stroke-width="4" marker-end="url(#mArrB)"/>
    <text x="115" y="160" font-size="11.5" text-anchor="middle" fill="#b02a1a">Ux = 29.2 %</text>
    <text x="115" y="176" font-size="11.5" text-anchor="middle" fill="#1a63a8">Rz = 56.4 %</text>
    <text x="115" y="196" font-size="10.5" text-anchor="middle" fill="#555">torsión domina, con algo de X</text>
  </g>

  <text x="480" y="250" font-size="11.5" text-anchor="middle" fill="#555">
    Ninguno de los tres es un modo "puro": la asimetría de arriostramiento acopla X, Y y Rz en proporciones distintas en cada uno.
  </text>
  <text x="480" y="270" font-size="11.5" text-anchor="middle" fill="#555">
    Entre los tres capturan 85 % de la masa en X y 81 % en Y — suficiente para el desarrollo de este post.
  </text>
</svg>
