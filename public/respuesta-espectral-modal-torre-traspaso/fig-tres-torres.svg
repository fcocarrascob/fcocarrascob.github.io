<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="960" height="420" fill="#ffffff"/>
  <text x="480" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Tres torres, mismo todo salvo el arriostramiento — el acoplamiento manda la brecha SRSS-CQC</text>

  <!-- reusable: each panel draws a 6x4 plan (X horiz, Y vert), braced faces as thick blue w/ diagonal -->
  <!-- corners: A bottom-left, B bottom-right, C top-right, D top-left -->

  <!-- ============ Panel 1: asimétrica (3 caras) ============ -->
  <g transform="translate(40,60)">
    <text x="130" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Asimétrica · 3 caras</text>
    <g transform="translate(40,20)">
      <!-- plan rectangle 180x120 -->
      <rect x="0" y="0" width="180" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
      <!-- braced faces: left (D-A, X=0), right (B-C, X=6), top (C-D, Y=4) -->
      <line x1="0" y1="0" x2="0" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="180" y1="0" x2="180" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="0" x2="180" y2="0" stroke="#1a63a8" stroke-width="4"/>
      <!-- open face bottom (A-B, Y=0) -->
      <line x1="0" y1="120" x2="180" y2="120" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 4"/>
      <!-- diagonals as brace markers -->
      <line x1="0" y1="120" x2="0" y2="0" stroke="none"/>
      <line x1="6" y1="114" x2="6" y2="6" stroke="#1a63a8" stroke-width="1" opacity="0"/>
      <line x1="0" y1="0" x2="14" y2="14" stroke="#1a63a8" stroke-width="1.2"/>
      <line x1="180" y1="0" x2="166" y2="14" stroke="#1a63a8" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="14" y2="-0" stroke="none"/>
      <!-- corner dots + labels -->
      <circle cx="0" cy="120" r="3" fill="#333"/><text x="-8" y="134" font-size="9" fill="#555">A</text>
      <circle cx="180" cy="120" r="3" fill="#333"/><text x="184" y="134" font-size="9" fill="#555">B</text>
      <circle cx="180" cy="0" r="3" fill="#333"/><text x="184" y="-4" font-size="9" fill="#555">C</text>
      <circle cx="0" cy="0" r="3" fill="#333"/><text x="-10" y="-4" font-size="9" fill="#555">D</text>
      <text x="90" y="136" font-size="9" text-anchor="middle" fill="#c0392b">Y=0 sin arriostrar (correa)</text>
    </g>
    <text x="130" y="180" font-size="11" text-anchor="middle" fill="#333">modos <tspan fill="#b02a1a">mezclados</tspan> (ningún modo puro)</text>
    <text x="130" y="200" font-size="11" text-anchor="middle" fill="#333">ρ máx = <tspan font-weight="bold">0.04</tspan></text>
    <text x="130" y="222" font-size="12" text-anchor="middle" fill="#1a7a3a" font-weight="bold">CQC − SRSS = +0.6 %</text>
  </g>

  <!-- ============ Panel 2: simétrica (4 caras) ============ -->
  <g transform="translate(360,60)">
    <text x="130" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Simétrica · 4 caras</text>
    <g transform="translate(40,20)">
      <rect x="0" y="0" width="180" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="180" y1="0" x2="180" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="0" x2="180" y2="0" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="120" x2="180" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="0" x2="14" y2="14" stroke="#1a63a8" stroke-width="1.2"/>
      <line x1="180" y1="0" x2="166" y2="14" stroke="#1a63a8" stroke-width="1.2"/>
      <line x1="0" y1="120" x2="14" y2="106" stroke="#1a63a8" stroke-width="1.2"/>
      <line x1="180" y1="120" x2="166" y2="106" stroke="#1a63a8" stroke-width="1.2"/>
      <circle cx="0" cy="120" r="3" fill="#333"/><text x="-8" y="134" font-size="9" fill="#555">A</text>
      <circle cx="180" cy="120" r="3" fill="#333"/><text x="184" y="134" font-size="9" fill="#555">B</text>
      <circle cx="180" cy="0" r="3" fill="#333"/><text x="184" y="-4" font-size="9" fill="#555">C</text>
      <circle cx="0" cy="0" r="3" fill="#333"/><text x="-10" y="-4" font-size="9" fill="#555">D</text>
      <text x="90" y="66" font-size="10" text-anchor="middle" fill="#777">CR ≡ CM</text>
    </g>
    <text x="130" y="180" font-size="11" text-anchor="middle" fill="#333">modos <tspan fill="#1a7a3a" font-weight="bold">puros</tspan>: X, Y, torsión separados</text>
    <text x="130" y="200" font-size="11" text-anchor="middle" fill="#333">ρ = <tspan font-weight="bold">0</tspan> (desacoplados)</text>
    <text x="130" y="222" font-size="12" text-anchor="middle" fill="#1a7a3a" font-weight="bold">CQC − SRSS = +0.2 %</text>
  </g>

  <!-- ============ Panel 3: modos cercanos (2 caras) ============ -->
  <g transform="translate(680,60)">
    <text x="130" y="0" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Modos cercanos · 2 caras</text>
    <g transform="translate(40,20)">
      <rect x="0" y="0" width="180" height="120" fill="#f7f7f7" stroke="#bbb" stroke-width="1"/>
      <!-- braced: left (D-A) and top (C-D) — 2 adjacent at corner D -->
      <line x1="0" y1="0" x2="0" y2="120" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="0" x2="180" y2="0" stroke="#1a63a8" stroke-width="4"/>
      <line x1="0" y1="0" x2="14" y2="14" stroke="#1a63a8" stroke-width="1.2"/>
      <!-- open: right and bottom -->
      <line x1="180" y1="0" x2="180" y2="120" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 4"/>
      <line x1="0" y1="120" x2="180" y2="120" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 4"/>
      <circle cx="0" cy="120" r="3" fill="#333"/><text x="-8" y="134" font-size="9" fill="#555">A</text>
      <circle cx="180" cy="120" r="3" fill="#333"/><text x="184" y="134" font-size="9" fill="#555">B</text>
      <circle cx="180" cy="0" r="3" fill="#333"/><text x="184" y="-4" font-size="9" fill="#555">C</text>
      <circle cx="0" cy="0" r="3" fill="#333"/><text x="-10" y="-4" font-size="9" fill="#555">D</text>
      <text x="120" y="80" font-size="9.5" text-anchor="middle" fill="#c0392b">2 caras sin arriostrar</text>
    </g>
    <text x="130" y="180" font-size="11" text-anchor="middle" fill="#333">T₃=0.448 / T₄=0.432 s → <tspan fill="#b02a1a" font-weight="bold">3.7 %</tspan></text>
    <text x="130" y="200" font-size="11" text-anchor="middle" fill="#333">ρ₃₄ = <tspan font-weight="bold" fill="#b02a1a">0.72</tspan></text>
    <text x="130" y="222" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">SRSS subestima: Vₓ −7 %, Mz −13 %</text>
  </g>

  <!-- legend -->
  <g transform="translate(0,320)" font-size="11">
    <line x1="270" y1="0" x2="300" y2="0" stroke="#1a63a8" stroke-width="4"/>
    <text x="308" y="4" fill="#555">cara arriostrada</text>
    <line x1="450" y1="0" x2="480" y2="0" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="488" y="4" fill="#555">cara sin arriostrar (pórtico a momento)</text>
  </g>
  <text x="480" y="366" font-size="11.5" text-anchor="middle" fill="#555">
    La correlación ρ salta de 0.00 (simétrica) a 0.04 (asimétrica) a 0.72 (modos cercanos), y con ella la brecha SRSS-CQC: 0 % → 0.6 % → 12 %.
  </text>
  <text x="480" y="386" font-size="11.5" text-anchor="middle" fill="#555">
    SRSS solo se queda corto cuando dos períodos casi coinciden — exactamente lo que el barrido de C3 va a mapear como un continuo.
  </text>
</svg>
