<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="460" fill="#ffffff"/>
  <text x="490" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Torre de traspaso: planta y arriostramiento asimétrico</text>

  <!-- ============ PANEL A: plan view ============ -->
  <text x="175" y="52" font-size="12.5" text-anchor="middle" fill="#555">Planta (6 m × 4 m)</text>

  <!-- axes hint -->
  <text x="40" y="292" font-size="10.5" fill="#888">Y</text>
  <text x="290" y="308" font-size="10.5" fill="#888">X</text>

  <!-- bottom edge Y=0: frontal, unbraced -->
  <line x1="70" y1="280" x2="280" y2="280" stroke="#8a857c" stroke-width="4" stroke-dasharray="2 5"/>
  <text x="175" y="300" font-size="11" text-anchor="middle" fill="#8a857c">Y=0 · sin arriostrar (ingreso correa)</text>

  <!-- top edge Y=4: trasera, braced -->
  <line x1="70" y1="140" x2="280" y2="140" stroke="#333" stroke-width="4"/>
  <path d="M70,140 L280,140" stroke="none"/>
  <g stroke="#1a63a8" stroke-width="2">
    <line x1="90" y1="140" x2="130" y2="130"/><line x1="130" y1="150" x2="90" y2="130"/>
    <line x1="150" y1="140" x2="190" y2="130"/><line x1="190" y1="150" x2="150" y2="130"/>
    <line x1="210" y1="140" x2="250" y2="130"/><line x1="250" y1="150" x2="210" y2="130"/>
  </g>
  <text x="175" y="122" font-size="11" text-anchor="middle" fill="#1a63a8">Y=4 · trasera arriostrada</text>

  <!-- left edge X=0: braced -->
  <line x1="70" y1="140" x2="70" y2="280" stroke="#333" stroke-width="4"/>
  <g stroke="#1a63a8" stroke-width="2">
    <line x1="70" y1="160" x2="82" y2="195"/><line x1="58" y1="195" x2="70" y2="160"/>
    <line x1="70" y1="220" x2="82" y2="255"/><line x1="58" y1="255" x2="70" y2="220"/>
  </g>
  <text x="30" y="212" font-size="11" text-anchor="middle" fill="#1a63a8" transform="rotate(-90 30 212)">X=0 arriostrada</text>

  <!-- right edge X=6: braced -->
  <line x1="280" y1="140" x2="280" y2="280" stroke="#333" stroke-width="4"/>
  <g stroke="#1a63a8" stroke-width="2">
    <line x1="280" y1="160" x2="268" y2="195"/><line x1="292" y1="195" x2="280" y2="160"/>
    <line x1="280" y1="220" x2="268" y2="255"/><line x1="292" y1="255" x2="280" y2="220"/>
  </g>
  <text x="325" y="212" font-size="11" text-anchor="middle" fill="#1a63a8" transform="rotate(90 325 212)">X=6 arriostrada</text>

  <!-- corner labels -->
  <g font-size="11" fill="#222">
    <circle cx="70" cy="280" r="3" fill="#333"/><text x="60" y="296" text-anchor="end">A (0,0)</text>
    <circle cx="280" cy="280" r="3" fill="#333"/><text x="290" y="296">B (6,0)</text>
    <circle cx="280" cy="140" r="3" fill="#333"/><text x="290" y="132">C (6,4)</text>
    <circle cx="70" cy="140" r="3" fill="#333"/><text x="60" y="132" text-anchor="end">D (0,4)</text>
  </g>

  <!-- CM / CR -->
  <g>
    <circle cx="175" cy="210" r="4.5" fill="#1c7c3c"/>
    <text x="175" y="227" font-size="10.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">CM</text>
    <circle cx="175" cy="184" r="4.5" fill="#b02a1a"/>
    <text x="175" y="172" font-size="10.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">CR</text>
    <line x1="175" y1="205" x2="175" y2="189" stroke="#555" stroke-width="1.5" marker-end="url(#armd2)"/>
    <text x="200" y="200" font-size="10" fill="#555">e (excentricidad)</text>
  </g>
  <defs>
    <marker id="armd2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- ============ PANEL B: frontal elevation (unbraced) ============ -->
  <text x="530" y="52" font-size="12.5" text-anchor="middle" fill="#555">Elevación Y=0 (frontal) — pórtico a momento</text>
  <g stroke="#333" stroke-width="3.5">
    <line x1="450" y1="380" x2="450" y2="80"/>
    <line x1="610" y1="380" x2="610" y2="80"/>
    <line x1="450" y1="380" x2="610" y2="380"/>
    <line x1="450" y1="305" x2="610" y2="305"/>
    <line x1="450" y1="230" x2="610" y2="230"/>
    <line x1="450" y1="155" x2="610" y2="155"/>
    <line x1="450" y1="80"  x2="610" y2="80"/>
  </g>
  <g font-size="10" fill="#888" text-anchor="end">
    <text x="444" y="384">z=0</text><text x="444" y="309">z=4</text><text x="444" y="234">z=8</text>
    <text x="444" y="159">z=12</text><text x="444" y="84">z=16</text>
  </g>
  <text x="530" y="405" font-size="10.5" text-anchor="middle" fill="#8a857c">sin diagonales — la correa entra por acá</text>

  <!-- ============ PANEL C: trasera elevation (braced, zig-zag) ============ -->
  <text x="800" y="52" font-size="12.5" text-anchor="middle" fill="#555">Elevación Y=4 (trasera) — arriostrada</text>
  <g stroke="#333" stroke-width="3.5">
    <line x1="720" y1="380" x2="720" y2="80"/>
    <line x1="880" y1="380" x2="880" y2="80"/>
    <line x1="720" y1="380" x2="880" y2="380"/>
    <line x1="720" y1="305" x2="880" y2="305"/>
    <line x1="720" y1="230" x2="880" y2="230"/>
    <line x1="720" y1="155" x2="880" y2="155"/>
    <line x1="720" y1="80"  x2="880" y2="80"/>
  </g>
  <g stroke="#1a63a8" stroke-width="3">
    <line x1="720" y1="380" x2="880" y2="305"/>
    <line x1="880" y1="305" x2="720" y2="230"/>
    <line x1="720" y1="230" x2="880" y2="155"/>
    <line x1="880" y1="155" x2="720" y2="80"/>
  </g>
  <text x="800" y="405" font-size="10.5" text-anchor="middle" fill="#1a63a8">diagonal alternada, una por piso</text>

  <text x="490" y="440" font-size="11.5" text-anchor="middle" fill="#555">
    3 de 4 caras arriostradas (X=0, X=6, Y=4) — la cara Y=0 queda como pórtico a momento puro
  </text>
</svg>
