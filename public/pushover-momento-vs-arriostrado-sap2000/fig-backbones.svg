<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="axk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="27" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Por qué las curvas difieren: la forma del backbone de la rótula</text>

  <!-- ═══════ (a) flexión: M–θ simétrico ═══════ -->
  <text x="240" y="58" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(a) rótula de FLEXIÓN (viga/columna) — M–θ</text>
  <!-- ejes -->
  <line x1="110" y1="360" x2="460" y2="360" stroke="#888" stroke-width="1.2" marker-end="url(#axk)"/>
  <line x1="110" y1="360" x2="110" y2="100" stroke="#888" stroke-width="1.2" marker-end="url(#axk)"/>
  <text x="462" y="376" font-size="11.5" fill="#555">θ (rotación)</text>
  <text x="110" y="92" font-size="11.5" fill="#555" text-anchor="middle">M</text>
  <!-- backbone A-B-C-D-E -->
  <polyline points="110,360 180,190 330,176 355,300 445,300" fill="none" stroke="#2a78d6" stroke-width="2.8"/>
  <line x1="110" y1="190" x2="180" y2="190" stroke="#999" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="116" y="185" font-size="10.5" fill="#0f3d78">Mp = Fye·Z</text>
  <g font-size="11" fill="#222">
    <circle cx="180" cy="190" r="4" fill="#2a78d6"/><text x="184" y="185">B</text>
    <circle cx="330" cy="176" r="4" fill="#2a78d6"/><text x="326" y="170">C</text>
    <circle cx="355" cy="300" r="4" fill="#2a78d6"/><text x="360" y="296">D</text>
    <circle cx="445" cy="300" r="4" fill="#2a78d6"/><text x="432" y="294">E</text>
    <text x="98" y="364" text-anchor="end">A</text>
  </g>
  <text x="285" y="152" font-size="11" fill="#0f3d78" text-anchor="middle">fluye y SOSTIENE el momento</text>
  <text x="285" y="205" font-size="11" fill="#0f3d78" text-anchor="middle">(larga meseta B→C, dúctil)</text>
  <text x="240" y="400" font-size="11.5" fill="#0f3d78" text-anchor="middle" font-weight="bold">→ da la MESETA de la curva del MF</text>

  <!-- ═══════ (b) axial: P–δ asimétrico ═══════ -->
  <text x="710" y="58" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(b) rótula AXIAL (diagonal) — P–δ, asimétrica</text>
  <!-- ejes: P=0 en y=250 -->
  <line x1="580" y1="250" x2="905" y2="250" stroke="#888" stroke-width="1.2" marker-end="url(#axk)"/>
  <line x1="580" y1="360" x2="580" y2="95" stroke="#888" stroke-width="1.2" marker-end="url(#axk)"/>
  <text x="905" y="243" font-size="11.5" fill="#555">δ axial</text>
  <text x="566" y="108" font-size="11" fill="#a06f00" text-anchor="end">P (+tracción)</text>
  <text x="566" y="352" font-size="11" fill="#0f3d78" text-anchor="end">P (−compresión)</text>

  <!-- tracción: sube alto y sostiene -->
  <polyline points="580,250 636,140 690,132 895,124" fill="none" stroke="#eda100" stroke-width="2.8"/>
  <line x1="580" y1="140" x2="636" y2="140" stroke="#c99a1a" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="586" y="135" font-size="10.5" fill="#a06f00">Ty = Fye·A  (alto, dúctil)</text>
  <circle cx="636" cy="140" r="4" fill="#eda100"/>

  <!-- compresión: pandea bajo y CAE a residual -->
  <polyline points="580,250 640,318 688,300 895,296" fill="none" stroke="#2a78d6" stroke-width="2.8"/>
  <line x1="580" y1="318" x2="640" y2="318" stroke="#4a86cf" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="586" y="333" font-size="10.5" fill="#0f3d78">−Pcr  (pandeo, AISC E3)</text>
  <circle cx="640" cy="318" r="4" fill="#2a78d6"/>
  <text x="705" y="292" font-size="10.5" fill="#0f3d78">cae a ~0.3·Pcr (degrada)</text>

  <!-- llave de asimetría -->
  <line x1="915" y1="124" x2="915" y2="296" stroke="#b02a1a" stroke-width="1.2"/>
  <line x1="911" y1="124" x2="919" y2="124" stroke="#b02a1a" stroke-width="1.2"/>
  <line x1="911" y1="296" x2="919" y2="296" stroke="#b02a1a" stroke-width="1.2"/>

  <text x="710" y="392" font-size="11.5" fill="#b02a1a" text-anchor="middle" font-weight="bold">Pcr ≪ Ty → el PICO lo fija la compresión, y CAE</text>
  <text x="710" y="408" font-size="11" fill="#555" text-anchor="middle">→ da el pico-y-caída de la curva del CBF</text>
</svg>
