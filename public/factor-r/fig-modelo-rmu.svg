<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ma5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="mb5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#999" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="940" height="450" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El laboratorio: un oscilador elastoplástico, replicado 63 veces en un solo modelo</text>

  <!-- ═══ panel (a): el oscilador ═══ -->
  <text x="210" y="60" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(a) el oscilador</text>

  <!-- ground -->
  <rect x="60" y="360" width="300" height="14" fill="url(#hatch)"/>
  <line x1="60" y1="360" x2="360" y2="360" stroke="#333" stroke-width="1.5"/>

  <!-- spring (zigzag) + slider in series -->
  <line x1="130" y1="360" x2="130" y2="330" stroke="#333" stroke-width="1.6"/>
  <polyline points="130,330 118,322 142,310 118,298 142,286 118,274 130,266"
            fill="none" stroke="#333" stroke-width="1.6"/>
  <text x="108" y="302" font-size="12" fill="#333" text-anchor="end">k = m·(2π/T)²</text>
  <!-- friction slider -->
  <line x1="130" y1="266" x2="130" y2="248" stroke="#333" stroke-width="1.6"/>
  <rect x="116" y="228" width="28" height="20" fill="#fff" stroke="#b02a1a" stroke-width="1.6"/>
  <line x1="110" y1="252" x2="150" y2="252" stroke="#b02a1a" stroke-width="1.6"/>
  <text x="152" y="244" font-size="12" fill="#b02a1a">deslizador: F_y</text>
  <line x1="130" y1="228" x2="130" y2="206" stroke="#333" stroke-width="1.6"/>

  <!-- mass -->
  <rect x="96" y="166" width="68" height="40" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.8"/>
  <text x="130" y="191" font-size="12.5" fill="#1a63a8" text-anchor="middle" font-weight="bold">m</text>
  <text x="172" y="184" font-size="12" fill="#555">1000 kg, solo UX libre</text>

  <!-- base excitation -->
  <line x1="86" y1="392" x2="130" y2="392" stroke="#333" stroke-width="1.6" marker-end="url(#ma5)"/>
  <text x="138" y="396" font-size="12.5" fill="#333" font-weight="bold">ü_g(t): El Centro 1940</text>
  <text x="138" y="412" font-size="11" fill="#777">(el registro con el que Newmark formuló las reglas)</text>

  <!-- F-u law inset -->
  <line x1="248" y1="330" x2="380" y2="330" stroke="#333" stroke-width="1.2" marker-end="url(#ma5)"/>
  <line x1="290" y1="345" x2="290" y2="220" stroke="#333" stroke-width="1.2" marker-end="url(#ma5)"/>
  <text x="384" y="345" font-size="11" fill="#333">u</text>
  <text x="282" y="216" font-size="11" fill="#333" text-anchor="end">F</text>
  <polyline points="252,358 290,330 320,254 372,254" fill="none" stroke="#b02a1a" stroke-width="2.2"/>
  <line x1="290" y1="254" x2="320" y2="254" stroke="#999" stroke-width="0.9" stroke-dasharray="3 3"/>
  <line x1="320" y1="254" x2="320" y2="330" stroke="#999" stroke-width="0.9" stroke-dasharray="3 3"/>
  <text x="286" y="250" font-size="11" fill="#b02a1a" text-anchor="end">F_y</text>
  <text x="322" y="343" font-size="11" fill="#555">δ_y</text>
  <text x="348" y="246" font-size="10.5" fill="#555">meseta (EPP puro)</text>

  <!-- ═══ panel (b): el banco ═══ -->
  <text x="672" y="60" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(b) el banco: 9 T × (1 elástico + 6 R) = 63 osciladores, un caso FNA</text>

  <!-- column header: T -->
  <text x="672" y="92" font-size="11.5" fill="#555" text-anchor="middle">T = 0.1 · 0.15 · 0.2 · 0.3 · 0.5 · 0.75 · 1.0 · 1.5 · 2.0 s</text>
  <line x1="500" y1="98" x2="844" y2="98" stroke="#ccc" stroke-width="1"/>

  <!-- grid of oscillators: 9 cols x 7 rows -->
  <!-- row 1: elastic (blue) -->
  <g>
    <text x="492" y="122" font-size="11.5" fill="#1a63a8" text-anchor="end" font-weight="bold">elástico</text>
    <circle cx="512" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="553" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="594" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="635" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="676" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="717" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="758" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="799" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <circle cx="840" cy="118" r="7" fill="#e8eef6" stroke="#1a63a8" stroke-width="1.6"/>
    <text x="856" y="122" font-size="11" fill="#1a63a8">→ V_e, δ_e</text>
  </g>

  <!-- rows 2-7: plastic (red), R levels -->
  <g fill="#fdecea" stroke="#b02a1a" stroke-width="1.4">
    <g transform="translate(0,152)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
    <g transform="translate(0,186)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
    <g transform="translate(0,220)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
    <g transform="translate(0,254)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
    <g transform="translate(0,288)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
    <g transform="translate(0,322)"><circle cx="512" cy="0" r="7"/><circle cx="553" cy="0" r="7"/><circle cx="594" cy="0" r="7"/><circle cx="635" cy="0" r="7"/><circle cx="676" cy="0" r="7"/><circle cx="717" cy="0" r="7"/><circle cx="758" cy="0" r="7"/><circle cx="799" cy="0" r="7"/><circle cx="840" cy="0" r="7"/></g>
  </g>
  <g font-size="11.5" fill="#b02a1a" text-anchor="end">
    <text x="492" y="156">R = 1.5</text>
    <text x="492" y="190">R = 2</text>
    <text x="492" y="224">R = 3</text>
    <text x="492" y="258">R = 4</text>
    <text x="492" y="292">R = 6</text>
    <text x="492" y="326">R = 8</text>
  </g>
  <text x="856" y="240" font-size="11" fill="#b02a1a">F_y = V_e / R</text>
  <text x="856" y="256" font-size="11" fill="#555">→ δ_u, μ</text>

  <!-- base excitation arrow under grid -->
  <line x1="512" y1="352" x2="840" y2="352" stroke="#333" stroke-width="1.4"/>
  <line x1="640" y1="370" x2="676" y2="370" stroke="#333" stroke-width="1.6" marker-end="url(#ma5)"/>
  <text x="684" y="374" font-size="12" fill="#333" font-weight="bold">el mismo ü_g(t) para todos</text>
  <text x="676" y="396" font-size="11" fill="#777" text-anchor="middle">independientes entre sí: cada uno con su propia base — el barrido completo cuesta UNA corrida</text>

  <!-- takeaway -->
  <text x="470" y="436" font-size="12.5" text-anchor="middle" fill="#333">Fase A: corre la fila <tspan fill="#1a63a8" font-weight="bold">elástica</tspan> y mide V_e(T). Fase B: recorta la fluencia a <tspan fill="#b02a1a" font-weight="bold">F_y = V_e/R</tspan> y vuelve a correr. R queda definido EXACTO por construcción.</text>
</svg>
