<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ma7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="mg7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f7d32"/>
    </marker>
    <marker id="mr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <pattern id="hatch7" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#999" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="940" height="500" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El mecanismo con sus números: todo lo que el fusible entrega, alguien lo recibe</text>

  <!-- ground -->
  <rect x="120" y="390" width="560" height="14" fill="url(#hatch7)"/>
  <line x1="120" y1="390" x2="680" y2="390" stroke="#333" stroke-width="1.5"/>

  <!-- geometry: A(180,390) B(620,390) C(180,170) D(620,170) E(400,170) -->
  <!-- columns -->
  <line x1="180" y1="390" x2="180" y2="170" stroke="#555" stroke-width="3"/>
  <line x1="620" y1="390" x2="620" y2="170" stroke="#555" stroke-width="3"/>
  <!-- beam -->
  <line x1="180" y1="170" x2="620" y2="170" stroke="#555" stroke-width="3.5"/>

  <!-- moment diagram (triangle under the beam) -->
  <path d="M180,170 L400,300 L620,170 Z" fill="#e67e22" fill-opacity="0.15" stroke="#e67e22" stroke-width="1.2"/>
  <text x="400" y="324" font-size="12.5" fill="#b35c0e" text-anchor="middle" font-weight="bold">M = 1304 kNm = 2.2·M_p</text>
  <text x="400" y="340" font-size="11" fill="#b35c0e" text-anchor="middle">(869·L/4 — SAP: 0.00 %)</text>

  <!-- tension diagonal (A to E), bold -->
  <line x1="180" y1="390" x2="400" y2="170" stroke="#2f7d32" stroke-width="4"/>
  <text x="242" y="316" font-size="12.5" fill="#2f7d32" font-weight="bold" transform="rotate(-45 242 316)">T_ye = 1244 kN</text>

  <!-- buckled compression diagonal (B to E), dashed bulge -->
  <path d="M620,390 Q560,320 400,170" fill="none" stroke="#b02a1a" stroke-width="3" stroke-dasharray="7 5"/>
  <text x="592" y="330" font-size="12.5" fill="#b02a1a" font-weight="bold" transform="rotate(48 592 330)">0.3·P_ne = 158 kN</text>

  <!-- unbalance at E -->
  <line x1="400" y1="170" x2="400" y2="120" stroke="#b02a1a" stroke-width="2.5" marker-start="url(#mr7)"/>
  <text x="410" y="128" font-size="13" fill="#b02a1a" font-weight="bold">desbalance vertical: (T_ye − 0.3·P_ne)·senθ = 869 kN</text>

  <!-- column reactions -->
  <line x1="152" y1="118" x2="152" y2="160" stroke="#333" stroke-width="2" marker-end="url(#ma7)"/>
  <text x="146" y="108" font-size="12" fill="#333" text-anchor="end">435 kN a cada columna</text>
  <line x1="648" y1="118" x2="648" y2="160" stroke="#333" stroke-width="2" marker-end="url(#ma7)"/>
  <text x="658" y="108" font-size="12" fill="#333">435 kN</text>

  <!-- foundation reactions -->
  <line x1="180" y1="462" x2="180" y2="412" stroke="#2f7d32" stroke-width="2.5" marker-end="url(#mg7)"/>
  <text x="180" y="482" font-size="12.5" fill="#2f7d32" text-anchor="middle" font-weight="bold">arrancamiento: T_ye·senθ = 995 kN</text>
  <text x="180" y="497" font-size="11" fill="#555" text-anchor="middle">(el análisis pedía 292 — pernos y fundación ×3.4)</text>
  <line x1="620" y1="412" x2="620" y2="452" stroke="#b02a1a" stroke-width="2" marker-end="url(#mr7)"/>
  <text x="620" y="472" font-size="12" fill="#b02a1a" text-anchor="middle">126 kN</text>

  <!-- side note -->
  <text x="810" y="180" font-size="12" fill="#333" font-weight="bold">la cadena completa:</text>
  <text x="810" y="200" font-size="11.5" fill="#2f7d32">fusible → T_ye</text>
  <text x="810" y="218" font-size="11.5" fill="#555">conexión → resiste T_ye</text>
  <text x="810" y="236" font-size="11.5" fill="#b35c0e">viga puntal → 1304 kNm</text>
  <text x="810" y="254" font-size="11.5" fill="#333">columnas → 435 kN</text>
  <text x="810" y="272" font-size="11.5" fill="#2f7d32">anclaje → 995 kN</text>
  <text x="810" y="296" font-size="11.5" fill="#b02a1a" font-weight="bold">y el análisis elástico</text>
  <text x="810" y="312" font-size="11.5" fill="#b02a1a" font-weight="bold">no ve ninguna de estas</text>

  <text x="470" y="446" font-size="12" text-anchor="middle" fill="#333" font-weight="bold" opacity="0">.</text>
</svg>
