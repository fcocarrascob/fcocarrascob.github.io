<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ma6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <pattern id="hatch6" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#999" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El marco chevron y la ley de sus diagonales: el fusible con todo a la vista</text>

  <!-- ═══ panel (a): el marco ═══ -->
  <text x="235" y="60" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(a) el marco (geometría 3-4-5)</text>

  <!-- ground -->
  <rect x="60" y="380" width="360" height="14" fill="url(#hatch6)"/>
  <line x1="60" y1="380" x2="420" y2="380" stroke="#333" stroke-width="1.5"/>

  <!-- nodes: A(100,380) B(370,380) C(100,200) D(370,200) E(235,200) -->
  <!-- columns -->
  <line x1="100" y1="380" x2="100" y2="200" stroke="#555" stroke-width="3"/>
  <line x1="370" y1="380" x2="370" y2="200" stroke="#555" stroke-width="3"/>
  <!-- beam -->
  <line x1="100" y1="200" x2="370" y2="200" stroke="#555" stroke-width="3"/>
  <!-- braces -->
  <line x1="100" y1="380" x2="235" y2="200" stroke="#b02a1a" stroke-width="3.2"/>
  <line x1="370" y1="380" x2="235" y2="200" stroke="#b02a1a" stroke-width="3.2"/>

  <!-- pins -->
  <circle cx="100" cy="380" r="5" fill="#fff" stroke="#333" stroke-width="1.6"/>
  <circle cx="370" cy="380" r="5" fill="#fff" stroke="#333" stroke-width="1.6"/>
  <circle cx="100" cy="200" r="4" fill="#fff" stroke="#555" stroke-width="1.4"/>
  <circle cx="370" cy="200" r="4" fill="#fff" stroke="#555" stroke-width="1.4"/>
  <circle cx="235" cy="200" r="5" fill="#1a63a8" stroke="#fff" stroke-width="1.4"/>

  <!-- labels -->
  <text x="88" y="398" font-size="12" fill="#333" text-anchor="end">A</text>
  <text x="382" y="398" font-size="12" fill="#333">B</text>
  <text x="88" y="194" font-size="12" fill="#333" text-anchor="end">C</text>
  <text x="382" y="194" font-size="12" fill="#333">D</text>
  <text x="235" y="186" font-size="12.5" fill="#1a63a8" text-anchor="middle" font-weight="bold">E (masa M)</text>
  <text x="150" y="300" font-size="12" fill="#b02a1a" font-weight="bold" transform="rotate(-53 150 300)">Ld = 5 m</text>
  <text x="120" y="290" font-size="11.5" fill="#555" transform="rotate(-90 120 290)">h = 4 m</text>
  <text x="235" y="424" font-size="11.5" fill="#555" text-anchor="middle">L = 6 m</text>
  <line x1="100" y1="412" x2="370" y2="412" stroke="#999" stroke-width="1" marker-start="url(#ma6)" marker-end="url(#ma6)"/>

  <!-- lateral load arrow at E -->
  <line x1="168" y1="164" x2="228" y2="164" stroke="#1a63a8" stroke-width="2" marker-end="url(#ma6)"/>
  <text x="162" y="168" font-size="12" fill="#1a63a8" text-anchor="end" font-weight="bold">V</text>

  <!-- key facts -->
  <text x="235" y="440" font-size="11" fill="#555" text-anchor="middle">todo rotulado: la resistencia lateral es 100 % de las diagonales;</text>
  <text x="235" y="454" font-size="11" fill="#555" text-anchor="middle">viga y columnas fuertes (elásticas declaradas)</text>

  <!-- ═══ panel (b): la ley del link ═══ -->
  <text x="690" y="60" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">(b) la ley de cada diagonal (link axial calibrado)</text>

  <!-- axes -->
  <line x1="500" y1="270" x2="900" y2="270" stroke="#333" stroke-width="1.3" marker-end="url(#ma6)"/>
  <line x1="620" y1="420" x2="620" y2="90" stroke="#333" stroke-width="1.3" marker-end="url(#ma6)"/>
  <text x="896" y="288" font-size="11.5" fill="#333" text-anchor="end">alargamiento d</text>
  <text x="612" y="86" font-size="11.5" fill="#333" text-anchor="end">P</text>

  <!-- tension branch: elastic to (680,140), plateau to (890,140) -->
  <polyline points="620,270 680,140 890,140" fill="none" stroke="#b02a1a" stroke-width="3"/>
  <!-- compression branch: elastic to (596,322), degrade to (560,395)->wait shape: peak at -Pne then residual -->
  <polyline points="620,270 596,322 560,352 510,352" fill="none" stroke="#b02a1a" stroke-width="3"/>

  <!-- reference lines -->
  <line x1="620" y1="140" x2="890" y2="140" stroke="#999" stroke-width="0.9" stroke-dasharray="4 3"/>
  <line x1="510" y1="322" x2="620" y2="322" stroke="#999" stroke-width="0.9" stroke-dasharray="4 3"/>
  <line x1="510" y1="352" x2="620" y2="352" stroke="#999" stroke-width="0.9" stroke-dasharray="4 3"/>

  <text x="626" y="134" font-size="12" fill="#1c7c3c" font-weight="bold">T_ye = R_y·F_y·A_g  (tracción esperada)</text>
  <text x="588" y="314" font-size="12" fill="#b02a1a" text-anchor="end" font-weight="bold">−P_ne = −1.14·F_cre·A_g</text>
  <text x="614" y="366" font-size="12" fill="#e67e22" text-anchor="end" font-weight="bold">−0.3·P_ne (residual)</text>

  <!-- annotations -->
  <circle cx="596" cy="322" r="4" fill="#b02a1a"/>
  <text x="700" y="222" font-size="11" fill="#555">rigidez elástica k = E·A_g/L_d</text>
  <text x="770" y="415" font-size="11" fill="#555" text-anchor="middle">capacidades esperadas del cap. 7 del libro —</text>
  <text x="770" y="431" font-size="11" fill="#555" text-anchor="middle">las mismas del Post 4 que viene</text>

  <!-- takeaway -->
  <text x="470" y="467" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">Diseño: diagonales elásticas + espectro NCh2369/R → perfil. Capacidad: la misma geometría con esta ley → pushover.</text>
</svg>
