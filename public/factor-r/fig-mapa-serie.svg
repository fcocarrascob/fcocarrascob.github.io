<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="mb3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <marker id="mg3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f7d32"/>
    </marker>
  </defs>
  <rect width="940" height="340" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El mapa de la serie: cada mitad de R se mide en un experimento distinto</text>

  <text x="470" y="72" font-size="24" text-anchor="middle" fill="#333" font-weight="bold">R  =  <tspan fill="#1a63a8">R_μ</tspan>  ·  <tspan fill="#2f7d32">Ω₀</tspan></text>

  <line x1="430" y1="82" x2="300" y2="106" stroke="#1a63a8" stroke-width="1.6" marker-end="url(#mb3)"/>
  <line x1="522" y1="82" x2="660" y2="106" stroke="#2f7d32" stroke-width="1.6" marker-end="url(#mg3)"/>

  <!-- left box -->
  <rect x="70" y="112" width="390" height="150" rx="8" fill="#1a63a8" fill-opacity="0.07" stroke="#1a63a8" stroke-width="1.4"/>
  <text x="265" y="140" font-size="13.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">R_μ — reducción por ductilidad</text>
  <text x="265" y="166" font-size="12" text-anchor="middle" fill="#333">Vive en el comportamiento histerético del material:</text>
  <text x="265" y="184" font-size="12" text-anchor="middle" fill="#333">cuánta demanda elástica absorbe la fluencia.</text>
  <text x="265" y="210" font-size="12" text-anchor="middle" fill="#555">Se mide con un oscilador de 1 GDL elastoplástico</text>
  <text x="265" y="228" font-size="12" text-anchor="middle" fill="#555">bajo un registro real (tiempo-historia no lineal).</text>
  <text x="265" y="252" font-size="12.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">→ Post 2</text>

  <!-- right box -->
  <rect x="480" y="112" width="390" height="150" rx="8" fill="#2f7d32" fill-opacity="0.07" stroke="#2f7d32" stroke-width="1.4"/>
  <text x="675" y="140" font-size="13.5" text-anchor="middle" fill="#2f7d32" font-weight="bold">Ω₀ — sobrerresistencia</text>
  <text x="675" y="166" font-size="12" text-anchor="middle" fill="#333">Vive en el sistema: perfiles discretos, verificaciones</text>
  <text x="675" y="184" font-size="12" text-anchor="middle" fill="#333">que no son de resistencia, redundancia.</text>
  <text x="675" y="210" font-size="12" text-anchor="middle" fill="#555">Se mide con un pushover del marco diseñado</text>
  <text x="675" y="228" font-size="12" text-anchor="middle" fill="#555">con el espectro NCh2369 reducido.</text>
  <text x="675" y="252" font-size="12.5" text-anchor="middle" fill="#2f7d32" font-weight="bold">→ Post 3</text>

  <!-- bottom -->
  <text x="470" y="300" font-size="12.5" text-anchor="middle" fill="#333">Con las dos mitades medidas: <tspan font-weight="bold">Post 4</tspan> — fusibles, capacidad esperada (R_y·F_y·A_g) y la alternativa Ω₀ = 0.7·R.</text>
</svg>
