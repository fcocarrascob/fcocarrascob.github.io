<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ea2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La hipótesis de Newmark: qué deformación acompaña a la reducción de fuerza</text>

  <!-- ===== left panel: equal displacement ===== -->
  <text x="260" y="64" font-size="13.5" text-anchor="middle" fill="#333" font-weight="bold">T moderado o largo: igual desplazamiento</text>
  <text x="260" y="88" font-size="13" text-anchor="middle" fill="#1a63a8" font-weight="bold">R_μ = μ</text>

  <line x1="70" y1="390" x2="450" y2="390" stroke="#333" stroke-width="1.5" marker-end="url(#ea2)"/>
  <line x1="70" y1="390" x2="70" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#ea2)"/>

  <line x1="70" y1="160" x2="350" y2="160" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="70" y1="300" x2="350" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="64" y="164" font-size="12.5" fill="#333" text-anchor="end" font-weight="bold">V_e</text>
  <text x="64" y="304" font-size="12.5" fill="#333" text-anchor="end" font-weight="bold">V_y</text>

  <line x1="350" y1="160" x2="350" y2="390" stroke="#333" stroke-width="1.2" stroke-dasharray="4 4"/>

  <line x1="70" y1="390" x2="350" y2="160" stroke="#1a63a8" stroke-width="2.5"/>
  <polyline points="70,390 180,300 350,300" fill="none" stroke="#b02a1a" stroke-width="3"/>
  <circle cx="350" cy="160" r="4" fill="#1a63a8"/>
  <circle cx="350" cy="300" r="4" fill="#b02a1a"/>
  <text x="344" y="244" font-size="11.5" fill="#333" text-anchor="end">llegan al mismo δ</text>

  <text x="180" y="408" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">δ_y</text>
  <text x="350" y="408" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">δ_e = δ_u</text>

  <!-- ===== right panel: equal energy ===== -->
  <text x="720" y="64" font-size="13.5" text-anchor="middle" fill="#333" font-weight="bold">T corto: igual energía</text>
  <text x="720" y="88" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">R_μ = √(2μ − 1)  ⇒  μ = (R_μ² + 1)/2</text>

  <line x1="540" y1="390" x2="920" y2="390" stroke="#333" stroke-width="1.5" marker-end="url(#ea2)"/>
  <line x1="540" y1="390" x2="540" y2="110" stroke="#333" stroke-width="1.5" marker-end="url(#ea2)"/>

  <line x1="540" y1="160" x2="760" y2="160" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="540" y1="300" x2="880" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="534" y="164" font-size="12.5" fill="#333" text-anchor="end" font-weight="bold">V_e</text>
  <text x="534" y="304" font-size="12.5" fill="#333" text-anchor="end" font-weight="bold">V_y</text>

  <!-- equal areas -->
  <path d="M626,300 L760,160 L760,300 Z" fill="#1a63a8" fill-opacity="0.13"/>
  <rect x="760" y="300" width="120" height="90" fill="#b02a1a" fill-opacity="0.13"/>
  <text x="742" y="268" font-size="12.5" fill="#1a63a8" font-weight="bold" text-anchor="end">E₁</text>
  <text x="818" y="352" font-size="12.5" fill="#b02a1a" font-weight="bold">E₂</text>
  <text x="806" y="286" font-size="11.5" fill="#333">E₁ = E₂</text>

  <line x1="760" y1="160" x2="760" y2="390" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="880" y1="300" x2="880" y2="390" stroke="#333" stroke-width="1.2" stroke-dasharray="4 4"/>

  <line x1="540" y1="390" x2="760" y2="160" stroke="#1a63a8" stroke-width="2.5"/>
  <polyline points="540,390 626,300 880,300" fill="none" stroke="#b02a1a" stroke-width="3"/>
  <circle cx="760" cy="160" r="4" fill="#1a63a8"/>
  <circle cx="880" cy="300" r="4" fill="#b02a1a"/>

  <text x="626" y="408" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">δ_y</text>
  <text x="760" y="408" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">δ_e</text>
  <text x="880" y="408" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">δ_u</text>

  <!-- takeaway -->
  <text x="470" y="440" font-size="12.5" text-anchor="middle" fill="#333">El mismo recorte de fuerza cuesta distinta ductilidad según el período.</text>
  <text x="470" y="459" font-size="12.5" text-anchor="middle" fill="#333">La regla de igual desplazamiento es la hipótesis <tspan font-weight="bold">C_d = R</tspan> de NCh2369 — y deja de ser conservadora en períodos cortos.</text>
</svg>
