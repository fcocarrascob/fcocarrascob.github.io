<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 450" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="cva" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="940" height="450" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El coeficiente C_v : cuánta fluencia por corte alcanza el alma según su esbeltez</text>

  <!-- zone bands -->
  <rect x="120" y="80" width="230" height="290" fill="#1c7c3c" fill-opacity="0.09"/>
  <rect x="350" y="80" width="150" height="290" fill="#e67e22" fill-opacity="0.11"/>
  <rect x="500" y="80" width="370" height="290" fill="#b02a1a" fill-opacity="0.08"/>

  <!-- axes -->
  <line x1="120" y1="370" x2="872" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#cva)"/>
  <line x1="120" y1="370" x2="120" y2="75" stroke="#333" stroke-width="1.5" marker-end="url(#cva)"/>
  <text x="876" y="387" font-size="13" fill="#333">h / t_w</text>
  <text x="114" y="70" font-size="13" fill="#333" text-anchor="end">C_v</text>

  <!-- Cv = 1 gridline -->
  <line x1="120" y1="100" x2="872" y2="100" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="114" y="104" font-size="12.5" fill="#1c7c3c" text-anchor="end" font-weight="bold">1.0</text>

  <!-- curve: plateau Cv=1 to first threshold, inelastic (1/x) to second, elastic (1/x^2) after -->
  <polyline points="120,100 350,100" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
  <path d="M350,100 C 410,150 450,190 500,222" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
  <path d="M500,222 C 590,290 700,330 862,352" fill="none" stroke="#1a63a8" stroke-width="3.5"/>

  <!-- thresholds -->
  <line x1="350" y1="80" x2="350" y2="374" stroke="#333" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="350" y="392" font-size="11.5" fill="#333" text-anchor="middle" font-weight="bold">1.10√(k_v E/F_y)</text>
  <line x1="500" y1="80" x2="500" y2="374" stroke="#333" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="500" y="392" font-size="11.5" fill="#333" text-anchor="middle" font-weight="bold">1.37√(k_v E/F_y)</text>

  <!-- zone labels -->
  <text x="235" y="130" font-size="13" fill="#1c7c3c" text-anchor="middle" font-weight="bold">FLUENCIA</text>
  <text x="235" y="150" font-size="12" fill="#555" text-anchor="middle">alma robusta</text>
  <text x="235" y="168" font-size="12.5" fill="#1c7c3c" text-anchor="middle">C_v = 1.0</text>
  <text x="235" y="186" font-size="11.5" fill="#555" text-anchor="middle">desarrolla 0.6 F_y A_w</text>

  <text x="425" y="130" font-size="12.5" fill="#b35c0e" text-anchor="middle" font-weight="bold">PANDEO</text>
  <text x="425" y="147" font-size="12.5" fill="#b35c0e" text-anchor="middle">INELÁSTICO</text>
  <text x="425" y="167" font-size="11" fill="#555" text-anchor="middle">C_v ∝ 1/(h/t_w)</text>

  <text x="685" y="130" font-size="13" fill="#b02a1a" text-anchor="middle" font-weight="bold">PANDEO ELÁSTICO</text>
  <text x="685" y="150" font-size="12" fill="#555" text-anchor="middle">alma muy esbelta</text>
  <text x="685" y="168" font-size="11.5" fill="#b02a1a" text-anchor="middle">C_v ∝ 1/(h/t_w)²</text>

  <!-- rolled-W marker inside plateau -->
  <circle cx="235" cy="100" r="5" fill="#1c7c3c"/>
  <text x="235" y="90" font-size="11" fill="#1c7c3c" text-anchor="middle">casi todo perfil W laminado</text>

  <!-- takeaway -->
  <text x="470" y="422" font-size="12.5" text-anchor="middle" fill="#333">Misma idea que la curva de columna: la esbeltez (aquí h/t_w) decide qué fracción de la resistencia del material se aprovecha.</text>
  <text x="470" y="441" font-size="12" text-anchor="middle" fill="#555">Atiesadores transversales suben k_v → mueven los umbrales a la derecha → más alma trabaja a fluencia.</text>
</svg>
