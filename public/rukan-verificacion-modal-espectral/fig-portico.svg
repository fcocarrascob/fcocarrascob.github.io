  <line x1="70" y1="150" x2="160" y2="150" stroke="#333" stroke-width="3.5"/>
  <!-- nudos -->
  <circle cx="70" cy="235" r="3.5" fill="#333"/><circle cx="160" cy="235" r="3.5" fill="#333"/>
  <circle cx="70" cy="150" r="3.5" fill="#333"/><circle cx="160" cy="150" r="3.5" fill="#333"/>
  <!-- empotramientos -->
  <line x1="52" y1="320" x2="88" y2="320" stroke="#333" stroke-width="3"/>
  <line x1="55" y1="320" x2="47" y2="330" stroke="#333"/><line x1="63" y1="320" x2="55" y2="330" stroke="#333"/>
  <line x1="71" y1="320" x2="63" y2="330" stroke="#333"/><line x1="79" y1="320" x2="71" y2="330" stroke="#333"/><line x1="87" y1="320" x2="79" y2="330" stroke="#333"/>
  <line x1="142" y1="320" x2="178" y2="320" stroke="#333" stroke-width="3"/>
  <line x1="145" y1="320" x2="137" y2="330" stroke="#333"/><line x1="153" y1="320" x2="145" y2="330" stroke="#333"/>
  <line x1="161" y1="320" x2="153" y2="330" stroke="#333"/><line x1="169" y1="320" x2="161" y2="330" stroke="#333"/><line x1="177" y1="320" x2="169" y2="330" stroke="#333"/>
  <!-- masas -->
  <rect x="103" y="225" width="24" height="14" rx="2" fill="#c77d11"/>
  <text x="115" y="235.5" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">10 t</text>
  <rect x="104" y="140" width="22" height="14" rx="2" fill="#c77d11"/>
  <text x="115" y="150.5" font-size="10" text-anchor="middle" fill="#fff" font-weight="bold">8 t</text>
  <!-- cotas -->
  <text x="44" y="192" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 44 192)">4 m</text>
  <text x="44" y="278" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 44 278)">4 m</text>
  <text x="115" y="345" font-size="10.5" text-anchor="middle" fill="#555">6 m</text>
  <text x="115" y="366" font-size="12" text-anchor="middle" fill="#222" font-weight="bold">modelo</text>

  <!-- ===================== PANEL B: modo 1 ===================== -->
  <!-- sin deformar (referencia) -->
  <line x1="280" y1="320" x2="280" y2="150" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="370" y1="320" x2="370" y2="150" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- deformada -->
  <path d="M280,320 Q283,275 295.5,235 Q305,192 314,150" fill="none" stroke="#b02a1a" stroke-width="3"/>
  <path d="M370,320 Q373,275 385.5,235 Q395,192 404,150" fill="none" stroke="#b02a1a" stroke-width="3"/>
