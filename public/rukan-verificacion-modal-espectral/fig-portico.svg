  <!-- ===================== PANEL A: geometría ===================== -->
  <!-- columnas -->
  <line x1="70" y1="320" x2="70" y2="150" stroke="#333" stroke-width="3.5"/>
  <line x1="160" y1="320" x2="160" y2="150" stroke="#333" stroke-width="3.5"/>
