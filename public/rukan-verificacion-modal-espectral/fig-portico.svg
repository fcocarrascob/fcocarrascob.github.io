  <circle cx="314" cy="150" r="3.5" fill="#b02a1a"/><circle cx="404" cy="150" r="3.5" fill="#b02a1a"/>
  <text x="322" y="243" font-size="10" fill="#b02a1a">+0.46</text>
  <text x="410" y="150" font-size="10" fill="#b02a1a">+1.00</text>
  <text x="342" y="366" font-size="12" text-anchor="middle" fill="#b02a1a" font-weight="bold">modo 1 · T=0.526 s · 87% masa</text>

  <!-- ===================== PANEL C: modo 2 ===================== -->
  <line x1="490" y1="320" x2="490" y2="150" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4 3"/>
