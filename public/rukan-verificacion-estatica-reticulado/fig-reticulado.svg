<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="Segoe UI, Arial, sans-serif">
  <rect width="560" height="380" fill="#ffffff"/>
  <text x="280" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Caso 3 · reticulado triangular isostático</text>

  <defs>
    <marker id="t3dn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="t3up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f7d32"/>
    </marker>
  </defs>

  <!-- barras: diagonales en compresión (rojo), cordón en tracción (azul) -->
  <line x1="120" y1="280" x2="270" y2="130" stroke="#b02a1a" stroke-width="4.5"/>
  <line x1="270" y1="130" x2="420" y2="280" stroke="#b02a1a" stroke-width="4.5"/>
  <line x1="120" y1="280" x2="420" y2="280" stroke="#1a63a8" stroke-width="4.5"/>

  <!-- nudos -->
  <circle cx="120" cy="280" r="5.5" fill="#333"/>
  <circle cx="420" cy="280" r="5.5" fill="#333"/>
  <circle cx="270" cy="130" r="5.5" fill="#333"/>
  <text x="104" y="276" font-size="13" fill="#222" font-weight="bold">A</text>
  <text x="430" y="276" font-size="13" fill="#222" font-weight="bold">B</text>
  <text x="270" y="118" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">C</text>

  <!-- carga P en el vértice -->
  <line x1="270" y1="60" x2="270" y2="122" stroke="#b02a1a" stroke-width="3.5" marker-end="url(#t3dn)"/>
  <text x="284" y="78" font-size="12.5" fill="#b02a1a" font-weight="bold">P = 100 kN</text>

  <!-- etiquetas de fuerza -->
  <text x="168" y="196" font-size="12.5" text-anchor="middle" fill="#b02a1a" transform="rotate(-45 168 196)">−70,7 kN (C)</text>
  <text x="372" y="196" font-size="12.5" text-anchor="middle" fill="#b02a1a" transform="rotate(45 372 196)">−70,7 kN (C)</text>
  <text x="270" y="303" font-size="12.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">+50,0 kN (T)</text>

  <!-- apoyo fijo (rótula) en A -->
  <path d="M120,286 L106,308 L134,308 Z" fill="none" stroke="#333" stroke-width="2"/>
  <g stroke="#555" stroke-width="1.3">
    <line x1="106" y1="308" x2="98" y2="318"/>
    <line x1="118" y1="308" x2="110" y2="318"/>
    <line x1="130" y1="308" x2="122" y2="318"/>
    <line x1="140" y1="308" x2="132" y2="318"/>
  </g>

  <!-- apoyo móvil (rodillo) en B -->
  <path d="M420,286 L406,306 L434,306 Z" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="411" cy="311" r="3.5" fill="none" stroke="#333" stroke-width="1.6"/>
  <circle cx="429" cy="311" r="3.5" fill="none" stroke="#333" stroke-width="1.6"/>
  <line x1="402" y1="316" x2="438" y2="316" stroke="#333" stroke-width="1.6"/>

  <!-- reacciones -->
  <line x1="120" y1="352" x2="120" y2="325" stroke="#2f7d32" stroke-width="2.6" marker-end="url(#t3up)"/>
  <line x1="420" y1="352" x2="420" y2="325" stroke="#2f7d32" stroke-width="2.6" marker-end="url(#t3up)"/>
  <text x="120" y="368" font-size="11.5" text-anchor="middle" fill="#2f7d32">50 kN</text>
  <text x="420" y="368" font-size="11.5" text-anchor="middle" fill="#2f7d32">50 kN</text>

  <!-- cotas -->
  <text x="270" y="336" font-size="11" text-anchor="middle" fill="#555">b = 6 m</text>
  <text x="450" y="208" font-size="11" text-anchor="middle" fill="#555">h = 3 m</text>
</svg>
