<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="340" fill="#ffffff"/>
  <line x1="392" y1="20" x2="392" y2="320" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ═══ (a) El modelo ═══ -->
  <text x="200" y="26" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a1a1a">(a) Pórtico plano paramétrico</text>

  <!-- suelo -->
  <line x1="55" y1="290" x2="345" y2="290" stroke="#1a1a1a" stroke-width="1.5"/>
  <g stroke="#9ca3af" stroke-width="1">
    <line x1="66" y1="290" x2="58" y2="300"/><line x1="86" y1="290" x2="78" y2="300"/>
    <line x1="106" y1="290" x2="98" y2="300"/><line x1="126" y1="290" x2="118" y2="300"/>
    <line x1="146" y1="290" x2="138" y2="300"/><line x1="166" y1="290" x2="158" y2="300"/>
    <line x1="186" y1="290" x2="178" y2="300"/><line x1="206" y1="290" x2="198" y2="300"/>
    <line x1="226" y1="290" x2="218" y2="300"/><line x1="246" y1="290" x2="238" y2="300"/>
    <line x1="266" y1="290" x2="258" y2="300"/><line x1="286" y1="290" x2="278" y2="300"/>
    <line x1="306" y1="290" x2="298" y2="300"/><line x1="326" y1="290" x2="318" y2="300"/>
  </g>

  <!-- columnas del portico (empotradas) -->
  <line x1="100" y1="290" x2="100" y2="110" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="230" y1="290" x2="230" y2="110" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- vigas -->
  <line x1="100" y1="110" x2="230" y2="110" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="100" y1="170" x2="230" y2="170" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="100" y1="230" x2="230" y2="230" stroke="#1a1a1a" stroke-width="2"/>

  <!-- leaning column: tramos pin-pin + conectores -->
  <line x1="310" y1="290" x2="310" y2="110" stroke="#6b7280" stroke-width="2"/>
  <circle cx="310" cy="284" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <circle cx="310" cy="236" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <circle cx="310" cy="224" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <circle cx="310" cy="176" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <circle cx="310" cy="164" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <circle cx="310" cy="116" r="3.2" fill="#ffffff" stroke="#6b7280" stroke-width="1.2"/>
  <line x1="230" y1="110" x2="310" y2="110" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="230" y1="170" x2="310" y2="170" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="230" y1="230" x2="310" y2="230" stroke="#9ca3af" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="312" y="100" text-anchor="middle" font-size="9.5" fill="#6b7280">columna</text>
  <text x="312" y="90" text-anchor="middle" font-size="9.5" fill="#6b7280">gravitacional</text>

  <!-- gravedad por piso -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="100" y1="82" x2="100" y2="104" marker-end="url(#ai)"/>
    <line x1="230" y1="82" x2="230" y2="104" marker-end="url(#ai)"/>
  </g>
  <line x1="310" y1="82" x2="310" y2="104" stroke="#6b7280" stroke-width="1.5" marker-end="url(#am)"/>
  <text x="165" y="76" text-anchor="middle" font-size="10.5" fill="#1a1a1a">(1−f<tspan font-size="8" dy="2">lean</tspan><tspan dy="-2">)·P/2 por columna</tspan></text>
  <text x="322" y="76" text-anchor="middle" font-size="10.5" fill="#6b7280">f<tspan font-size="8" dy="2">lean</tspan><tspan dy="-2">·P</tspan></text>

  <!-- patron lateral triangular -->
  <g stroke="#2563eb" stroke-width="1.6">
    <line x1="52" y1="110" x2="92" y2="110" marker-end="url(#aa)"/>
    <line x1="62" y1="170" x2="92" y2="170" marker-end="url(#aa)"/>
    <line x1="72" y1="230" x2="92" y2="230" marker-end="url(#aa)"/>
  </g>
  <text x="52" y="98" font-size="10.5" fill="#1d4ed8">patrón LAT</text>

  <!-- dimensiones -->
  <line x1="240" y1="230" x2="240" y2="290" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="248" y="264" font-size="10.5" font-style="italic" fill="#1a1a1a">h</text>
  <line x1="100" y1="312" x2="230" y2="312" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="165" y="328" text-anchor="middle" font-size="10.5" font-style="italic" fill="#1a1a1a">L</text>
  <text x="165" y="128" text-anchor="middle" font-size="10.5" fill="#1a1a1a">ρ = (I<tspan font-size="8" dy="2">b</tspan><tspan dy="-2">/L)/(I</tspan><tspan font-size="8" dy="2">c</tspan><tspan dy="-2">/h)</tspan></text>

  <!-- ═══ (b) Esquema de casos ═══ -->
  <text x="576" y="26" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a1a1a">(b) Casos por modelo (uno por geometría)</text>

  <rect x="420" y="44" width="145" height="40" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="492" y="61" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a1a1a">LAT — lineal</text>
  <text x="492" y="76" text-anchor="middle" font-size="10" fill="#6b7280">Δ₁, momentos M₁</text>

  <rect x="590" y="44" width="145" height="40" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="662" y="61" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1a1a1a">BUCK — pandeo</text>
  <text x="662" y="76" text-anchor="middle" font-size="10" fill="#6b7280">λ<tspan font-size="8" dy="2">cr</tspan><tspan dy="-2"> del modo de sway</tspan></text>

  <rect x="420" y="128" width="315" height="42" rx="6" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-width="1.2"/>
  <text x="577" y="145" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1d4ed8">GRAV_θ — no lineal P-Delta, solo gravedad ×s<tspan font-size="8" dy="2">θ</tspan></text>
  <text x="577" y="161" text-anchor="middle" font-size="10" fill="#1d4ed8">s<tspan font-size="8" dy="2">θ</tspan><tspan dy="-2"> escala P para calzar θ (despeje lineal desde Δ₁)</tspan></text>

  <rect x="420" y="196" width="315" height="42" rx="6" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-width="1.2"/>
  <text x="577" y="213" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1d4ed8">LAT2_θ — LINEAL sobre la rigidez de GRAV_θ</text>
  <text x="577" y="229" text-anchor="middle" font-size="10" fill="#1d4ed8">mismo patrón LAT → Δ₂, M₂</text>

  <line x1="577" y1="170" x2="577" y2="192" stroke="#2563eb" stroke-width="1.4" marker-end="url(#aa)"/>
  <text x="585" y="185" font-size="9.5" fill="#6b7280">rigidez K(P)</text>

  <rect x="420" y="266" width="315" height="44" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="577" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a">α = Δ₂/Δ₁ por piso  (× 8 niveles de θ)</text>
  <text x="577" y="301" text-anchor="middle" font-size="10" fill="#6b7280">vs 1/(1−θ) · B₂ · 1/(1−1/λ<tspan font-size="8" dy="2">cr</tspan><tspan dy="-2">)</tspan></text>

  <line x1="577" y1="238" x2="577" y2="262" stroke="#1a1a1a" stroke-width="1.4" marker-end="url(#ai)"/>
  <polyline points="445,84 445,100 406,100 406,288 414,288" fill="none" stroke="#6b7280" stroke-width="1.1" marker-end="url(#am)"/>
  <polyline points="710,84 710,100 749,100 749,288 741,288" fill="none" stroke="#6b7280" stroke-width="1.1" marker-end="url(#am)"/>
</svg>
