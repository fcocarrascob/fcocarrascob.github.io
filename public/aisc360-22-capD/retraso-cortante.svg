<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 410" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ua" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="ur" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="410" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Retraso de cortante: sólo parte de la sección está conectada</text>

  <!-- ===== LEFT: cross-section of angle, x-bar ===== -->
  <g>
    <text x="215" y="66" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Sección del ángulo</text>
    <!-- gusset (connection plane) -->
    <rect x="120" y="100" width="10" height="180" fill="#5b6470" fill-opacity="0.35"/>
    <text x="112" y="300" font-size="11" fill="#5b6470" text-anchor="middle">plancha</text>
    <!-- angle: connected (vertical) leg + free (horizontal) leg -->
    <rect x="130" y="100" width="20" height="170" fill="#1c7c3c" fill-opacity="0.18" stroke="#1c7c3c" stroke-width="2"/>
    <rect x="130" y="250" width="130" height="20" fill="#b02a1a" fill-opacity="0.12" stroke="#b02a1a" stroke-width="2"/>
    <text x="140" y="130" font-size="11.5" fill="#1c7c3c" transform="rotate(90 140,130)">ala conectada</text>
    <text x="205" y="264" font-size="11.5" fill="#b02a1a" text-anchor="middle">ala libre — retrasa</text>
    <!-- centroid -->
    <circle cx="185" cy="205" r="5" fill="#333"/>
    <text x="192" y="200" font-size="11.5" fill="#333">centroide</text>
    <!-- x-bar dim: connection plane (x=140) to centroid (x=185) -->
    <line x1="140" y1="320" x2="185" y2="320" stroke="#666" stroke-width="1" marker-start="url(#ua)" marker-end="url(#ua)"/>
    <line x1="140" y1="270" x2="140" y2="326" stroke="#888" stroke-width="0.8" stroke-dasharray="3 3"/>
    <line x1="185" y1="205" x2="185" y2="326" stroke="#888" stroke-width="0.8" stroke-dasharray="3 3"/>
    <text x="162" y="340" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">x̄</text>
  </g>

  <!-- divider -->
  <line x1="330" y1="80" x2="330" y2="340" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== RIGHT: elevation of connection, length l ===== -->
  <g>
    <text x="620" y="66" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Elevación de la conexión</text>
    <!-- connected leg strip -->
    <rect x="400" y="120" width="380" height="60" fill="#1c7c3c" fill-opacity="0.12" stroke="#1c7c3c" stroke-width="1.6"/>
    <!-- bolts -->
    <circle cx="470" cy="150" r="9" fill="#ffffff" stroke="#5b6470" stroke-width="1.6"/>
    <circle cx="570" cy="150" r="9" fill="#ffffff" stroke="#5b6470" stroke-width="1.6"/>
    <circle cx="670" cy="150" r="9" fill="#ffffff" stroke="#5b6470" stroke-width="1.6"/>
    <!-- P arrow (pulled to the right) -->
    <line x1="780" y1="150" x2="850" y2="150" stroke="#666" stroke-width="2.5" marker-end="url(#ua)"/>
    <text x="855" y="155" font-size="13" fill="#666">P</text>
    <!-- stress crowding: red arrows converging into bolts -->
    <g stroke="#b02a1a" stroke-width="1.6">
      <line x1="720" y1="132" x2="682" y2="146" marker-end="url(#ur)"/>
      <line x1="720" y1="168" x2="682" y2="154" marker-end="url(#ur)"/>
    </g>
    <text x="740" y="205" font-size="11.5" fill="#b02a1a" text-anchor="middle">la fuerza se agolpa en los pernos</text>
    <!-- l dimension: first to last bolt -->
    <line x1="470" y1="205" x2="670" y2="205" stroke="#666" stroke-width="1" marker-start="url(#ua)" marker-end="url(#ua)"/>
    <text x="570" y="222" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">l</text>
    <text x="570" y="240" font-size="11.5" fill="#555" text-anchor="middle">largo de la conexión</text>
  </g>

  <!-- formula band -->
  <rect x="250" y="300" width="440" height="46" rx="8" fill="#f2f6fb" stroke="#1a63a8"/>
  <text x="365" y="329" font-size="16" fill="#1a63a8" text-anchor="middle" font-weight="bold">U = 1 − x̄ / l</text>
  <line x1="470" y1="308" x2="470" y2="338" stroke="#1a63a8" stroke-width="1" opacity="0.4"/>
  <text x="585" y="329" font-size="16" fill="#1a63a8" text-anchor="middle" font-weight="bold">A_e = A_n · U</text>

  <!-- takeaway -->
  <text x="470" y="374" font-size="12.5" text-anchor="middle" fill="#333">Como no todos los elementos se conectan, la tensión no alcanza a repartirse: el área efectiva baja.</text>
  <text x="470" y="395" font-size="12.5" text-anchor="middle" fill="#555">Menos excentricidad x̄ o conexión más larga l → U más cerca de 1 → menos penalización.</text>
</svg>
