<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 410" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="sa2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="sr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="410" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Soldadura de filete (J2): falla por la garganta, y gana resistencia con el ángulo</text>

  <!-- divider -->
  <line x1="410" y1="55" x2="410" y2="350" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== LEFT: cross-section geometry ===== -->
  <g>
    <text x="205" y="72" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">La garganta es el plano de falla</text>
    <!-- vertical plate -->
    <rect x="120" y="100" width="26" height="200" fill="#efece6" stroke="#8a857c"/>
    <!-- horizontal plate -->
    <rect x="120" y="274" width="200" height="26" fill="#efece6" stroke="#8a857c"/>
    <!-- fillet weld triangle -->
    <polygon points="146,274 146,190 230,274" fill="#1a63a8" fill-opacity="0.18" stroke="#1a63a8" stroke-width="1.6"/>
    <!-- legs w -->
    <line x1="134" y1="190" x2="134" y2="274" stroke="#666" stroke-width="1" marker-start="url(#sa2)" marker-end="url(#sa2)"/>
    <text x="124" y="235" font-size="12" fill="#666" text-anchor="end">w</text>
    <line x1="146" y1="288" x2="230" y2="288" stroke="#666" stroke-width="1" marker-start="url(#sa2)" marker-end="url(#sa2)"/>
    <text x="188" y="303" font-size="12" fill="#666" text-anchor="middle">w</text>
    <!-- throat line (45 deg, from corner-ish to hypotenuse midpoint) -->
    <line x1="146" y1="274" x2="188" y2="232" stroke="#b02a1a" stroke-width="2.5" stroke-dasharray="5 3"/>
    <text x="205" y="205" font-size="12" fill="#b02a1a" font-weight="bold">garganta</text>
    <text x="205" y="221" font-size="12.5" fill="#b02a1a" font-weight="bold">= 0.707 w</text>
    <text x="205" y="345" font-size="11.5" fill="#333" text-anchor="middle">R_n = F_nw · A_we</text>
    <text x="205" y="362" font-size="11" fill="#555" text-anchor="middle">A_we = garganta × longitud</text>
  </g>

  <!-- ===== RIGHT: angle bonus ===== -->
  <g>
    <text x="675" y="72" font-size="13" text-anchor="middle" fill="#222" font-weight="bold">La resistencia sube con el ángulo de carga</text>
    <text x="675" y="92" font-size="12" fill="#333" text-anchor="middle">F_nw = 0.60 F_EXX (1 + 0.50 sin¹·⁵θ)</text>

    <!-- longitudinal case -->
    <g>
      <rect x="450" y="120" width="120" height="20" fill="#efece6" stroke="#8a857c"/>
      <rect x="450" y="140" width="120" height="10" fill="#1a63a8" fill-opacity="0.3" stroke="#1a63a8"/>
      <line x1="450" y1="130" x2="410" y2="130" stroke="#666" stroke-width="2" marker-end="url(#sa2)"/>
      <text x="585" y="128" font-size="11.5" fill="#333" font-weight="bold">longitudinal (θ = 0°)</text>
      <text x="585" y="144" font-size="11.5" fill="#333">F_nw = 0.60 F_EXX</text>
    </g>

    <!-- transversal case -->
    <g>
      <rect x="450" y="185" width="120" height="20" fill="#efece6" stroke="#8a857c"/>
      <rect x="450" y="205" width="120" height="10" fill="#b02a1a" fill-opacity="0.3" stroke="#b02a1a"/>
      <line x1="510" y1="230" x2="510" y2="266" stroke="#666" stroke-width="2" marker-end="url(#sa2)"/>
      <text x="585" y="200" font-size="11.5" fill="#333" font-weight="bold">transversal (θ = 90°)</text>
      <text x="585" y="216" font-size="11.5" fill="#b02a1a" font-weight="bold">F_nw = 0.90 F_EXX  (+50%)</text>
    </g>

    <!-- mini curve Fnw/0.6FEXX vs theta -->
    <g>
      <line x1="470" y1="360" x2="870" y2="360" stroke="#333" stroke-width="1.2" marker-end="url(#sa2)"/>
      <line x1="470" y1="360" x2="470" y2="285" stroke="#333" stroke-width="1.2" marker-end="url(#sa2)"/>
      <text x="875" y="364" font-size="11" fill="#333">θ</text>
      <text x="464" y="292" font-size="10.5" fill="#333" text-anchor="end">F_nw</text>
      <!-- curve from (0, 1.0x) to (90, 1.5x) -->
      <path d="M470,340 C 620,336 760,315 860,300" fill="none" stroke="#1a63a8" stroke-width="2.5"/>
      <line x1="466" y1="340" x2="474" y2="340" stroke="#333" stroke-width="1"/>
      <text x="462" y="344" font-size="10" fill="#555" text-anchor="end">1.0×</text>
      <line x1="466" y1="300" x2="474" y2="300" stroke="#333" stroke-width="1"/>
      <text x="462" y="304" font-size="10" fill="#b02a1a" text-anchor="end">1.5×</text>
      <line x1="470" y1="356" x2="470" y2="364" stroke="#333" stroke-width="1"/>
      <text x="470" y="378" font-size="10" fill="#555" text-anchor="middle">0°</text>
      <line x1="860" y1="356" x2="860" y2="364" stroke="#333" stroke-width="1"/>
      <text x="860" y="378" font-size="10" fill="#555" text-anchor="middle">90°</text>
    </g>
  </g>
</svg>
