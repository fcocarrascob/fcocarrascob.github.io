<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ba2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="br2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Los estados límite del perno (J3)</text>

  <!-- dividers -->
  <line x1="240" y1="50" x2="240" y2="330" stroke="#e5e2dc" stroke-width="1.5"/>
  <line x1="470" y1="50" x2="470" y2="330" stroke="#e5e2dc" stroke-width="1.5"/>
  <line x1="700" y1="50" x2="700" y2="330" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- ===== 1. Corte ===== -->
  <g>
    <text x="120" y="70" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">Corte</text>
    <!-- two plates, one over other, bolt through, pulled opposite -->
    <rect x="45" y="120" width="150" height="26" fill="#efece6" stroke="#8a857c"/>
    <rect x="45" y="146" width="150" height="26" fill="#e5e2dc" stroke="#8a857c"/>
    <!-- bolt -->
    <rect x="108" y="108" width="16" height="76" rx="3" fill="#5b6470"/>
    <!-- shear plane -->
    <line x1="70" y1="146" x2="170" y2="146" stroke="#b02a1a" stroke-width="2.5"/>
    <!-- pull arrows -->
    <line x1="45" y1="133" x2="15" y2="133" stroke="#666" stroke-width="2" marker-end="url(#ba2)"/>
    <line x1="195" y1="159" x2="225" y2="159" stroke="#666" stroke-width="2" marker-end="url(#ba2)"/>
    <text x="120" y="215" font-size="12" fill="#b02a1a" text-anchor="middle">el perno se corta</text>
    <text x="120" y="232" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">R_n = F_nv · A_b</text>
    <text x="120" y="252" font-size="11" fill="#555" text-anchor="middle">rosca incluida (N) o</text>
    <text x="120" y="267" font-size="11" fill="#555" text-anchor="middle">excluida (X): Tabla J3.2</text>
  </g>

  <!-- ===== 2. Tracción ===== -->
  <g>
    <text x="355" y="70" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">Tracción</text>
    <!-- flange + hanging bolt pulled down -->
    <rect x="300" y="110" width="110" height="20" fill="#efece6" stroke="#8a857c"/>
    <!-- bolt shank pulled down -->
    <rect x="347" y="110" width="16" height="70" rx="3" fill="#5b6470"/>
    <rect x="337" y="96" width="36" height="16" rx="2" fill="#5b6470"/>
    <line x1="355" y1="180" x2="355" y2="215" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#br2)"/>
    <text x="355" y="235" font-size="12" fill="#b02a1a" text-anchor="middle">el perno se estira / rompe</text>
    <text x="355" y="255" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">R_n = F_nt · A_b</text>
    <text x="355" y="277" font-size="11" fill="#555" text-anchor="middle">corte+tracción: F_nt' reducido</text>
    <text x="355" y="292" font-size="11" fill="#555" text-anchor="middle">(Ec. J3-3a)</text>
  </g>

  <!-- ===== 3. Aplastamiento / desgarre ===== -->
  <g>
    <text x="585" y="70" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">Aplastamiento + desgarre</text>
    <!-- plate with hole near edge, bolt bearing -->
    <rect x="510" y="110" width="150" height="70" fill="#efece6" stroke="#8a857c"/>
    <circle cx="600" cy="145" r="13" fill="#ffffff" stroke="#5b6470" stroke-width="1.6"/>
    <rect x="592" y="132" width="16" height="26" rx="3" fill="#5b6470"/>
    <!-- bolt pushing left; plate reaction -->
    <line x1="600" y1="145" x2="560" y2="145" stroke="#b02a1a" stroke-width="2" marker-end="url(#br2)"/>
    <!-- tearout path to edge (left) -->
    <line x1="587" y1="132" x2="510" y2="132" stroke="#b02a1a" stroke-width="2" stroke-dasharray="3 2"/>
    <line x1="587" y1="158" x2="510" y2="158" stroke="#b02a1a" stroke-width="2" stroke-dasharray="3 2"/>
    <!-- lc dim -->
    <line x1="510" y1="195" x2="587" y2="195" stroke="#666" stroke-width="1" marker-start="url(#ba2)" marker-end="url(#ba2)"/>
    <text x="548" y="210" font-size="11.5" fill="#666" text-anchor="middle">l_c</text>
    <text x="585" y="238" font-size="12" fill="#b02a1a" text-anchor="middle">la plancha se aplasta o</text>
    <text x="585" y="253" font-size="12" fill="#b02a1a" text-anchor="middle">se desgarra hacia el borde</text>
    <text x="585" y="275" font-size="11.5" fill="#333" text-anchor="middle" font-weight="bold">1.2 l_c t F_u ≤ 2.4 d t F_u</text>
  </g>

  <!-- ===== 4. Deslizamiento crítico ===== -->
  <g>
    <text x="820" y="70" font-size="13" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Deslizamiento crítico</text>
    <!-- two plates clamped, friction -->
    <rect x="745" y="122" width="150" height="24" fill="#efece6" stroke="#8a857c"/>
    <rect x="745" y="146" width="150" height="24" fill="#e5e2dc" stroke="#8a857c"/>
    <rect x="808" y="108" width="16" height="76" rx="3" fill="#5b6470"/>
    <!-- clamp arrows (pretension) -->
    <line x1="816" y1="100" x2="816" y2="118" stroke="#1c7c3c" stroke-width="2" marker-end="url(#ba2)"/>
    <line x1="816" y1="192" x2="816" y2="174" stroke="#1c7c3c" stroke-width="2" marker-end="url(#ba2)"/>
    <!-- friction marks at interface -->
    <g stroke="#1c7c3c" stroke-width="1.4">
      <line x1="760" y1="146" x2="770" y2="146"/>
      <line x1="780" y1="146" x2="790" y2="146"/>
      <line x1="840" y1="146" x2="850" y2="146"/>
      <line x1="860" y1="146" x2="870" y2="146"/>
    </g>
    <text x="820" y="215" font-size="12" fill="#1c7c3c" text-anchor="middle">la fricción resiste;</text>
    <text x="820" y="230" font-size="12" fill="#1c7c3c" text-anchor="middle">el perno no toca el agujero</text>
    <text x="820" y="252" font-size="11.5" fill="#333" text-anchor="middle" font-weight="bold">μ D_u h_f T_b n_s</text>
    <text x="820" y="272" font-size="11" fill="#555" text-anchor="middle">servicio: no desliza (Ec. J3-4)</text>
  </g>

  <!-- takeaway -->
  <text x="470" y="360" font-size="12.5" text-anchor="middle" fill="#333">Tres de los cuatro son fracturas <tspan fill="#b02a1a" font-weight="bold">frágiles</tspan> — por eso φ = 0.75. El deslizamiento crítico es de servicio: evita el movimiento antes de llegar al aplastamiento.</text>
</svg>
