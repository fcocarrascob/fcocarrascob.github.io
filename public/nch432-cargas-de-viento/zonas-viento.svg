<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Zonificación de viento de Chile (Tabla 1) — la velocidad básica V crece hacia el sur</text>

  <!-- ===== Vertical strip = Chile, N arriba / S abajo ===== -->
  <!-- Each band: [y0, y1] zone V color. Darker = more wind. -->
  <g>
    <!-- I  Norte -->
    <rect x="300" y="60" width="120" height="66" fill="#e9e4d6" stroke="#8a857c"/>
    <text x="360" y="88" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Zona I</text>
    <text x="360" y="106" font-size="11.5" text-anchor="middle" fill="#6b5a38">Norte · V = 27–30 m/s</text>
    <!-- II Centro -->
    <rect x="300" y="126" width="120" height="60" fill="#ddd0b0" stroke="#8a857c"/>
    <text x="360" y="152" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Zona II</text>
    <text x="360" y="170" font-size="11.5" text-anchor="middle" fill="#6b5a38">Centro · V = 27–35 m/s</text>
    <!-- III  -->
    <rect x="300" y="186" width="120" height="66" fill="#d0be92" stroke="#8a857c"/>
    <text x="360" y="212" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Zona III</text>
    <text x="360" y="230" font-size="11.5" text-anchor="middle" fill="#6b5a38">V = 34–35 m/s</text>
    <!-- IV -->
    <rect x="300" y="252" width="120" height="60" fill="#c3ab74" stroke="#8a857c"/>
    <text x="360" y="278" font-size="13" text-anchor="middle" fill="#333" font-weight="bold">Zona IV</text>
    <text x="360" y="296" font-size="11.5" text-anchor="middle" fill="#4a3d24">Chiloé · V = 37–40 m/s</text>
    <!-- V -->
    <rect x="300" y="312" width="120" height="60" fill="#b0954f" stroke="#8a857c"/>
    <text x="360" y="338" font-size="13" text-anchor="middle" fill="#ffffff" font-weight="bold">Zona V</text>
    <text x="360" y="356" font-size="11.5" text-anchor="middle" fill="#f3ecdc">Austral · V = 40 m/s</text>
    <!-- VI -->
    <rect x="300" y="372" width="120" height="66" fill="#8a7439" stroke="#6b5a38"/>
    <text x="360" y="400" font-size="13" text-anchor="middle" fill="#ffffff" font-weight="bold">Zona VI</text>
    <text x="360" y="418" font-size="11.5" text-anchor="middle" fill="#f3ecdc">Extremo sur · V = 44 m/s</text>
  </g>

  <!-- N/S compass -->
  <text x="360" y="52" font-size="12" text-anchor="middle" fill="#666">▲ Norte</text>
  <text x="360" y="458" font-size="12" text-anchor="middle" fill="#666">▼ Sur</text>

  <!-- Santiago marker on Zona III -->
  <line x1="420" y1="219" x2="470" y2="219" stroke="#b02a1a" stroke-width="1.5"/>
  <circle cx="420" cy="219" r="4" fill="#b02a1a"/>
  <text x="476" y="216" font-size="12" fill="#b02a1a" font-weight="bold">Santiago → III-A</text>
  <text x="476" y="232" font-size="11.5" fill="#b02a1a">V = 34 m/s, p₀ = 709 N/m²</text>

  <!-- Gradient arrow (left) -->
  <line x1="255" y1="70" x2="255" y2="428" stroke="#b35c0e" stroke-width="2"/>
  <polygon points="255,438 250,424 260,424" fill="#b35c0e"/>
  <text x="245" y="250" font-size="12" fill="#b35c0e" text-anchor="middle" transform="rotate(-90 245 250)">viento más intenso →</text>

  <!-- Sub-zones note -->
  <text x="360" y="486" font-size="11" text-anchor="middle" fill="#888">El sufijo A/B distingue por altitud (msnm): más altura, mayor V dentro de la misma zona.</text>

  <!-- ===== Non-continental (right box) ===== -->
  <g>
    <rect x="600" y="90" width="250" height="180" fill="#f7f4ee" stroke="#c9c3b6" rx="6"/>
    <text x="725" y="114" font-size="12.5" text-anchor="middle" fill="#333" font-weight="bold">Zonas no continentales</text>
    <text x="618" y="142" font-size="12" fill="#555">NC1 · Isla de Pascua</text>
    <text x="838" y="142" font-size="12" fill="#6b5a38" text-anchor="end" font-weight="bold">V = 32</text>
    <text x="618" y="172" font-size="12" fill="#555">NC2 · Juan Fernández</text>
    <text x="838" y="172" font-size="12" fill="#6b5a38" text-anchor="end" font-weight="bold">V = 50</text>
    <text x="618" y="202" font-size="12" fill="#555">NC3 · Antártica CL</text>
    <text x="838" y="202" font-size="12" fill="#4a3d24" text-anchor="end" font-weight="bold">V = 60</text>
    <text x="725" y="240" font-size="11" text-anchor="middle" fill="#888">Antártica: el viento más severo</text>
    <text x="725" y="256" font-size="11" text-anchor="middle" fill="#888">de toda la norma (V = 60 m/s).</text>
  </g>

  <text x="725" y="300" font-size="11.5" text-anchor="middle" fill="#666">V es la ráfaga de 3 s a 10 m</text>
  <text x="725" y="318" font-size="11.5" text-anchor="middle" fill="#666">sobre terreno abierto (exp. C),</text>
  <text x="725" y="336" font-size="11.5" text-anchor="middle" fill="#666">con período de retorno según</text>
  <text x="725" y="354" font-size="11.5" text-anchor="middle" fill="#666">la categoría de ocupación (Tabla 2).</text>
</svg>
