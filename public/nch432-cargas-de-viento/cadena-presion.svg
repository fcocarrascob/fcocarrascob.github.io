<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="af" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#ffffff"/>
  <text x="480" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La cadena de la NCh 432: de una velocidad a una presión sobre el edificio</text>

  <!-- Stage 1: V -->
  <rect x="30" y="70" width="120" height="80" rx="8" fill="#eef3f7" stroke="#2d6b9c"/>
  <text x="90" y="102" font-size="13" text-anchor="middle" fill="#2d6b9c" font-weight="bold">V</text>
  <text x="90" y="122" font-size="11" text-anchor="middle" fill="#446">velocidad básica</text>
  <text x="90" y="138" font-size="11" text-anchor="middle" fill="#446">(zona · Tabla 1)</text>

  <line x1="150" y1="110" x2="200" y2="110" stroke="#555" stroke-width="2" marker-end="url(#af)"/>

  <!-- Stage 2: q_z -->
  <rect x="200" y="60" width="220" height="100" rx="8" fill="#f6f0e4" stroke="#8a7449"/>
  <text x="310" y="86" font-size="13" text-anchor="middle" fill="#6b5a38" font-weight="bold">Presión de velocidad q_z</text>
  <text x="310" y="112" font-size="14" text-anchor="middle" fill="#333">q_z = 0,613 · I · K_z · K_zt · K_e · V²</text>
  <text x="310" y="134" font-size="10.5" text-anchor="middle" fill="#888">½ρV² afinado por dónde, qué exposición,</text>
  <text x="310" y="149" font-size="10.5" text-anchor="middle" fill="#888">la topografía, la altura y la densidad del aire</text>

  <line x1="420" y1="110" x2="470" y2="110" stroke="#555" stroke-width="2" marker-end="url(#af)"/>

  <!-- Stage 3: p -->
  <rect x="470" y="60" width="230" height="100" rx="8" fill="#f7ecea" stroke="#b02a1a"/>
  <text x="585" y="86" font-size="13" text-anchor="middle" fill="#b02a1a" font-weight="bold">Presión de diseño p</text>
  <text x="585" y="112" font-size="13.5" text-anchor="middle" fill="#333">p = q·K_d·G·C_p − q_i·K_d·(GC_pi)</text>
  <text x="585" y="134" font-size="10.5" text-anchor="middle" fill="#888">externa (barlovento/sotavento/techo)</text>
  <text x="585" y="149" font-size="10.5" text-anchor="middle" fill="#888">menos la presión interna</text>

  <line x1="700" y1="110" x2="750" y2="110" stroke="#555" stroke-width="2" marker-end="url(#af)"/>

  <!-- Stage 4: structure -->
  <rect x="750" y="70" width="180" height="80" rx="8" fill="#eef6ef" stroke="#1c7c3c"/>
  <text x="840" y="98" font-size="12.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Fuerzas de diseño</text>
  <text x="840" y="120" font-size="11" text-anchor="middle" fill="#355">SPRFV (estructura) o</text>
  <text x="840" y="136" font-size="11" text-anchor="middle" fill="#355">C&amp;R (revestimiento)</text>

  <!-- ===== Factor legend ===== -->
  <text x="310" y="205" font-size="12.5" text-anchor="middle" fill="#6b5a38" font-weight="bold">Factores que afinan q_z</text>
  <g font-size="11.5" fill="#444">
    <text x="60" y="232"><tspan fill="#6b5a38" font-weight="bold">I</tspan>   Factor de importancia — categoría de ocupación fija el período de retorno (25 a 150 años)</text>
    <text x="60" y="256"><tspan fill="#6b5a38" font-weight="bold">K_z</tspan>  Exposición + altura — el perfil de viento: crece con z, y depende de la rugosidad B/C/D</text>
    <text x="60" y="280"><tspan fill="#6b5a38" font-weight="bold">K_zt</tspan> Topografía — amplificación sobre cerros, escarpes y lomas (= 1 en terreno plano)</text>
    <text x="60" y="304"><tspan fill="#6b5a38" font-weight="bold">K_e</tspan>  Elevación — corrige la densidad del aire con la altitud: K_e = e^(−0,000119·z_e)</text>
  </g>

  <text x="585" y="340" font-size="12.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">Factores que llevan q a la superficie</text>
  <g font-size="11.5" fill="#444">
    <text x="60" y="366"><tspan fill="#b02a1a" font-weight="bold">K_d</tspan>  Direccionalidad — probabilidad de que el viento máximo coincida con la peor dirección (0,85)</text>
    <text x="60" y="390"><tspan fill="#b02a1a" font-weight="bold">G</tspan>   Efecto de ráfaga — rígido (f ≥ 1 Hz): G = 0,85; flexible: G_f por análisis dinámico</text>
    <text x="60" y="414"><tspan fill="#b02a1a" font-weight="bold">C_p</tspan>  Coef. de presión externa — la aerodinámica de la forma: dónde el edificio empuja o succiona</text>
    <text x="60" y="438"><tspan fill="#b02a1a" font-weight="bold">GC_pi</tspan> Presión interna — depende de cuán cerrado esté el edificio (Tabla 7): ±0,18 / ±0,55 / 0</text>
  </g>
</svg>
