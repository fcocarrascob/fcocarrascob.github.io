<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" font-family="Segoe UI, Arial, sans-serif">
  <rect width="480" height="340" fill="#ffffff"/>
  <text x="240" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Caso 1 · columna en voladizo (1 GDL)</text>

  <defs>
    <marker id="c1arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>

  <!-- suelo + empotramiento -->
  <line x1="120" y1="285" x2="220" y2="285" stroke="#333" stroke-width="2.5"/>
  <g stroke="#555" stroke-width="1.4">
    <line x1="128" y1="285" x2="118" y2="296"/>
    <line x1="144" y1="285" x2="134" y2="296"/>
    <line x1="160" y1="285" x2="150" y2="296"/>
    <line x1="176" y1="285" x2="166" y2="296"/>
    <line x1="192" y1="285" x2="182" y2="296"/>
    <line x1="208" y1="285" x2="198" y2="296"/>
  </g>

  <!-- columna sin deformar (referencia) -->
  <line x1="170" y1="285" x2="170" y2="95" stroke="#9aa1ab" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- columna deformada -->
  <path d="M170,285 C 170,205 198,140 216,98" fill="none" stroke="#1a63a8" stroke-width="3.2"/>

  <!-- masa en la punta -->
  <circle cx="216" cy="95" r="15" fill="#1a63a8"/>
  <text x="243" y="99" font-size="13" fill="#222" font-weight="bold">m</text>

  <!-- flecha de desplazamiento u -->
  <line x1="216" y1="72" x2="286" y2="72" stroke="#b02a1a" stroke-width="3" marker-end="url(#c1arr)"/>
  <text x="251" y="63" font-size="12.5" text-anchor="middle" fill="#b02a1a" font-style="italic">u</text>

  <!-- cota L -->
  <line x1="92" y1="95" x2="92" y2="285" stroke="#555" stroke-width="1.3"/>
  <line x1="87" y1="95" x2="97" y2="95" stroke="#555" stroke-width="1.3"/>
  <line x1="87" y1="285" x2="97" y2="285" stroke="#555" stroke-width="1.3"/>
  <text x="80" y="194" font-size="13" text-anchor="middle" fill="#222" font-style="italic" transform="rotate(-90 80 194)">L</text>

  <!-- rótulo EI -->
  <text x="150" y="200" font-size="12.5" text-anchor="middle" fill="#555" font-style="italic">EI</text>

  <!-- rigidez -->
  <text x="330" y="200" font-size="12.5" fill="#222">k = 3EI / L³</text>
  <text x="330" y="220" font-size="11.5" fill="#555">rigidez lateral de punta</text>
</svg>
