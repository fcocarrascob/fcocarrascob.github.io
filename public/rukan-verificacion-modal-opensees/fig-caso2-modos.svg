<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="26" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Caso 2 · edificio de corte de 2 GDL: modelo y modos</text>

  <defs>
    <marker id="c2red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="c2blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
  </defs>

  <!-- ============ Panel A: Modelo ============ -->
  <g transform="translate(30,60)">
    <text x="120" y="6" font-size="12.5" text-anchor="middle" fill="#222" font-weight="bold">Modelo</text>

    <!-- suelo -->
    <line x1="90" y1="270" x2="150" y2="270" stroke="#333" stroke-width="2.5"/>
    <g stroke="#555" stroke-width="1.3">
      <line x1="98" y1="270" x2="90" y2="279"/>
      <line x1="112" y1="270" x2="104" y2="279"/>
      <line x1="126" y1="270" x2="118" y2="279"/>
      <line x1="140" y1="270" x2="132" y2="279"/>
    </g>

    <!-- columna (stick) -->
    <line x1="120" y1="270" x2="120" y2="80" stroke="#333" stroke-width="3"/>

    <!-- masas -->
    <rect x="106" y="163" width="28" height="24" fill="#333"/>
    <rect x="106" y="68" width="28" height="24" fill="#333"/>
    <text x="150" y="182" font-size="12.5" fill="#222" font-style="italic">m</text>
    <text x="150" y="87" font-size="12.5" fill="#222" font-style="italic">m</text>

    <!-- rigideces de piso -->
    <text x="150" y="228" font-size="12.5" fill="#555" font-style="italic">k</text>
    <text x="150" y="133" font-size="12.5" fill="#555" font-style="italic">k</text>

    <text x="120" y="312" font-size="11" text-anchor="middle" fill="#555">vigas rígidas</text>
    <text x="120" y="328" font-size="11" text-anchor="middle" fill="#555">k = 12EI / h³</text>
  </g>

  <!-- ============ Panel B: Modo 1 ============ -->
  <g transform="translate(330,60)">
    <text x="120" y="6" font-size="12.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">Modo 1 · T = 0.341 s</text>

    <line x1="90" y1="270" x2="150" y2="270" stroke="#333" stroke-width="2.5"/>
    <g stroke="#555" stroke-width="1.3">
      <line x1="98" y1="270" x2="90" y2="279"/>
      <line x1="112" y1="270" x2="104" y2="279"/>
      <line x1="126" y1="270" x2="118" y2="279"/>
      <line x1="140" y1="270" x2="132" y2="279"/>
    </g>

    <!-- referencia sin deformar -->
    <line x1="120" y1="270" x2="120" y2="80" stroke="#9aa1ab" stroke-width="1.8" stroke-dasharray="5 5"/>

    <!-- forma modal (en fase) -->
    <polyline points="120,270 160,175 184.7,80" fill="none" stroke="#1a63a8" stroke-width="3.2"/>
    <circle cx="160" cy="175" r="9" fill="#1a63a8"/>
    <circle cx="184.7" cy="80" r="9" fill="#1a63a8"/>

    <!-- flechas de sentido -->
    <line x1="160" y1="175" x2="196" y2="175" stroke="#b02a1a" stroke-width="2.6" marker-end="url(#c2red)"/>
    <line x1="184.7" y1="80" x2="230" y2="80" stroke="#b02a1a" stroke-width="2.6" marker-end="url(#c2red)"/>

    <text x="120" y="312" font-size="11.5" text-anchor="middle" fill="#222">φ₂/φ₁ = +1.618  (razón áurea)</text>
    <text x="120" y="330" font-size="11.5" text-anchor="middle" fill="#555">moviliza 94.7 % de la masa</text>
  </g>

  <!-- ============ Panel C: Modo 2 ============ -->
  <g transform="translate(630,60)">
    <text x="120" y="6" font-size="12.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">Modo 2 · T = 0.130 s</text>

    <line x1="90" y1="270" x2="150" y2="270" stroke="#333" stroke-width="2.5"/>
    <g stroke="#555" stroke-width="1.3">
      <line x1="98" y1="270" x2="90" y2="279"/>
      <line x1="112" y1="270" x2="104" y2="279"/>
      <line x1="126" y1="270" x2="118" y2="279"/>
      <line x1="140" y1="270" x2="132" y2="279"/>
    </g>

    <!-- referencia sin deformar -->
    <line x1="120" y1="270" x2="120" y2="80" stroke="#9aa1ab" stroke-width="1.8" stroke-dasharray="5 5"/>

    <!-- forma modal (en oposición) -->
    <polyline points="120,270 160,175 95.3,80" fill="none" stroke="#b02a1a" stroke-width="3.2"/>
    <circle cx="160" cy="175" r="9" fill="#b02a1a"/>
    <circle cx="95.3" cy="80" r="9" fill="#b02a1a"/>

    <!-- flechas de sentido (opuestas) -->
    <line x1="160" y1="175" x2="196" y2="175" stroke="#b02a1a" stroke-width="2.6" marker-end="url(#c2red)"/>
    <line x1="95.3" y1="80" x2="60" y2="80" stroke="#1a63a8" stroke-width="2.6" marker-end="url(#c2blue)"/>

    <text x="120" y="312" font-size="11.5" text-anchor="middle" fill="#222">φ₂/φ₁ = −0.618</text>
    <text x="120" y="330" font-size="11.5" text-anchor="middle" fill="#555">moviliza 5.3 % de la masa</text>
  </g>

  <text x="450" y="404" font-size="11.5" text-anchor="middle" fill="#555">Las dos masas modales efectivas suman exactamente el 100 % de la masa.</text>
</svg>
