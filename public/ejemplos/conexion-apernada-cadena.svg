<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="840" height="400" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La cadena de transferencia: φR_n de cada eslabón vs. V_u = 30 tonf</text>

  <!-- eje y demanda: escala 4 px/tonf desde x=250 -->
  <line x1="250" y1="60" x2="250" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="250" y1="250" x2="820" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="370" y1="55" x2="370" y2="250" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="370" y="50" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">V_u = 30</text>

  <!-- barras: x=250 + val*4 ; orden por severidad creciente arriba->abajo -->
  <!-- aplastamiento 56.9 (holgado) -->
  <rect x="250" y="70" width="228" height="18" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.2"/>
  <text x="244" y="83" font-size="10" text-anchor="end" fill="#4a5b6c">Aplastamiento/desgarre</text>
  <text x="484" y="83" font-size="9.5" fill="#1c7c3c">56.9 · 0.53</text>
  <!-- corte pernos 43.3 -->
  <rect x="250" y="96" width="173" height="18" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.2"/>
  <text x="244" y="109" font-size="10" text-anchor="end" fill="#4a5b6c">Corte de los pernos</text>
  <text x="429" y="109" font-size="9.5" fill="#1c7c3c">43.2 · 0.69</text>
  <!-- plancha fluencia 42.5 -->
  <rect x="250" y="122" width="170" height="18" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.2"/>
  <text x="244" y="135" font-size="10" text-anchor="end" fill="#4a5b6c">Plancha: corte fluencia</text>
  <text x="426" y="135" font-size="9.5" fill="#1c7c3c">42.5 · 0.71</text>
  <!-- bloque de corte 36.5 -->
  <rect x="250" y="148" width="146" height="18" fill="#fff5e6" stroke="#c07a00" stroke-width="1.3"/>
  <text x="244" y="161" font-size="10" text-anchor="end" fill="#a56a00">Rotura en bloque</text>
  <text x="402" y="161" font-size="9.5" fill="#a56a00">36.5 · 0.82</text>
  <!-- plancha rotura 33.8 GOBIERNA -->
  <rect x="250" y="174" width="135" height="18" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="244" y="187" font-size="10" text-anchor="end" fill="#c0392b" font-weight="bold">Plancha: corte rotura</text>
  <text x="391" y="187" font-size="9.5" fill="#c0392b" font-weight="bold">33.8 · 0.89 ◄</text>

  <!-- eje x marcas -->
  <text x="250" y="264" font-size="9" text-anchor="middle" fill="#888">0</text>
  <text x="450" y="264" font-size="9" text-anchor="middle" fill="#888">50 tonf</text>
  <line x1="450" y1="250" x2="450" y2="254" stroke="#888"/>

  <!-- caja tesis / palanca -->
  <rect x="250" y="290" width="570" height="96" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="264" y="310" font-size="11.5" fill="#222" font-weight="bold">El eslabón débil es la plancha, no el perno</text>
  <text x="264" y="329" font-size="10.5" fill="#333">Agregar o agrandar pernos no ayuda: su corte tiene 31 % de holgura (0.69).</text>
  <text x="264" y="347" font-size="10.5" fill="#333">La palanca son el espesor y la geometría de la plancha:</text>
  <text x="264" y="365" font-size="10.5" fill="#1c7c3c">   t = 10 mm → φR_n = 33.8 tonf   ·   t = 12 mm → 40.5 tonf</text>
  <text x="264" y="380" font-size="9.5" fill="#888">La conexión debe ser más fuerte que el miembro: se refuerza el eslabón que gobierna.</text>

  <!-- flechas cadena -->
  <text x="60" y="150" font-size="10.5" fill="#5a6b7c" font-weight="bold">cadena:</text>
  <text x="60" y="168" font-size="9.5" fill="#5a6b7c">perno →</text>
  <text x="60" y="182" font-size="9.5" fill="#5a6b7c">apoyo →</text>
  <text x="60" y="196" font-size="9.5" fill="#5a6b7c">plancha →</text>
  <text x="60" y="210" font-size="9.5" fill="#5a6b7c">bloque</text>
  <text x="60" y="230" font-size="9" fill="#888">gobierna el</text>
  <text x="60" y="242" font-size="9" fill="#888">menor</text>
</svg>
