<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ard" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="ld" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M5,10 L0,0 L10,0 z" fill="#5a6b7c"/>
    </marker>
  </defs>
  <rect width="840" height="440" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Viga W460×74, luz 8 m, w = 2.5 tonf/m → M_u = 20 tonf·m: un arriostre lo cambia todo</text>

  <!-- ============ ESQUEMA A: solo apoyos ============ -->
  <text x="60" y="56" font-size="11.5" fill="#c0392b" font-weight="bold">A) Arriostrada solo en los apoyos → L_b = 8 m (elástico)</text>
  <!-- carga distribuida -->
  <g stroke="#5a6b7c" stroke-width="1">
    <line x1="90" y1="72" x2="90" y2="92" marker-end="url(#ld)"/><line x1="140" y1="72" x2="140" y2="92" marker-end="url(#ld)"/>
    <line x1="190" y1="72" x2="190" y2="92" marker-end="url(#ld)"/><line x1="240" y1="72" x2="240" y2="92" marker-end="url(#ld)"/>
    <line x1="290" y1="72" x2="290" y2="92" marker-end="url(#ld)"/><line x1="340" y1="72" x2="340" y2="92" marker-end="url(#ld)"/>
    <line x1="390" y1="72" x2="390" y2="92" marker-end="url(#ld)"/>
  </g>
  <text x="410" y="82" font-size="10" fill="#5a6b7c">w</text>
  <!-- viga -->
  <rect x="90" y="94" width="300" height="10" fill="#eef2f7" stroke="#333" stroke-width="1.4"/>
  <!-- apoyos -->
  <path d="M90,104 l-9,14 l18,0 z" fill="#fff" stroke="#333"/><path d="M390,104 l-9,14 l18,0 z" fill="#fff" stroke="#333"/>
  <!-- arriostres solo en apoyos (aspa) -->
  <g stroke="#c0392b" stroke-width="1.8"><path d="M84,90 l12,18 M96,90 l-12,18"/><path d="M384,90 l12,18 M396,90 l-12,18"/></g>
  <!-- cota Lb=8m -->
  <line x1="90" y1="132" x2="390" y2="132" stroke="#555" stroke-width="0.8" marker-start="url(#ard)" marker-end="url(#ard)"/>
  <text x="240" y="146" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">L_b = 8 m &gt; L_r = 5.16 m</text>

  <!-- ============ ESQUEMA B: + media luz ============ -->
  <text x="60" y="186" font-size="11.5" fill="#1c7c3c" font-weight="bold">B) + un arriostre a media luz → L_b = 4 m (inelástico)</text>
  <rect x="90" y="214" width="300" height="10" fill="#eef2f7" stroke="#333" stroke-width="1.4"/>
  <path d="M90,224 l-9,14 l18,0 z" fill="#fff" stroke="#333"/><path d="M390,224 l-9,14 l18,0 z" fill="#fff" stroke="#333"/>
  <g stroke="#1c7c3c" stroke-width="1.8">
    <path d="M84,210 l12,18 M96,210 l-12,18"/>
    <path d="M234,210 l12,18 M246,210 l-12,18"/>
    <path d="M384,210 l12,18 M396,210 l-12,18"/>
  </g>
  <text x="240" y="205" font-size="9.5" text-anchor="middle" fill="#1c7c3c">arriostre lateral nuevo</text>
  <line x1="90" y1="250" x2="240" y2="250" stroke="#555" stroke-width="0.8" marker-start="url(#ard)" marker-end="url(#ard)"/>
  <line x1="240" y1="250" x2="390" y2="250" stroke="#555" stroke-width="0.8" marker-start="url(#ard)" marker-end="url(#ard)"/>
  <text x="165" y="263" font-size="10" text-anchor="middle" fill="#1c7c3c">4 m</text>
  <text x="315" y="263" font-size="10" text-anchor="middle" fill="#1c7c3c">4 m</text>

  <!-- ============ BARRAS demanda/capacidad ============ -->
  <text x="470" y="56" font-size="11.5" fill="#1a63a8" font-weight="bold">φM_n vs M_u = 20 tonf·m</text>
  <!-- escala 5 px/(tonf*m) desde x=470; Mu line en 470+20*5=570 -->
  <line x1="570" y1="70" x2="570" y2="210" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="570" y="66" font-size="10" text-anchor="middle" fill="#c0392b" font-weight="bold">M_u = 20</text>
  <line x1="470" y1="210" x2="810" y2="210" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="78" x2="470" y2="210" stroke="#333" stroke-width="1"/>
  <!-- meta phiMp=52.4 (faint) -->
  <rect x="470" y="86" width="262" height="18" fill="#f4f7fb" stroke="#9bb0c6" stroke-width="1.1"/>
  <text x="476" y="99" font-size="10" fill="#5a6b7c">meta φM_p = 52.4  (viga bien arriostrada)</text>
  <!-- A: 19.1 falla -->
  <rect x="470" y="118" width="96" height="18" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="476" y="131" font-size="10" fill="#c0392b" font-weight="bold">A) L_b=8 m  φM_n=19.1</text>
  <text x="806" y="131" font-size="10" text-anchor="end" fill="#c0392b" font-weight="bold">1.05 ✗</text>
  <!-- B: 51.0 pasa -->
  <rect x="470" y="150" width="255" height="18" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.3"/>
  <text x="476" y="163" font-size="10" fill="#1c7c3c">B) L_b=4 m  φM_n=51.0</text>
  <text x="806" y="163" font-size="10" text-anchor="end" fill="#1c7c3c">0.39 ✓</text>

  <!-- caja tesis -->
  <rect x="60" y="300" width="720" height="118" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="74" y="322" font-size="11.5" fill="#222" font-weight="bold">La palanca del LTB: arriostrar y el crédito C_b, no un perfil mayor</text>
  <text x="74" y="343" font-size="10.5" fill="#333">• Con L_b = 8 m la viga pandea elástica y φM_n = 19.1 &lt; 20: FALLA, aunque su φM_p = 52.4 sobra por lejos.</text>
  <text x="74" y="362" font-size="10.5" fill="#333">• C_b rescata algo: de 16.8 (C_b=1) a 19.1 (C_b=1.14), pero no alcanza.</text>
  <text x="74" y="381" font-size="10.5" fill="#333">• Un arriostre a media luz (L_b = 4 m) sube φM_n a 51.0 → uso 0.39. Mismo perfil, mismo acero.</text>
  <text x="74" y="402" font-size="10" fill="#888">Subir de perfil sube M_p (que ya sobra); lo que gobierna es la distancia entre arriostres.</text>
</svg>
