<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="fr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="840" height="470" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Viga carrilera: gobierna la flexión biaxial; la fatiga manda solo en servicio pesado</text>

  <!-- =============== PANEL A: sección transversal =============== -->
  <text x="40" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Sección: W610×155 + canal C310×45 + riel A55</text>

  <!-- carga vertical -->
  <line x1="210" y1="70" x2="210" y2="112" stroke="#c0392b" stroke-width="2.4" marker-end="url(#fr)"/>
  <text x="222" y="86" font-size="11" fill="#c0392b" font-weight="bold">P_v (vertical + impacto)</text>

  <!-- rueda -->
  <rect x="198" y="112" width="24" height="16" rx="2" fill="#d7dde5" stroke="#333" stroke-width="1.3"/>
  <!-- riel -->
  <rect x="194" y="128" width="32" height="14" fill="#c9d2dc" stroke="#333" stroke-width="1.3"/>
  <text x="240" y="139" font-size="10.5" fill="#555">riel A55</text>

  <!-- empuje lateral en cabeza de riel -->
  <line x1="226" y1="135" x2="286" y2="135" stroke="#c0392b" stroke-width="2.4" marker-end="url(#fr)"/>
  <text x="238" y="128" font-size="11" fill="#c0392b" font-weight="bold">H (empuje lateral)</text>

  <!-- canal (plano sobre ala superior) -->
  <rect x="142" y="142" width="136" height="14" fill="#dbe6d8" stroke="#333" stroke-width="1.4"/>
  <text x="70" y="152" font-size="10.5" fill="#3a6b34" text-anchor="end" font-weight="bold">canal C310×45</text>
  <line x1="72" y1="149" x2="140" y2="149" stroke="#3a6b34" stroke-width="0.8"/>

  <!-- ala superior -->
  <rect x="150" y="156" width="120" height="13" fill="#eef2f7" stroke="#333" stroke-width="1.5"/>
  <!-- alma -->
  <rect x="204" y="169" width="12" height="180" fill="#eef2f7" stroke="#333" stroke-width="1.5"/>
  <!-- ala inferior -->
  <rect x="150" y="349" width="120" height="13" fill="#eef2f7" stroke="#333" stroke-width="1.5"/>
  <text x="330" y="262" font-size="11" fill="#333" text-anchor="end" font-weight="bold">W610×155</text>
  <line x1="272" y1="258" x2="328" y2="258" stroke="#333" stroke-width="0.7"/>

  <!-- eje neutro combinado -->
  <line x1="130" y1="242" x2="300" y2="242" stroke="#1a63a8" stroke-width="1.1" stroke-dasharray="6 4"/>
  <text x="304" y="246" font-size="10" fill="#1a63a8">eje neutro (comb.)</text>

  <!-- cota altura -->
  <line x1="120" y1="156" x2="120" y2="362" stroke="#888" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="112" y="262" font-size="10" fill="#666" text-anchor="end">61 cm</text>

  <!-- =============== PANEL B: demanda vs capacidad =============== -->
  <text x="430" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Uso (demanda / capacidad) — límite = 1.0</text>

  <!-- ejes: bars start x=560, scale 250px=1.0, limit at 810 -->
  <line x1="560" y1="70" x2="560" y2="330" stroke="#bbb" stroke-width="1"/>
  <line x1="810" y1="70" x2="810" y2="336" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="810" y="350" font-size="10" fill="#c0392b" text-anchor="middle" font-weight="bold">1.0</text>

  <!-- rows: label right-aligned at x=555, bar from 560 -->
  <!-- LTB 0.72 -->
  <text x="555" y="85" font-size="10.5" fill="#333" text-anchor="end">Pandeo LTB</text>
  <rect x="560" y="75" width="180" height="15" fill="#7fa8d0"/>
  <text x="746" y="86" font-size="10" fill="#333">0.72</text>
  <!-- Biaxial 0.89 GOBIERNA -->
  <text x="555" y="112" font-size="10.5" fill="#c0392b" text-anchor="end" font-weight="bold">Flexión biaxial</text>
  <rect x="560" y="102" width="222" height="15" fill="#c0392b"/>
  <text x="788" y="113" font-size="10" fill="#c0392b" font-weight="bold">0.89</text>
  <!-- Corte 0.40 -->
  <text x="555" y="139" font-size="10.5" fill="#333" text-anchor="end">Corte</text>
  <rect x="560" y="129" width="100" height="15" fill="#7fa8d0"/>
  <text x="666" y="140" font-size="10" fill="#333">0.40</text>
  <!-- Fluencia alma 0.32 -->
  <text x="555" y="166" font-size="10.5" fill="#333" text-anchor="end">Fluencia local alma</text>
  <rect x="560" y="156" width="80" height="15" fill="#7fa8d0"/>
  <text x="646" y="167" font-size="10" fill="#333">0.32</text>
  <!-- Aplastamiento 0.24 -->
  <text x="555" y="193" font-size="10.5" fill="#333" text-anchor="end">Aplastamiento alma</text>
  <rect x="560" y="183" width="60" height="15" fill="#7fa8d0"/>
  <text x="626" y="194" font-size="10" fill="#333">0.24</text>
  <!-- Flecha vertical 0.44 -->
  <text x="555" y="220" font-size="10.5" fill="#333" text-anchor="end">Flecha vertical (L/600)</text>
  <rect x="560" y="210" width="110" height="15" fill="#8fb98a"/>
  <text x="676" y="221" font-size="10" fill="#333">0.44</text>
  <!-- Fatiga Clase C 0.48 -->
  <text x="555" y="247" font-size="10.5" fill="#333" text-anchor="end">Fatiga (Clase C)</text>
  <rect x="560" y="237" width="120" height="15" fill="#e0a94b"/>
  <text x="686" y="248" font-size="10" fill="#333">0.48</text>

  <!-- callout fatiga servicio pesado -->
  <rect x="470" y="368" width="345" height="82" rx="4" fill="#fbf3e0" stroke="#e0a94b" stroke-width="1.2"/>
  <text x="482" y="386" font-size="10.5" fill="#8a6d1f" font-weight="bold">La fatiga se da vuelta con el servicio de la grúa:</text>
  <text x="482" y="403" font-size="10" fill="#5a5030">Clase C (5·10⁵ ciclos) ............ uso 0.48</text>
  <text x="482" y="418" font-size="10" fill="#5a5030">Clase D (2·10⁶ ciclos) ........... uso 0.76</text>
  <text x="482" y="433" font-size="10" fill="#c0392b" font-weight="bold">Vida infinita (umbral CAFL) ... uso 0.98  → gobierna</text>
  <text x="482" y="447" font-size="9" fill="#8a6d1f">Con la Clase correcta la fatiga holga; en servicio pesado toma el control.</text>

  <!-- nota panel A -->
  <text x="40" y="410" font-size="9.5" fill="#666">L_b = 8 m sin arriostrar → el canal sube I_y y controla</text>
  <text x="40" y="424" font-size="9.5" fill="#666">el LTB y la flexión lateral con un solo elemento.</text>
</svg>
