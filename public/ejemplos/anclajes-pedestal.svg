<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="vr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c07a00"/>
    </marker>
  </defs>
  <rect width="840" height="470" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Grupo de anclajes en pedestal: la interacción tracción–corte gobierna</text>

  <!-- =============== PANEL A: planta + sección =============== -->
  <text x="40" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Planta del pedestal (100 × 100 cm)</text>

  <!-- pedestal -->
  <rect x="150" y="72" width="120" height="120" fill="#f4f7fb" stroke="#333" stroke-width="1.6"/>
  <!-- área proyectada de arrancamiento A_Nc (fila +y), recortada por los bordes del pedestal -->
  <rect x="150" y="72" width="120" height="102" fill="#fdecea" stroke="#c0392b" stroke-width="1" stroke-dasharray="4 3" opacity="0.55"/>
  <text x="258" y="86" font-size="8.5" text-anchor="end" fill="#c0392b">A_Nc</text>
  <!-- pernos -->
  <g stroke="#333" stroke-width="1.2">
    <circle cx="180" cy="102" r="5" fill="#c0392b"/>
    <circle cx="240" cy="102" r="5" fill="#c0392b"/>
    <circle cx="180" cy="162" r="5" fill="#dfe5ec"/>
    <circle cx="240" cy="162" r="5" fill="#dfe5ec"/>
  </g>
  <text x="210" y="60" font-size="9.5" text-anchor="middle" fill="#c0392b">fila traccionada (T = 4 tonf c/u)</text>

  <!-- corte V hacia borde x+ -->
  <line x1="255" y1="132" x2="300" y2="132" stroke="#c07a00" stroke-width="2.4" marker-end="url(#vr)"/>
  <text x="292" y="124" font-size="10.5" fill="#c07a00" font-weight="bold">V = 3.5 tonf</text>

  <!-- cotas -->
  <line x1="180" y1="205" x2="240" y2="205" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="210" y="218" font-size="10" text-anchor="middle" fill="#555">gauge 50</text>
  <line x1="150" y1="205" x2="180" y2="205" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="150" y="218" font-size="9" text-anchor="middle" fill="#555">c_a=25</text>
  <line x1="150" y1="232" x2="270" y2="232" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="210" y="245" font-size="10" text-anchor="middle" fill="#555">B₂ = 100 cm</text>

  <!-- sección: anclaje + cono breakout -->
  <text x="40" y="278" font-size="11" fill="#1a63a8" font-weight="bold">Sección: cono de arrancamiento (≈35°, proyección 1.5·h_ef)</text>
  <rect x="40" y="300" width="340" height="120" fill="#f8fafc" stroke="#333" stroke-width="1.2"/>
  <!-- cono: base 1.5·h_ef a cada lado en la superficie, vértice en la cabeza del perno -->
  <path d="M45,300 L375,300 L210,410 Z" fill="#eaf1fb" stroke="#1a63a8" stroke-width="1.3" stroke-dasharray="5 4"/>
  <!-- perno -->
  <line x1="210" y1="292" x2="210" y2="410" stroke="#333" stroke-width="2.4"/>
  <rect x="202" y="404" width="16" height="10" fill="#333"/>
  <text x="120" y="345" font-size="10" fill="#333">perno φ1″ (cast-in)</text>
  <text x="120" y="401" font-size="9.5" fill="#333">cabeza / tuerca hex. a h_ef</text>
  <!-- h_ef -->
  <line x1="230" y1="300" x2="230" y2="410" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="236" y="360" font-size="9.5" fill="#555" transform="rotate(-90 236,360)">h_ef = 40 cm</text>
  <!-- proyección 1.5·h_ef en la superficie -->
  <line x1="210" y1="309" x2="375" y2="309" stroke="#1a63a8" stroke-width="0.8" marker-end="url(#ar)"/>
  <text x="300" y="321" font-size="9" text-anchor="middle" fill="#1a63a8">1.5·h_ef</text>
  <text x="150" y="296" font-size="8.5" text-anchor="middle" fill="#1a63a8">superficie del hormigón</text>

  <!-- =============== PANEL B: interacción + modos =============== -->
  <text x="430" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Interacción tracción–corte (17.8.3)</text>

  <!-- ejes -->
  <line x1="575" y1="235" x2="575" y2="70" stroke="#333" stroke-width="1"/>
  <line x1="575" y1="235" x2="775" y2="235" stroke="#333" stroke-width="1"/>
  <text x="775" y="250" font-size="10" text-anchor="end" fill="#333">N / φN_n</text>
  <text x="568" y="74" font-size="10" text-anchor="end" fill="#333">V / φV_n</text>
  <!-- region segura (N+V<=1.2) -->
  <polygon points="575,235 755,235 575,67" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.5"/>
  <text x="642" y="205" font-size="10" fill="#1c7c3c">seguro</text>
  <text x="690" y="150" font-size="9.5" fill="#1c7c3c" transform="rotate(-43 690,150)">N/φN + V/φV = 1.2</text>
  <!-- marcas 1.0 -->
  <line x1="575" y1="235" x2="575" y2="238"/>
  <text x="575" y="248" font-size="8" text-anchor="middle" fill="#888">0</text>
  <line x1="725" y1="233" x2="725" y2="237" stroke="#888"/>
  <text x="725" y="248" font-size="8" text-anchor="middle" fill="#888">1.0</text>
  <line x1="573" y1="95" x2="577" y2="95" stroke="#888"/>
  <text x="568" y="99" font-size="8" text-anchor="end" fill="#888">1.0</text>
  <!-- punto (0.58, 0.56) -->
  <circle cx="662" cy="157" r="4.5" fill="#c0392b"/>
  <line x1="575" y1="157" x2="662" y2="157" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3 2"/>
  <line x1="662" y1="235" x2="662" y2="157" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3 2"/>
  <text x="672" y="150" font-size="10" fill="#c0392b" font-weight="bold">(0.58, 0.56)</text>
  <text x="672" y="163" font-size="9.5" fill="#c0392b">suma = 1.14 ≤ 1.2 ✓</text>

  <!-- lista de modos -->
  <text x="430" y="285" font-size="11.5" fill="#1a63a8" font-weight="bold">Modos verificados (φ = 0.70, hormigón fisurado)</text>
  <g font-size="10.5">
    <text x="440" y="308" fill="#333">Breakout tracción (17.6.2)</text><text x="700" y="308" fill="#c0392b" font-weight="bold">dem 8.0 / 13.8 tonf → 0.58 ◄</text>
    <text x="440" y="328" fill="#333">Pullout (17.6.3)</text><text x="700" y="328" fill="#555">dem 4.0 / 10.5 tonf → 0.38</text>
    <text x="440" y="348" fill="#333">Side-face blowout (17.6.4)</text><text x="700" y="348" fill="#555">no aplica (c_a &gt; 0.4 h_ef)</text>
    <text x="440" y="368" fill="#333">Breakout de corte (17.7.2)</text><text x="700" y="368" fill="#c07a00" font-weight="bold">dem 3.5 / 6.2 tonf → 0.56 ◄</text>
    <text x="440" y="388" fill="#333">Pryout (17.7.3)</text><text x="700" y="388" fill="#555">dem 3.5 / 32.4 tonf → 0.11</text>
    <text x="440" y="408" fill="#c0392b" font-weight="bold">Interacción N–V (17.8.3)</text><text x="700" y="408" fill="#c0392b" font-weight="bold">1.14 ≤ 1.2 → gobierna</text>
  </g>
</svg>
