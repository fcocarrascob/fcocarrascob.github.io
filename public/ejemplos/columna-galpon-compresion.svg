<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="fr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="840" height="470" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Columna de galpón a compresión: el eje fuerte (cantilever) gobierna</text>

  <!-- =============== PANEL A: la columna y sus dos ejes =============== -->
  <text x="60" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Columna W250×73: base empotrada, tope arriostrado solo fuera del plano</text>

  <!-- fuerza Pu -->
  <line x1="170" y1="66" x2="170" y2="86" stroke="#c0392b" stroke-width="2.4" marker-end="url(#fr)"/>
  <text x="170" y="62" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">P_u = 65 tonf</text>

  <!-- columna -->
  <rect x="157" y="90" width="26" height="270" fill="#eef2f7" stroke="#333" stroke-width="1.6"/>

  <!-- forma pandeada eje fuerte (cantilever K=2) -->
  <path d="M170,360 C 214,286 220,158 202,92" fill="none" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="250" y="120" font-size="10.5" fill="#c0392b" font-weight="bold">eje fuerte X</text>
  <text x="250" y="134" font-size="10" fill="#c0392b">cantilever, K_x = 2.0</text>

  <!-- base empotrada -->
  <line x1="120" y1="360" x2="220" y2="360" stroke="#333" stroke-width="2.4"/>
  <path d="M124,360 l-8,10 M138,360 l-8,10 M152,360 l-8,10 M166,360 l-8,10 M180,360 l-8,10 M194,360 l-8,10 M208,360 l-8,10 M222,360 l-8,10" stroke="#333" stroke-width="1"/>
  <text x="170" y="386" font-size="10.5" text-anchor="middle" fill="#333">base empotrada</text>

  <!-- arriostramiento a media altura (eje debil) -->
  <path d="M110,225 l30,-8 0,16 z" fill="#1a63a8" stroke="#1a63a8"/>
  <line x1="140" y1="225" x2="157" y2="225" stroke="#1a63a8" stroke-width="1.4"/>
  <circle cx="170" cy="225" r="2.6" fill="#1a63a8"/>
  <text x="104" y="212" font-size="10" text-anchor="middle" fill="#1a63a8">arriostramiento</text>
  <text x="104" y="242" font-size="10" text-anchor="middle" fill="#1a63a8">eje débil Y</text>

  <!-- cota L -->
  <line x1="240" y1="90" x2="240" y2="360" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="248" y="228" font-size="11" fill="#555">L = 7.5 m</text>

  <!-- bloque de esbelteces -->
  <text x="60" y="410" font-size="10.5" fill="#c0392b" font-weight="bold">Eje fuerte X:  L_cx = 2.0·7.5 = 15.0 m → L_cx/r_x = 136  ◄ gobierna</text>
  <text x="60" y="428" font-size="10.5" fill="#1c7c3c">Eje débil Y:   L_cy = 1.0·3.75 = 3.75 m → L_cy/r_y = 58</text>
  <text x="60" y="448" font-size="10" fill="#888">r_x = 11.0 &gt; r_y = 6.46 cm, pero manda el eje fuerte: la longitud efectiva pesa más que el radio de giro.</text>

  <!-- =============== PANEL B: demanda vs capacidad =============== -->
  <text x="500" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Estados de pandeo (φP_n vs P_u = 65 tonf)</text>

  <!-- linea de demanda: scale 0.92 px/tonf desde x=500 -->
  <line x1="560" y1="70" x2="560" y2="200" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="560" y="66" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">P_u = 65</text>

  <!-- eje -->
  <line x1="500" y1="200" x2="815" y2="200" stroke="#333" stroke-width="1"/>
  <line x1="500" y1="80" x2="500" y2="200" stroke="#333" stroke-width="1"/>

  <!-- barra eje debil 229.7 (holgado) -->
  <rect x="500" y="92" width="211" height="20" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.3"/>
  <text x="506" y="106" font-size="10.5" fill="#1c7c3c">Eje débil Y (K=1)  φP_n = 229.7</text>
  <text x="807" y="106" font-size="10" text-anchor="end" fill="#1c7c3c">0.28</text>
  <!-- barra eje fuerte 79.3 (gobierna) -->
  <rect x="500" y="130" width="73" height="20" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="506" y="144" font-size="10.5" fill="#c0392b" font-weight="bold">Eje fuerte X (K=2)  φP_n = 79.3</text>
  <text x="807" y="144" font-size="10" text-anchor="end" fill="#c0392b" font-weight="bold">0.82 ◄</text>
  <!-- pandeo local -->
  <rect x="500" y="168" width="211" height="20" fill="#eef2f7" stroke="#5a6b7c" stroke-width="1.3"/>
  <text x="506" y="182" font-size="10.5" fill="#4a5b6c">Pandeo local (E7): no esbelto → A_e = A_g</text>

  <!-- caja lever -->
  <rect x="490" y="300" width="325" height="128" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="502" y="322" font-size="11.5" fill="#222" font-weight="bold">La palanca: bajar L_c/r, no subir F_y</text>
  <text x="502" y="342" font-size="11" fill="#333">El eje fuerte pandea elástico (F_n = 0.877·F_e),</text>
  <text x="502" y="358" font-size="11" fill="#333">y F_e no depende de F_y — solo de E y la geometría:</text>
  <text x="502" y="380" font-size="11" fill="#c0392b">  Cantilever K=2:           φP_n = 79.3 tonf</text>
  <text x="502" y="398" font-size="11" fill="#1c7c3c">  Arriostrar el marco K=1:  φP_n = 209 tonf</text>
  <text x="502" y="416" font-size="10" fill="#888">Subir el acero (A36→A992) no cambia el eje fuerte.</text>
</svg>
