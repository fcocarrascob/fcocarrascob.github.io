<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="840" height="400" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Las tres zonas del LTB: la misma viga cambia de resistencia según L_b</text>

  <!-- zonas sombreadas: plastico [90,230] inelastico [230,497] elastico [497,800] -->
  <rect x="90" y="70" width="140" height="290" fill="#eef7ee"/>
  <rect x="230" y="70" width="267" height="290" fill="#fff5e6"/>
  <rect x="497" y="70" width="303" height="290" fill="#eef4fb"/>
  <text x="160" y="350" font-size="9.5" text-anchor="middle" fill="#1c7c3c">plástico (M_p)</text>
  <text x="363" y="350" font-size="9.5" text-anchor="middle" fill="#a56a00">inelástico</text>
  <text x="648" y="350" font-size="9.5" text-anchor="middle" fill="#1a63a8">elástico</text>

  <!-- ejes -->
  <line x1="90" y1="70" x2="90" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="90" y1="360" x2="800" y2="360" stroke="#333" stroke-width="1.2"/>
  <text x="80" y="74" font-size="10.5" text-anchor="end" fill="#333">M_n</text>
  <text x="80" y="86" font-size="9" text-anchor="end" fill="#888">tonf·m</text>
  <text x="800" y="378" font-size="10.5" text-anchor="end" fill="#333">L_b (m)</text>

  <!-- marcas x: 0,2,4,6,8 m = 0,200,400,600,800 cm ; x=90+Lb*0.789 -->
  <line x1="90" y1="360" x2="90" y2="364" stroke="#333"/><text x="90" y="376" font-size="9.5" text-anchor="middle" fill="#555">0</text>
  <line x1="248" y1="360" x2="248" y2="364" stroke="#333"/><text x="248" y="376" font-size="9.5" text-anchor="middle" fill="#555">2</text>
  <line x1="406" y1="360" x2="406" y2="364" stroke="#333"/><text x="406" y="376" font-size="9.5" text-anchor="middle" fill="#555">4</text>
  <line x1="563" y1="360" x2="563" y2="364" stroke="#333"/><text x="563" y="376" font-size="9.5" text-anchor="middle" fill="#555">6</text>
  <line x1="721" y1="360" x2="721" y2="364" stroke="#333"/><text x="721" y="376" font-size="9.5" text-anchor="middle" fill="#555">8</text>

  <!-- Mp y 0.7FySx horizontales -->
  <line x1="90" y1="78" x2="800" y2="78" stroke="#1c7c3c" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="96" y="74" font-size="9.5" fill="#1c7c3c">M_p = 58.3</text>
  <line x1="90" y1="187" x2="497" y2="187" stroke="#888" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="300" y="199" font-size="9" fill="#888">0.7·F_y·S_x = 35.9</text>

  <!-- Lp, Lr verticales -->
  <line x1="230" y1="70" x2="230" y2="360" stroke="#7a8ba0" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="230" y="66" font-size="9.5" text-anchor="middle" fill="#5a6b7c">L_p=1.78</text>
  <line x1="497" y1="70" x2="497" y2="360" stroke="#7a8ba0" stroke-width="0.9" stroke-dasharray="4 3"/>
  <text x="497" y="66" font-size="9.5" text-anchor="middle" fill="#5a6b7c">L_r=5.16</text>

  <!-- curva base Cb=1 -->
  <polyline points="90,78 230,78 287,102 366,134 445,165 497,187 563,223 642,251 721,270 800,283"
            fill="none" stroke="#333" stroke-width="1.6"/>
  <text x="610" y="243" font-size="9.5" fill="#555">curva base (C_b = 1)</text>

  <!-- punto B: Lb=4m con Cb=1.30, sube de 43.6 a 56.7 -->
  <line x1="406" y1="149" x2="406" y2="88" stroke="#1c7c3c" stroke-width="1.4" marker-end="url(#up)"/>
  <circle cx="406" cy="86" r="5" fill="#1c7c3c"/>
  <text x="414" y="82" font-size="10" fill="#1c7c3c" font-weight="bold">B) L_b=4 m · C_b=1.30</text>
  <text x="414" y="95" font-size="9.5" fill="#1c7c3c">M_n = 56.7 → φM_n = 51.0</text>

  <!-- punto A: Lb=8m con Cb=1.14, sube de 18.6 a 21.2 -->
  <line x1="721" y1="270" x2="721" y2="259" stroke="#c0392b" stroke-width="1.4" marker-end="url(#up)"/>
  <circle cx="721" cy="257" r="5" fill="#c0392b"/>
  <text x="713" y="253" font-size="10" fill="#c0392b" font-weight="bold" text-anchor="end">A) L_b=8 m · C_b=1.14</text>
  <text x="713" y="266" font-size="9.5" fill="#c0392b" text-anchor="end">M_n = 21.2 → φM_n = 19.1</text>

  <text x="150" y="120" font-size="9.5" fill="#1c7c3c">C_b sube la curva,</text>
  <text x="150" y="132" font-size="9.5" fill="#1c7c3c">nunca sobre M_p</text>
</svg>
