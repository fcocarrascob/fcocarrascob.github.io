<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="up" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,10 L10,10 L5,0 z" fill="#1a63a8"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="840" height="470" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Zapata aislada: en ACI 318-25 el corte en una dirección gobierna el canto</text>

  <!-- =============== PANEL A: sección y secciones críticas =============== -->
  <text x="60" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Sección: presión mayorada y las tres secciones críticas</text>

  <!-- columna -->
  <rect x="201" y="104" width="58" height="46" fill="#eef2f7" stroke="#333" stroke-width="1.4"/>
  <text x="230" y="98" font-size="10.5" text-anchor="middle" fill="#333">columna 40×40</text>
  <!-- zapata -->
  <rect x="70" y="150" width="320" height="58" fill="#f4f7fb" stroke="#333" stroke-width="1.6"/>
  <!-- armadura inferior -->
  <g fill="#1c7c3c"><circle cx="90" cy="199" r="3"/><circle cx="128" cy="199" r="3"/><circle cx="166" cy="199" r="3"/><circle cx="204" cy="199" r="3"/><circle cx="242" cy="199" r="3"/><circle cx="280" cy="199" r="3"/><circle cx="318" cy="199" r="3"/><circle cx="356" cy="199" r="3"/></g>
  <text x="230" y="224" font-size="10.5" text-anchor="middle" fill="#1c7c3c">9 φ18 @ 25 cm (malla inferior, cada dirección)</text>

  <!-- presión hacia arriba -->
  <g stroke="#1a63a8" stroke-width="1.3">
    <line x1="90" y1="238" x2="90" y2="210" marker-end="url(#up)"/>
    <line x1="140" y1="238" x2="140" y2="210" marker-end="url(#up)"/>
    <line x1="190" y1="238" x2="190" y2="210" marker-end="url(#up)"/>
    <line x1="240" y1="238" x2="240" y2="210" marker-end="url(#up)"/>
    <line x1="290" y1="238" x2="290" y2="210" marker-end="url(#up)"/>
    <line x1="340" y1="238" x2="340" y2="210" marker-end="url(#up)"/>
  </g>
  <line x1="70" y1="238" x2="390" y2="238" stroke="#1a63a8" stroke-width="1.2"/>
  <text x="230" y="252" font-size="11" text-anchor="middle" fill="#1a63a8" font-weight="bold">q_u = 24.8 tonf/m²  (N_u = 120 tonf / 4.84 m²)</text>

  <!-- secciones criticas -->
  <!-- momento en cara -->
  <line x1="201" y1="150" x2="201" y2="104" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="259" y1="150" x2="259" y2="104" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- punzonamiento d/2 -->
  <line x1="168" y1="150" x2="168" y2="132" stroke="#c07a00" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="292" y1="150" x2="292" y2="132" stroke="#c07a00" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="230" y="128" font-size="9.5" text-anchor="middle" fill="#c07a00">punz. a d/2</text>
  <!-- corte 1 dir a d (gobierna) -->
  <line x1="134" y1="150" x2="134" y2="208" stroke="#c0392b" stroke-width="2"/>
  <line x1="326" y1="150" x2="326" y2="208" stroke="#c0392b" stroke-width="2"/>
  <text x="105" y="146" font-size="9.5" fill="#c0392b" font-weight="bold">corte 1-dir a d</text>

  <!-- cotas -->
  <line x1="70" y1="270" x2="390" y2="270" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="230" y="284" font-size="11" text-anchor="middle" fill="#555">B = L = 2.20 m</text>
  <line x1="404" y1="150" x2="404" y2="208" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="410" y="182" font-size="10.5" fill="#555" transform="rotate(-90 410,182)">h=55 · d≈46</text>

  <!-- =============== PANEL B: usos y el giro del efecto de tamaño =============== -->
  <text x="470" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Uso demanda/capacidad de cada verificación</text>

  <!-- limite 1.0 -->
  <line x1="760" y1="66" x2="760" y2="230" stroke="#c0392b" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="760" y="63" font-size="10" text-anchor="middle" fill="#c0392b">1.0</text>
  <line x1="560" y1="230" x2="560" y2="66" stroke="#333" stroke-width="1"/>

  <!-- barras: 200px = 1.0, desde x=560 -->
  <!-- presion 0.93 -->
  <rect x="560" y="74" width="186" height="18" fill="#eef2f7" stroke="#5a6b7c" stroke-width="1.2"/>
  <text x="565" y="87" font-size="10.5" fill="#4a5b6c">Presión de contacto (servicio)</text>
  <text x="752" y="87" font-size="10" fill="#4a5b6c">0.93</text>
  <!-- punzonamiento 0.61 -->
  <rect x="560" y="104" width="122" height="18" fill="#fff5e6" stroke="#c07a00" stroke-width="1.2"/>
  <text x="565" y="117" font-size="10.5" fill="#a56a00">Punzonamiento (2 dir, con λ_s)</text>
  <text x="688" y="117" font-size="10" fill="#a56a00">0.61</text>
  <!-- corte 1 dir 0.86 gobierna -->
  <rect x="560" y="134" width="172" height="18" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="565" y="147" font-size="10.5" fill="#c0392b" font-weight="bold">Corte 1 dir (efecto de tamaño)</text>
  <text x="738" y="147" font-size="10" fill="#c0392b" font-weight="bold">0.86 ◄</text>
  <!-- flexion 0.57 -->
  <rect x="560" y="164" width="114" height="18" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.2"/>
  <text x="565" y="177" font-size="10.5" fill="#1c7c3c">Flexión (acero mínimo gobierna)</text>
  <text x="680" y="177" font-size="10" fill="#1c7c3c">0.57</text>
  <!-- desarrollo 0.88 -->
  <rect x="560" y="194" width="172" height="18" fill="#eef2f7" stroke="#5a6b7c" stroke-width="1.2"/>
  <text x="565" y="207" font-size="10.5" fill="#4a5b6c">Desarrollo de la barra φ18</text>
  <text x="738" y="207" font-size="10" fill="#4a5b6c">0.86</text>

  <!-- caja del giro -->
  <rect x="470" y="300" width="340" height="128" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="482" y="322" font-size="11.5" fill="#222" font-weight="bold">El giro de ACI 318-25: el efecto de tamaño</text>
  <text x="482" y="342" font-size="11" fill="#333">El corte en una dirección de una zapata (sin</text>
  <text x="482" y="358" font-size="11" fill="#333">estribos, poco armada) usa V_c = 2.11·λ_s·(ρ_w)^⅓·√f'c·b·d:</text>
  <text x="482" y="380" font-size="11" fill="#888">  código antiguo (0.53√f'c):  φV_c = 63.6 tonf → uso 0.38</text>
  <text x="482" y="398" font-size="11" fill="#c0392b" font-weight="bold">  ACI 318-25 (efecto tamaño):  φV_c = 27.9 tonf → uso 0.86</text>
  <text x="482" y="418" font-size="10" fill="#555">Antes gobernaba el punzonamiento; ahora manda el corte 1-dir.</text>
</svg>
