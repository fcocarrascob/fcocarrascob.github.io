<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="840" height="400" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Los dos ejes sobre la curva de columna (F_cr vs. esbeltez)</text>

  <!-- ejes -->
  <line x1="90" y1="70" x2="90" y2="360" stroke="#333" stroke-width="1.2"/>
  <line x1="90" y1="360" x2="800" y2="360" stroke="#333" stroke-width="1.2"/>
  <text x="70" y="66" font-size="10.5" text-anchor="end" fill="#333">F_cr</text>
  <text x="70" y="74" font-size="9" text-anchor="end" fill="#888">kgf/cm²</text>
  <text x="800" y="378" font-size="10.5" text-anchor="end" fill="#333">L_c / r</text>

  <!-- Fy dashed -->
  <line x1="90" y1="70" x2="800" y2="70" stroke="#c07a00" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="96" y="66" font-size="10" fill="#a56a00">F_y = 3520  (techo del material)</text>

  <!-- marcas eje x -->
  <line x1="90" y1="360" x2="90" y2="364" stroke="#333"/><text x="90" y="376" font-size="9.5" text-anchor="middle" fill="#555">0</text>
  <line x1="265" y1="360" x2="265" y2="364" stroke="#333"/><text x="265" y="376" font-size="9.5" text-anchor="middle" fill="#555">50</text>
  <line x1="440" y1="360" x2="440" y2="364" stroke="#333"/><text x="440" y="376" font-size="9.5" text-anchor="middle" fill="#555">100</text>
  <line x1="615" y1="360" x2="615" y2="364" stroke="#333"/><text x="615" y="376" font-size="9.5" text-anchor="middle" fill="#555">150</text>
  <line x1="790" y1="360" x2="790" y2="364" stroke="#333"/><text x="790" y="376" font-size="9.5" text-anchor="middle" fill="#555">200</text>

  <!-- transicion Lc/r = 113.4 -->
  <line x1="487" y1="70" x2="487" y2="360" stroke="#9bb0c6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="487" y="352" font-size="9.5" text-anchor="middle" fill="#7a8ba0">λ = 113  (quiebre)</text>

  <!-- rama inelastica (E3-2) -->
  <polyline points="90,70 160,78 230,102 293,133 370,179 440,221 487,247" fill="none" stroke="#1c7c3c" stroke-width="2"/>
  <!-- rama elastica (E3-3) -->
  <polyline points="487,247 567,282 650,303 790,324" fill="none" stroke="#1a63a8" stroke-width="2"/>

  <text x="300" y="88" font-size="10" fill="#1c7c3c">inelástico (Ec. E3-2)</text>
  <text x="640" y="270" font-size="10" fill="#1a63a8">elástico: 0.877·F_e (Ec. E3-3)</text>

  <!-- punto eje debil -->
  <circle cx="293" cy="133" r="4.5" fill="#1c7c3c"/>
  <line x1="293" y1="133" x2="293" y2="360" stroke="#1c7c3c" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="300" y="126" font-size="10.5" fill="#1c7c3c" font-weight="bold">eje débil Y</text>
  <text x="300" y="140" font-size="9.5" fill="#1c7c3c">λ=58, F_cr=2751</text>

  <!-- punto eje fuerte -->
  <circle cx="567" cy="282" r="4.5" fill="#c0392b"/>
  <line x1="567" y1="282" x2="567" y2="360" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3 3"/>
  <text x="574" y="278" font-size="10.5" fill="#c0392b" font-weight="bold">eje fuerte X  (gobierna)</text>
  <text x="574" y="292" font-size="9.5" fill="#c0392b">λ=136, F_cr=950</text>

  <!-- flecha diferencia -->
  <line x1="567" y1="200" x2="293" y2="200" stroke="#888" stroke-width="0.8" stroke-dasharray="2 2"/>
  <text x="430" y="195" font-size="9.5" text-anchor="middle" fill="#888">el mismo perfil, 2.9× menos capacidad, solo por la esbeltez</text>
</svg>
