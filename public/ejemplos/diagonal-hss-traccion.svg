<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="fr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="840" height="470" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Diagonal HSS a tracción: la conexión soldada gobierna la rotura</text>

  <!-- =============== PANEL A: detalle de conexión =============== -->
  <text x="60" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Conexión: HSS ranurado a plancha gusset concéntrica (soldada)</text>

  <!-- tubo HSS (vista lateral) -->
  <rect x="250" y="150" width="215" height="62" fill="#eef2f7" stroke="#333" stroke-width="1.6"/>
  <line x1="250" y1="162" x2="465" y2="162" stroke="#9bb0c6" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="250" y1="200" x2="465" y2="200" stroke="#9bb0c6" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="440" y="142" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">HSS 4×4×1/4</text>

  <!-- plancha gusset entrando por la ranura -->
  <rect x="70" y="174" width="245" height="14" fill="#dfe5ec" stroke="#333" stroke-width="1.3"/>
  <text x="150" y="169" font-size="10.5" text-anchor="middle" fill="#555">plancha gusset t = 16 mm</text>
  <text x="120" y="205" font-size="10.5" text-anchor="middle" fill="#555">(al marco)</text>

  <!-- cordones de filete a lo largo de l -->
  <path d="M250,174 l6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6" fill="none" stroke="#c0392b" stroke-width="1.6"/>
  <path d="M250,188 l6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6 6,6 6,-6" fill="none" stroke="#c0392b" stroke-width="1.6"/>
  <text x="322" y="234" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">4 cordones de filete, w = 6 mm</text>

  <!-- cota l -->
  <line x1="250" y1="248" x2="322" y2="248" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="286" y="262" font-size="11" text-anchor="middle" fill="#555">l = 15 cm</text>

  <!-- fuerza Pu -->
  <line x1="465" y1="181" x2="520" y2="181" stroke="#c0392b" stroke-width="2.4" marker-end="url(#fr)"/>
  <text x="500" y="172" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">P_u = 42 tonf</text>

  <!-- ranura marcada -->
  <line x1="250" y1="181" x2="315" y2="181" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="250" y="128" font-size="10" text-anchor="middle" fill="#888">ranura</text>
  <line x1="250" y1="150" x2="250" y2="132" stroke="#888" stroke-width="0.7"/>

  <!-- corte A-A: seccion del HSS con plancha -->
  <text x="130" y="278" font-size="11" text-anchor="middle" fill="#555" font-weight="bold">Corte A–A (retraso de cortante, Caso 6)</text>
  <rect x="80" y="292" width="100" height="100" fill="none" stroke="#333" stroke-width="1.6"/>
  <rect x="90" y="302" width="80" height="80" fill="none" stroke="#9bb0c6" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="130" y1="288" x2="130" y2="396" stroke="#333" stroke-width="1.4"/>
  <text x="130" y="408" font-size="10.5" text-anchor="middle" fill="#333">plancha (plano de conexión)</text>
  <circle cx="130" cy="342" r="2.6" fill="#1a63a8"/>
  <line x1="130" y1="342" x2="164" y2="342" stroke="#1a63a8" stroke-width="1" marker-end="url(#ar)"/>
  <text x="200" y="338" font-size="10.5" fill="#1a63a8">x̄ = 3.81 cm</text>
  <text x="200" y="352" font-size="9.5" fill="#888">(centroide del semi-perfil)</text>
  <line x1="80" y1="404" x2="180" y2="404" stroke="#555" stroke-width="0.8" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="130" y="418" font-size="10" text-anchor="middle" fill="#555">B = H = 10.2 cm</text>

  <text x="300" y="300" font-size="10.5" fill="#333">U = 1 − x̄/l</text>
  <text x="300" y="318" font-size="10.5" fill="#333">= 1 − 3.81/15 = 0.75</text>
  <text x="300" y="342" font-size="10.5" fill="#333">A_n = A_g − 2·t·w_ranura</text>
  <text x="300" y="360" font-size="10.5" fill="#333">= 21.7 − 2.24 = 19.5 cm²</text>
  <text x="300" y="378" font-size="10.5" fill="#1a63a8" font-weight="bold">A_e = A_n·U = 14.5 cm²</text>

  <!-- =============== PANEL B: demanda vs capacidad =============== -->
  <text x="560" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Estados límite (φP_n vs P_u = 42 tonf)</text>

  <!-- linea de demanda -->
  <line x1="694" y1="70" x2="694" y2="250" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="694" y="66" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">P_u = 42</text>

  <!-- eje -->
  <line x1="560" y1="250" x2="810" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="560" y1="80" x2="560" y2="250" stroke="#333" stroke-width="1"/>

  <!-- barras: scale 3.2 px/tonf desde x=560 -->
  <!-- yield 68.7 -->
  <rect x="560" y="92" width="220" height="20" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.3"/>
  <text x="565" y="106" font-size="10.5" fill="#1c7c3c">Fluencia bruta  φP_n = 68.7</text>
  <text x="800" y="106" font-size="10" text-anchor="end" fill="#1c7c3c">0.61</text>
  <!-- rupture 47.5 (gobierna) -->
  <rect x="560" y="130" width="152" height="20" fill="#fdecea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="565" y="144" font-size="10.5" fill="#c0392b" font-weight="bold">Rotura (retraso cortante)  φP_n = 47.5</text>
  <text x="800" y="144" font-size="10" text-anchor="end" fill="#c0392b" font-weight="bold">0.88 ◄</text>
  <!-- weld 56.4 -->
  <rect x="560" y="168" width="180" height="20" fill="#fff5e6" stroke="#c07a00" stroke-width="1.3"/>
  <text x="565" y="182" font-size="10.5" fill="#a56a00">Soldadura de filete  φR_n = 56.4</text>
  <text x="800" y="182" font-size="10" text-anchor="end" fill="#a56a00">0.75</text>
  <!-- block shear 69.5 -->
  <rect x="560" y="206" width="222" height="20" fill="#eef2f7" stroke="#5a6b7c" stroke-width="1.3"/>
  <text x="565" y="220" font-size="10.5" fill="#4a5b6c">Corte de bloque  φR_n = 69.5</text>
  <text x="800" y="220" font-size="10" text-anchor="end" fill="#4a5b6c">0.60</text>

  <!-- caja lever -->
  <rect x="490" y="300" width="320" height="120" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="502" y="322" font-size="11.5" fill="#222" font-weight="bold">La palanca de diseño: la longitud l</text>
  <text x="502" y="342" font-size="11" fill="#333">Gobierna la rotura frágil, no el cuerpo del tubo.</text>
  <text x="502" y="360" font-size="11" fill="#333">Alargar la soldadura sube U y la capacidad:</text>
  <text x="502" y="380" font-size="11" fill="#1c7c3c">  l = 15 cm → U = 0.75 → φP_n = 47.5 tonf</text>
  <text x="502" y="398" font-size="11" fill="#1c7c3c">  l = 20 cm → U = 0.81 → φP_n = 51.5 tonf</text>
  <text x="502" y="414" font-size="10" fill="#888">Agrandar el HSS no ayuda: la falla vive en la conexión.</text>
</svg>
