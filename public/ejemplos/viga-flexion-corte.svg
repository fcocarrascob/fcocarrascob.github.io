<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="dn" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,0 L5,10 z" fill="#c0392b"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="840" height="440" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Viga a flexión y corte: del modelo de cargas al par interno</text>

  <!-- =================== PANEL A: cargas + diagramas =================== -->
  <text x="90" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Modelo de cargas (vano simplemente apoyado)</text>

  <!-- carga distribuida -->
  <line x1="90" y1="66" x2="390" y2="66" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="110" y1="66" x2="110" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="150" y1="66" x2="150" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="190" y1="66" x2="190" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="230" y1="66" x2="230" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="270" y1="66" x2="270" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="310" y1="66" x2="310" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <line x1="350" y1="66" x2="350" y2="86" stroke="#c0392b" stroke-width="1.2" marker-end="url(#dn)"/>
  <text x="240" y="62" font-size="12" text-anchor="middle" fill="#c0392b" font-weight="bold">w_u = 6.0 tonf/m</text>

  <!-- viga -->
  <rect x="90" y="90" width="300" height="9" fill="#eef2f7" stroke="#333" stroke-width="1.2"/>
  <!-- apoyos -->
  <path d="M90,99 L80,114 L100,114 z" fill="#dfe5ec" stroke="#333" stroke-width="1.1"/>
  <path d="M390,99 L380,114 L400,114 z" fill="#dfe5ec" stroke="#333" stroke-width="1.1"/>
  <circle cx="384" cy="118" r="3" fill="none" stroke="#333"/>
  <circle cx="396" cy="118" r="3" fill="none" stroke="#333"/>
  <!-- luz -->
  <line x1="90" y1="130" x2="390" y2="130" stroke="#555" stroke-width="1" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="240" y="145" font-size="12" text-anchor="middle" fill="#555">L = 6.0 m</text>

  <!-- diagrama de momento -->
  <line x1="90" y1="185" x2="390" y2="185" stroke="#333" stroke-width="1"/>
  <text x="80" y="189" font-size="11" text-anchor="end" fill="#333">M</text>
  <path d="M90,185 Q240,289 390,185 Z" fill="#eaf1fb" stroke="#1a63a8" stroke-width="1.6"/>
  <text x="240" y="262" font-size="12" text-anchor="middle" fill="#1a63a8" font-weight="bold">M_u = w_u·L²/8 = 27 tonf·m</text>

  <!-- diagrama de corte -->
  <line x1="90" y1="345" x2="390" y2="345" stroke="#333" stroke-width="1"/>
  <text x="80" y="349" font-size="11" text-anchor="end" fill="#333">V</text>
  <polygon points="90,305 240,345 90,345" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.4"/>
  <polygon points="240,345 390,385 390,345" fill="#fbeaea" stroke="#c0392b" stroke-width="1.4"/>
  <line x1="90" y1="305" x2="390" y2="385" stroke="#555" stroke-width="1"/>
  <text x="86" y="300" font-size="11.5" fill="#1c7c3c" font-weight="bold">V_u = 18 tonf</text>
  <circle cx="117" cy="312" r="3" fill="#1c7c3c"/>
  <text x="124" y="309" font-size="11" fill="#1c7c3c">V@d = 14.8 tonf</text>
  <text x="396" y="388" font-size="11.5" fill="#c0392b">−18 tonf</text>

  <!-- =================== PANEL B: sección + par interno =================== -->
  <text x="500" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Sección y equilibrio a flexión</text>

  <!-- sección transversal -->
  <rect x="500" y="80" width="90" height="180" fill="none" stroke="#333" stroke-width="1.6"/>
  <rect x="512" y="92" width="66" height="156" fill="none" stroke="#1c7c3c" stroke-width="1.4" rx="4"/>
  <circle cx="521" cy="240" r="6" fill="#333"/>
  <circle cx="545" cy="240" r="6" fill="#333"/>
  <circle cx="569" cy="240" r="6" fill="#333"/>

  <!-- cotas sección -->
  <line x1="500" y1="70" x2="590" y2="70" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="545" y="66" font-size="10.5" text-anchor="middle" fill="#555">b = 30 cm</text>
  <line x1="486" y1="80" x2="486" y2="240" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="482" y="164" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 482,164)">d = 54 cm</text>
  <line x1="604" y1="80" x2="604" y2="260" stroke="#555" stroke-width="0.9" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text x="608" y="172" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 608,172)">h = 60 cm</text>

  <text x="545" y="284" font-size="11" text-anchor="middle" fill="#333">3 φ25  =  14.7 cm²</text>
  <text x="545" y="300" font-size="11" text-anchor="middle" fill="#1c7c3c">Estribo φ10 @ 25 (2 ramas)</text>

  <!-- diagrama de deformaciones -->
  <text x="700" y="70" font-size="11" text-anchor="middle" fill="#555">deformaciones</text>
  <line x1="700" y1="80" x2="700" y2="260" stroke="#333" stroke-width="1"/>
  <polygon points="700,80 664,80 700,124" fill="#fdecea" stroke="#c0392b" stroke-width="1.3"/>
  <polygon points="700,124 762,260 700,260" fill="#eaf1fb" stroke="#1a63a8" stroke-width="1.3"/>
  <line x1="656" y1="124" x2="770" y2="124" stroke="#555" stroke-width="0.8" stroke-dasharray="5 4"/>
  <text x="662" y="94" font-size="10.5" fill="#c0392b">ε_cu = 0.003</text>
  <text x="770" y="140" font-size="10.5" text-anchor="end" fill="#555">L.N.  c = 11.4 cm</text>
  <text x="720" y="250" font-size="10.5" fill="#1a63a8" font-weight="bold">ε_t = 0.0112 ≥ 0.005 ✓</text>

  <!-- resultado -->
  <rect x="500" y="320" width="300" height="86" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="512" y="341" font-size="11.5" fill="#222">Bloque:  a = A_s·f_y / (0.85·f'c·b) = 9.70 cm</text>
  <text x="512" y="361" font-size="11.5" fill="#222">φM_n = 0.90·A_s·f_y·(d − a/2) = 27.4 tonf·m</text>
  <text x="512" y="381" font-size="11.5" fill="#1c7c3c" font-weight="bold">φM_n = 27.4 ≥ M_u = 27 tonf·m  ✓  (φ = 0.90)</text>
  <text x="512" y="399" font-size="11" fill="#555">controlada por tracción: c/d = 0.21 ≤ 0.375</text>
</svg>
