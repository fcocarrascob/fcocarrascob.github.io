<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="460" fill="#ffffff"/>
  <text x="430" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Diagrama de interacción P–M: la combinación sísmica (axial mínimo) gobierna</text>

  <!-- ejes -->
  <line x1="70" y1="70" x2="70" y2="400" stroke="#333" stroke-width="1.2"/>
  <line x1="70" y1="400" x2="835" y2="400" stroke="#333" stroke-width="1.2"/>
  <text x="60" y="74" font-size="11" text-anchor="end" fill="#333">φP_n</text>
  <text x="60" y="86" font-size="9" text-anchor="end" fill="#888">tonf</text>
  <text x="835" y="420" font-size="11" text-anchor="end" fill="#333">φM_n (tonf·m)</text>

  <!-- ticks P: 0..400, y=400 abajo, escala 0.775 px/tonf; ejes M escala 6.6 px/(tonf·m) desde x=70? -->
  <!-- Reescala: M 0..50 -> x 70..830 (15.2 px por tonf*m); P 0..400 -> y 400..70 (0.825 px/tonf) -->
  <!-- ticks M -->
  <line x1="70" y1="400" x2="70" y2="404" stroke="#333"/><text x="70" y="416" font-size="9.5" text-anchor="middle" fill="#555">0</text>
  <line x1="222" y1="400" x2="222" y2="404" stroke="#333"/><text x="222" y="416" font-size="9.5" text-anchor="middle" fill="#555">10</text>
  <line x1="374" y1="400" x2="374" y2="404" stroke="#333"/><text x="374" y="416" font-size="9.5" text-anchor="middle" fill="#555">20</text>
  <line x1="526" y1="400" x2="526" y2="404" stroke="#333"/><text x="526" y="416" font-size="9.5" text-anchor="middle" fill="#555">30</text>
  <line x1="678" y1="400" x2="678" y2="404" stroke="#333"/><text x="678" y="416" font-size="9.5" text-anchor="middle" fill="#555">40</text>
  <line x1="830" y1="400" x2="830" y2="404" stroke="#333"/><text x="830" y="416" font-size="9.5" text-anchor="middle" fill="#555">50</text>
  <!-- ticks P -->
  <line x1="66" y1="400" x2="70" y2="400" stroke="#333"/><text x="62" y="404" font-size="9.5" text-anchor="end" fill="#555">0</text>
  <line x1="66" y1="317.5" x2="70" y2="317.5" stroke="#333"/><text x="62" y="321" font-size="9.5" text-anchor="end" fill="#555">100</text>
  <line x1="66" y1="235" x2="70" y2="235" stroke="#333"/><text x="62" y="239" font-size="9.5" text-anchor="end" fill="#555">200</text>
  <line x1="66" y1="152.5" x2="70" y2="152.5" stroke="#333"/><text x="62" y="156" font-size="9.5" text-anchor="end" fill="#555">300</text>

  <!-- tope phiPn,max = 357.7 -> y=400-357.7*0.825=104.9 -->
  <line x1="70" y1="105" x2="830" y2="105" stroke="#c07a00" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="76" y="100" font-size="10" fill="#a56a00">φP_n,máx = 0.65·0.80·P₀ = 357.7 tonf  (corta la punta frágil)</text>

  <!-- curva de diseño: (M,P) -> x=70+M*15.2, y=400-P*0.825 -->
  <!-- (0,357.7)(16.88,357.7)(23.52,312.5)(28.80,264.1)(32.96,210.8)(36.25,155.1 bal)(39.60,137.2)(43.16,114.3 Mmax)(40.78,65.9)(35.42,31.8)(29.84,0) -->
  <polyline points="70,105 327,105 428,142 508,182 571,226 621,272 672,287 726,306 690,346 608,374 524,400"
            fill="none" stroke="#1a63a8" stroke-width="2.3"/>
  <text x="150" y="200" font-size="11" fill="#1a63a8" font-weight="bold">frontera de diseño</text>
  <text x="150" y="215" font-size="10.5" fill="#1a63a8">φP_n – φM_n</text>
  <text x="150" y="229" font-size="9.5" fill="#888">(dentro = admisible)</text>

  <!-- punto balanceado -->
  <circle cx="621" cy="272" r="4" fill="#5a6b7c"/>
  <text x="600" y="258" font-size="10" fill="#4a5b6c" text-anchor="end">balanceado ε_t=ε_ty</text>
  <text x="600" y="270" font-size="9.5" fill="#4a5b6c" text-anchor="end">(aquí φ deja 0.65 y sube)</text>

  <!-- combo C1 gravedad (12,260) -> x=70+182.4=252, y=400-214.5=185.5 -->
  <circle cx="252" cy="186" r="5" fill="#1c7c3c"/>
  <text x="262" y="183" font-size="10.5" fill="#1c7c3c" font-weight="bold">C1  1.2D+1.6L</text>
  <text x="262" y="196" font-size="9.5" fill="#1c7c3c">P_u=260  M_u=12  · uso 0.41</text>

  <!-- combo C2 sismo (28,70) -> x=70+425.6=495.6, y=400-57.75=342.25 -->
  <circle cx="496" cy="342" r="5.5" fill="#c0392b"/>
  <text x="300" y="345" font-size="10.5" fill="#c0392b" font-weight="bold" text-anchor="end">C2  0.9D+1.0E  ►</text>
  <text x="300" y="358" font-size="9.5" fill="#c0392b" text-anchor="end">P_u=70  M_u=28  · uso 0.68 ◄ gobierna</text>
  <!-- flecha C2 a la frontera -->
  <line x1="496" y1="342" x2="699" y2="342" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="705" y="339" font-size="9" fill="#c0392b">φM_n=41.4</text>

  <!-- caja tesis -->
  <rect x="470" y="60" width="360" height="86" rx="6" fill="#fdecea" stroke="#c0392b"/>
  <text x="482" y="80" font-size="11" fill="#222" font-weight="bold">El axial máximo no es el caso crítico</text>
  <text x="482" y="98" font-size="10" fill="#333">C1 lleva 3.7× más axial (260 vs 70 tonf) pero cae</text>
  <text x="482" y="112" font-size="10" fill="#333">holgado. C2 (sismo) tiene poco axial y mucho momento:</text>
  <text x="482" y="126" font-size="10" fill="#333">perder compresión la acerca a la frontera → gobierna.</text>
  <text x="482" y="140" font-size="9" fill="#888">Hay que verificar TODAS las combinaciones, no solo P_u máx.</text>
</svg>
