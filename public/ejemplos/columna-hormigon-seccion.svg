<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="840" height="400" fill="#ffffff"/>
  <text x="420" y="26" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Cada punto del diagrama: fijar el eje neutro c y equilibrar la sección</text>

  <!-- ================= SECCION ================= -->
  <text x="140" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Sección 50×50 — 8Ø25 (ρ = 1.57 %)</text>
  <!-- cuadrado 50cm -> 180px, 3.6px/cm, x 90..270, y 80..260 -->
  <rect x="90" y="80" width="180" height="180" fill="#eef2f7" stroke="#333" stroke-width="1.6"/>
  <rect x="104" y="94" width="152" height="152" fill="none" stroke="#9bb0c6" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- barras: filas a 6/25/44 cm -> y 101.6/170/238.4 ; cols a 6/25/44 -> x 111.6/180/248.4 -->
  <circle cx="111.6" cy="101.6" r="6" fill="#333"/><circle cx="180" cy="101.6" r="6" fill="#333"/><circle cx="248.4" cy="101.6" r="6" fill="#333"/>
  <circle cx="111.6" cy="170" r="6" fill="#333"/><circle cx="248.4" cy="170" r="6" fill="#333"/>
  <circle cx="111.6" cy="238.4" r="6" fill="#333"/><circle cx="180" cy="238.4" r="6" fill="#333"/><circle cx="248.4" cy="238.4" r="6" fill="#333"/>
  <!-- dims -->
  <line x1="90" y1="278" x2="270" y2="278" stroke="#555" stroke-width="0.8" marker-start="url(#ar2)" marker-end="url(#ar2)"/>
  <text x="180" y="292" font-size="10.5" text-anchor="middle" fill="#555">h = 50 cm</text>
  <line x1="72" y1="80" x2="72" y2="260" stroke="#555" stroke-width="0.8" marker-start="url(#ar2)" marker-end="url(#ar2)"/>
  <text x="66" y="174" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 66 174)">b = 50 cm</text>
  <text x="180" y="316" font-size="9.5" text-anchor="middle" fill="#888">recubr. 40 mm · estribos · d' = 6 cm a la barra</text>

  <!-- ================= COMPATIBILIDAD ================= -->
  <text x="560" y="52" font-size="11.5" fill="#1a63a8" font-weight="bold">Compatibilidad (ε_cu = 0.003) → equilibrio</text>
  <!-- canto de la seccion, vertical, top=comprimido -->
  <line x1="430" y1="80" x2="430" y2="260" stroke="#333" stroke-width="1.4"/>
  <text x="424" y="76" font-size="9.5" text-anchor="end" fill="#888">borde comprimido</text>
  <!-- eje neutro balanceado c=26.4cm -> y=80+95=175 -->
  <line x1="430" y1="175" x2="700" y2="175" stroke="#9bb0c6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="706" y="178" font-size="9.5" fill="#7a8ba0">eje neutro c</text>
  <!-- triangulo de deformaciones: compresion a la derecha arriba, traccion a la izquierda abajo -->
  <!-- pivote en (430,175); arriba +0.003 a x=560; abajo -0.002 a x=... escala -->
  <polygon points="430,175 560,80 430,80" fill="#fdecea" stroke="#c0392b" stroke-width="1.2"/>
  <polygon points="430,175 350,260 430,260" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.2"/>
  <text x="566" y="84" font-size="10" fill="#c0392b">ε_cu = 0.003 (compresión)</text>
  <text x="344" y="256" font-size="10" fill="#1c7c3c" text-anchor="end">ε_t = ε_ty = 0.002</text>
  <text x="344" y="242" font-size="9" fill="#1c7c3c" text-anchor="end">(condición balanceada)</text>

  <!-- pasos de equilibrio -->
  <rect x="470" y="270" width="330" height="118" rx="6" fill="#f4f7fb" stroke="#1a63a8"/>
  <text x="482" y="289" font-size="10.5" fill="#222" font-weight="bold">Para cada c se equilibra la sección:</text>
  <text x="482" y="306" font-size="10" fill="#333">ε_si = 0.003·(c − d_i)/c   →   f_si = E_s·ε_si  (≤ f_y)</text>
  <text x="482" y="322" font-size="10" fill="#333">a = β₁c ,  C_c = 0.85·f'_c·a·b</text>
  <text x="482" y="338" font-size="10" fill="#333">P_n = C_c + Σ f_si·A_si</text>
  <text x="482" y="354" font-size="10" fill="#333">M_n = C_c·(h/2 − a/2) + Σ f_si·A_si·(h/2 − d_i)</text>
  <text x="482" y="372" font-size="9.5" fill="#888">Barrer c de ∞ a 0 traza toda la frontera P_n–M_n.</text>
</svg>
