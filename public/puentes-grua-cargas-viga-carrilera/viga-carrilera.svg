<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="bx" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6b9c"/>
    </marker>
  </defs>
  <rect width="920" height="440" fill="#ffffff"/>
  <text x="460" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">La viga carrilera: flexión biaxial y el canal-tapa que resiste el surge</text>

  <!-- ===== Cross-section (left) ===== -->
  <g>
    <!-- cap channel (over top flange) -->
    <rect x="110" y="150" width="170" height="16" fill="#cbbf9a" stroke="#8a7449"/>
    <rect x="110" y="166" width="10" height="16" fill="#cbbf9a" stroke="#8a7449"/>
    <rect x="270" y="166" width="10" height="16" fill="#cbbf9a" stroke="#8a7449"/>
    <!-- rail -->
    <rect x="185" y="136" width="20" height="14" fill="#8a7439" stroke="#6b5a38"/>
    <!-- top flange -->
    <rect x="125" y="182" width="140" height="14" fill="#e0d8c6" stroke="#8a857c"/>
    <!-- web -->
    <rect x="188" y="196" width="14" height="140" fill="#efece6" stroke="#8a857c"/>
    <!-- bottom flange -->
    <rect x="140" y="336" width="110" height="14" fill="#e0d8c6" stroke="#8a857c"/>

    <!-- strong axis x-x -->
    <line x1="95" y1="266" x2="300" y2="266" stroke="#b02a1a" stroke-width="0.9" stroke-dasharray="6 4"/>
    <text x="308" y="270" font-size="11" fill="#b02a1a" font-weight="bold">x</text>
    <!-- weak axis y-y -->
    <line x1="195" y1="120" x2="195" y2="366" stroke="#2d6b9c" stroke-width="0.9" stroke-dasharray="6 4"/>
    <text x="195" y="384" font-size="11" text-anchor="middle" fill="#2d6b9c" font-weight="bold">y</text>

    <!-- labels -->
    <text x="330" y="158" font-size="11" fill="#8a7449">canal-tapa</text>
    <text x="330" y="172" font-size="11" fill="#8a7449">(cap channel)</text>
    <line x1="284" y1="158" x2="326" y2="158" stroke="#ccc" stroke-width="0.8"/>
    <text x="330" y="330" font-size="11" fill="#8a857c">perfil I</text>
  </g>

  <!-- vertical load on strong axis -->
  <line x1="195" y1="100" x2="195" y2="132" stroke="#b02a1a" stroke-width="2.6" marker-end="url(#ax)"/>
  <text x="195" y="92" font-size="11" text-anchor="middle" fill="#b02a1a" font-weight="bold">vertical de rueda</text>

  <!-- lateral surge on top flange -->
  <line x1="120" y1="158" x2="90" y2="158" stroke="#2d6b9c" stroke-width="2.4" marker-end="url(#bx)"/>
  <text x="60" y="145" font-size="10.5" fill="#2d6b9c" font-weight="bold">surge</text>

  <!-- ===== Right column: explanation ===== -->
  <g font-size="12" fill="#333">
    <text x="470" y="90" font-size="13" fill="#b02a1a" font-weight="bold">Eje fuerte (x) — carga vertical</text>
    <text x="470" y="112">Las ruedas flexionan toda la sección respecto</text>
    <text x="470" y="130">al eje x. Como la carga es móvil, el momento</text>
    <text x="470" y="148">máximo se busca con líneas de influencia</text>
    <text x="470" y="166">(momento máximo absoluto).</text>

    <text x="470" y="200" font-size="13" fill="#2d6b9c" font-weight="bold">Eje débil (y) — surge lateral</text>
    <text x="470" y="222">El ala sola no resiste el empuje lateral. Por eso</text>
    <text x="470" y="240">se le suma un <tspan fill="#8a7449" font-weight="bold">canal-tapa</tspan>: el ala superior + el</text>
    <text x="470" y="258">canal trabajan como una <tspan font-weight="bold">viga horizontal</tspan> que</text>
    <text x="470" y="276">lleva el surge a las columnas. Diseño biaxial:</text>
  </g>

  <!-- biaxial interaction -->
  <rect x="470" y="288" width="380" height="30" rx="5" fill="#f6f0e4" stroke="#8a7449"/>
  <text x="660" y="308" font-size="13" text-anchor="middle" fill="#333">M_ux / φM_nx  +  M_uy / φM_ny  ≤  1,0</text>

  <!-- deflection limits -->
  <rect x="470" y="332" width="380" height="86" rx="6" fill="#eef3f7" stroke="#2d6b9c"/>
  <text x="484" y="352" font-size="12.5" fill="#2d6b9c" font-weight="bold">Deflexión (suele mandar el tamaño)</text>
  <text x="484" y="373" font-size="11.5" fill="#33506b">Vertical:  δ ≤ L/600  (carga estática, sin impacto)</text>
  <text x="484" y="391" font-size="11.5" fill="#33506b">Grúas automatizadas:  L/800 a L/1000</text>
  <text x="484" y="409" font-size="11.5" fill="#33506b">Lateral (surge):  δ ≤ L/400</text>
</svg>
