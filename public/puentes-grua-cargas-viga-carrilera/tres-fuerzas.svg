<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="fv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="fl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6b9c"/>
    </marker>
    <marker id="fg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Tres efectos dinámicos sobre la viga carrilera (ASCE 7 §4.9)</text>
  <text x="470" y="49" font-size="11.5" text-anchor="middle" fill="#777">El impacto solo afecta a la fuerza vertical; el surge y el frenado se aplican sin impacto.</text>

  <!-- runway girder (isometric-ish) -->
  <!-- top flange plane -->
  <polygon points="150,180 700,180 760,210 210,210" fill="#e7dfce" stroke="#8a7449"/>
  <!-- web -->
  <polygon points="210,210 760,210 760,320 210,320" fill="#efece6" stroke="#8a857c"/>
  <!-- bottom flange -->
  <polygon points="210,320 760,320 795,338 245,338" fill="#e0d8c6" stroke="#8a857c"/>
  <!-- rail on top -->
  <rect x="230" y="168" width="430" height="8" fill="#8a7439" stroke="#6b5a38" transform="skewX(-27)" opacity="0"/>
  <polygon points="240,176 600,176 636,192 276,192" fill="#c9bf9a" stroke="#8a7449"/>
  <!-- wheel -->
  <circle cx="400" cy="168" r="12" fill="#cdd6de" stroke="#2d6b9c"/>

  <!-- 1) Vertical (with impact) -->
  <line x1="400" y1="120" x2="400" y2="158" stroke="#b02a1a" stroke-width="3" marker-end="url(#fv)"/>
  <text x="400" y="112" font-size="12.5" text-anchor="middle" fill="#b02a1a" font-weight="bold">1 · Vertical + impacto</text>
  <text x="400" y="96" font-size="11" text-anchor="middle" fill="#b02a1a">cab 25 % · pendant 10 % · monorriel 25 %</text>

  <!-- 2) Lateral surge on top flange -->
  <line x1="470" y1="188" x2="560" y2="188" stroke="#2d6b9c" stroke-width="3" marker-end="url(#fl)"/>
  <text x="600" y="176" font-size="12.5" fill="#2d6b9c" font-weight="bold">2 · Lateral (surge)</text>
  <text x="600" y="192" font-size="11" fill="#2d6b9c">20 % de (W_L + W_carro),</text>
  <text x="600" y="207" font-size="11" fill="#2d6b9c">repartida a los dos rieles</text>
  <text x="600" y="225" font-size="10" fill="#2d6b9c">→ carga el ala superior</text>

  <!-- 3) Longitudinal (braking) along rail -->
  <line x1="330" y1="184" x2="250" y2="220" stroke="#1c7c3c" stroke-width="3" marker-end="url(#fg)"/>
  <text x="150" y="250" font-size="12.5" fill="#1c7c3c" font-weight="bold">3 · Longitudinal</text>
  <text x="150" y="266" font-size="11" fill="#1c7c3c">(frenado del puente)</text>
  <text x="150" y="281" font-size="11" fill="#1c7c3c">10 % de las cargas de rueda</text>
  <text x="150" y="299" font-size="10" fill="#1c7c3c">→ a la arriostura longitudinal</text>

  <!-- callouts on section -->
  <text x="740" y="270" font-size="10.5" fill="#8a7449">alma</text>
  <line x1="735" y1="266" x2="600" y2="266" stroke="#ccc" stroke-width="0.8"/>
  <text x="470" y="360" font-size="10.5" fill="#8a7449" text-anchor="middle">ala inferior</text>

  <!-- summary bar -->
  <rect x="150" y="378" width="640" height="40" rx="6" fill="#f7f4ee" stroke="#c9c3b6"/>
  <text x="470" y="402" font-size="11.5" text-anchor="middle" fill="#444">Cada fuerza sigue su propio camino: la vertical flexiona el <tspan font-weight="bold">eje fuerte</tspan>; el surge, el <tspan font-weight="bold">ala superior</tspan> (eje débil); el frenado va a la <tspan font-weight="bold">arriostura longitudinal</tspan>.</text>
</svg>
