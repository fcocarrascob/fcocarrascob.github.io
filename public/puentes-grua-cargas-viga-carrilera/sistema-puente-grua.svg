<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="rd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
    <marker id="rb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2d6b9c"/>
    </marker>
    <marker id="rg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="470" y="28" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El sistema: la nave, la viga carrilera y el puente grúa que rueda sobre ella</text>

  <!-- ground -->
  <line x1="80" y1="410" x2="860" y2="410" stroke="#8a857c" stroke-width="1.5"/>

  <!-- ==== Columns (stepped) ==== -->
  <!-- left column: lower shaft wider, upper shaft narrower above bracket -->
  <rect x="170" y="240" width="26" height="170" fill="#dcd8d0" stroke="#8a857c"/>
  <rect x="176" y="110" width="14" height="130" fill="#dcd8d0" stroke="#8a857c"/>
  <rect x="744" y="240" width="26" height="170" fill="#dcd8d0" stroke="#8a857c"/>
  <rect x="750" y="110" width="14" height="130" fill="#dcd8d0" stroke="#8a857c"/>

  <!-- roof gable -->
  <polygon points="176,110 470,72 764,110 764,120 470,84 176,120" fill="#efece6" stroke="#8a857c"/>

  <!-- ==== Brackets + runway girders ==== -->
  <!-- left bracket + runway girder (seen end-on as a box) -->
  <rect x="196" y="232" width="40" height="20" fill="#dcd8d0" stroke="#8a857c"/>
  <rect x="200" y="222" width="34" height="22" fill="#cbbf9a" stroke="#8a7449"/>
  <rect x="704" y="222" width="34" height="22" fill="#cbbf9a" stroke="#8a7449"/>
  <rect x="704" y="232" width="40" height="20" fill="#dcd8d0" stroke="#8a857c"/>
  <!-- rails -->
  <rect x="210" y="216" width="14" height="6" fill="#8a7439" stroke="#6b5a38"/>
  <rect x="714" y="216" width="14" height="6" fill="#8a7439" stroke="#6b5a38"/>

  <!-- ==== Bridge crane spanning rail to rail ==== -->
  <rect x="224" y="204" width="490" height="14" fill="#e7dfce" stroke="#8a7449"/>
  <text x="469" y="199" font-size="11" text-anchor="middle" fill="#6b5a38">puente (viga del puente grúa) — luz S</text>
  <!-- end trucks / wheels on rails -->
  <circle cx="219" cy="216" r="4" fill="#6b5a38"/>
  <circle cx="719" cy="216" r="4" fill="#6b5a38"/>

  <!-- ==== Trolley near left rail ==== -->
  <rect x="300" y="192" width="46" height="24" fill="#cdd6de" stroke="#2d6b9c"/>
  <text x="323" y="207" font-size="9.5" text-anchor="middle" fill="#2d6b9c">carro</text>
  <!-- hoist line + load -->
  <line x1="323" y1="216" x2="323" y2="300" stroke="#555" stroke-width="1.5"/>
  <rect x="305" y="300" width="36" height="26" fill="#b7a877" stroke="#6b5a38"/>
  <text x="323" y="317" font-size="9.5" text-anchor="middle" fill="#3d3520">W_L</text>

  <!-- ==== Force annotations ==== -->
  <!-- vertical wheel load (with impact) -->
  <line x1="210" y1="238" x2="210" y2="262" stroke="#b02a1a" stroke-width="2.4" marker-end="url(#rd)"/>
  <text x="120" y="278" font-size="11" fill="#b02a1a" font-weight="bold">vertical</text>
  <text x="120" y="292" font-size="10" fill="#b02a1a">(+impacto)</text>
  <line x1="150" y1="270" x2="204" y2="252" stroke="#e0b0a8" stroke-width="0.8"/>
  <!-- lateral surge on top of bridge (right half, clear of the span label) -->
  <line x1="596" y1="199" x2="636" y2="199" stroke="#2d6b9c" stroke-width="2.2" marker-end="url(#rb)"/>
  <text x="616" y="190" font-size="10.5" text-anchor="middle" fill="#2d6b9c" font-weight="bold">lateral (surge)</text>
  <!-- longitudinal (into page along rail) -->
  <line x1="360" y1="228" x2="300" y2="228" stroke="#1c7c3c" stroke-width="2.2" marker-end="url(#rg)"/>
  <text x="470" y="232" font-size="10.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">longitudinal → a lo largo del riel (frenado)</text>

  <!-- labels -->
  <text x="183" y="392" font-size="10.5" text-anchor="middle" fill="#555" transform="rotate(-90 130 330)"></text>
  <text x="120" y="360" font-size="11" fill="#555">columna</text>
  <line x1="150" y1="356" x2="176" y2="340" stroke="#999" stroke-width="0.8"/>
  <text x="660" y="282" font-size="11" fill="#8a7449" text-anchor="middle">viga carrilera + riel</text>
  <line x1="690" y1="272" x2="726" y2="240" stroke="#ccc" stroke-width="0.8"/>

  <text x="470" y="360" font-size="11.5" text-anchor="middle" fill="#444">Tres cosas hacen distinto a este edificio: la carga <tspan font-weight="bold">se mueve</tspan> (posición crítica),</text>
  <text x="470" y="378" font-size="11.5" text-anchor="middle" fill="#444">tiene <tspan font-weight="bold">inercia</tspan> (impacto, surge, frenado) y <tspan font-weight="bold">se repite</tspan> millones de veces (fatiga).</text>
</svg>
