<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
    <marker id="r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="k" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="860" height="430" fill="#ffffff"/>
  <text x="430" y="26" font-size="15.5" text-anchor="middle" fill="#222" font-weight="bold">Cero secciones inventadas: la cita sale del retrieval, y el umbral se niega</text>

  <!-- pregunta -->
  <rect x="22" y="170" width="196" height="86" rx="6" fill="#f4f7fb" stroke="#8aa6c4"/>
  <text x="120" y="190" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">Pregunta</text>
  <text x="120" y="212" font-size="10.5" text-anchor="middle" fill="#555">«¿cuándo se exige</text>
  <text x="120" y="227" font-size="10.5" text-anchor="middle" fill="#555">refuerzo mínimo</text>
  <text x="120" y="242" font-size="10.5" text-anchor="middle" fill="#555">de corte?»</text>
  <line x1="218" y1="213" x2="246" y2="213" stroke="#555" stroke-width="1.4" marker-end="url(#k)"/>

  <!-- eje de similitud con dos zonas -->
  <rect x="250" y="150" width="215" height="126" fill="#fdecea"/>
  <rect x="465" y="150" width="215" height="126" fill="#eef7ee"/>
  <text x="357" y="168" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">ruido (no responde)</text>
  <text x="573" y="168" font-size="10.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">respaldo (responde)</text>
  <line x1="250" y1="252" x2="680" y2="252" stroke="#333" stroke-width="1.2"/>
  <text x="250" y="270" font-size="9.5" text-anchor="middle" fill="#888">0.55</text>
  <text x="680" y="270" font-size="9.5" text-anchor="middle" fill="#888">0.85  similitud</text>

  <!-- umbral -->
  <line x1="465" y1="140" x2="465" y2="252" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="465" y="134" font-size="10.5" text-anchor="middle" fill="#c0392b" font-weight="bold">umbral 0.70</text>

  <!-- puntos: ajeno 0.63 (rojo), pertinentes 0.76 y 0.78 (verde) -->
  <circle cx="365" cy="252" r="5" fill="#c0392b"/>
  <text x="365" y="230" font-size="9.5" text-anchor="middle" fill="#c0392b">«capital de</text>
  <text x="365" y="242" font-size="9.5" text-anchor="middle" fill="#c0392b">Francia» 0.63</text>
  <circle cx="551" cy="252" r="5" fill="#1c7c3c"/>
  <text x="551" y="242" font-size="9.5" text-anchor="middle" fill="#1c7c3c">§9.6.2  0.76</text>
  <circle cx="580" cy="252" r="5.5" fill="#1c7c3c"/>
  <text x="612" y="242" font-size="9.5" text-anchor="middle" fill="#1c7c3c">§7.6.3  0.78</text>

  <!-- salida respaldo -->
  <line x1="573" y1="150" x2="573" y2="86" stroke="#1c7c3c" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="500" y="42" width="336" height="44" rx="6" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.5"/>
  <text x="668" y="60" font-size="11" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Respuesta con cita del retrieval</text>
  <text x="668" y="76" font-size="10.5" text-anchor="middle" fill="#333">«… en toda región donde Vu &gt; φVc [ACI 318-25 §7.6.3]»</text>

  <!-- salida rechazo -->
  <line x1="357" y1="276" x2="357" y2="330" stroke="#c0392b" stroke-width="1.5" marker-end="url(#r)"/>
  <rect x="196" y="334" width="322" height="44" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.5"/>
  <text x="357" y="352" font-size="11" text-anchor="middle" fill="#c0392b" font-weight="bold">Se niega — no improvisa</text>
  <text x="357" y="368" font-size="10.5" text-anchor="middle" fill="#333">«no encontré respaldo en el corpus para eso»</text>

  <!-- nota: la cita viene del chunk -->
  <text x="700" y="150" font-size="9.5" fill="#555">cada fragmento</text>
  <text x="700" y="163" font-size="9.5" fill="#555">trae su § del</text>
  <text x="700" y="176" font-size="9.5" fill="#555">encabezado</text>
</svg>
