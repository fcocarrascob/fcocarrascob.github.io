<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="620" height="500" fill="#ffffff"/>

  <!-- placa -->
  <rect x="70" y="70" width="460" height="360" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- franjas de voladizo (m arriba, n a la derecha) -->
  <rect x="70" y="70" width="460" height="66" fill="#2563eb" fill-opacity="0.07"/>
  <rect x="380" y="70" width="150" height="360" fill="#2563eb" fill-opacity="0.07"/>

  <!-- columna (perfil I): bf = 200 en x, d = 240 en y -->
  <rect x="200" y="130" width="200" height="16" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="200" y="354" width="200" height="16" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="291" y="146" width="18" height="208" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="300" y="122" text-anchor="middle" font-size="11" fill="#6b7280">columna</text>

  <!-- líneas críticas -->
  <line x1="70" y1="136" x2="530" y2="136" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 5"/>
  <line x1="70" y1="364" x2="530" y2="364" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 5"/>
  <line x1="220" y1="70" x2="220" y2="430" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 5"/>
  <line x1="380" y1="70" x2="380" y2="430" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text x="536" y="140" font-size="11" fill="#2563eb">0.95·<tspan font-style="italic">d</tspan></text>
  <text x="220" y="62" text-anchor="middle" font-size="11" fill="#2563eb">0.8·<tspan font-style="italic">b</tspan><tspan font-size="8" dy="2.5">f</tspan></text>

  <!-- dimensión m (volado superior) -->
  <line x1="66" y1="70" x2="42" y2="70" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="66" y1="136" x2="42" y2="136" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="48" y1="70" x2="48" y2="136" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="34" y="107" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">m</text>

  <!-- dimensión n (volado derecho) -->
  <line x1="380" y1="66" x2="380" y2="44" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="530" y1="66" x2="530" y2="44" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="380" y1="50" x2="530" y2="50" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="455" y="44" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">n</text>

  <!-- λn′ (fluencia entre alas) -->
  <line x1="309" y1="250" x2="364" y2="250" stroke="#2563eb" stroke-width="1.2" marker-start="url(#aa)" marker-end="url(#aa)"/>
  <text x="336" y="241" text-anchor="middle" font-size="11" font-style="italic" fill="#2563eb">λn′</text>

  <text x="82" y="420" font-size="11" fill="#6b7280">placa</text>
</svg>
