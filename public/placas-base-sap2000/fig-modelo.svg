<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="aa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff"/>

  <!-- ═══ Panel A: planta ═══ -->
  <text x="185" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7280">Planta</text>

  <rect x="45" y="60" width="280" height="280" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <text x="185" y="84" text-anchor="middle" font-size="11" fill="#6b7280">pedestal <tspan font-style="italic">B</tspan><tspan font-size="8" dy="2.5">2</tspan><tspan dy="-2.5"> × </tspan><tspan font-style="italic">N</tspan><tspan font-size="8" dy="2.5">2</tspan></text>

  <rect x="85" y="100" width="200" height="200" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="95" y="293" font-size="11" fill="#6b7280">placa</text>

  <!-- columna (perfil I): d en y, bf en x -->
  <rect x="130" y="135" width="110" height="12" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="130" y="253" width="110" height="12" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="179" y="147" width="12" height="106" fill="#dfe3e8" stroke="#1a1a1a" stroke-width="1"/>

  <!-- pernos -->
  <circle cx="110" cy="125" r="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="260" cy="125" r="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="110" cy="275" r="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="260" cy="275" r="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- ejes en el centroide -->
  <circle cx="185" cy="200" r="2.5" fill="#2563eb"/>
  <line x1="185" y1="200" x2="236" y2="200" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aa)"/>
  <line x1="185" y1="200" x2="185" y2="152" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aa)"/>
  <text x="241" y="192" font-size="12" font-style="italic" fill="#2563eb">x</text>
  <text x="193" y="156" font-size="12" font-style="italic" fill="#2563eb">y</text>

  <!-- dimensiones -->
  <line x1="85" y1="304" x2="85" y2="366" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="285" y1="304" x2="285" y2="366" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="85" y1="360" x2="285" y2="360" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="185" y="354" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">B</text>

  <line x1="81" y1="100" x2="24" y2="100" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="81" y1="300" x2="24" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="30" y1="100" x2="30" y2="300" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="14" y="204" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">N</text>

  <line x1="262" y1="135" x2="262" y2="265" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="270" y="204" font-size="12" font-style="italic" fill="#1a1a1a">d</text>

  <line x1="130" y1="283" x2="240" y2="283" stroke="#6b7280" stroke-width="1" marker-start="url(#am)" marker-end="url(#am)"/>
  <text x="185" y="297" text-anchor="middle" font-size="12" font-style="italic" fill="#1a1a1a">b<tspan font-size="9" dy="2.5">f</tspan></text>

  <!-- ═══ Panel B: elevación ═══ -->
  <text x="430" y="30" font-size="13" font-weight="600" fill="#6b7280">Elevación</text>

  <rect x="430" y="250" width="300" height="130" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <text x="580" y="372" text-anchor="middle" font-size="11" fill="#6b7280">pedestal</text>

  <!-- presiones bajo la placa (compresión total) -->
  <polygon points="470,250 690,250 690,272 470,290" fill="#2563eb" fill-opacity="0.13" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="510" y1="286" x2="510" y2="257" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <line x1="580" y1="281" x2="580" y2="257" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <line x1="650" y1="275" x2="650" y2="257" stroke="#2563eb" stroke-width="1.3" marker-end="url(#aa)"/>
  <text x="580" y="312" text-anchor="middle" font-size="12" font-style="italic" fill="#2563eb">σ(x, y)</text>

  <!-- placa -->
  <rect x="470" y="238" width="220" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="698" y="248" font-size="11" fill="#6b7280">placa</text>

  <!-- pernos de anclaje -->
  <line x1="495" y1="222" x2="495" y2="252" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="495" y1="252" x2="495" y2="330" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="495" y1="330" x2="509" y2="330" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="489" y="222" width="12" height="6" fill="#1a1a1a"/>
  <line x1="665" y1="222" x2="665" y2="252" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="665" y1="252" x2="665" y2="330" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="665" y1="330" x2="651" y2="330" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="4 3"/>
  <rect x="659" y="222" width="12" height="6" fill="#1a1a1a"/>
  <text x="665" y="346" text-anchor="middle" font-size="10.5" fill="#6b7280">perno</text>

  <!-- columna -->
  <rect x="545" y="70" width="70" height="168" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="553" y1="70" x2="553" y2="238" stroke="#9ca3af" stroke-width="1"/>
  <line x1="607" y1="70" x2="607" y2="238" stroke="#9ca3af" stroke-width="1"/>
  <text x="622" y="120" font-size="11" fill="#6b7280">columna</text>

  <!-- cargas -->
  <line x1="580" y1="24" x2="580" y2="62" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="590" y="46" font-size="12.5" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan></text>
  <line x1="498" y1="100" x2="540" y2="100" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="492" y="104" text-anchor="end" font-size="12.5" font-style="italic" fill="#1a1a1a">V<tspan font-size="9" dy="2.5">u</tspan></text>
  <path d="M 612 62 A 30 30 0 0 1 612 112" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="634" y="92" font-size="12.5" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">u</tspan></text>
</svg>
