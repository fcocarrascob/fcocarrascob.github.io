<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ai" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="760" height="470" fill="#ffffff"/>
  <line x1="380" y1="18" x2="380" y2="452" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="15" y1="235" x2="745" y2="235" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ═══ (a) Compresión total ═══ -->
  <text x="16" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">(a) Compresión total</text>
  <text x="16" y="42" font-size="11" fill="#6b7280">resultante dentro del núcleo central</text>
  <rect x="60" y="160" width="260" height="50" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <polygon points="90,160 290,160 290,184 90,172" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="90" y="148" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="110" y="126" width="10" height="5" fill="#1a1a1a"/>
  <line x1="115" y1="131" x2="115" y2="162" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="115" y1="162" x2="115" y2="198" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="260" y="126" width="10" height="5" fill="#1a1a1a"/>
  <line x1="265" y1="131" x2="265" y2="162" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="265" y1="162" x2="265" y2="198" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="170" y="84" width="40" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="190" y1="52" x2="190" y2="80" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="198" y="66" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan></text>

  <!-- ═══ (b) Contacto parcial ═══ -->
  <text x="396" y="26" font-size="12.5" font-weight="600" fill="#1a1a1a">(b) Contacto parcial</text>
  <text x="396" y="42" font-size="11" fill="#6b7280">el eje neutro cruza la placa</text>
  <rect x="440" y="160" width="260" height="50" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <polygon points="570,160 670,160 670,192" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="470" y="148" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="490" y="126" width="10" height="5" fill="#1a1a1a"/>
  <line x1="495" y1="131" x2="495" y2="162" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="495" y1="162" x2="495" y2="198" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="640" y="126" width="10" height="5" fill="#1a1a1a"/>
  <line x1="645" y1="131" x2="645" y2="162" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="645" y1="162" x2="645" y2="198" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="550" y="84" width="40" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="570" y1="52" x2="570" y2="80" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="578" y="66" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan></text>
  <path d="M 594 56 A 22 22 0 0 1 594 94" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="612" y="78" font-size="12" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">u</tspan></text>
  <line x1="570" y1="120" x2="570" y2="204" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="570" y="219" text-anchor="middle" font-size="10.5" fill="#6b7280">eje neutro</text>
  <line x1="495" y1="166" x2="495" y2="194" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="504" y="186" font-size="12" font-style="italic" fill="#dc2626">T</text>

  <!-- ═══ (c) Solo pernos ═══ -->
  <text x="16" y="261" font-size="12.5" font-weight="600" fill="#1a1a1a">(c) Solo pernos (levantamiento)</text>
  <text x="16" y="277" font-size="11" fill="#6b7280">tracción neta, sin contacto</text>
  <rect x="60" y="395" width="260" height="50" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <rect x="90" y="373" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="110" y="351" width="10" height="5" fill="#1a1a1a"/>
  <line x1="115" y1="356" x2="115" y2="387" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="115" y1="387" x2="115" y2="433" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="260" y="351" width="10" height="5" fill="#1a1a1a"/>
  <line x1="265" y1="356" x2="265" y2="387" stroke="#1a1a1a" stroke-width="1.8"/>
  <line x1="265" y1="387" x2="265" y2="433" stroke="#1a1a1a" stroke-width="1.8" stroke-dasharray="4 3"/>
  <rect x="170" y="309" width="40" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="190" y1="315" x2="190" y2="287" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="198" y="301" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan><tspan dy="-2.5" font-style="normal"> &lt; 0</tspan></text>
  <line x1="115" y1="391" x2="115" y2="419" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="124" y="411" font-size="12" font-style="italic" fill="#dc2626">T</text>
  <line x1="265" y1="391" x2="265" y2="419" stroke="#dc2626" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="274" y="411" font-size="12" font-style="italic" fill="#dc2626">T</text>
  <text x="190" y="412" text-anchor="middle" font-size="10.5" fill="#6b7280">sin contacto</text>

  <!-- ═══ (d) Inestable ═══ -->
  <text x="396" y="261" font-size="12.5" font-weight="600" fill="#1a1a1a">(d) Inestable</text>
  <text x="396" y="277" font-size="11" fill="#6b7280">la carga no puede equilibrarse (sin pernos)</text>
  <rect x="440" y="395" width="260" height="50" fill="#eef1f4" stroke="#d1d5db" stroke-width="1"/>
  <rect x="470" y="383" width="200" height="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="550" y="319" width="40" height="64" fill="#e9ecf0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="570" y1="317" x2="570" y2="289" stroke="#1a1a1a" stroke-width="2" marker-end="url(#ai)"/>
  <text x="562" y="303" text-anchor="end" font-size="12" font-style="italic" fill="#1a1a1a">P<tspan font-size="9" dy="2.5">u</tspan><tspan dy="-2.5" font-style="normal"> &lt; 0</tspan></text>
  <path d="M 594 291 A 22 22 0 0 1 594 329" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ai)"/>
  <text x="612" y="313" font-size="12" font-style="italic" fill="#1a1a1a">M<tspan font-size="9" dy="2.5">u</tspan></text>
  <text x="570" y="424" text-anchor="middle" font-size="11.5" font-weight="600" fill="#dc2626">✗ no hay equilibrio</text>
</svg>
