<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ca" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="car" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <rect width="940" height="400" fill="#ffffff"/>
  <text x="470" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">La viga fisurada trabaja como celosía: bielas de hormigón + estribos como montantes</text>

  <!-- beam -->
  <rect x="70" y="70" width="800" height="200" fill="#efece6" stroke="#8a857c"/>
  <!-- support -->
  <polygon points="110,270 90,300 130,300" fill="#5b6470"/>
  <line x1="110" y1="330" x2="110" y2="304" stroke="#b02a1a" stroke-width="2.5" marker-end="url(#car)"/>
  <text x="120" y="326" font-size="13" fill="#b02a1a" font-weight="bold">R = V_u</text>
  <!-- distributed load -->
  <g stroke="#666" stroke-width="1.5">
    <line x1="140" y1="46" x2="140" y2="66" marker-end="url(#ca)"/>
    <line x1="240" y1="46" x2="240" y2="66" marker-end="url(#ca)"/>
    <line x1="340" y1="46" x2="340" y2="66" marker-end="url(#ca)"/>
    <line x1="440" y1="46" x2="440" y2="66" marker-end="url(#ca)"/>
    <line x1="540" y1="46" x2="540" y2="66" marker-end="url(#ca)"/>
    <line x1="640" y1="46" x2="640" y2="66" marker-end="url(#ca)"/>
    <line x1="740" y1="46" x2="740" y2="66" marker-end="url(#ca)"/>
    <line x1="840" y1="46" x2="840" y2="66" marker-end="url(#ca)"/>
  </g>
  <line x1="130" y1="46" x2="850" y2="46" stroke="#666" stroke-width="1.5"/>

  <!-- cracks (45 deg, from bottom near support rising toward load) -->
  <g stroke="#a35" stroke-width="1.6">
    <line x1="170" y1="268" x2="330" y2="108"/>
    <line x1="250" y1="268" x2="410" y2="108"/>
    <line x1="330" y1="268" x2="490" y2="108"/>
    <line x1="410" y1="268" x2="570" y2="108"/>
  </g>
  <text x="185" y="255" font-size="11.5" fill="#a35" transform="rotate(-45 185,255)">fisuras ≈ 45°</text>

  <!-- truss overlay: chords -->
  <line x1="90" y1="100" x2="860" y2="100" stroke="#1a63a8" stroke-width="4" stroke-dasharray="10 6"/>
  <text x="705" y="92" font-size="12.5" fill="#1a63a8">cordón comprimido (hormigón)</text>
  <line x1="90" y1="252" x2="860" y2="252" stroke="#b02a1a" stroke-width="4"/>
  <text x="705" y="245" font-size="12.5" fill="#b02a1a">cordón traccionado (A_s)</text>
  <!-- struts -->
  <g stroke="#1a63a8" stroke-width="2.5" stroke-dasharray="7 5">
    <line x1="130" y1="252" x2="282" y2="100"/>
    <line x1="290" y1="252" x2="442" y2="100"/>
    <line x1="450" y1="252" x2="602" y2="100"/>
  </g>
  <text x="480" y="180" font-size="12.5" fill="#1a63a8" transform="rotate(-45 480,180)">bielas comprimidas</text>
  <!-- stirrups (ties) -->
  <g stroke="#1c7c3c" stroke-width="3.5">
    <line x1="210" y1="90" x2="210" y2="262"/>
    <line x1="290" y1="90" x2="290" y2="262"/>
    <line x1="370" y1="90" x2="370" y2="262"/>
    <line x1="450" y1="90" x2="450" y2="262"/>
    <line x1="530" y1="90" x2="530" y2="262"/>
  </g>
  <text x="612" y="130" font-size="12.5" fill="#1c7c3c" font-weight="bold">estribos = montantes traccionados</text>
  <text x="612" y="147" font-size="12.5" fill="#1c7c3c">V_s = A_v·f_yt·d / s</text>
  <line x1="608" y1="126" x2="535" y2="118" stroke="#1c7c3c" stroke-width="1.4" marker-end="url(#ca)"/>

  <!-- s dim -->
  <line x1="370" y1="282" x2="450" y2="282" stroke="#666" stroke-width="1" marker-start="url(#ca)" marker-end="url(#ca)"/>
  <text x="410" y="298" font-size="12" fill="#666" text-anchor="middle">s</text>
  <!-- d dim -->
  <line x1="885" y1="70" x2="885" y2="252" stroke="#666" stroke-width="1" marker-start="url(#ca)" marker-end="url(#ca)"/>
  <text x="893" y="165" font-size="12.5" fill="#666">d</text>
  <!-- crack projection dim -->
  <line x1="410" y1="310" x2="570" y2="310" stroke="#a35" stroke-width="1.2" marker-start="url(#ca)" marker-end="url(#ca)"/>
  <text x="490" y="327" font-size="12" fill="#a35" text-anchor="middle">proyección horizontal de la fisura ≈ d</text>

  <!-- bottom explanations -->
  <text x="70" y="360" font-size="12.5" fill="#333">→ para que <tspan font-weight="bold">toda</tspan> fisura cruce al menos un estribo: <tspan font-weight="bold">s ≤ d/2</tspan> (Tabla 9.7.6.2.2)</text>
  <text x="70" y="380" font-size="12.5" fill="#333">→ el tope V_s ≤ 0.66√f'c·b_w·d protege la <tspan fill="#1a63a8" font-weight="bold">biela</tspan>: con demasiados estribos, el hormigón diagonal se aplasta antes de que fluyan</text>
</svg>
