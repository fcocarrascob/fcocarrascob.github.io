<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="za" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="zag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>

  <!-- ===== Panel izquierdo: sección y deformaciones ===== -->
  <g>
    <text x="170" y="34" font-size="14" text-anchor="middle" fill="#222" font-weight="bold">Sección y deformaciones</text>
    <!-- section -->
    <rect x="55" y="60" width="130" height="240" fill="#efece6" stroke="#8a857c"/>
    <circle cx="85" cy="272" r="6" fill="#3f3f3f"/>
    <circle cx="120" cy="272" r="6" fill="#3f3f3f"/>
    <circle cx="155" cy="272" r="6" fill="#3f3f3f"/>
    <!-- neutral axis on section -->
    <line x1="55" y1="150" x2="185" y2="150" stroke="#a35" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text x="60" y="144" font-size="11" fill="#a35">eje neutro</text>
    <!-- c dim -->
    <line x1="40" y1="60" x2="40" y2="150" stroke="#666" stroke-width="1" marker-start="url(#za)" marker-end="url(#za)"/>
    <text x="33" y="110" font-size="12" fill="#666" text-anchor="end">c</text>
    <!-- strain diagram -->
    <line x1="245" y1="60" x2="245" y2="300" stroke="#999" stroke-width="1.2"/>
    <line x1="305" y1="60" x2="245" y2="150" stroke="#333" stroke-width="2"/>
    <line x1="245" y1="150" x2="163" y2="272" stroke="#333" stroke-width="2"/>
    <polygon points="245,60 305,60 245,150" fill="#5b6470" fill-opacity="0.15"/>
    <polygon points="245,150 163,272 245,272" fill="#1c7c3c" fill-opacity="0.12"/>
    <line x1="245" y1="60" x2="305" y2="60" stroke="#5b6470" stroke-width="2.5"/>
    <text x="312" y="64" font-size="12.5" fill="#5b6470">ε_cu = 0.003</text>
    <line x1="245" y1="272" x2="163" y2="272" stroke="#1c7c3c" stroke-width="2.5"/>
    <text x="196" y="292" font-size="13" fill="#1c7c3c" font-weight="bold">ε_t</text>
    <text x="170" y="330" font-size="12" fill="#555">la geometría fija la relación:</text>
    <text x="170" y="347" font-size="12.5" fill="#333">ε_t = 0.003·(d_t − c)/c</text>
    <text x="170" y="376" font-size="12" fill="#555">menos acero → c más chico</text>
    <text x="170" y="392" font-size="12" fill="#555">→ ε_t más grande → más dúctil</text>
  </g>

  <!-- ===== Panel derecho: phi vs eps_t ===== -->
  <g>
    <text x="655" y="34" font-size="14" text-anchor="middle" fill="#222" font-weight="bold">φ según la deformación del acero extremo (Tabla 21.2.2, Gr 420)</text>
    <!-- zone bands -->
    <rect x="430" y="70" width="118" height="250" fill="#c0392b" fill-opacity="0.10"/>
    <rect x="548" y="70" width="169" height="250" fill="#e67e22" fill-opacity="0.12"/>
    <rect x="717" y="70" width="163" height="250" fill="#1c7c3c" fill-opacity="0.10"/>
    <!-- axes -->
    <line x1="430" y1="320" x2="890" y2="320" stroke="#333" stroke-width="1.4" marker-end="url(#za)"/>
    <line x1="430" y1="320" x2="430" y2="62" stroke="#333" stroke-width="1.4" marker-end="url(#za)"/>
    <text x="893" y="336" font-size="12" fill="#333">ε_t</text>
    <text x="424" y="56" font-size="12" fill="#333" text-anchor="end">φ</text>
    <!-- phi curve -->
    <polyline points="430,286 548,286 717,114 880,114" fill="none" stroke="#1a63a8" stroke-width="3"/>
    <!-- gridlines phi values -->
    <line x1="426" y1="286" x2="434" y2="286" stroke="#333" stroke-width="1.4"/>
    <text x="420" y="290" font-size="12" fill="#333" text-anchor="end">0.65</text>
    <line x1="426" y1="114" x2="434" y2="114" stroke="#333" stroke-width="1.4"/>
    <text x="420" y="118" font-size="12" fill="#333" text-anchor="end">0.90</text>
    <!-- x ticks -->
    <line x1="548" y1="316" x2="548" y2="324" stroke="#333" stroke-width="1.4"/>
    <text x="548" y="340" font-size="12" fill="#333" text-anchor="middle">ε_ty ≈ 0.0021</text>
    <line x1="717" y1="316" x2="717" y2="324" stroke="#333" stroke-width="1.4"/>
    <text x="717" y="340" font-size="12" fill="#333" text-anchor="middle">ε_ty + 0.003 ≈ 0.005</text>
    <!-- zone labels -->
    <text x="489" y="94" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="bold">compresión-</text>
    <text x="489" y="109" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="bold">controlada</text>
    <text x="489" y="126" font-size="11.5" fill="#c0392b" text-anchor="middle">falla el hormigón</text>
    <text x="489" y="141" font-size="11.5" fill="#c0392b" text-anchor="middle">sin que fluya el acero</text>
    <text x="632" y="94" font-size="12" fill="#b35c0e" text-anchor="middle" font-weight="bold">transición</text>
    <text x="798" y="94" font-size="12" fill="#1c7c3c" text-anchor="middle" font-weight="bold">tracción-controlada</text>
    <text x="798" y="110" font-size="11.5" fill="#1c7c3c" text-anchor="middle">el acero fluye mucho</text>
    <text x="798" y="125" font-size="11.5" fill="#1c7c3c" text-anchor="middle">antes de aplastar</text>
    <!-- beams must live here -->
    <line x1="770" y1="230" x2="740" y2="180" stroke="#1c7c3c" stroke-width="2" marker-end="url(#zag)"/>
    <rect x="700" y="234" width="184" height="52" rx="6" fill="#eaf5ee" stroke="#1c7c3c"/>
    <text x="792" y="255" font-size="12.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">las vigas deben vivir aquí</text>
    <text x="792" y="273" font-size="12" fill="#1c7c3c" text-anchor="middle">ε_t ≥ ε_ty + 0.003 (Sec. 9.3.3.1)</text>
  </g>

  <text x="470" y="418" font-size="12" text-anchor="middle" fill="#555">φ no premia la precisión del cálculo: premia el modo de falla — 0.90 para la falla que avisa, 0.65 para la que no</text>
</svg>
