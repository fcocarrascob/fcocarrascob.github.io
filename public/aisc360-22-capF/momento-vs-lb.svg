<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="fag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">Resistencia a flexión según la longitud no arriostrada L_b</text>

  <!-- axes -->
  <line x1="110" y1="380" x2="880" y2="380" stroke="#333" stroke-width="1.5" marker-end="url(#fa)"/>
  <line x1="110" y1="380" x2="110" y2="70" stroke="#333" stroke-width="1.5" marker-end="url(#fa)"/>
  <text x="884" y="398" font-size="13" fill="#333">L_b</text>
  <text x="104" y="64" font-size="13" fill="#333" text-anchor="end">M_n</text>

  <!-- Mp gridline -->
  <line x1="110" y1="110" x2="880" y2="110" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="104" y="114" font-size="12.5" fill="#1c7c3c" text-anchor="end" font-weight="bold">M_p</text>
  <!-- 0.7FySx gridline -->
  <line x1="110" y1="250" x2="620" y2="250" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="104" y="254" font-size="11.5" fill="#777" text-anchor="end">0.7F_y·S_x</text>

  <!-- zone bands -->
  <rect x="110" y="70" width="200" height="310" fill="#1c7c3c" fill-opacity="0.09"/>
  <rect x="310" y="70" width="310" height="310" fill="#e67e22" fill-opacity="0.11"/>
  <rect x="620" y="70" width="260" height="310" fill="#b02a1a" fill-opacity="0.09"/>

  <!-- Lp / Lr ticks -->
  <line x1="310" y1="376" x2="310" y2="384" stroke="#333" stroke-width="1.4"/>
  <text x="310" y="400" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">L_p</text>
  <line x1="620" y1="376" x2="620" y2="384" stroke="#333" stroke-width="1.4"/>
  <text x="620" y="400" font-size="12.5" fill="#333" text-anchor="middle" font-weight="bold">L_r</text>

  <!-- curve Cb = 1 : flat at Mp until Lp, straight line to (Lr, 0.7FySx), then elastic decay -->
  <polyline points="110,110 310,110" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
  <line x1="310" y1="110" x2="620" y2="250" stroke="#1a63a8" stroke-width="3.5"/>
  <path d="M620,250 C 690,300 780,340 875,360" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
  <text x="700" y="335" font-size="12.5" fill="#1a63a8" font-weight="bold">C_b = 1</text>

  <!-- curve with Cb > 1 : lifted, capped at Mp -->
  <path d="M310,110 L470,110 C 540,150 560,210 620,205" fill="none" stroke="#1c7c3c" stroke-width="2.6" stroke-dasharray="8 5"/>
  <path d="M620,205 C 700,255 785,305 875,330" fill="none" stroke="#1c7c3c" stroke-width="2.6" stroke-dasharray="8 5"/>
  <text x="472" y="100" font-size="12.5" fill="#1c7c3c" font-weight="bold">C_b &gt; 1 (sube, tope M_p)</text>
  <line x1="470" y1="128" x2="470" y2="110" stroke="#1c7c3c" stroke-width="1.3" marker-end="url(#fag)"/>

  <!-- zone labels -->
  <text x="210" y="92" font-size="12.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">plastificación</text>
  <text x="210" y="330" font-size="12" fill="#1c7c3c" text-anchor="middle">M_n = M_p</text>
  <text x="210" y="347" font-size="11.5" fill="#555" text-anchor="middle">bien arriostrada</text>
  <text x="210" y="362" font-size="11.5" fill="#555" text-anchor="middle">→ falla dúctil</text>

  <text x="465" y="332" font-size="12.5" fill="#b35c0e" text-anchor="middle" font-weight="bold">LTB inelástico</text>
  <text x="465" y="349" font-size="11.5" fill="#555" text-anchor="middle">Ec. F2-2 (recta)</text>
  <text x="465" y="364" font-size="11.5" fill="#555" text-anchor="middle">la sección ya fluyó en parte</text>

  <text x="750" y="115" font-size="12.5" fill="#b02a1a" text-anchor="middle" font-weight="bold">LTB elástico</text>
  <text x="750" y="132" font-size="11.5" fill="#555" text-anchor="middle">Ec. F2-3 (Euler)</text>
  <text x="750" y="147" font-size="11.5" fill="#555" text-anchor="middle">se vuelca sin fluir</text>

  <text x="470" y="440" font-size="12.5" text-anchor="middle" fill="#555">Arriostrar (bajar L_b) mueve la viga hacia la izquierda, hacia M_p — el mismo perfil rinde más solo con más arriostramientos</text>
</svg>
