<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="la" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <marker id="lab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
  </defs>
  <rect width="940" height="430" fill="#ffffff"/>
  <text x="470" y="30" font-size="15" text-anchor="middle" fill="#222" font-weight="bold">El ala comprimida es una columna: pandea de costado y torsiona la sección</text>

  <!-- ===== Left: plan-ish view of beam buckling laterally ===== -->
  <g>
    <text x="300" y="66" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Vista en planta del ala comprimida</text>

    <!-- tension flange stays straight (reference) -->
    <line x1="90" y1="150" x2="510" y2="150" stroke="#b02a1a" stroke-width="3"/>
    <text x="300" y="142" font-size="12" fill="#b02a1a" text-anchor="middle">ala traccionada: recta y estable</text>

    <!-- compression flange buckles sideways (bowed) -->
    <path d="M90,230 C 220,150 380,150 510,230" fill="none" stroke="#1a63a8" stroke-width="3.5"/>
    <line x1="90" y1="230" x2="510" y2="230" stroke="#1a63a8" stroke-width="1" stroke-dasharray="5 5" opacity="0.5"/>
    <text x="300" y="252" font-size="12" fill="#1a63a8" text-anchor="middle" font-weight="bold">ala comprimida: pandea de costado</text>

    <!-- lateral deflection arrow -->
    <line x1="300" y1="228" x2="300" y2="178" stroke="#1a63a8" stroke-width="1.6" marker-end="url(#lab)"/>
    <text x="308" y="200" font-size="12" fill="#1a63a8">δ lateral</text>

    <!-- braces -->
    <g stroke="#1c7c3c" stroke-width="3">
      <line x1="90" y1="140" x2="90" y2="240"/>
      <line x1="510" y1="140" x2="510" y2="240"/>
    </g>
    <text x="90" y="270" font-size="11.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">arriostr.</text>
    <text x="510" y="270" font-size="11.5" fill="#1c7c3c" text-anchor="middle" font-weight="bold">arriostr.</text>
    <!-- Lb dim -->
    <line x1="90" y1="300" x2="510" y2="300" stroke="#666" stroke-width="1" marker-start="url(#la)" marker-end="url(#la)"/>
    <text x="300" y="318" font-size="12.5" fill="#666" text-anchor="middle">L_b = longitud no arriostrada</text>
    <text x="300" y="350" font-size="12" fill="#555" text-anchor="middle">como una columna: más larga → pandea más fácil</text>
  </g>

  <!-- ===== Right: cross-section rotating ===== -->
  <g>
    <text x="740" y="66" font-size="13.5" text-anchor="middle" fill="#222" font-weight="bold">Sección: se desplaza y gira</text>

    <!-- original section (light, upright) -->
    <g stroke="#bbb" stroke-width="2" fill="none">
      <line x1="700" y1="110" x2="780" y2="110"/>
      <line x1="740" y1="110" x2="740" y2="230"/>
      <line x1="700" y1="230" x2="780" y2="230"/>
    </g>
    <text x="740" y="250" font-size="11" fill="#aaa" text-anchor="middle">posición original</text>

    <!-- rotated/translated section (blue, tilted) -->
    <g stroke="#1a63a8" stroke-width="3" fill="none" transform="rotate(18 800 170) translate(60 0)">
      <line x1="700" y1="110" x2="780" y2="110"/>
      <line x1="740" y1="110" x2="740" y2="230"/>
      <line x1="700" y1="230" x2="780" y2="230"/>
    </g>
    <!-- top flange marker (compression) -->
    <circle cx="843" cy="128" r="5" fill="#1a63a8"/>
    <text x="853" y="124" font-size="11" fill="#1a63a8">ala compr.</text>

    <!-- rotation arc -->
    <path d="M812,255 A 55 55 0 0 1 865,235" fill="none" stroke="#c0392b" stroke-width="2" marker-end="url(#la)"/>
    <text x="855" y="278" font-size="12" fill="#c0392b" text-anchor="middle" font-weight="bold">giro φ</text>
  </g>

  <!-- divider -->
  <line x1="590" y1="90" x2="590" y2="360" stroke="#e5e2dc" stroke-width="1.5"/>

  <!-- bottom takeaway -->
  <text x="470" y="392" font-size="12.5" text-anchor="middle" fill="#333">Desplazamiento lateral <tspan fill="#1a63a8" font-weight="bold">+</tspan> giro = pandeo lateral-torsional. El alma ata el ala comprimida al ala estable, por eso arrastra la sección en torsión.</text>
  <text x="470" y="413" font-size="12.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Arriostrar reduce L_b → devuelve resistencia hasta recuperar M_p.</text>
</svg>
