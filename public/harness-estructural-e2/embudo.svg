<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="440" fill="#ffffff"/>
  <text x="430" y="26" font-size="16" text-anchor="middle" fill="#222" font-weight="bold">El embudo: los tres eligen bien la herramienta; la diferencia es aguas abajo</text>

  <!-- grid -->
  <line x1="120" y1="80" x2="800" y2="80" stroke="#e3e8ee" stroke-width="1"/>
  <line x1="120" y1="220" x2="800" y2="220" stroke="#e3e8ee" stroke-width="1"/>
  <line x1="120" y1="360" x2="800" y2="360" stroke="#333" stroke-width="1.2"/>
  <text x="112" y="84" font-size="10" text-anchor="end" fill="#888">100 %</text>
  <text x="112" y="224" font-size="10" text-anchor="end" fill="#888">50 %</text>
  <text x="112" y="364" font-size="10" text-anchor="end" fill="#888">0 %</text>

  <!-- eje x: 4 etapas -->
  <text x="180" y="382" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">formato</text>
  <text x="373" y="382" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">tool</text>
  <text x="567" y="382" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">args</text>
  <text x="760" y="382" font-size="11.5" text-anchor="middle" fill="#222" font-weight="bold">task success</text>
  <text x="180" y="397" font-size="9" text-anchor="middle" fill="#888">¿llamó?</text>
  <text x="373" y="397" font-size="9" text-anchor="middle" fill="#888">¿la correcta?</text>
  <text x="567" y="397" font-size="9" text-anchor="middle" fill="#888">¿los datos?</text>
  <text x="760" y="397" font-size="9" text-anchor="middle" fill="#888">¿el resultado?</text>

  <!-- "todos 100%" sobre formato+tool -->
  <path d="M150,66 L150,58 L403,58 L403,66" fill="none" stroke="#1c7c3c" stroke-width="1.1"/>
  <text x="276" y="52" font-size="10.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">100 % — todos eligen la herramienta correcta</text>

  <!-- separador aguas abajo -->
  <line x1="470" y1="70" x2="470" y2="360" stroke="#bbb" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="472" y="76" font-size="9.5" fill="#999">aquí se separan →</text>

  <!-- qwen3 (azul): 100,100,92,67 -->
  <polyline points="180,80 373,80 567,102.4 760,172.4" fill="none" stroke="#1a63a8" stroke-width="2.2"/>
  <circle cx="180" cy="80" r="3.5" fill="#1a63a8"/><circle cx="373" cy="80" r="3.5" fill="#1a63a8"/>
  <circle cx="567" cy="102.4" r="3.5" fill="#1a63a8"/><circle cx="760" cy="172.4" r="4.5" fill="#1a63a8"/>
  <text x="567" y="97" font-size="9.5" text-anchor="middle" fill="#1a63a8">92</text>
  <text x="775" y="170" font-size="11" fill="#1a63a8" font-weight="bold">67 %</text>

  <!-- llama3.1 (verde): 100,100,83,83 -->
  <polyline points="180,80 373,80 567,127.6 760,127.6" fill="none" stroke="#1c7c3c" stroke-width="2.6"/>
  <circle cx="567" cy="127.6" r="3.5" fill="#1c7c3c"/><circle cx="760" cy="127.6" r="5" fill="#1c7c3c"/>
  <text x="775" y="126" font-size="11" fill="#1c7c3c" font-weight="bold">83 %</text>

  <!-- llama3.2:3b (rojo): 100,100,83,8 -->
  <polyline points="180,80 373,80 567,127.6 760,337.6" fill="none" stroke="#c0392b" stroke-width="2.2" stroke-dasharray="6 3"/>
  <circle cx="760" cy="337.6" r="4.5" fill="#c0392b"/>
  <text x="775" y="341" font-size="11" fill="#c0392b" font-weight="bold">8 %</text>

  <!-- callouts -->
  <text x="700" y="118" font-size="10" text-anchor="end" fill="#1c7c3c" font-weight="bold">llama3.1 — motor</text>
  <rect x="556" y="300" width="196" height="34" rx="5" fill="#fdecea" stroke="#c0392b"/>
  <text x="654" y="315" font-size="10" text-anchor="middle" fill="#c0392b" font-weight="bold">3B: forma perfecta,</text>
  <text x="654" y="329" font-size="10" text-anchor="middle" fill="#c0392b">números rotos (args 83 → éxito 8)</text>

  <!-- leyenda -->
  <line x1="150" y1="410" x2="176" y2="410" stroke="#1c7c3c" stroke-width="2.6"/>
  <text x="182" y="414" font-size="10.5" fill="#333">Llama 3.1-8B</text>
  <line x1="300" y1="410" x2="326" y2="410" stroke="#1a63a8" stroke-width="2.2"/>
  <text x="332" y="414" font-size="10.5" fill="#333">Qwen3-8B</text>
  <line x1="450" y1="410" x2="476" y2="410" stroke="#c0392b" stroke-width="2.2" stroke-dasharray="6 3"/>
  <text x="482" y="414" font-size="10.5" fill="#333">Llama 3.2-3B</text>
</svg>
