<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c7c3c"/>
    </marker>
  </defs>
  <rect width="860" height="430" fill="#ffffff"/>
  <text x="430" y="26" font-size="16" text-anchor="middle" fill="#222" font-weight="bold">El bug estaba en mi instrumento, no en el modelo</text>

  <!-- respuesta cruda -->
  <rect x="24" y="52" width="486" height="330" rx="8" fill="#f7f8fa" stroke="#cfd6de"/>
  <text x="40" y="74" font-size="12" fill="#333" font-weight="bold">Respuesta cruda de Ollama (Llama 3.1)</text>

  <!-- campo tool_calls: vacío -->
  <rect x="40" y="88" width="454" height="58" rx="5" fill="#fdecea" stroke="#c0392b"/>
  <text x="52" y="112" font-size="12.5" fill="#333" font-family="Consolas, monospace">"tool_calls": []</text>
  <text x="52" y="132" font-size="10.5" fill="#c0392b" font-weight="bold">✗ el harness buscaba la llamada ACÁ — y estaba vacío</text>

  <!-- campo content: la llamada real -->
  <rect x="40" y="158" width="454" height="150" rx="5" fill="#eef7ee" stroke="#1c7c3c"/>
  <text x="52" y="180" font-size="11" fill="#333" font-family="Consolas, monospace">"content":</text>
  <text x="52" y="200" font-size="11" fill="#333" font-family="Consolas, monospace">"{ "name": "anclajes_grupo_hormigon",</text>
  <text x="52" y="218" font-size="11" fill="#333" font-family="Consolas, monospace">   "parameters": { "fc": 250, "hef": 40,</text>
  <text x="52" y="236" font-size="11" fill="#333" font-family="Consolas, monospace">     "ca1": 25, "T_grupo": 8.0,</text>
  <text x="52" y="254" font-size="11" fill="#333" font-family="Consolas, monospace">     "ca_min": <tspan fill="#c0392b" font-weight="bold">None</tspan>, "detalle": <tspan fill="#c0392b" font-weight="bold">False</tspan> } }"</text>
  <text x="52" y="278" font-size="10.5" fill="#1c7c3c" font-weight="bold">✓ la llamada correcta estaba ACÁ — como texto</text>
  <text x="52" y="296" font-size="10" fill="#c0392b">↑ literales de Python (None/False), no JSON: json.loads se ahoga</text>

  <text x="40" y="332" font-size="10.5" fill="#555">La herramienta bien, los datos bien. Solo el</text>
  <text x="40" y="348" font-size="10.5" fill="#555">campo equivocado y un dialecto equivocado.</text>
  <text x="40" y="370" font-size="10.5" fill="#888" font-style="italic">Invisible en el papel: el oráculo daba 100 %, los tests pasaban.</text>

  <!-- el arreglo -->
  <rect x="540" y="88" width="296" height="150" rx="8" fill="#f4f7fb" stroke="#8aa6c4"/>
  <text x="556" y="110" font-size="12" fill="#1a63a8" font-weight="bold">El arreglo (del parser, no del modelo)</text>
  <text x="556" y="134" font-size="11" fill="#333">1. si <tspan font-family="Consolas, monospace">tool_calls</tspan> viene vacío,</text>
  <text x="556" y="150" font-size="11" fill="#333">    rescatar la llamada del <tspan font-family="Consolas, monospace">content</tspan></text>
  <text x="556" y="174" font-size="11" fill="#333">2. <tspan font-family="Consolas, monospace">json.loads</tspan> y, si falla,</text>
  <text x="556" y="190" font-size="11" fill="#333">    <tspan font-family="Consolas, monospace">ast.literal_eval</tspan> (tolera None/False)</text>
  <text x="556" y="220" font-size="10.5" fill="#555">4 tareas "perdidas" reaparecen</text>

  <!-- resultado -->
  <line x1="688" y1="238" x2="688" y2="278" stroke="#1c7c3c" stroke-width="2" marker-end="url(#d)"/>
  <rect x="540" y="288" width="296" height="70" rx="8" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.6"/>
  <text x="688" y="316" font-size="13" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Llama 3.1:  67 %  →  83 %</text>
  <text x="688" y="340" font-size="10.5" text-anchor="middle" fill="#555">el ranking correcto no existía</text>
  <text x="688" y="354" font-size="10.5" text-anchor="middle" fill="#555">hasta arreglar cómo medía</text>
</svg>
