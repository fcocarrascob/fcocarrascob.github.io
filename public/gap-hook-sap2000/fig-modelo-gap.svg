<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">El mismo pórtico, ahora con un puntal vertical (Gap) bajo la cumbre</text>

  <!-- ground -->
  <line x1="120" y1="360" x2="780" y2="360" stroke="#8a857c" stroke-width="1.5"/>

  <!-- supports (fixed, hatched), muted -->
  <g stroke="#c3c2b7" stroke-width="1.2">
    <rect x="182" y="360" width="36" height="14" fill="#efece6"/>
    <rect x="682" y="360" width="36" height="14" fill="#efece6"/>
    <line x1="182" y1="374" x2="172" y2="384"/><line x1="192" y1="374" x2="182" y2="384"/>
    <line x1="202" y1="374" x2="192" y2="384"/><line x1="212" y1="374" x2="202" y2="384"/>
    <line x1="682" y1="374" x2="672" y2="384"/><line x1="692" y1="374" x2="682" y2="384"/>
    <line x1="702" y1="374" x2="692" y2="384"/><line x1="712" y1="374" x2="702" y2="384"/>
  </g>

  <!-- columns and rafters, muted (context only) -->
  <g stroke="#b7b4ab" stroke-width="3.5">
    <line x1="200" y1="360" x2="200" y2="200"/>
    <line x1="700" y1="360" x2="700" y2="200"/>
    <line x1="200" y1="200" x2="325" y2="145"/>
    <line x1="325" y1="145" x2="450" y2="90"/>
    <line x1="450" y1="90" x2="575" y2="145"/>
    <line x1="575" y1="145" x2="700" y2="200"/>
  </g>
  <!-- existing horizontal Hook tie, muted -->
  <line x1="325" y1="145" x2="575" y2="145" stroke="#a8bcd8" stroke-width="4"/>
  <text x="325" y="163" font-size="10.5" fill="#8896ab" text-anchor="middle">tirante Hook (ya calibrado)</text>

  <!-- new vertical prop base -->
  <g stroke="#8a857c" stroke-width="1.2">
    <rect x="432" y="360" width="36" height="14" fill="#dcd8d0"/>
    <line x1="432" y1="374" x2="422" y2="384"/><line x1="442" y1="374" x2="432" y2="384"/>
    <line x1="452" y1="374" x2="442" y2="384"/><line x1="462" y1="374" x2="452" y2="384"/>
  </g>
  <text x="450" y="400" font-size="11" text-anchor="middle" fill="#555">nueva fundación (empotrada)</text>

  <!-- vertical prop, highlighted -->
  <line x1="450" y1="360" x2="450" y2="102" stroke="#b35c0e" stroke-width="5"/>
  <text x="480" y="230" font-size="12.5" fill="#b35c0e" font-weight="bold" transform="rotate(-90 480,230)">puntal vertical (candidato a Gap)</text>

  <!-- gap symbol near ridge -->
  <line x1="450" y1="102" x2="450" y2="90" stroke="#b35c0e" stroke-width="2" stroke-dasharray="3 2"/>
  <circle cx="450" cy="90" r="4" fill="#1c7c3c"/>
  <line x1="454" y1="97" x2="480" y2="118" stroke="#b35c0e" stroke-width="1"/>
  <text x="486" y="120" font-size="11" fill="#b35c0e" font-weight="bold">holgura 10 mm</text>
  <text x="486" y="134" font-size="10.5" fill="#555">(Gap, cierra en compresión)</text>

  <!-- SNOW load arrows -->
  <g stroke="#b02a1a" stroke-width="2" marker-end="url(#armd2)">
    <line x1="285" y1="128" x2="285" y2="153"/>
    <line x1="615" y1="128" x2="615" y2="153"/>
  </g>
  <defs>
    <marker id="armd2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>

  <text x="450" y="55" font-size="11.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">5 — cumbre</text>

  <text x="450" y="415" font-size="12" text-anchor="middle" fill="#555">Cuando la cumbre baja 10 mm, toca el puntal y lo comprime — el mecanismo opuesto al tirante Hook</text>
</svg>
