<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="450" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">El pórtico y el puntal candidato bajo la cumbre</text>

  <!-- ground -->
  <line x1="120" y1="360" x2="780" y2="360" stroke="#8a857c" stroke-width="1.5"/>

  <!-- supports (fixed, hatched) -->
  <g stroke="#8a857c" stroke-width="1.2">
    <rect x="182" y="360" width="36" height="14" fill="#dcd8d0"/>
    <rect x="682" y="360" width="36" height="14" fill="#dcd8d0"/>
    <line x1="182" y1="374" x2="172" y2="384"/><line x1="192" y1="374" x2="182" y2="384"/>
    <line x1="202" y1="374" x2="192" y2="384"/><line x1="212" y1="374" x2="202" y2="384"/>
    <line x1="682" y1="374" x2="672" y2="384"/><line x1="692" y1="374" x2="682" y2="384"/>
    <line x1="702" y1="374" x2="692" y2="384"/><line x1="712" y1="374" x2="702" y2="384"/>
  </g>

  <!-- columns -->
  <line x1="200" y1="360" x2="200" y2="200" stroke="#333" stroke-width="4"/>
  <line x1="700" y1="360" x2="700" y2="200" stroke="#333" stroke-width="4"/>

  <!-- rafters: 1-6-5 and 5-7-4 -->
  <line x1="200" y1="200" x2="325" y2="145" stroke="#333" stroke-width="4"/>
  <line x1="325" y1="145" x2="450" y2="90" stroke="#333" stroke-width="4"/>
  <line x1="450" y1="90" x2="575" y2="145" stroke="#333" stroke-width="4"/>
  <line x1="575" y1="145" x2="700" y2="200" stroke="#333" stroke-width="4"/>

  <!-- puntal, highlighted -->
  <line x1="325" y1="145" x2="575" y2="145" stroke="#1a63a8" stroke-width="5"/>
  <text x="450" y="132" font-size="12.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">puntal "PUNTAL" (candidato a Hook)</text>

  <!-- SNOW load arrows on rafters -->
  <g stroke="#b02a1a" stroke-width="2" marker-end="url(#armd)">
    <line x1="245" y1="150" x2="245" y2="175"/>
    <line x1="285" y1="128" x2="285" y2="153"/>
    <line x1="390" y1="98" x2="390" y2="123"/>
    <line x1="510" y1="98" x2="510" y2="123"/>
    <line x1="615" y1="128" x2="615" y2="153"/>
    <line x1="655" y1="150" x2="655" y2="175"/>
  </g>
  <defs>
    <marker id="armd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b02a1a"/>
    </marker>
  </defs>
  <text x="450" y="60" font-size="12" text-anchor="middle" fill="#b02a1a">SNOW (proyectada, kgf/m²)</text>

  <!-- node labels -->
  <g font-size="11.5" fill="#222">
    <circle cx="200" cy="360" r="3.5" fill="#333"/><text x="196" y="382" text-anchor="end">2 (0,0)</text>
    <circle cx="200" cy="200" r="3.5" fill="#333"/><text x="188" y="196" text-anchor="end">1 (0,6)</text>
    <circle cx="700" cy="360" r="3.5" fill="#333"/><text x="704" y="382">3 (6,0)</text>
    <circle cx="700" cy="200" r="3.5" fill="#333"/><text x="712" y="196">4 (6,6)</text>
    <circle cx="450" cy="90" r="4" fill="#1c7c3c"/><text x="450" y="76" text-anchor="middle" fill="#1c7c3c" font-weight="bold">5 — cumbre (3,7)</text>
    <circle cx="325" cy="145" r="3.5" fill="#1a63a8"/><text x="315" y="165" text-anchor="end">6 (1.5, 6.5)</text>
    <circle cx="575" cy="145" r="3.5" fill="#1a63a8"/><text x="585" y="165">7 (4.5, 6.5)</text>
  </g>

  <text x="450" y="405" font-size="12.5" text-anchor="middle" fill="#555">Luz 6 m, cumbre a 1 m sobre los hombros — el puntal 6-7 pasa 0.5 m bajo la cumbre, sin tocarla</text>
</svg>
