<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="940" height="300" fill="#ffffff"/>
  <text x="470" y="28" font-size="14.5" text-anchor="middle" fill="#222" font-weight="bold">Por qué el puntal necesita 4 links, no 2</text>

  <!-- chain: 6 - [hook || rigido] - 8 - frame - 9 - [hook || rigido] - 7 -->
  <g font-size="12.5" fill="#222" text-anchor="middle">
    <circle cx="80" cy="150" r="5" fill="#333"/><text x="80" y="175">6</text>
    <circle cx="300" cy="150" r="5" fill="#333"/><text x="300" y="175">8</text>
    <circle cx="640" cy="150" r="5" fill="#333"/><text x="640" y="175">9</text>
    <circle cx="860" cy="150" r="5" fill="#333"/><text x="860" y="175">7</text>
  </g>

  <!-- left pair of parallel links: 6 -> 8 -->
  <path d="M80,150 C 140,110 240,110 300,150" fill="none" stroke="#1a63a8" stroke-width="2.5"/>
  <text x="190" y="103" font-size="11.5" text-anchor="middle" fill="#1a63a8" font-weight="bold">Link Hook (U1, no lineal)</text>
  <path d="M80,150 C 140,190 240,190 300,150" fill="none" stroke="#1c7c3c" stroke-width="2.5"/>
  <text x="190" y="212" font-size="11.5" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Link Linear (U2,U3 rígido)</text>

  <!-- frame PUNTAL: 8 -> 9 -->
  <line x1="300" y1="150" x2="640" y2="150" stroke="#8a7449" stroke-width="6"/>
  <text x="470" y="140" font-size="12.5" text-anchor="middle" fill="#6b5a38" font-weight="bold">frame PUNTAL (sección real)</text>

  <!-- right pair of parallel links: 9 -> 7 -->
  <path d="M640,150 C 700,110 800,110 860,150" fill="none" stroke="#1a63a8" stroke-width="2.5"/>
  <path d="M640,150 C 700,190 800,190 860,150" fill="none" stroke="#1c7c3c" stroke-width="2.5"/>

  <!-- warning callout -->
  <g>
    <rect x="60" y="235" width="820" height="46" rx="6" fill="#fff6e0" stroke="#e0a010" stroke-width="1"/>
    <text x="80" y="253" font-size="12" fill="#8a5c00" font-weight="bold">SapModel.PropLink.SetHook solo acepta 1 GDL activo por propiedad —</text>
    <text x="80" y="270" font-size="12" fill="#8a5c00">"Fixed" en los otros GDL se ignora en silencio (return 0, pero no se guarda). Solución: separar el Hook axial de la rigidez transversal en dos links en paralelo.</text>
  </g>
</svg>
