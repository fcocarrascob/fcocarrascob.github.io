<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="k" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a63a8"/>
    </marker>
    <marker id="p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a5aa6"/>
    </marker>
    <marker id="rr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="860" height="430" fill="#ffffff"/>
  <text x="430" y="26" font-size="15.5" text-anchor="middle" fill="#222" font-weight="bold">Un punto de entrada: ¿elige una herramienta? Verifica. ¿No? Consulta la norma.</text>

  <!-- consulta -->
  <rect x="20" y="188" width="150" height="72" rx="6" fill="#f4f7fb" stroke="#8aa6c4"/>
  <text x="95" y="212" font-size="11.5" text-anchor="middle" fill="#333" font-weight="bold">Consulta</text>
  <text x="95" y="232" font-size="10" text-anchor="middle" fill="#555">en lenguaje</text>
  <text x="95" y="246" font-size="10" text-anchor="middle" fill="#555">natural</text>
  <line x1="170" y1="224" x2="204" y2="224" stroke="#555" stroke-width="1.4" marker-end="url(#k)"/>

  <!-- decisión -->
  <polygon points="286,176 350,224 286,272 222,224" fill="#eef2f7" stroke="#555" stroke-width="1.4"/>
  <text x="286" y="214" font-size="10" text-anchor="middle" fill="#333">¿el modelo llama</text>
  <text x="286" y="228" font-size="10" text-anchor="middle" fill="#333">a una herramienta</text>
  <text x="286" y="242" font-size="10" text-anchor="middle" fill="#333">válida?</text>

  <!-- ===== vía verificación (arriba) ===== -->
  <path d="M286,176 L286,110 L356,110" fill="none" stroke="#1a63a8" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="300" y="104" font-size="10.5" fill="#1a63a8" font-weight="bold">sí</text>

  <rect x="360" y="84" width="150" height="52" rx="6" fill="#eaf1fb" stroke="#1a63a8"/>
  <text x="435" y="106" font-size="11" text-anchor="middle" fill="#1a63a8" font-weight="bold">Herramienta calcula</text>
  <text x="435" y="123" font-size="9.5" text-anchor="middle" fill="#555">(números en Python)</text>

  <!-- loop reparación -->
  <path d="M435,84 C435,52 360,52 372,78" fill="none" stroke="#c0392b" stroke-width="1.3" marker-end="url(#rr)"/>
  <text x="404" y="48" font-size="9" text-anchor="middle" fill="#c0392b">se niega → corrige y reintenta</text>

  <line x1="510" y1="110" x2="654" y2="110" stroke="#1a63a8" stroke-width="1.5" marker-end="url(#b)"/>
  <text x="582" y="103" font-size="9.5" text-anchor="middle" fill="#555">narra</text>
  <rect x="658" y="84" width="182" height="52" rx="6" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.5"/>
  <text x="749" y="106" font-size="11" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Verificación con cita</text>
  <text x="749" y="123" font-size="9.5" text-anchor="middle" fill="#555">demanda/capacidad/uso · §</text>

  <!-- ===== vía consulta normativa (abajo) ===== -->
  <path d="M286,272 L286,338 L356,338" fill="none" stroke="#7a5aa6" stroke-width="1.5" marker-end="url(#p)"/>
  <text x="300" y="332" font-size="10.5" fill="#7a5aa6" font-weight="bold">no</text>
  <text x="286" y="300" font-size="9" text-anchor="middle" fill="#7a5aa6">(o inventó una</text>
  <text x="286" y="312" font-size="9" text-anchor="middle" fill="#7a5aa6">tool inexistente)</text>

  <rect x="360" y="312" width="150" height="52" rx="6" fill="#f2ecfa" stroke="#7a5aa6"/>
  <text x="435" y="334" font-size="11" text-anchor="middle" fill="#7a5aa6" font-weight="bold">RAG (corpus)</text>
  <text x="435" y="351" font-size="9.5" text-anchor="middle" fill="#555">recupera por similitud</text>

  <line x1="510" y1="338" x2="654" y2="338" stroke="#7a5aa6" stroke-width="1.5" marker-end="url(#p)"/>
  <rect x="658" y="306" width="182" height="64" rx="6" fill="#eef7ee" stroke="#1c7c3c" stroke-width="1.5"/>
  <text x="749" y="328" font-size="11" text-anchor="middle" fill="#1c7c3c" font-weight="bold">Respuesta con cita</text>
  <text x="749" y="345" font-size="9.5" text-anchor="middle" fill="#555">del corpus [§…],</text>
  <text x="749" y="359" font-size="9.5" text-anchor="middle" fill="#555">o se niega si no hay respaldo</text>

  <!-- nota central -->
  <text x="430" y="224" font-size="9.5" text-anchor="middle" fill="#888" font-style="italic">ambas vías:</text>
  <text x="430" y="238" font-size="9.5" text-anchor="middle" fill="#888" font-style="italic">respuesta con procedencia</text>
</svg>
